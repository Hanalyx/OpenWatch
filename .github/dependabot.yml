version: 2
updates:
  # Go module for the OpenWatch Go rebuild. The module lives at the repo root
  # (promoted from app/ on 2026-06-05), so the directory is "/".
  # See specs/system/supply-chain.spec.yaml — every accepted update must also
  # update the depguard allowlist in .golangci.yml if the module set changes.
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    rebase-strategy: "auto"
    reviewers:
      - "Hanalyx/security-team"
    labels:
      - "dependencies"
      - "go"
      - "supply-chain"
    commit-message:
      prefix: "deps(go)"
      include: "scope"
    groups:
      go-patch:
        patterns:
          - "*"
        update-types:
          - "patch"
      go-minor:
        patterns:
          - "*"
        update-types:
          - "minor"

  # JavaScript dependencies for the active frontend (React 19 + Vite).
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    rebase-strategy: "disabled"
    reviewers:
      - "Hanalyx/frontend-team"
    labels:
      - "dependencies"
      - "frontend"
      - "javascript"
    commit-message:
      prefix: "frontend"
      include: "scope"
    groups:
      mui-packages:
        patterns:
          - "@mui/*"
          - "@emotion/*"
        update-types:
          - "minor"
          - "patch"
      react-packages:
        patterns:
          - "react"
          - "react-dom"
          - "react-router*"
          - "@types/react*"
        update-types:
          - "minor"
          - "patch"
      testing-packages:
        patterns:
          - "@playwright/*"
          - "playwright"
          - "vitest"
          - "@vitest/*"
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      npm-production:
        patterns:
          - "*"
        exclude-patterns:
          - "@mui/*"
          - "@emotion/*"
          - "react*"
          - "@types/react*"
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      npm-development:
        patterns:
          - "*"
        exclude-patterns:
          - "@playwright/*"
          - "playwright"
          - "vitest"
          - "@vitest/*"
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    allow:
      - dependency-type: "development"
        update-type: "version-update:semver-patch"
      - dependency-type: "production"
        update-type: "version-update:semver-patch"
    ignore:
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@mui/material"
        update-types: ["version-update:semver-major"]
      - dependency-name: "*"
        versions: ["*alpha*", "*beta*", "*rc*", "*pre*", "*dev*"]

  # GitHub Actions used by the CI/release/packaging workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "10:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    rebase-strategy: "disabled"
    reviewers:
      - "Hanalyx/security-team"
    labels:
      - "dependencies"
      - "ci-cd"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    allow:
      - dependency-type: "all"
        update-type: "version-update:semver-patch"

  # Security-only updates for the frontend on a daily cadence.
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "UTC"
    target-branch: "main"
    rebase-strategy: "disabled"
    labels:
      - "dependencies"
      - "security"
      - "critical"
      - "frontend"
    reviewers:
      - "Hanalyx/security-team"
    commit-message:
      prefix: "security(frontend)"
      include: "scope"
    allow:
      - dependency-type: "all"
        update-type: "security-update"
