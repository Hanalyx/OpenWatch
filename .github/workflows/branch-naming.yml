# Branch naming convention check
#
# Enforces the prefix policy from .github/BRANCH_MANAGEMENT.md.
# Fails the PR when the head branch name does not start with a
# recognised conventional-commit prefix or one of the auto/release
# exceptions (dependabot/, release/).
#
# Reports as a single check named "Branch naming convention" so it
# can be added to required-status-checks if you want to harden the
# gate further; today it runs on every PR but is not required to
# merge, so a reviewer can manually rename or override when
# legitimately needed.
name: Branch naming

on:
  pull_request:
    branches: [main]
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read

jobs:
  check:
    name: Branch naming convention
    runs-on: ubuntu-latest
    steps:
      - name: Validate head branch prefix
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          # Allowed conventional-commit prefixes plus auto/release lanes.
          allowed='^(feat|fix|chore|docs|refactor|perf|test|build|ci|revert|release|dependabot)/'
          if [[ "$HEAD_REF" =~ $allowed ]]; then
            echo "Branch '$HEAD_REF' matches the naming policy."
            exit 0
          fi
          echo "::error::Branch '$HEAD_REF' does not match the naming policy."
          echo ""
          echo "Required prefixes (see .github/BRANCH_MANAGEMENT.md):"
          echo "  feat/      — new feature or capability"
          echo "  fix/       — bug fix"
          echo "  chore/     — maintenance, refactor, infra"
          echo "  docs/      — documentation only"
          echo "  refactor/  — internal restructure, no behavior change"
          echo "  perf/      — performance change"
          echo "  test/      — test-only changes"
          echo "  build/     — build system change"
          echo "  ci/        — CI configuration change"
          echo "  revert/    — reverting a prior change"
          echo "  release/   — release branch"
          echo "  dependabot/ — auto-generated by Dependabot"
          echo ""
          echo "Rename the branch with:"
          echo "  git branch -m <new-name>"
          echo "  git push origin :<old-name> <new-name>"
          echo "  gh pr edit <num> --base main --head <new-name>"
          exit 1
