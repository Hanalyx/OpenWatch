# Pre-merge gates for the Go rebuild in app/.
#
# Runs: make vet, make lint (staticcheck + gosec + ...), make vuln
# (govulncheck), make test-race (data races + full integration suite
# against a Postgres service container), and `specter sync` (spec
# validation + strict AC coverage).
#
# Spec: app/specs/release/ci-gates.spec.yaml.

name: Go CI

# Triggers on every push/PR to main. The gates job detects whether the
# change touches app/** internally; if not, the job short-circuits to
# success so the required-status-check ("Quality + security gates") is
# present even for doc-only, packaging-only, or backend/frontend-only
# PRs. This avoids the "missing required check" bootstrap problem
# described in .github/BRANCH_MANAGEMENT.md under Troubleshooting.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gates:
    name: Quality + security gates
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: openwatch
          POSTGRES_PASSWORD: openwatch_ci
          POSTGRES_DB: openwatch_go_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: app
        shell: bash

    env:
      OPENWATCH_TEST_DSN: postgres://openwatch:openwatch_ci@127.0.0.1:5432/openwatch_go_test?sslmode=disable
      # Spec system-supply-chain C-03 / AC-05: pin every go command in
      # this workflow to read-only module resolution so a typo in
      # go.mod or an out-of-band fetch attempt fails the build instead
      # of silently mutating the lockfile.
      GOFLAGS: -mod=readonly
      # Test-DB isolation guard: CI's openwatch_go_test name already
      # ends in _test so the runtime guard accepts it without bypass.
      OPENWATCH_TEST_DSN_ALLOW_NONTEST: "no"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Detect whether this push/PR touches app/** (or the workflow
      # file itself). For non-Go changes the job short-circuits to
      # success below — this keeps "Quality + security gates" present
      # as a green check for doc/packaging/backend/frontend PRs.
      - id: paths
        name: Detect app/** changes
        working-directory: ${{ github.workspace }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            changed=$(git diff --name-only "$base" "$head" || git diff --name-only "origin/${{ github.event.pull_request.base.ref }}...HEAD")
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            changed=$(git diff --name-only "$base" "$head" 2>/dev/null || git ls-files)
          fi
          if echo "$changed" | grep -qE '^(app/|\.github/workflows/go-ci\.yml$)'; then
            echo "go=true" >> "$GITHUB_OUTPUT"
            echo "Go-relevant changes detected — running full pipeline."
          else
            echo "go=false" >> "$GITHUB_OUTPUT"
            echo "No app/** changes — gate trivially passes."
          fi

      - name: Set up Go
        if: steps.paths.outputs.go == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
          cache: true
          cache-dependency-path: app/go.sum

      - name: Set up golangci-lint
        if: steps.paths.outputs.go == 'true'
        # Build from source against the runner's Go toolchain. The
        # prebuilt v1.64.8 binary was compiled with Go 1.24, which
        # refuses to load configs targeting Go 1.25. Building from
        # source gets us a binary matched to the runner's toolchain.
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          golangci-lint --version

      - name: Set up specter
        if: steps.paths.outputs.go == 'true'
        env:
          # Pinned so CI is reproducible. Bump in lockstep with any
          # spec-schema change required by app/specs/.
          SPECTER_VERSION: "0.13.2"
        run: |
          curl -fsSL "https://github.com/Hanalyx/specter/releases/download/v${SPECTER_VERSION}/specter_${SPECTER_VERSION}_linux_amd64.tar.gz" \
              -o /tmp/specter.tar.gz
          tar -xzf /tmp/specter.tar.gz -C /tmp specter
          install -m 0755 /tmp/specter /usr/local/bin/specter
          specter --version

      # Spec system-supply-chain C-04 / AC-06: every PR re-runs
      # `go mod tidy` and refuses to merge if go.mod / go.sum have
      # drifted. Catches stale dependency declarations + accidental
      # indirect-to-direct promotions.
      # GOFLAGS=-mod=readonly (AC-05) is unset for THIS step because
      # `go mod tidy` mutates go.mod/go.sum by design; readonly would
      # block it. Drift is detected via the follow-up `git diff` instead.
      - name: go mod tidy + diff
        if: steps.paths.outputs.go == 'true'
        working-directory: app
        env:
          GOFLAGS: ""
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum || {
            echo "::error::go.mod / go.sum drifted from 'go mod tidy' output. Run 'go mod tidy' locally and commit.";
            exit 1;
          }

      - name: make vet
        if: steps.paths.outputs.go == 'true'
        run: make vet

      - name: make lint
        if: steps.paths.outputs.go == 'true'
        run: make lint

      - name: make vuln
        if: steps.paths.outputs.go == 'true'
        run: make vuln

      - name: make test-race
        if: steps.paths.outputs.go == 'true'
        run: make test-race

      # Spec coverage gate. Split into discrete steps so a failure
      # attributes to the actual command (go test vs. ingest vs. sync)
      # instead of getting hidden behind a single bundled step.
      - name: go test (json) for specter ingest
        if: steps.paths.outputs.go == 'true'
        run: |
          set +e
          go test -json -timeout 360s -p 1 ./... > /tmp/go-test.json
          EXIT=$?
          if [ "$EXIT" -ne 0 ]; then
            echo "::group::Failed tests"
            jq -r 'select(.Action=="fail" and .Test != null) | "FAIL  \(.Package)  \(.Test)"' /tmp/go-test.json | sort -u
            echo "::endgroup::"
            echo "::group::Failure output (last 80 lines)"
            jq -r 'select(.Action=="output" and (.Output | ascii_downcase | test("--- fail|panic:|fatal error|error:"))) | "\(.Package): \(.Output)"' /tmp/go-test.json | tail -80
            echo "::endgroup::"
          fi
          exit $EXIT

      # Frontend Vitest run for specter ingest. The app/specs/frontend/
      # specs reference tests in app/frontend/tests/pages/* (the Go
      # rebuild's frontend, distinct from the legacy frontend/ tree at
      # the repo root). Without these JUnit results, those specs report
      # 0% coverage and fail the threshold gate even though the tests
      # pass. Vitest emits JUnit XML at /tmp/vitest-junit.xml which
      # specter ingest reads alongside the Go test results.
      - name: Set up Node.js
        if: steps.paths.outputs.go == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/frontend/package-lock.json

      - name: app/frontend vitest (junit) for specter ingest
        if: steps.paths.outputs.go == 'true'
        working-directory: app/frontend
        run: |
          npm ci --no-audit --no-fund
          set +e
          npx vitest run --reporter=junit --outputFile=/tmp/vitest-junit.xml --reporter=default
          EXIT=$?
          # Don't block the pipeline on Vitest failure — surface it but
          # let specter sync report which ACs are uncovered. The Go test
          # step above already fails the build on test failure; this
          # mirror keeps the gate's failure source observable.
          if [ "$EXIT" -ne 0 ]; then
            echo "::warning::Vitest reported test failures — see specter coverage for affected ACs"
          fi

      - name: specter ingest
        if: steps.paths.outputs.go == 'true'
        run: specter ingest --go-test /tmp/go-test.json --junit /tmp/vitest-junit.xml

      - name: specter sync (AC coverage thresholds)
        if: steps.paths.outputs.go == 'true'
        # --tests '**/*' broadens default discovery to include .test.tsx
        # files. Specter's `sync` coverage phase does not honor
        # settings.tests_glob in specter.yaml (the `coverage` subcommand
        # does — known specter quirk). The annotation walker still
        # filters on @spec / @ac, so non-test files in the broad glob
        # are skipped at parse time.
        run: specter sync --tests '**/*'

      - name: upload specter artifacts
        if: always() && steps.paths.outputs.go == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: specter-results
          path: |
            app/.specter-results.json
            /tmp/go-test.json
            /tmp/vitest-junit.xml
          retention-days: 7
