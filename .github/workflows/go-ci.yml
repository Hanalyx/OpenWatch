# Pre-merge gates for OpenWatch (repo root).
#
# Runs: make vet, make lint (staticcheck + gosec + ...), make vuln
# (govulncheck), a single `go test -race -json` run (data races + full
# integration suite against a Postgres service container, AND the JSON
# specter ingests — one pass, not two), and `specter sync` (spec
# validation + strict AC coverage).
#
# Spec: specs/release/ci-gates.spec.yaml.

name: Go CI

# Triggers on every push/PR to main. The gates job detects whether the
# change touches Go-relevant paths; if not, the job short-circuits to
# success so the required-status-check ("Quality + security gates") is
# present even for doc-only / meta-only PRs. This avoids the "missing
# required check" bootstrap problem
# described in .github/BRANCH_MANAGEMENT.md under Troubleshooting.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gates:
    name: Quality + security gates
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: openwatch
          POSTGRES_PASSWORD: openwatch_ci
          POSTGRES_DB: openwatch_go_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        shell: bash

    env:
      OPENWATCH_TEST_DSN: postgres://openwatch:openwatch_ci@127.0.0.1:5432/openwatch_go_test?sslmode=disable
      # Spec system-supply-chain C-03 / AC-05: pin every go command in
      # this workflow to read-only module resolution so a typo in
      # go.mod or an out-of-band fetch attempt fails the build instead
      # of silently mutating the lockfile.
      GOFLAGS: -mod=readonly
      # Test-DB isolation guard: CI's openwatch_go_test name already
      # ends in _test so the runtime guard accepts it without bypass.
      OPENWATCH_TEST_DSN_ALLOW_NONTEST: "no"

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Detect whether this push/PR touches Go-relevant paths (or the
      # workflow file itself). For doc/meta-only changes the job
      # short-circuits to success below — this keeps "Quality + security
      # gates" present as a green check on every PR.
      - id: paths
        name: Detect Go-relevant changes
        working-directory: ${{ github.workspace }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            changed=$(git diff --name-only "$base" "$head" || git diff --name-only "origin/${{ github.event.pull_request.base.ref }}...HEAD")
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            changed=$(git diff --name-only "$base" "$head" 2>/dev/null || git ls-files)
          fi
          if echo "$changed" | grep -qE '^(cmd/|internal/|api/|frontend/|specs/|configs/|audit/|auth/|license/|packaging/|scripts/|go\.mod|go\.sum|Makefile|specter\.yaml|sqlc\.yaml|\.golangci\.yml|\.github/workflows/go-ci\.yml$)'; then
            echo "go=true" >> "$GITHUB_OUTPUT"
            echo "Go-relevant changes detected — running full pipeline."
          else
            echo "go=false" >> "$GITHUB_OUTPUT"
            echo "Doc/meta-only change — gate trivially passes."
          fi

      - name: Set up Go
        if: steps.paths.outputs.go == 'true'
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true
          cache-dependency-path: go.sum

      # Cache the from-source golangci-lint binary so we don't rebuild it
      # (~1-3 min) on every run. Keyed on the lint version + Go toolchain:
      # the binary MUST match the runner's Go (the prebuilt v1.64.8 was
      # built with Go 1.24 and refuses Go 1.25+ configs), so a toolchain
      # bump invalidates the cache and triggers a fresh build.
      - name: Cache golangci-lint binary
        if: steps.paths.outputs.go == 'true'
        id: cache-golangci-bin
        uses: actions/cache@v6
        with:
          path: ~/go/bin/golangci-lint
          key: golangci-bin-v1.64.8-go1.26.4-${{ runner.os }}

      - name: Set up golangci-lint
        if: steps.paths.outputs.go == 'true' && steps.cache-golangci-bin.outputs.cache-hit != 'true'
        # Build from source against the runner's Go toolchain (see cache
        # key rationale above). Only runs on a cache miss.
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      # Cache golangci-lint's own analysis cache so `make lint` reuses
      # prior results and only re-lints changed packages. restore-keys
      # falls back to the newest partial cache when no exact hit.
      - name: Cache golangci-lint analysis cache
        if: steps.paths.outputs.go == 'true'
        uses: actions/cache@v6
        with:
          path: ~/.cache/golangci-lint
          key: golangci-cache-${{ runner.os }}-${{ hashFiles('**/*.go') }}
          restore-keys: |
            golangci-cache-${{ runner.os }}-

      - name: golangci-lint version
        if: steps.paths.outputs.go == 'true'
        run: golangci-lint --version

      - name: Set up specter
        if: steps.paths.outputs.go == 'true'
        env:
          # Pinned so CI is reproducible. Bump in lockstep with any
          # spec-schema change required by specs/. 0.14.0 matches the
          # local toolchain; all 75 specs validated against it.
          SPECTER_VERSION: "0.14.0"
        run: |
          curl -fsSL "https://github.com/Hanalyx/specter/releases/download/v${SPECTER_VERSION}/specter_${SPECTER_VERSION}_linux_amd64.tar.gz" \
              -o /tmp/specter.tar.gz
          tar -xzf /tmp/specter.tar.gz -C /tmp specter
          install -m 0755 /tmp/specter /usr/local/bin/specter
          specter --version

      # Spec system-supply-chain C-04 / AC-06: every PR re-runs
      # `go mod tidy` and refuses to merge if go.mod / go.sum have
      # drifted. Catches stale dependency declarations + accidental
      # indirect-to-direct promotions.
      # GOFLAGS=-mod=readonly (AC-05) is unset for THIS step because
      # `go mod tidy` mutates go.mod/go.sum by design; readonly would
      # block it. Drift is detected via the follow-up `git diff` instead.
      - name: go mod tidy + diff
        if: steps.paths.outputs.go == 'true'
        env:
          GOFLAGS: ""
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum || {
            echo "::error::go.mod / go.sum drifted from 'go mod tidy' output. Run 'go mod tidy' locally and commit.";
            exit 1;
          }

      - name: make vet
        if: steps.paths.outputs.go == 'true'
        run: make vet

      - name: make lint
        if: steps.paths.outputs.go == 'true'
        run: make lint

      - name: make vuln
        if: steps.paths.outputs.go == 'true'
        run: make vuln

      # Annotation hygiene: cross-reference every test's @spec / @ac
      # annotation against the spec registry and fail on a dangling spec
      # ref, unknown AC id, malformed AC id, or unreachable annotation
      # error. This catches the class of drift where a spec is renamed or
      # dropped but its test annotations linger (exactly what happened when
      # the connectivity specs were lost in a squash-merge). Gate on the
      # printed error count, not the exit code: `specter check --test`
      # returns 0 on some builds even with errors present.
      - name: specter check --test (annotation hygiene)
        if: steps.paths.outputs.go == 'true'
        run: |
          out=$(specter check --test 2>&1) || true
          echo "$out"
          n=$(echo "$out" | grep -cE 'error \[' || true)
          if [ "$n" -gt 0 ]; then
            echo "::error::specter check --test found $n test-annotation error(s) — fix the dangling @spec / @ac refs listed above."
            exit 1
          fi

      # 100% structural coverage gate. Every acceptance criterion in every spec
      # MUST have at least one test annotation — no AC may silently lose its
      # test. This runs in annotation strictness (structural, no ingest) so it
      # is independent of which tests run in this lane, and it fails fast and
      # with a clear message before the heavier ingest-based outcome gate. The
      # outcome gate (`specter sync` at the manifest's threshold strictness,
      # tiers all 100, below) separately requires every AC's test to PASS; the
      # ingest job provisions OPENWATCH_KENSA_RULES_DIR + OPENWATCH_PACKAGING_BUILD
      # so the formerly env-gated tests run there instead of skipping.
      #
      # NOTE: `specter sync --strictness annotation` would only enforce the
      # per-tier thresholds, so we assert 100% directly: any per-spec row
      # (a "… Tn …" line) not at 100% fails the build.
      - name: specter structural coverage must be 100%
        if: steps.paths.outputs.go == 'true'
        run: |
          report=$(specter coverage --strictness annotation 2>&1)
          echo "$report"
          below=$(echo "$report" | grep -E '\sT[0-9]+\s' | grep -vE '\s100%' || true)
          if [ -n "$below" ]; then
            echo "::error::Specter structural coverage is below 100% — every acceptance criterion must carry a // @ac (Go) or // @ac (frontend) annotation. Specs below 100%:"
            echo "$below"
            exit 1
          fi
          echo "All specs at 100% structural coverage."

      # Single full-suite run that BOTH detects data races and emits the
      # JSON specter ingests — replacing the previous two end-to-end passes
      # (`make test-race` + a separate non-race `go test -json`), which ran
      # the whole serial DB-bound suite twice. Coverage is unaffected: the
      # only `//go:build !race` test file holds constants (with a `race`
      # twin), so every test still compiles+runs under -race, and the perf
      # budgets are non-gating (internal/perftest.Budgetf). Timeout raised
      # to 600s because race instrumentation slows the hot DB packages.
      - name: go test (race + json) for specter ingest
        if: steps.paths.outputs.go == 'true'
        # OPENWATCH_PACKAGING_BUILD=1 opts the native package-build + runtime-boot
        # tests into this run so their AC coverage is enforced in CI; a plain
        # local `go test ./...` skips them (they take minutes and write into
        # dist/). See packaging/tests/package_test.go:requirePackagingBuild.
        env:
          OPENWATCH_PACKAGING_BUILD: "1"
        run: |
          set +e
          # Point the Kensa variable-catalog tests at the real rule corpus that
          # ships inside the kensa module, so api-system-scan-config/AC-08 runs
          # here instead of skipping (100% outcome coverage requires it).
          export OPENWATCH_KENSA_RULES_DIR="$(go list -m -f '{{.Dir}}' github.com/Hanalyx/kensa)/rules"
          go test -race -json -timeout 600s -p 4 ./... > /tmp/go-test.json
          EXIT=$?
          if [ "$EXIT" -ne 0 ]; then
            echo "::group::Failed tests"
            jq -r 'select(.Action=="fail" and .Test != null) | "FAIL  \(.Package)  \(.Test)"' /tmp/go-test.json | sort -u
            echo "::endgroup::"
            echo "::group::Failure output (last 80 lines)"
            jq -r 'select(.Action=="output" and (.Output | ascii_downcase | test("--- fail|panic:|fatal error|error:"))) | "\(.Package): \(.Output)"' /tmp/go-test.json | tail -80
            echo "::endgroup::"
          fi
          exit $EXIT

      # Frontend Vitest run for specter ingest. The specs/frontend/ specs
      # reference tests in frontend/tests/pages/*. Without these JUnit
      # results, those specs report 0% coverage and fail the threshold
      # gate even though the tests pass. Vitest emits JUnit XML at
      # /tmp/vitest-junit.xml which specter ingest reads alongside the Go
      # test results.
      - name: Set up Node.js
        if: steps.paths.outputs.go == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: frontend vitest (junit) for specter ingest
        if: steps.paths.outputs.go == 'true'
        working-directory: frontend
        run: |
          npm ci --no-audit --no-fund
          set +e
          npx vitest run --reporter=junit --outputFile=/tmp/vitest-junit.xml --reporter=default
          EXIT=$?
          # Record the exit code but DON'T fail here: specter ingest (next
          # step) still needs to read the JUnit file, and specter sync should
          # report which ACs the failures left uncovered before we abort.
          # The "Enforce frontend tests passed" step below turns a non-zero
          # result into a hard build failure once specter has run.
          echo "$EXIT" > /tmp/vitest-exit
          if [ "$EXIT" -ne 0 ]; then
            echo "::warning::Vitest reported test failures — specter coverage below shows affected ACs; the build fails at the enforcement step."
          fi

      - name: specter ingest
        if: steps.paths.outputs.go == 'true'
        run: specter ingest --go-test /tmp/go-test.json --junit /tmp/vitest-junit.xml

      - name: specter sync (AC coverage thresholds)
        if: steps.paths.outputs.go == 'true'
        # --tests '**/*' broadens default discovery to include .test.tsx
        # files. Specter's `sync` coverage phase does not honor
        # settings.tests_glob in specter.yaml (the `coverage` subcommand
        # does — known specter quirk). The annotation walker still
        # filters on @spec / @ac, so non-test files in the broad glob
        # are skipped at parse time.
        run: specter sync --tests '**/*'

      # Hard frontend-test gate. Vitest failures are deferred above so
      # specter can ingest the JUnit results and report coverage first; this
      # step makes a real frontend test failure fail the build. A frontend
      # regression that does not happen to map to a spec AC would otherwise
      # slip through (specter only gates annotated ACs), so this is the
      # backstop that keeps `npm test` authoritative in CI.
      - name: Enforce frontend tests passed
        if: steps.paths.outputs.go == 'true'
        run: |
          EXIT=$(cat /tmp/vitest-exit 2>/dev/null || echo 1)
          if [ "$EXIT" -ne 0 ]; then
            echo "::error::Frontend vitest suite failed (exit $EXIT). See the 'frontend vitest' step above."
            exit "$EXIT"
          fi
          echo "frontend vitest suite passed"

      - name: upload specter artifacts
        if: always() && steps.paths.outputs.go == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: specter-results
          path: |
            .specter-results.json
            /tmp/go-test.json
            /tmp/vitest-junit.xml
          retention-days: 7
