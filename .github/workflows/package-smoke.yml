name: Package smoke test

# Install the freshly-built RPM/DEB on each target distribution and smoke-test:
# the package installs cleanly (deps resolve), the system user + files land, and
# the binary runs. This is the automatable half of the pre-release verification
# gate (see docs/runbooks/RELEASING.md) — service start and functional E2E
# against a real fleet remain a manual RC step.
#
# Runs on packaging changes, on release tags, and on demand. amd64 only (the
# GitHub runners are amd64); the arm64 packages are covered by cross-build
# correctness in package-build (AC-14) until arm64 runners/QEMU are wired in.

on:
  push:
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'packaging/**'
      - '.github/workflows/package-smoke.yml'
      - '.github/scripts/install-rpmbuild.sh'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.5'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install rpmbuild
        run: bash .github/scripts/install-rpmbuild.sh
      - name: Build packages
        run: make packages
      - uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            dist/openwatch-*.rpm
            dist/openwatch_*.deb
            dist/kensa-rules-*.rpm
            dist/kensa-rules_*.deb
          retention-days: 3

  smoke:
    name: ${{ matrix.distro }}
    needs: build
    runs-on: ubuntu-latest
    container: ${{ matrix.distro }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { distro: 'rockylinux:9', kind: rpm }
          - { distro: 'almalinux:9', kind: rpm }
          - { distro: 'fedora:41', kind: rpm }
          - { distro: 'oraclelinux:9', kind: rpm }
          - { distro: 'ubuntu:24.04', kind: deb }
          - { distro: 'debian:12', kind: deb }
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: packages
          path: dist

      - name: Install ${{ matrix.kind }}
        run: |
          set -eux
          if [ "${{ matrix.kind }}" = "rpm" ]; then
            # Both local files in one transaction: dnf resolves
            # postgresql-server from the distro repos and the hard
            # kensa-rules dependency from the local noarch RPM. Installing
            # openwatch alone MUST fail (corpus dependency unsatisfiable
            # offline) — passing here proves the both-file air-gapped path.
            dnf install -y ./dist/openwatch-*.x86_64.rpm ./dist/kensa-rules-*.noarch.rpm
          else
            apt-get update
            # apt install of local .debs pulls declared deps; the openwatch
            # .deb Depends on kensa-rules, satisfied by the local all .deb.
            apt-get install -y ./dist/openwatch_*_amd64.deb ./dist/kensa-rules_*_all.deb
          fi

      - name: Smoke-test the install
        run: |
          set -eux
          # Files in the expected places.
          test -x /usr/bin/openwatch
          test -f /etc/openwatch/openwatch.toml
          test -f /etc/systemd/system/openwatch.service
          test -f /etc/openwatch/tls/cert.pem
          # System user created by the post-install scriptlet.
          id openwatch
          # Kensa rule corpus landed at the engine's default load path, and
          # carries the full rule set — a scan-capable install, not a stub.
          test -d /usr/share/kensa/rules
          rule_count="$(find /usr/share/kensa/rules -name '*.yml' | wc -l)"
          test "$rule_count" -ge 500
          # Identity keys provisioned by the post-install scriptlet (the server
          # refuses to auto-generate them and exits without them).
          test -f /etc/openwatch/keys/jwt_private.pem
          test -f /etc/openwatch/keys/credential.key
          # JWT key is a valid RSA key; DEK is exactly 32 bytes; DEK is 0600.
          openssl rsa -in /etc/openwatch/keys/jwt_private.pem -noout -check
          test "$(stat -c '%s' /etc/openwatch/keys/credential.key)" -eq 32
          test "$(stat -c '%a' /etc/openwatch/keys/credential.key)" = "600"
          # Binary runs (no DB needed for these).
          /usr/bin/openwatch --version
          /usr/bin/openwatch check-config

  # Full package-UPGRADE path: build an old (release 1) + new (release 2) RPM,
  # then in a rockylinux:9 container install the old one, stand up Postgres,
  # roll the schema back one migration, and `rpm -U` the new one — asserting
  # the %post scriptlet migrates the DB to head, takes a pre-upgrade backup,
  # and stop/starts the service. This is the half the per-distro `smoke` job
  # (a fresh install) does not cover. The driver script builds both RPMs and
  # runs the container; it uses --network host (so the container's dnf reaches
  # mirrors) and a throwaway Postgres on port 55432.
  upgrade:
    name: Package upgrade (rpm -U auto-migrate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.5'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install rpmbuild
        run: bash .github/scripts/install-rpmbuild.sh
      - name: Build old+new RPMs and run the container upgrade test
        run: bash packaging/tests/run-upgrade-container-test.sh
