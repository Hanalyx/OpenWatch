name: Release

# Cut a release on a v* tag (or manually via workflow_dispatch). Builds the
# native RPM + DEB for amd64 and arm64 (each a complete API+UI binary — the SPA
# is embedded), generates a CycloneDX SBOM per artifact with syft, writes signed
# checksums, and publishes everything to a GitHub Release.
#
# Distribution model: GitHub Releases. Operators download and
# `sudo dnf install ./openwatch-*.rpm` / `sudo apt install ./openwatch_*.deb`.
#
# Spec: specs/system/supply-chain.spec.yaml AC-08 (syft SBOM) / AC-09 (CycloneDX
#       1.5); specs/release/package-build.spec.yaml.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, e.g. v0.2.0 (tag is created on publish)'
        required: true
        type: string

permissions:
  contents: write # create the release + upload assets

jobs:
  release:
    name: Build, SBOM, sign, publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install rpmbuild
        run: sudo apt-get update && sudo apt-get install -y rpm

      # Builds all four artifacts: RPM + DEB for amd64 and arm64. arm64 is a
      # CGO-disabled cross-compile, so no C cross-toolchain is required.
      - name: Build packages (amd64 + arm64)
        run: make packages

      # Detect which signing keys are configured. The `secrets` context is not
      # allowed in `if:`, so resolve presence here (secrets ARE allowed via env)
      # and gate the signing steps on these outputs.
      - name: Detect signing keys
        id: keys
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            echo "gpg=true" >> "$GITHUB_OUTPUT"
          else
            echo "gpg=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No GPG_PRIVATE_KEY secret — packages and checksums will be published unsigned."
          fi
          if [ -n "$COSIGN_PRIVATE_KEY" ]; then
            echo "cosign=true" >> "$GITHUB_OUTPUT"
          else
            echo "cosign=false" >> "$GITHUB_OUTPUT"
          fi

      # Per-package GPG signatures for the RPMs. rpmsign embeds the signature in
      # each RPM header (operators verify with `rpm --import KEYS` + `rpm -K`, or
      # dnf gpgcheck). Runs BEFORE SBOM/checksums because it rewrites the package
      # bytes. The default %__gpg points at gpg2, absent on Ubuntu runners, so set
      # it explicitly.
      #
      # DEBs are NOT signed per-package: apt/dpkg never verify standalone-.deb
      # signatures, and the tooling that produced them (dpkg-sig) was removed from
      # Ubuntu. Each .deb's authenticity instead rides on its SHA256 in the
      # GPG-signed (and cosign-signed) SHA256SUMS manifest below. A signed apt
      # repo is the proper next step if per-DEB trust is ever required.
      - name: GPG-sign RPMs
        if: steps.keys.outputs.gpg == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          key_id="$(gpg --list-secret-keys --with-colons | awk -F: '/^sec/{print $5; exit}')"
          gpg_bin="$(command -v gpg)"
          # Non-interactive rpmsign with a loopback-passphrase sign command.
          cat > "$HOME/.rpmmacros" <<RPMMACROS
          %__gpg ${gpg_bin}
          %_signature gpg
          %_gpg_name ${key_id}
          %__gpg_sign_cmd %{__gpg} --batch --no-armor --pinentry-mode loopback --passphrase ${GPG_PASSPHRASE} --no-secmem-warning --digest-algo sha256 -u "%{_gpg_name}" -sbo %{__signature_filename} %{__plaintext_filename}
          RPMMACROS
          rpmsign --addsign dist/openwatch-*.rpm

      # SBOM: syft scans the actual (signed) binary and packages and emits
      # CycloneDX 1.5 JSON — supply-chain AC-08 / AC-09.
      - name: Install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b "$HOME/.local/bin"

      - name: Generate CycloneDX SBOMs
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          mkdir -p dist/sbom
          # CycloneDX 1.5 schema the emitted SBOMs validate against:
          #   https://cyclonedx.org/schema/bom-1.5.schema.json
          for art in dist/openwatch dist/openwatch-*.rpm dist/openwatch_*.deb; do
            [ -e "$art" ] || continue
            name="$(basename "$art")"
            syft scan "file:$art" -o "cyclonedx-json=dist/sbom/${name}.cdx.json"
          done
          ls -l dist/sbom

      - name: Checksums
        run: |
          cd dist
          sha256sum openwatch-*.rpm openwatch_*.deb sbom/*.cdx.json > SHA256SUMS
          cat SHA256SUMS

      # Detached GPG signature over the checksum manifest — the universal verify
      # path (`gpg --verify SHA256SUMS.asc SHA256SUMS`), independent of rpm/dpkg.
      # The key was already imported by the GPG-sign packages step.
      - name: GPG-sign checksums
        if: steps.keys.outputs.gpg == 'true'
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          cd dist
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$GPG_PASSPHRASE" \
            --armor --detach-sign --output SHA256SUMS.asc SHA256SUMS

      # cosign attestation over the checksum manifest (sigstore). Offline,
      # key-based, no Rekor transparency-log upload.
      - name: Install cosign
        if: steps.keys.outputs.cosign == 'true'
        uses: sigstore/cosign-installer@v3.7.0

      - name: Cosign-sign checksums
        if: steps.keys.outputs.cosign == 'true'
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign sign-blob --yes --tlog-upload=false \
            --key env://COSIGN_PRIVATE_KEY \
            --output-signature dist/SHA256SUMS.cosign.sig dist/SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            dist/openwatch-*.rpm
            dist/openwatch_*.deb
            dist/SHA256SUMS
            dist/SHA256SUMS.asc
            dist/SHA256SUMS.cosign.sig
            dist/sbom/*.cdx.json
            KEYS
