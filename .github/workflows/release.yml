name: Release

# Cut a release on a v* tag (or manually via workflow_dispatch). Builds the
# native RPM + DEB for amd64 and arm64 (each a complete API+UI binary — the SPA
# is embedded), generates a CycloneDX SBOM per artifact with syft, writes signed
# checksums, and publishes everything to a GitHub Release.
#
# Distribution model: GitHub Releases. Operators download and
# `sudo dnf install ./openwatch-*.rpm` / `sudo apt install ./openwatch_*.deb`.
#
# Spec: specs/system/supply-chain.spec.yaml AC-08 (syft SBOM) / AC-09 (CycloneDX
#       1.5); specs/release/package-build.spec.yaml.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, e.g. v0.2.0 (tag is created on publish)'
        required: true
        type: string

permissions:
  contents: write # create the release + upload assets

jobs:
  release:
    name: Build, SBOM, sign, publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install rpmbuild
        run: bash .github/scripts/install-rpmbuild.sh

      # Builds all four artifacts: RPM + DEB for amd64 and arm64. arm64 is a
      # CGO-disabled cross-compile, so no C cross-toolchain is required.
      - name: Build packages (amd64 + arm64)
        run: make packages

      # Pre-release packages carry a '~' in their filename (e.g.
      # openwatch-0.2.0~rc.8-1.x86_64.rpm). GitHub release assets replace '~'
      # with '.', which would desync the served asset names from the
      # SHA256SUMS manifest computed below and break `sha256sum -c`. Normalize
      # to the form GitHub will serve BEFORE signing, SBOMs, and checksums so
      # they all agree. The package INTERNAL version keeps the '~' (that is what
      # dnf/apt compare); only the filename label changes.
      - name: Normalize artifact filenames for GitHub Releases
        run: |
          shopt -s nullglob
          cd dist
          for f in *~*; do
            mv -- "$f" "${f//\~/.}"
          done
          ls -1

      # Detect which signing keys are configured. The `secrets` context is not
      # allowed in `if:`, so resolve presence here (secrets ARE allowed via env)
      # and gate the signing steps on these outputs.
      - name: Detect signing keys
        id: keys
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            echo "gpg=true" >> "$GITHUB_OUTPUT"
          elif [ "$GITHUB_EVENT_NAME" = "push" ]; then
            # A v* tag push is an intentional release cut — publishing it
            # unsigned would ship packages operators cannot verify. Fail
            # closed. Manual workflow_dispatch runs (dry-runs / trials) stay
            # permissive below so an unsigned trial build is still possible.
            echo "::error::No GPG_PRIVATE_KEY secret configured, but this is a tag-push release ($GITHUB_REF_NAME). Refusing to publish unsigned packages. Configure the GPG_PRIVATE_KEY secret, or cut an unsigned trial via workflow_dispatch."
            exit 1
          else
            echo "gpg=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No GPG_PRIVATE_KEY secret — this workflow_dispatch build will be published UNSIGNED. Tag pushes fail closed instead."
          fi
          if [ -n "$COSIGN_PRIVATE_KEY" ]; then
            echo "cosign=true" >> "$GITHUB_OUTPUT"
          else
            echo "cosign=false" >> "$GITHUB_OUTPUT"
          fi

      # Per-package GPG signatures for the RPMs. rpmsign embeds the signature in
      # each RPM header (operators verify with `rpm --import KEYS` + `rpm -K`, or
      # dnf gpgcheck). Runs BEFORE SBOM/checksums because it rewrites the package
      # bytes. The default %__gpg points at gpg2, absent on Ubuntu runners, so set
      # it explicitly.
      #
      # DEBs are NOT signed per-package: apt/dpkg never verify standalone-.deb
      # signatures, and the tooling that produced them (dpkg-sig) was removed from
      # Ubuntu. Each .deb's authenticity instead rides on its SHA256 in the
      # GPG-signed (and cosign-signed) SHA256SUMS manifest below. A signed apt
      # repo is the proper next step if per-DEB trust is ever required.
      - name: GPG-sign RPMs
        if: steps.keys.outputs.gpg == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          key_id="$(gpg --list-secret-keys --with-colons | awk -F: '/^sec/{print $5; exit}')"
          gpg_bin="$(command -v gpg)"
          # Non-interactive rpmsign with a loopback-passphrase sign command.
          cat > "$HOME/.rpmmacros" <<RPMMACROS
          %__gpg ${gpg_bin}
          %_signature gpg
          %_gpg_name ${key_id}
          %__gpg_sign_cmd %{__gpg} --batch --no-armor --pinentry-mode loopback --passphrase ${GPG_PASSPHRASE} --no-secmem-warning --digest-algo sha256 -u "%{_gpg_name}" -sbo %{__signature_filename} %{__plaintext_filename}
          RPMMACROS
          # Sign every RPM in dist/, including the noarch kensa-rules corpus.
          rpmsign --addsign dist/*.rpm

      # SBOM: syft scans the actual (signed) binary and packages and emits
      # CycloneDX 1.5 JSON — supply-chain AC-08 / AC-09.
      - name: Install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b "$HOME/.local/bin"

      - name: Generate CycloneDX SBOMs
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          # Emit SBOMs flat into dist/ (not dist/sbom/). They publish as flat
          # release assets, so a sbom/ path prefix in SHA256SUMS would never
          # match the served filename and `sha256sum -c` would fail for the
          # .cdx.json lines. The loop globs only packages (*.rpm/*.deb) + the
          # bare binary, so the new *.cdx.json files are never re-scanned.
          # CycloneDX 1.5 schema the emitted SBOMs validate against:
          #   https://cyclonedx.org/schema/bom-1.5.schema.json
          for art in dist/openwatch dist/openwatch-*.rpm dist/openwatch_*.deb dist/kensa-rules-*.rpm dist/kensa-rules_*.deb; do
            [ -e "$art" ] || continue
            name="$(basename "$art")"
            syft scan "file:$art" -o "cyclonedx-json=dist/${name}.cdx.json"
          done
          ls -l dist/*.cdx.json

      - name: Checksums
        run: |
          cd dist
          sha256sum *.rpm *.deb *.cdx.json > SHA256SUMS
          cat SHA256SUMS

      # Detached GPG signature over the checksum manifest — the universal verify
      # path (`gpg --verify SHA256SUMS.asc SHA256SUMS`), independent of rpm/dpkg.
      # The key was already imported by the GPG-sign packages step.
      - name: GPG-sign checksums
        if: steps.keys.outputs.gpg == 'true'
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          cd dist
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$GPG_PASSPHRASE" \
            --armor --detach-sign --output SHA256SUMS.asc SHA256SUMS

      # cosign attestation over the checksum manifest (sigstore). Offline,
      # key-based, no Rekor transparency-log upload.
      - name: Install cosign
        if: steps.keys.outputs.cosign == 'true'
        uses: sigstore/cosign-installer@v3.7.0

      - name: Cosign-sign checksums
        if: steps.keys.outputs.cosign == 'true'
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign sign-blob --yes --tlog-upload=false \
            --key env://COSIGN_PRIVATE_KEY \
            --output-signature dist/SHA256SUMS.cosign.sig dist/SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          # Any version with a pre-release suffix (e.g. -rc.4, -beta.1) is a
          # pre-release; a bare vX.Y.Z (no hyphen) is a GA release.
          prerelease: ${{ contains(github.event.inputs.version || github.ref_name, '-') }}
          files: |
            dist/openwatch-*.rpm
            dist/openwatch_*.deb
            dist/kensa-rules-*.rpm
            dist/kensa-rules_*.deb
            dist/SHA256SUMS
            dist/SHA256SUMS.asc
            dist/SHA256SUMS.cosign.sig
            dist/*.cdx.json
            security/KEYS
