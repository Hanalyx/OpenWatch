# Pre-commit hooks for OpenWatch
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # General file quality
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: ^frontend/|\.min\.(js|css)$
      - id: end-of-file-fixer
        exclude: ^frontend/|\.min\.(js|css)$
      - id: check-yaml
        args: ['--unsafe']  # tolerate custom YAML tags
      - id: check-json
        exclude: ^frontend/package(-lock)?\.json$
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
        # Exclude files with SSH key validation code (contain key format strings, not actual keys),
        # documentation, and test-only PEM fixtures.
        exclude: |
          (?x)^(
            docs/.*|
            scripts/test-data/.*|
            frontend/src/utils/hostValidation\.ts|
            frontend/src/pages/hosts/AddHost\.tsx|
            frontend/src/pages/hosts/Hosts\.tsx|
            frontend/src/pages/settings/Settings\.tsx|
            internal/identity/jwt\.go|
            internal/ssh/dial\.go|
            internal/license/testdata/.*|
            internal/policy/testdata/.*|
            internal/credential/credential_test\.go|
            internal/ssh/ssh_test\.go|
            internal/server/tls_test\.go|
            internal/server/server_test\.go|
            internal/server/api_credentials_test\.go|
            packaging/tests/runtime_boot_test\.go
          )$
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Frontend quality + project-local hooks (via local hooks since we need npm)
  - repo: local
    hooks:
      - id: check-no-emojis
        name: Check for Emojis in Code
        # Note: Emojis allowed in CLAUDE.md (policy doc) and .github/ (templates).
        entry: bash -c 'if git diff --cached --name-only | grep -v "CLAUDE.md" | grep -v "^\.github/" | xargs grep -P "[\x{1F300}-\x{1F9FF}]" 2>/dev/null; then echo "ERROR - Emojis detected in code. See CLAUDE.md emoji policy."; exit 1; fi'
        language: system
        pass_filenames: false

      - id: frontend-lint
        name: ESLint Frontend
        entry: bash -c 'cd frontend && npx eslint --max-warnings=0 .'
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false

      - id: prettier
        name: Prettier Frontend Formatting
        entry: bash -c 'cd frontend && npx prettier --check .'
        language: system
        files: ^frontend/.*\.(ts|tsx|css|scss|json)$
        pass_filenames: false
      #   pass_filenames: false

      # Note: TypeScript has 219+ pre-existing type errors requiring gradual migration
      # Type check disabled until errors are addressed (tracked in CLAUDE.md)
      # Run manual type check with: cd frontend && npx tsc --noEmit
      # - id: frontend-typecheck
      #   name: TypeScript Type Check
      #   entry: bash -c 'cd frontend && npx tsc --noEmit'
      #   language: system
      #   files: ^frontend/src/.*\.(ts|tsx)$
      #   pass_filenames: false

      - id: commitlint
        name: Commit Message Linting
        entry: .git/hooks/commit-msg-lint.sh
        language: script
        stages: [commit-msg]

      # Spec coverage gate (Go rebuild). Source-walks for @ac AC-NN
      # annotations under specs/; <1s, no tests required. Catches
      # the class of failure that put PR #455 through 3 CI re-runs:
      # a tier-1 spec landed with passing tests but without the @ac
      # comments specter coverage walks for. Skipped when specter is
      # not installed (CI is the strict gate).
      - id: spec-coverage
        name: Spec coverage (source-walk)
        entry: scripts/check-go-spec-coverage.sh
        language: script
        pass_filenames: false
        files: ^(internal/.*_test\.go|specs/.*\.spec\.yaml|frontend/(src|tests)/.*\.(ts|tsx))$
        stages: [pre-commit]

      # Don't run tests in pre-commit (too slow)
      # Tests run in CI instead

  # Secret scanning
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: ^(package-lock\.json|.*\.lock)$

  # Shell script linting
  # Note: Using --severity=error to only flag errors, not warnings/info
  # Run full check with: shellcheck -x -S warning scripts/*.sh
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args:
          - '-x'           # Follow source includes
          - '-S'           # Severity level flag
          - 'error'        # Only show errors, not warnings

# Configuration
default_language_version:
  python: python3
  node: 18.x

# Performance optimization
default_stages: [pre-commit]
fail_fast: false  # Run all hooks even if one fails
