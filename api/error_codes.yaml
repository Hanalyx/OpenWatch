# OpenWatch Error Code Registry
#
# Source of truth for all API error codes. Codegen produces:
#   - internal/errors/codes.gen.go (typed Go constants and a Code -> metadata map)
#   - documentation rendered as part of the OpenAPI bundle
#
# Build invariants enforced by scripts/validate-error-codes.go:
#   - Every code matches ^[a-z][a-z0-9_]*\.[a-z][a-z0-9_]*$
#   - Every code's prefix references a defined category id
#   - http_status is in the 4xx or 5xx range (or, for soft denials, in {402, 503})
#   - fault is one of: client | server | policy | external
#   - retryable is bool
#   - detail_schema (when present) is valid JSON Schema
#   - No duplicates between errors and deprecated_errors
#
# Naming rules: see app/docs/api_design_principles.md §8.3
# Adding a new code: see §8.4 (registry-first workflow)
#
# Field semantics:
#   code         - Stable dotted identifier; never changes meaning.
#   http_status  - HTTP status returned alongside the envelope.
#   fault        - Who is at fault. Drives agent retry/abort logic.
#                    client   - Caller's fault (bad input, missing perms).
#                    server   - Our fault (bug, internal failure).
#                    policy   - Denied by policy (RBAC, license, governance).
#                    external - Downstream system failed (SSH host, plugin).
#   retryable    - True if the *same call* may succeed later without changes.
#                  Distinct from idempotency: retryable=false on policy/validation
#                  errors because the caller must change something first.
#   description  - One-line human description (what went wrong, not how to fix).
#   detail_schema- Optional JSON Schema for the `detail` field of the envelope.
#                  When omitted, `detail` is unconstrained (additionalProperties: true).

version: 1

categories:
  - id: auth
    description: Authentication failures (who are you?)
  - id: authz
    description: Authorization failures (are you allowed?)
  - id: validation
    description: Input validation failures
  - id: pagination
    description: Pagination parameter errors
  - id: idempotency
    description: Idempotency-Key violations
  - id: transition
    description: State machine transition violations
  - id: resource
    description: Generic resource lifecycle errors
  - id: host
    description: Host operations (SSH, connectivity, identity)
  - id: scan
    description: Scan execution and lifecycle
  - id: policy
    description: Policy validation and application (Principle 2)
  - id: license
    description: License JWT validation, expiry, fingerprint
  - id: quota
    description: License-driven quota limits
  - id: audit
    description: Audit query and export errors
  - id: rate_limit
    description: Rate limiter rejections
  - id: server
    description: Internal server errors

errors:
  # =========================================================================
  # auth - authentication
  # =========================================================================
  - code: auth.required
    http_status: 401
    fault: client
    retryable: false
    description: >
      The request reached a protected endpoint without a usable session (no
      credentials presented, or the session cookie expired in the browser and
      was not sent). The caller must sign in. Distinct from
      authz.permission_denied (403), which is an authenticated caller whose role
      lacks the permission. The SPA redirects to login on this 401.

  - code: auth.invalid_credentials
    http_status: 401
    fault: client
    retryable: false
    description: Provided credentials did not authenticate
    detail_schema:
      type: object
      properties:
        auth_method: {type: string, enum: [password, sso_oidc, sso_saml, api_key]}

  - code: auth.token_expired
    http_status: 401
    fault: client
    retryable: true
    description: Access token has expired; refresh and retry
    detail_schema:
      type: object
      properties:
        token_type: {type: string, enum: [access, refresh]}
        expired_at: {type: string, format: date-time}

  - code: auth.token_revoked
    http_status: 401
    fault: client
    retryable: false
    description: Token has been revoked (logout, rotation, or admin action)

  - code: auth.token_invalid
    http_status: 401
    fault: client
    retryable: false
    description: Token signature, format, or audience failed validation

  - code: auth.mfa_required
    http_status: 401
    fault: client
    retryable: false
    description: Step-up authentication is required to complete this request
    detail_schema:
      type: object
      properties:
        challenge_id: {type: string}
        methods: {type: array, items: {type: string, enum: [totp, fido2]}}

  - code: auth.mfa_failed
    http_status: 401
    fault: client
    retryable: false
    description: MFA challenge response did not validate

  - code: auth.account_locked
    http_status: 403
    fault: client
    retryable: false
    description: Account locked by failed-login policy or admin action
    detail_schema:
      type: object
      properties:
        unlock_at: {type: [string, 'null'], format: date-time}
        reason: {type: string, enum: [too_many_failures, admin_lock]}

  - code: auth.session_expired
    http_status: 401
    fault: client
    retryable: false
    description: Session exceeded idle or absolute timeout; reauthenticate

  # =========================================================================
  # authz - authorization
  # =========================================================================
  - code: authz.permission_denied
    http_status: 403
    fault: policy
    retryable: false
    description: Authenticated identity lacks the required permission
    detail_schema:
      type: object
      properties:
        required_permission: {type: string}
        route: {type: string}

  - code: authz.role_required
    http_status: 403
    fault: policy
    retryable: false
    description: Operation requires a role the caller does not hold
    detail_schema:
      type: object
      properties:
        required_role: {type: string}

  # =========================================================================
  # validation - request/payload shape
  # =========================================================================
  - code: validation.field_required
    http_status: 400
    fault: client
    retryable: false
    description: A required field is missing
    detail_schema:
      type: object
      properties:
        field: {type: string}

  - code: validation.field_format
    http_status: 400
    fault: client
    retryable: false
    description: Field present but does not match expected format
    detail_schema:
      type: object
      properties:
        field: {type: string}
        expected: {type: string}

  - code: validation.field_range
    http_status: 400
    fault: client
    retryable: false
    description: Field value is outside the allowed range
    detail_schema:
      type: object
      properties:
        field: {type: string}
        min: {}
        max: {}
        actual: {}

  - code: validation.field_unknown
    http_status: 400
    fault: client
    retryable: false
    description: Request body contains an unknown field (strict-mode)

  - code: validation.body_too_large
    http_status: 413
    fault: client
    retryable: false
    description: Request body exceeds the maximum accepted size
    detail_schema:
      type: object
      properties:
        max_bytes: {type: integer}
        actual_bytes: {type: integer}

  # =========================================================================
  # pagination - cursor and limit errors
  # =========================================================================
  - code: pagination.limit_exceeded
    http_status: 400
    fault: client
    retryable: false
    description: Requested page size exceeds the per-endpoint maximum
    detail_schema:
      type: object
      properties:
        max_limit: {type: integer}
        requested: {type: integer}

  - code: pagination.cursor_invalid
    http_status: 400
    fault: client
    retryable: false
    description: Cursor is malformed, expired, or for a different query

  # =========================================================================
  # idempotency - Idempotency-Key violations
  # =========================================================================
  - code: idempotency.key_reused
    http_status: 409
    fault: client
    retryable: false
    description: Idempotency-Key was reused with a different request body
    detail_schema:
      type: object
      properties:
        first_seen_at: {type: string, format: date-time}

  - code: idempotency.key_required
    http_status: 400
    fault: client
    retryable: false
    description: This endpoint requires an Idempotency-Key header

  # =========================================================================
  # transition - state machine violations
  # =========================================================================
  - code: transition.invalid
    http_status: 409
    fault: client
    retryable: false
    description: Requested state transition is not legal from the current state
    detail_schema:
      type: object
      properties:
        from_status: {type: string}
        to_status: {type: string}
        allowed_transitions: {type: array, items: {type: string}}

  # =========================================================================
  # resource - generic CRUD errors
  # =========================================================================
  - code: resource.not_found
    http_status: 404
    fault: client
    retryable: false
    description: Resource does not exist or caller lacks read permission
    detail_schema:
      type: object
      properties:
        resource_type: {type: string}
        resource_id: {type: string}

  - code: resource.conflict
    http_status: 409
    fault: client
    retryable: false
    description: Resource already exists or has been modified by another caller
    detail_schema:
      type: object
      properties:
        resource_type: {type: string}
        conflicting_field: {type: string}

  - code: resource.gone
    http_status: 410
    fault: client
    retryable: false
    description: Resource existed but has been permanently deleted

  - code: resource.builtin
    http_status: 405
    fault: client
    retryable: false
    description: Resource is built-in and cannot be modified or deleted via the API
    detail_schema:
      type: object
      properties:
        resource_type: {type: string}
        resource_id: {type: string}

  # =========================================================================
  # host - host operations
  # =========================================================================
  - code: host.not_found
    http_status: 404
    fault: client
    retryable: false
    description: Host record does not exist

  - code: host.unreachable
    http_status: 502
    fault: external
    retryable: true
    description: Host did not respond on the SSH port within the timeout
    detail_schema:
      type: object
      properties:
        address: {type: string}
        port: {type: integer}
        timeout_seconds: {type: integer}

  - code: host.ssh_authentication_failed
    http_status: 502
    fault: external
    retryable: false
    description: SSH key or credentials were rejected by the host

  - code: host.ssh_host_key_mismatch
    http_status: 502
    fault: external
    retryable: false
    description: Host key does not match the pinned key in known_hosts
    detail_schema:
      type: object
      properties:
        expected_fingerprint: {type: string}
        actual_fingerprint: {type: string}

  - code: host.duplicate
    http_status: 409
    fault: client
    retryable: false
    description: A host with the same address or hostname already exists

  - code: host.platform_unsupported
    http_status: 422
    fault: client
    retryable: false
    description: Host platform is not in the supported matrix
    detail_schema:
      type: object
      properties:
        os_family: {type: string}
        os_version: {type: string}

  # =========================================================================
  # scan - scan execution and lifecycle
  # =========================================================================
  - code: scan.not_found
    http_status: 404
    fault: client
    retryable: false
    description: Scan record does not exist

  - code: scan.already_running
    http_status: 409
    fault: client
    retryable: true
    description: A scan is already running against this host or session
    detail_schema:
      type: object
      properties:
        existing_scan_id: {type: string, format: uuid}

  - code: scan.aborted
    http_status: 409
    fault: client
    retryable: false
    description: Scan was aborted by user or system

  - code: scan.kensa_error
    http_status: 502
    fault: external
    retryable: true
    description: Kensa engine returned an error during execution
    detail_schema:
      type: object
      properties:
        kensa_error_code: {type: string}
        kensa_message: {type: string}

  - code: scan.template_invalid
    http_status: 400
    fault: client
    retryable: false
    description: Scan template references unknown rules, frameworks, or controls

  # =========================================================================
  # policy - policy validation and application
  # =========================================================================
  - code: policy.invalid
    http_status: 400
    fault: client
    retryable: false
    description: Submitted policy fails schema or semantic validation
    detail_schema:
      type: object
      properties:
        policy_type: {type: string}
        validation_errors: {type: array, items: {type: string}}

  - code: policy.version_mismatch
    http_status: 409
    fault: client
    retryable: false
    description: Caller referenced a stale policy version; refresh and retry
    detail_schema:
      type: object
      properties:
        policy_type: {type: string}
        expected_version: {type: string}
        current_version: {type: string}

  - code: policy.denied
    http_status: 403
    fault: policy
    retryable: false
    description: Operation denied by an active policy
    detail_schema:
      type: object
      properties:
        policy_type: {type: string}
        policy_version: {type: string}
        reason: {type: string}

  - code: policy.not_found
    http_status: 404
    fault: client
    retryable: false
    description: No policy of this type is currently loaded

  # =========================================================================
  # license - license JWT, fingerprint, expiry
  # =========================================================================
  - code: license.invalid
    http_status: 400
    fault: client
    retryable: false
    description: License JWT failed signature, structure, or audience validation

  - code: license.expired
    http_status: 402
    fault: policy
    retryable: false
    description: License is past its expiry plus grace period

  - code: license.feature_unavailable
    http_status: 402
    fault: policy
    retryable: false
    description: Feature requires an OpenWatch+ license tier
    detail_schema:
      type: object
      properties:
        feature: {type: string}
        required_tier: {type: string}

  - code: license.fingerprint_mismatch
    http_status: 409
    fault: policy
    retryable: false
    description: License is bound to a different deployment fingerprint

  - code: license.clock_rollback_detected
    http_status: 409
    fault: policy
    retryable: false
    description: System clock is earlier than last_known_good time
    detail_schema:
      type: object
      properties:
        last_known_good: {type: string, format: date-time}
        current_time: {type: string, format: date-time}

  # =========================================================================
  # quota - license-driven quotas
  # =========================================================================
  - code: quota.max_hosts_exceeded
    http_status: 402
    fault: policy
    retryable: false
    description: Adding this host would exceed the licensed host limit
    detail_schema:
      type: object
      properties:
        limit: {type: integer}
        current: {type: integer}

  - code: quota.max_users_exceeded
    http_status: 402
    fault: policy
    retryable: false
    description: Adding this user would exceed the licensed user limit
    detail_schema:
      type: object
      properties:
        limit: {type: integer}
        current: {type: integer}

  - code: quota.max_scans_per_day_exceeded
    http_status: 402
    fault: policy
    retryable: true
    description: Daily scan limit reached; resets at UTC midnight
    detail_schema:
      type: object
      properties:
        limit: {type: integer}
        current: {type: integer}
        resets_at: {type: string, format: date-time}

  - code: quota.concurrent_scan_limit
    http_status: 503
    fault: policy
    retryable: true
    description: Concurrent scan slots exhausted; scan deferred (not failed)
    detail_schema:
      type: object
      properties:
        limit: {type: integer}
        in_flight: {type: integer}

  # =========================================================================
  # audit - audit query/export errors
  # =========================================================================
  - code: audit.query_invalid
    http_status: 400
    fault: client
    retryable: false
    description: Audit query DSL failed parse or semantic validation

  - code: audit.export_too_large
    http_status: 413
    fault: client
    retryable: false
    description: Export would exceed the maximum row count; narrow the filter
    detail_schema:
      type: object
      properties:
        max_rows: {type: integer}
        estimated_rows: {type: integer}

  - code: audit.write_failed
    http_status: 500
    fault: server
    retryable: true
    description: Audit event could not be persisted on the synchronous critical path

  # =========================================================================
  # rate_limit - throttling
  # =========================================================================
  - code: rate_limit.exceeded
    http_status: 429
    fault: client
    retryable: true
    description: Caller exceeded the request rate limit
    detail_schema:
      type: object
      properties:
        retry_after_seconds: {type: integer}
        limit: {type: integer}
        window_seconds: {type: integer}

  # =========================================================================
  # server - internal failures
  # =========================================================================
  - code: server.internal
    http_status: 500
    fault: server
    retryable: true
    description: Unexpected internal error; correlation_id should be reported

  - code: server.unavailable
    http_status: 503
    fault: server
    retryable: true
    description: Service is temporarily unavailable (startup, maintenance, dependency)
    detail_schema:
      type: object
      properties:
        component: {type: string}

  - code: server.timeout
    http_status: 504
    fault: server
    retryable: true
    description: Internal operation exceeded its timeout

# Deprecated codes retained for read compatibility (e.g., parsing historical logs).
# Build fails if any source emits a deprecated code.
deprecated_errors: []
