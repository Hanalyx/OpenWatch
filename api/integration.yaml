# OpenWatch — Integration domain (skeleton)
#
# External system integration: ORSA plugins (scanner extensions) and event
# webhooks (machine-to-machine subscriptions).
#
# Distinction from notifications.yaml:
#   - notifications.yaml = outbound dispatch to HUMANS (Slack, email, jira,
#     pagerduty). Alert-driven. Severity/body/title schema.
#   - integration.yaml /webhooks = machine-to-machine event subscriptions.
#     "Send me a JSON payload when scan.completed fires." Event-type schema.
#
# Fidelity: skeleton — operations, extensions, descriptions; schemas stubbed.
#
# Registry cross-references:
#   - Permissions: app/auth/permissions.yaml — integration:{read,write,execute}
#   - Audit events: app/audit/events.yaml — integration.{plugin.installed,plugin.executed,
#       webhook.delivered,webhook.failed}
#   - Error codes: app/api/error_codes.yaml — resource.not_found, validation.field_format

openapi: 3.1.0
info:
  title: OpenWatch — Integration API
  version: 0.1.0-skeleton

paths:

  # ===========================================================================
  # Plugins — ORSA (OpenWatch Remote Scanner Architecture) v2.0
  # ===========================================================================

  /api/v1/integration/plugins:
    get:
      operationId: listPlugins
      summary: List installed plugins (ORSA-compatible scanner extensions).
      x-required-permission: integration:read
      parameters:
        - {name: kind, in: query, schema: {type: string, enum: [scanner, mapper, notifier, custom]}}
        - {name: enabled, in: query, schema: {type: boolean}}
        - {name: cursor, in: query, schema: {type: [string, 'null']}}
        - {name: limit,  in: query, schema: {type: integer, minimum: 1, maximum: 100, default: 25}}
      responses:
        '200':
          description: Page of installed plugins.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: {type: array, items: {type: object}}
                  next_cursor: {type: [string, 'null']}

    post:
      operationId: installPlugin
      summary: Install / register a new plugin (binary upload + manifest).
      description: |
        Validates the plugin manifest, signature, and ORSA contract version,
        then registers it. Plugins are sandboxed at runtime per the ORSA v2.0
        plugin interface (separate process, restricted FS).
      x-required-permission: integration:write
      x-audit-events: [integration.plugin.installed]
      parameters:
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string}}
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, additionalProperties: true}}}
      responses:
        '201': {description: Plugin installed.}
        '400':
          description: Plugin manifest invalid, signature failed, or contract version unsupported.
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

  /api/v1/integration/plugins/{plugin_id}:
    parameters:
      - {name: plugin_id, in: path, required: true, schema: {type: string, format: uuid}}
    get:
      operationId: getPlugin
      summary: Plugin detail (manifest, contract version, last invocation outcome).
      x-required-permission: integration:read
      responses:
        '200': {description: Plugin detail.}
        '404': {$ref: '#/components/responses/NotFound'}

    delete:
      operationId: uninstallPlugin
      summary: Uninstall a plugin (dangerous; scans relying on it will fall back to defaults).
      x-required-permission: integration:write
      responses:
        '204': {description: Uninstalled.}
        '404': {$ref: '#/components/responses/NotFound'}

  /api/v1/integration/plugins/{plugin_id}:invoke:
    parameters:
      - {name: plugin_id, in: path, required: true, schema: {type: string, format: uuid}}
    post:
      operationId: invokePlugin
      summary: Manually invoke a plugin (out-of-band of normal scan-triggered invocation).
      description: |
        Used for diagnostics or one-off operations. Subject to plugin-specific
        input validation and rate limits.
      x-required-permission: integration:execute
      x-audit-events: [integration.plugin.executed]
      parameters:
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string}}
      requestBody:
        content: {application/json: {schema: {type: object, additionalProperties: true}}}
      responses:
        '200': {description: Invocation completed.}
        '404': {$ref: '#/components/responses/NotFound'}

  # ===========================================================================
  # Webhooks — event subscriptions for external systems
  # ===========================================================================

  /api/v1/integration/webhooks:
    get:
      operationId: listWebhookSubscriptions
      summary: List event-webhook subscriptions.
      x-required-permission: integration:read
      parameters:
        - {name: event_type, in: query, schema: {type: string}, description: 'Filter to subscriptions for this event type (e.g., scan.completed).'}
        - {name: enabled, in: query, schema: {type: boolean}}
        - {name: cursor, in: query, schema: {type: [string, 'null']}}
        - {name: limit,  in: query, schema: {type: integer, minimum: 1, maximum: 100, default: 25}}
      responses:
        '200':
          description: Page of subscriptions.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: {type: array, items: {type: object}}
                  next_cursor: {type: [string, 'null']}

    post:
      operationId: createWebhookSubscription
      summary: Subscribe an external URL to one or more event types.
      description: |
        Creates a subscription. POST events are signed with HMAC-SHA256 using
        a per-subscription secret returned ONCE in the create response.
        Subsequent GET requests do not return the secret. Delivery retry
        policy: exponential backoff up to 24h, then dead-letter.
      x-required-permission: integration:write
      x-audit-events: [integration.webhook.subscribed]
      parameters:
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string}}
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, additionalProperties: true}}}
      responses:
        '201': {description: Subscription created; secret returned in this response only.}

  /api/v1/integration/webhooks/{subscription_id}:
    parameters:
      - {name: subscription_id, in: path, required: true, schema: {type: string, format: uuid}}
    get:
      operationId: getWebhookSubscription
      summary: Subscription detail (URL, event types, last delivery outcome). Secret redacted.
      x-required-permission: integration:read
      responses:
        '200': {description: Subscription detail.}
        '404': {$ref: '#/components/responses/NotFound'}

    delete:
      operationId: deleteWebhookSubscription
      summary: Delete a webhook subscription (stops further deliveries).
      x-required-permission: integration:write
      x-audit-events: [integration.webhook.unsubscribed]
      responses:
        '204': {description: Subscription removed.}
        '404': {$ref: '#/components/responses/NotFound'}

  /api/v1/integration/webhooks/{subscription_id}:test:
    parameters:
      - {name: subscription_id, in: path, required: true, schema: {type: string, format: uuid}}
    post:
      operationId: testWebhookSubscription
      summary: Send a synthetic test event to the subscribed URL.
      x-required-permission: integration:execute
      x-audit-events: [integration.webhook.delivered, integration.webhook.failed]
      parameters:
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string}}
      responses:
        '200': {description: Test delivery succeeded.}
        '502':
          description: Subscriber rejected or timed out.
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

# =============================================================================
# Shared components
# =============================================================================

components:

  responses:
    Unauthorized: {description: Authentication required, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
    Forbidden:    {description: Permission denied,         content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
    NotFound:     {description: Resource not found,         content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}

  schemas:
    ErrorEnvelope:
      # See app/api/error_codes.yaml for the canonical registry of codes.
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, fault, retryable, human_message]
          properties:
            code: {type: string, examples: [resource.not_found, validation.field_format]}
            fault: {type: string, enum: [client, server, policy, external]}
            retryable: {type: boolean}
            human_message: {type: string}
            detail: {type: object, additionalProperties: true}
            correlation_id: {type: string}
