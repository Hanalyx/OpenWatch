              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  # ===========================================================================
  # Remediation (Phase 7). Free core: request -> approve | reject + projected
  # lift (see-and-govern). The act verbs (:dry-run, :execute, :rollback) are
  # OpenWatch+ licensed (remediation_execution) and return 402 on the free
  # tier. Spec api-remediation; plan docs/engineering/remediation_core_plan.md.
  # ===========================================================================
  /api/v1/remediation/requests:
    get:
      operationId: listRemediationRequests
      summary: List remediation requests (fleet or filtered)
      description: |
        Remediation request queue, newest first, optionally filtered by
        status, host_id, or rule_id; capped at limit (default 200). RBAC:
        remediation:read. Spec api-remediation.
      x-required-permission: remediation:read
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending_approval, approved, rejected, dry_run_complete, executing, executed, rolled_back, failed]
        - name: host_id
          in: query
          required: false
          schema: {type: string, format: uuid}
        - name: rule_id
          in: query
          required: false
          schema: {type: string}
        - name: limit
          in: query
          required: false
          schema: {type: integer, default: 200}
      responses:
        '200':
          description: Remediation requests, newest first
          content:
            application/json:
              schema: {$ref: '#/components/schemas/RemediationRequestList'}
        '403':
          description: Caller lacks remediation:read permission
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
    post:
      operationId: requestRemediation
      summary: Request a remediation (fix) for a failing rule on a host
      description: |
        Submits a pending_approval remediation request for a host+rule and
        records the projected per-framework compliance lift. One open request
        is allowed per host+rule; a duplicate returns 409. The requester is
        the authenticated user. This NEVER contacts the host. RBAC:
        remediation:request. Spec api-remediation.
      x-required-permission: remediation:request
      x-audit-events: [remediation.requested]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/RemediationRequestCreate'}
      responses:
        '201':
          description: The created remediation request (pending approval)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/RemediationRequest'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '404':
          description: Unknown or deleted host
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '403':
          description: Caller lacks remediation:request permission
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '409':
          description: An open remediation request already exists for this host and rule
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/remediation/requests/{rid}:
    get:
      operationId: getRemediationRequest
      summary: Get a remediation request
      description: 'RBAC: remediation:read. Spec api-remediation.'
      x-required-permission: remediation:read
      parameters:
        - name: rid
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: The remediation request
          content:
            application/json:
              schema: {$ref: '#/components/schemas/RemediationRequest'}
        '404':
          description: Remediation request not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '403':
          description: Caller lacks remediation:read permission
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/remediation/requests/{rid}/steps:
    get:
      operationId: listRemediationSteps
      summary: List a remediation request's transaction journal (steps)
      description: |
        Per-step Kensa transaction journal (Capture/Apply/Validate/Commit
        outcomes). Empty until the request is executed (executing is the
        OpenWatch+ licensed track). RBAC: remediation:read. Spec
        api-remediation.
      x-required-permission: remediation:read
      parameters:
        - name: rid
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: Steps, in apply order
          content:
            application/json:
              schema: {$ref: '#/components/schemas/RemediationStepList'}
        '404':
          description: Remediation request not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '403':
          description: Caller lacks remediation:read permission
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/remediation/requests/{rid}:approve:
    post:
      operationId: approveRemediation
      summary: Approve a pending remediation request
      description: |
        pending_approval -> approved. The reviewer must differ from the
        requester (separation of duties, 409). RBAC: remediation:approve.
        Spec api-remediation.
      x-required-permission: remediation:approve
      x-audit-events: [remediation.approved]
      parameters:
        - name: rid
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        content:
          application/json:
            schema: {$ref: '#/components/schemas/RemediationReview'}
      responses:
        '200':
          description: The approved remediation request
          content:
            application/json:
              schema: {$ref: '#/components/schemas/RemediationRequest'}
        '403':
          description: Caller lacks remediation:approve permission
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '404':
          description: Remediation request not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '409':
          description: Not in the pending_approval state, or reviewer is the requester
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/remediation/requests/{rid}:reject:
    post:
      operationId: rejectRemediation
      summary: Reject a pending remediation request
      description: |
        pending_approval -> rejected. The reviewer must differ from the
        requester (409). RBAC: remediation:approve. Spec api-remediation.
      x-required-permission: remediation:approve
      x-audit-events: [remediation.approved]
      parameters:
        - name: rid
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        content:
          application/json:
            schema: {$ref: '#/components/schemas/RemediationReview'}
      responses:
        '200':
          description: The rejected remediation request
          content:
            application/json:
              schema: {$ref: '#/components/schemas/RemediationRequest'}
        '403':
          description: Caller lacks remediation:approve permission
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '404':
          description: Remediation request not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '409':
          description: Not in the pending_approval state, or reviewer is the requester
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/remediation/requests/{rid}:dry-run:
    post:
      operationId: dryRunRemediation
      summary: Dry-run a remediation (preview)
      description: |
        Would connect to the host and report what an apply changes, without
        applying. Free core (remediation:execute). Not yet implemented; returns
        501. Spec api-remediation.
      x-required-permission: remediation:execute
      parameters:
        - name: rid
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '403':
          description: Caller lacks remediation:execute permission
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '501':
          description: Dry-run not yet implemented
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/remediation/requests/{rid}:execute:
    post:
      operationId: executeRemediation
      summary: Execute an approved single-rule remediation (free core)
      description: |
        Applies the fix on the host (Kensa Capture/Apply/Validate/Commit),
        queued to the remediation worker. Free core: requires
        remediation:execute (single-rule manual remediation is not
        license-gated). The request must be in the 'approved' state; poll
        GET /requests/{rid} for the executed|failed outcome. Spec api-remediation.
      x-required-permission: remediation:execute
      x-audit-events: [remediation.executed]
      parameters:
        - name: rid
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '202':
          description: Execution queued; poll GET /requests/{rid} for executed|failed
        '403':
          description: Caller lacks remediation:execute permission
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '404':
          description: Remediation request not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '409':
          description: Request is not in the approved state
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/remediation/requests/{rid}:rollback:
    post:
      operationId: rollbackRemediation
      summary: Roll back an executed remediation (free core)
      description: |
        Restores the captured pre-state, queued to the remediation worker. Free
        core: requires remediation:rollback. The request must be in the
        'executed' state. Spec api-remediation.
      x-required-permission: remediation:rollback
      x-audit-events: [remediation.rolled_back]
      parameters:
        - name: rid
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '202':
          description: Rollback queued
        '403':
          description: Caller lacks remediation:rollback permission
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '404':
          description: Remediation request not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '409':
          description: Request is not in the executed state
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

