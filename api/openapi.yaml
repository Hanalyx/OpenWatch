# OpenWatch — Stage-0 OpenAPI manifest.
#
# Self-contained 3-endpoint surface that oapi-codegen turns into typed
# Go server stubs. The full 14-domain manifest lives in openapi.full.yaml
# for Stage 2+ reference.
#
# Endpoints:
#   GET  /api/v1/health                — anonymous liveness probe
#   POST /api/v1/diagnostics:echo      — exercises idempotency + audit
#   GET  /api/v1/audit/events          — cursor-paginated audit list
#
# Specs:
#   app/specs/api/health.spec.yaml
#   app/specs/api/diagnostics-echo.spec.yaml
#   app/specs/api/audit-events-query.spec.yaml

openapi: 3.0.3

info:
  title: OpenWatch (Stage 0)
  version: 0.1.0-alpha.1
  description: |
    Stage 0 walking-skeleton surface — three endpoints that exercise the
    foundation stack (correlation, idempotency, audit, error envelope).

servers:
  - url: https://localhost:8443
    description: Local development

paths:

  /api/v1/auth/login:
    post:
      operationId: postAuthLogin
      summary: Username/password login with optional TOTP
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/AuthLoginRequest'}
      responses:
        '200':
          description: Login succeeded; tokens issued
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AuthLoginResponse'}
        '401':
          description: Invalid credentials or MFA required
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/auth/logout:
    post:
      operationId: postAuthLogout
      summary: Revoke the calling session
      responses:
        '204':
          description: Session revoked

  /api/v1/auth/refresh:
    post:
      operationId: postAuthRefresh
      summary: Rotate the refresh token; mint a new access+refresh pair
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/AuthRefreshRequest'}
      responses:
        '200':
          description: New token pair issued
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AuthLoginResponse'}
        '401':
          description: Refresh token invalid, expired, or reused (cascade revoke triggered)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/auth/refresh-cookie:
    post:
      operationId: postAuthRefreshCookie
      summary: Rotate the refresh cookie and mint a new session (browser flow)
      description: >
        Reads the HttpOnly `openwatch_refresh` cookie, rotates the underlying
        refresh token, mints a new session, and Set-Cookies both the rotated
        refresh cookie and a fresh `openwatch_session`. Used by the browser
        API client as the transparent on-401 retry hook so users with a live
        refresh window don't get bounced to /login on every inactivity timeout.
      security: []
      responses:
        '200':
          description: Cookies rotated; identity returned
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AuthMeResponse'}
        '401':
          description: Refresh cookie missing, invalid, expired, or reused. Both auth cookies are cleared.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/auth/me:
    get:
      operationId: getAuthMe
      summary: Return the calling identity
      responses:
        '200':
          description: Identity
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AuthMeResponse'}
        '401':
          description: No valid session or bearer
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/auth/mfa:enroll:
    post:
      operationId: postAuthMFAEnroll
      summary: Enroll the calling user in TOTP MFA
      responses:
        '200':
          description: Provisioning URI returned for the authenticator app
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AuthMFAEnrollResponse'}

  /api/v1/auth/mfa:verify:
    post:
      operationId: postAuthMFAVerify
      summary: Confirm an enrolled MFA secret by verifying a generated OTP
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/AuthMFAVerifyRequest'}
      responses:
        '204':
          description: MFA verified
        '401':
          description: MFA OTP invalid or replayed
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/auth/password:change:
    post:
      operationId: postAuthPasswordChange
      summary: Change the calling user's password
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/AuthPasswordChangeRequest'}
      responses:
        '204':
          description: Password updated
        '401':
          description: Current password wrong
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '400':
          description: New password rejected by policy
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/health:
    get:
      operationId: getHealth
      summary: Liveness + readiness probe (anonymous)
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HealthResponse'}
        '503':
          description: Service is degraded or unavailable
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/version:
    get:
      operationId: getVersion
      summary: Build/version metadata (anonymous)
      security: []
      responses:
        '200':
          description: Version metadata for this deployment
          content:
            application/json:
              schema: {$ref: '#/components/schemas/VersionResponse'}

  /api/v1/diagnostics:echo:
    post:
      operationId: postDiagnosticsEcho
      summary: Echo the request message; exercises idempotency + audit
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: {type: string, minLength: 1, maxLength: 255}
        - name: X-Correlation-Id
          in: header
          required: false
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/EchoRequest'}
      responses:
        '200':
          description: Echo succeeded
          content:
            application/json:
              schema: {$ref: '#/components/schemas/EchoResponse'}
        '400':
          $ref: '#/components/responses/BadRequest'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '409':
          description: Idempotency-Key reused with different body
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/license:
    get:
      operationId: getLicense
      summary: Get the current license state (tier, features, quotas, status)
      responses:
        '200':
          description: License state
          content:
            application/json:
              schema: {$ref: '#/components/schemas/LicenseStateResponse'}

  /api/v1/admin/license:verify:
    post:
      operationId: postAdminLicenseVerify
      summary: Dry-run validate a JWT license without installing it
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/LicenseVerifyRequest'}
      responses:
        '200':
          description: Verification result (success or typed failure)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/LicenseVerifyResponse'}

  /api/v1/diagnostics:premium-echo:
    post:
      operationId: postDiagnosticsPremiumEcho
      summary: License-gated echo; requires premium_diagnostics feature
      x-required-feature: premium_diagnostics
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: {type: string, minLength: 1, maxLength: 255}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/EchoRequest'}
      responses:
        '200':
          description: Echoed
          content:
            application/json:
              schema: {$ref: '#/components/schemas/EchoResponse'}
        '402':
          description: License does not include premium_diagnostics feature
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/diagnostics:require-host-read:
    post:
      operationId: postDiagnosticsRequireHostRead
      summary: Stage-0 RBAC demo; requires host:read permission
      x-required-permission: host:read
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: {type: string, minLength: 1, maxLength: 255}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/EchoRequest'}
      responses:
        '200':
          description: Echoed (caller holds host:read)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/EchoResponse'}
        '403':
          description: Caller lacks host:read
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/diagnostics:require-host-write:
    post:
      operationId: postDiagnosticsRequireHostWrite
      summary: Stage-0 RBAC demo; requires host:write permission
      x-required-permission: host:write
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: {type: string, minLength: 1, maxLength: 255}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/EchoRequest'}
      responses:
        '200':
          description: Echoed (caller holds host:write)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/EchoResponse'}
        '403':
          description: Caller lacks host:write
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/diagnostics:evaluate-alert:
    post:
      operationId: postDiagnosticsEvaluateAlert
      summary: Stage-0 policy demo; evaluates the alert_thresholds policy
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/EvaluateAlertRequest'}
      responses:
        '200':
          description: Policy decision
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PolicyDecisionResponse'}

  /api/v1/diagnostics:enqueue-test-job:
    post:
      operationId: postDiagnosticsEnqueueTestJob
      summary: Stage-0 queue demo; enqueues a no-op job processed by the in-process worker
      responses:
        '202':
          description: Job accepted; worker will drain
          content:
            application/json:
              schema: {$ref: '#/components/schemas/EnqueueTestJobResponse'}

  /api/v1/admin/policies:reload:
    post:
      operationId: postAdminPoliciesReload
      summary: Reload signed policy files from the configured directory
      x-required-permission: policy:reload
      responses:
        '200':
          description: Per-type reload outcomes
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PoliciesReloadResponse'}
        '403':
          description: Caller lacks policy:reload
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/diagnostics:require-remediation-execute:
    post:
      operationId: postDiagnosticsRequireRemediationExecute
      summary: Stage-0 RBAC+license demo; requires remediation:execute + remediation_execution feature
      x-required-permission: remediation:execute
      x-required-feature: remediation_execution
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: {type: string, minLength: 1, maxLength: 255}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/EchoRequest'}
      responses:
        '200':
          description: Echoed
          content:
            application/json:
              schema: {$ref: '#/components/schemas/EchoResponse'}
        '402':
          description: License does not include remediation_execution
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '403':
          description: Caller lacks remediation:execute
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/auth/me/permissions:
    get:
      operationId: getAuthMePermissions
      summary: Effective permissions for the calling identity
      responses:
        '200':
          description: Permission list
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AuthMePermissionsResponse'}

  /api/v1/auth/permissions:registry:
    get:
      operationId: getAuthPermissionsRegistry
      summary: Full RBAC registry (categories, permissions, built-in roles)
      responses:
        '200':
          description: Registry
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PermissionsRegistryResponse'}

  /api/v1/users:
    get:
      operationId: getUsers
      summary: List users
      x-required-permission: user:read
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UsersListResponse'}
        '403':
          description: Caller lacks user:read
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
    post:
      operationId: postUsers
      summary: Create a user
      x-required-permission: user:write
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UserCreateRequest'}
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UserResponse'}
        '400':
          description: Validation or policy failure
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '403':
          description: Caller lacks user:write
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/users/{id}:
    get:
      operationId: getUserByID
      summary: Fetch a user
      x-required-permission: user:read
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200':
          description: User
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UserResponse'}
        '404':
          description: User not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
    delete:
      operationId: deleteUserByID
      summary: Soft-delete a user
      x-required-permission: user:delete
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '204':
          description: Deleted
        '404':
          description: User not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/users/{id}/roles:assign:
    post:
      operationId: postUserRolesAssign
      summary: Assign a role to a user
      x-required-permission: role:assign
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UserRoleAssignRequest'}
      responses:
        '204':
          description: Role assigned
        '400':
          description: Unknown role id
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/users/{id}/roles:unassign:
    post:
      operationId: postUserRolesUnassign
      summary: Remove a role from a user
      x-required-permission: role:assign
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UserRoleAssignRequest'}
      responses:
        '204':
          description: Role removed (idempotent)

  /api/v1/roles:create:
    post:
      operationId: postRolesCreate
      summary: Create a custom role
      x-required-permission: role:write
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CustomRoleCreateRequest'}
      responses:
        '201':
          description: Custom role created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/CustomRoleResponse'}
        '400':
          description: Permission unknown
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '409':
          description: Role id taken
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/roles:
    get:
      operationId: getRoles
      summary: List built-in roles
      x-required-permission: role:read
      responses:
        '200':
          description: Role list
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AdminRolesResponse'}
        '403':
          description: Caller lacks role:read
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/credentials:
    get:
      operationId: getCredentials
      summary: List credentials (metadata only)
      x-required-permission: credential:read
      responses:
        '200':
          description: Credential metadata list
          content:
            application/json:
              schema: {$ref: '#/components/schemas/CredentialListResponse'}
        '403':
          description: Caller lacks credential:read
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
    post:
      operationId: postCredentials
      summary: Create a credential
      x-required-permission: credential:write
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CredentialCreateRequest'}
      responses:
        '201':
          description: Credential created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/CredentialResponse'}
        '400':
          description: Validation, invalid scope, host not found, or invalid SSH key
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '409':
          description: Multiple system defaults
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/credentials/{id}:
    get:
      operationId: getCredentialByID
      summary: Fetch a credential's metadata
      x-required-permission: credential:read
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200':
          description: Credential metadata
          content:
            application/json:
              schema: {$ref: '#/components/schemas/CredentialResponse'}
        '404':
          description: Credential not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
    delete:
      operationId: deleteCredentialByID
      summary: Soft-delete a credential
      x-required-permission: credential:delete
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '204':
          description: Deleted (is_active=false)
        '404':
          description: Credential not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/credentials/{id}:clone:
    post:
      operationId: postCredentialClone
      summary: Clone a credential into a new scope (system → host or host → host)
      description: >
        Copies the source credential's encrypted secret material verbatim
        into a new row with the target scope/scope_id. Used by the bulk
        import flow to attach a chosen credential template to each newly
        imported host without re-prompting for the secret material.
      x-required-permission: credential:write
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CredentialCloneRequest'}
      responses:
        '201':
          description: Clone created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/CredentialResponse'}
        '400':
          description: Invalid scope, host not found, or validation failure
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '404':
          description: Source credential not found or already soft-deleted
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '409':
          description: is_default=true collides with an existing system default
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/hosts:
    get:
      operationId: getHosts
      summary: List hosts
      x-required-permission: host:read
      parameters:
        - {name: environment, in: query, required: false, schema: {type: string}}
        - {name: tag, in: query, required: false, schema: {type: string}}
      responses:
        '200':
          description: Host list
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HostListResponse'}
        '403':
          description: Caller lacks host:read
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
    post:
      operationId: postHosts
      summary: Create a host
      x-required-permission: host:write
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/HostCreateRequest'}
      responses:
        '201':
          description: Host created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HostResponse'}
        '400':
          description: Validation failure (bad hostname, ip, port, etc.)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '409':
          description: Hostname already exists in environment
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/hosts/{id}:
    get:
      operationId: getHostByID
      summary: Fetch a host with liveness + compliance enrichment
      x-required-permission: host:read
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
        - name: framework
          in: query
          description: Filter compliance_summary to host_rule_state rows whose framework_refs contains this key (v1.2.0). Liveness is unaffected.
          schema: {type: string}
      responses:
        '200':
          description: Host detail (includes liveness + compliance_summary)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HostDetailResponse'}
        '404':
          description: Host not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
    patch:
      operationId: patchHostByID
      summary: Update mutable host fields
      x-required-permission: host:write
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/HostUpdateRequest'}
      responses:
        '200':
          description: Host updated
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HostResponse'}
        '400':
          description: Validation failure
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '404':
          description: Host not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
    delete:
      operationId: deleteHostByID
      summary: Soft-delete a host
      x-required-permission: host:delete
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '204':
          description: Deleted (deleted_at set)
        '404':
          description: Host not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/hosts/{host_id}/credentials:resolve:
    post:
      operationId: postHostCredentialsResolve
      summary: Resolve the credential that will be used for a host
      x-required-permission: credential:read
      parameters:
        - {name: host_id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200':
          description: Resolved credential metadata
          content:
            application/json:
              schema: {$ref: '#/components/schemas/CredentialResponse'}
        '404':
          description: No credential available for host or system default
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/hosts/{host_id}/maintenance:
    put:
      operationId: putHostMaintenance
      summary: Pause/resume liveness probes for a single host
      description: >
        Toggling maintenance_mode=true causes listProbeTargets to skip
        the host on every subsequent tick. The host_liveness row is left
        untouched, so resuming maintenance picks up from the last
        recorded state. v1.3.0.
      x-required-permission: host:write
      parameters:
        - {name: host_id, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/HostMaintenanceRequest'}
      responses:
        '200':
          description: Updated host
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HostResponse'}
        '404':
          description: Host not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/hosts/{host_id}/monitoring/history:
    get:
      operationId: getHostMonitoringHistory
      summary: Tail the host's monitoring-history rows (most recent first)
      description: >
        Returns up to `limit` most-recent host_monitoring_history rows
        for diagnostics. Each row captures the per-layer pass/fail flags
        the multi-layer probe recorded. v1.3.0.
      x-required-permission: host:read
      parameters:
        - {name: host_id, in: path, required: true, schema: {type: string, format: uuid}}
        - name: limit
          in: query
          required: false
          schema: {type: integer, minimum: 1, maximum: 500, default: 50}
      responses:
        '200':
          description: History rows newest-first
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HostMonitoringHistoryResponse'}
        '404':
          description: Host not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/audit/events:
    get:
      operationId: getAuditEvents
      summary: List audit events (cursor-paginated, newest first)
      parameters:
        - name: action
          in: query
          schema: {type: string}
        - name: correlation_id
          in: query
          schema: {type: string}
        - name: actor_type
          in: query
          schema: {type: string}
        - name: since
          in: query
          schema: {type: string, format: date-time}
        - name: until
          in: query
          schema: {type: string, format: date-time}
        - name: cursor
          in: query
