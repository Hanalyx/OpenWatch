# OpenWatch — Stage-0 OpenAPI manifest.
#
# Self-contained 3-endpoint surface that oapi-codegen turns into typed
# Go server stubs. The full 14-domain manifest lives in openapi.full.yaml
# for Stage 2+ reference.
#
# Endpoints:
#   GET  /api/v1/health                — anonymous liveness probe
#   POST /api/v1/diagnostics:echo      — exercises idempotency + audit
#   GET  /api/v1/audit/events          — cursor-paginated audit list
#
# Specs:
#   app/specs/api/health.spec.yaml
#   app/specs/api/diagnostics-echo.spec.yaml
#   app/specs/api/audit-events-query.spec.yaml

openapi: 3.0.3

info:
  title: OpenWatch (Stage 0)
  version: 0.1.0-alpha.1
  description: |
    Stage 0 walking-skeleton surface — three endpoints that exercise the
    foundation stack (correlation, idempotency, audit, error envelope).

servers:
  - url: https://localhost:8443
    description: Local development

paths:

  /api/v1/auth/login:
    post:
      operationId: postAuthLogin
      summary: Username/password login with optional TOTP
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/AuthLoginRequest'}
      responses:
        '200':
          description: Login succeeded; tokens issued
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AuthLoginResponse'}
        '401':
          description: Invalid credentials or MFA required
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/auth/logout:
    post:
      operationId: postAuthLogout
      summary: Revoke the calling session
      responses:
        '204':
          description: Session revoked

  /api/v1/auth/refresh:
    post:
      operationId: postAuthRefresh
      summary: Rotate the refresh token; mint a new access+refresh pair
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/AuthRefreshRequest'}
      responses:
        '200':
          description: New token pair issued
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AuthLoginResponse'}
        '401':
          description: Refresh token invalid, expired, or reused (cascade revoke triggered)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/auth/refresh-cookie:
    post:
      operationId: postAuthRefreshCookie
      summary: Rotate the refresh cookie and mint a new session (browser flow)
      description: >
        Reads the HttpOnly `openwatch_refresh` cookie, rotates the underlying
        refresh token, mints a new session, and Set-Cookies both the rotated
        refresh cookie and a fresh `openwatch_session`. Used by the browser
        API client as the transparent on-401 retry hook so users with a live
        refresh window don't get bounced to /login on every inactivity timeout.
      security: []
      responses:
        '200':
          description: Cookies rotated; identity returned
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AuthMeResponse'}
        '401':
          description: Refresh cookie missing, invalid, expired, or reused. Both auth cookies are cleared.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/auth/me:
    get:
      operationId: getAuthMe
      summary: Return the calling identity
      responses:
        '200':
          description: Identity
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AuthMeResponse'}
        '401':
          description: No valid session or bearer
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/users/me/preferences:
    get:
      operationId: getUsersMePreferences
      summary: Return the calling user's UI preferences
      description: >
        Per-user UI preferences (e.g. the /hosts grid-vs-table default).
        Self-scoped — any authenticated identity reads its own; no special
        permission. Unset keys are simply absent (the client falls back to
        its defaults). Spec system-user-preferences + api-user-preferences.
      responses:
        '200':
          description: The caller's stored preferences
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UserPreferences'}
        '401':
          description: No valid session or bearer
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
    patch:
      operationId: patchUsersMePreferences
      summary: Merge a partial update into the calling user's UI preferences
      description: >
        Shallow-merges the provided keys into the caller's stored
        preferences and returns the merged result. Only the keys present in
        the body are changed; omitted keys are retained. Self-scoped.
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UserPreferences'}
      responses:
        '200':
          description: The merged preferences
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UserPreferences'}
        '400':
          description: Malformed body
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '401':
          description: No valid session or bearer
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/auth/mfa:enroll:
    post:
      operationId: postAuthMFAEnroll
      summary: Enroll the calling user in TOTP MFA
      responses:
        '200':
          description: Provisioning URI returned for the authenticator app
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AuthMFAEnrollResponse'}

  /api/v1/auth/mfa:verify:
    post:
      operationId: postAuthMFAVerify
      summary: Confirm an enrolled MFA secret by verifying a generated OTP
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/AuthMFAVerifyRequest'}
      responses:
        '204':
          description: MFA verified
        '401':
          description: MFA OTP invalid or replayed
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/auth/password:change:
    post:
      operationId: postAuthPasswordChange
      summary: Change the calling user's password
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/AuthPasswordChangeRequest'}
      responses:
        '204':
          description: Password updated
        '401':
          description: Current password wrong
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '400':
          description: New password rejected by policy
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/health:
    get:
      operationId: getHealth
      summary: Liveness + readiness probe (anonymous)
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HealthResponse'}
        '503':
          description: Service is degraded or unavailable
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/version:
    get:
      operationId: getVersion
      summary: Build/version metadata (anonymous)
      security: []
      responses:
        '200':
          description: Version metadata for this deployment
          content:
            application/json:
              schema: {$ref: '#/components/schemas/VersionResponse'}

  /api/v1/diagnostics:echo:
    post:
      operationId: postDiagnosticsEcho
      summary: Echo the request message; exercises idempotency + audit
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: {type: string, minLength: 1, maxLength: 255}
        - name: X-Correlation-Id
          in: header
          required: false
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/EchoRequest'}
      responses:
        '200':
          description: Echo succeeded
          content:
            application/json:
              schema: {$ref: '#/components/schemas/EchoResponse'}
        '400':
          $ref: '#/components/responses/BadRequest'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '409':
          description: Idempotency-Key reused with different body
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/license:
    get:
      operationId: getLicense
      summary: Get the current license state (tier, features, quotas, status)
      responses:
        '200':
          description: License state
          content:
            application/json:
              schema: {$ref: '#/components/schemas/LicenseStateResponse'}

  /api/v1/admin/license:verify:
    post:
      operationId: postAdminLicenseVerify
      summary: Dry-run validate a JWT license without installing it
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/LicenseVerifyRequest'}
      responses:
        '200':
          description: Verification result (success or typed failure)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/LicenseVerifyResponse'}

  /api/v1/diagnostics:premium-echo:
    post:
      operationId: postDiagnosticsPremiumEcho
      summary: License-gated echo; requires premium_diagnostics feature
      x-required-feature: premium_diagnostics
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: {type: string, minLength: 1, maxLength: 255}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/EchoRequest'}
      responses:
        '200':
          description: Echoed
          content:
            application/json:
              schema: {$ref: '#/components/schemas/EchoResponse'}
        '402':
          description: License does not include premium_diagnostics feature
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/diagnostics:require-host-read:
    post:
      operationId: postDiagnosticsRequireHostRead
      summary: Stage-0 RBAC demo; requires host:read permission
      x-required-permission: host:read
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: {type: string, minLength: 1, maxLength: 255}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/EchoRequest'}
      responses:
        '200':
          description: Echoed (caller holds host:read)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/EchoResponse'}
        '403':
          description: Caller lacks host:read
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/diagnostics:require-host-write:
    post:
      operationId: postDiagnosticsRequireHostWrite
      summary: Stage-0 RBAC demo; requires host:write permission
      x-required-permission: host:write
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: {type: string, minLength: 1, maxLength: 255}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/EchoRequest'}
      responses:
        '200':
          description: Echoed (caller holds host:write)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/EchoResponse'}
        '403':
          description: Caller lacks host:write
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/diagnostics:evaluate-alert:
    post:
      operationId: postDiagnosticsEvaluateAlert
      summary: Stage-0 policy demo; evaluates the alert_thresholds policy
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/EvaluateAlertRequest'}
      responses:
        '200':
          description: Policy decision
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PolicyDecisionResponse'}

  /api/v1/diagnostics:enqueue-test-job:
    post:
      operationId: postDiagnosticsEnqueueTestJob
      summary: Stage-0 queue demo; enqueues a no-op job processed by the in-process worker
      responses:
        '202':
          description: Job accepted; worker will drain
          content:
            application/json:
              schema: {$ref: '#/components/schemas/EnqueueTestJobResponse'}

  /api/v1/admin/policies:reload:
    post:
      operationId: postAdminPoliciesReload
      summary: Reload signed policy files from the configured directory
      x-required-permission: policy:reload
      responses:
        '200':
          description: Per-type reload outcomes
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PoliciesReloadResponse'}
        '403':
          description: Caller lacks policy:reload
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/diagnostics:require-remediation-execute:
    post:
      operationId: postDiagnosticsRequireRemediationExecute
      summary: Stage-0 RBAC+license demo; requires remediation:execute (RBAC) + premium_diagnostics (license)
      x-required-permission: remediation:execute
      x-required-feature: premium_diagnostics
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: {type: string, minLength: 1, maxLength: 255}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/EchoRequest'}
      responses:
        '200':
          description: Echoed
          content:
            application/json:
              schema: {$ref: '#/components/schemas/EchoResponse'}
        '402':
          description: License does not include remediation_execution
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '403':
          description: Caller lacks remediation:execute
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/auth/me/permissions:
    get:
      operationId: getAuthMePermissions
      summary: Effective permissions for the calling identity
      responses:
        '200':
          description: Permission list
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AuthMePermissionsResponse'}

  /api/v1/auth/permissions:registry:
    get:
      operationId: getAuthPermissionsRegistry
      summary: Full RBAC registry (categories, permissions, built-in roles)
      responses:
        '200':
          description: Registry
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PermissionsRegistryResponse'}

  /api/v1/users:
    get:
      operationId: getUsers
      summary: List users
      x-required-permission: user:read
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UsersListResponse'}
        '403':
          description: Caller lacks user:read
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
    post:
      operationId: postUsers
      summary: Create a user
      x-required-permission: user:write
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UserCreateRequest'}
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UserResponse'}
        '400':
          description: Validation or policy failure
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '403':
          description: Caller lacks user:write
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/users/{id}:
    get:
      operationId: getUserByID
      summary: Fetch a user
      x-required-permission: user:read
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200':
          description: User
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UserResponse'}
        '404':
          description: User not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
    delete:
      operationId: deleteUserByID
      summary: Soft-delete a user
      x-required-permission: user:delete
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '204':
          description: Deleted
        '404':
          description: User not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/users/{id}/roles:assign:
    post:
      operationId: postUserRolesAssign
      summary: Assign a role to a user
      x-required-permission: role:assign
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UserRoleAssignRequest'}
      responses:
        '204':
          description: Role assigned
        '400':
          description: Unknown role id
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/users/{id}/roles:unassign:
    post:
      operationId: postUserRolesUnassign
      summary: Remove a role from a user
      x-required-permission: role:assign
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UserRoleAssignRequest'}
      responses:
        '204':
          description: Role removed (idempotent)

  /api/v1/users/{id}:reset-password:
    post:
      operationId: postUserResetPassword
      summary: Admin-reset a user's password (own or another's)
      description: |
        Sets a user's password on administrator authority - no current
        password required. The new password runs through the role-aware
        policy + breach screen; the target's active sessions are revoked so
        they must re-authenticate. RBAC: admin:user_manage. Spec api-users.
      x-required-permission: admin:user_manage
      x-audit-events: [admin.user.password_reset]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UserPasswordResetRequest'}
      responses:
        '204':
          description: Password reset; the target's sessions were revoked
        '400':
          description: New password rejected by policy (too short/long/breached)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '403':
          description: Caller lacks admin:user_manage permission
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '404':
          description: User not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/users/{id}:disable:
    post:
      operationId: postUserDisable
      summary: Disable a user account
      description: |
        Marks the account disabled: it can no longer authenticate (login is
        rejected) and the user's active sessions are revoked immediately. An
        admin cannot disable their own account (lockout prevention, 409).
        RBAC: admin:user_manage. Spec api-users.
      x-required-permission: admin:user_manage
      x-audit-events: [admin.user.disabled]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200':
          description: The disabled user
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UserResponse'}
        '403':
          description: Caller lacks admin:user_manage permission
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '404':
          description: User not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '409':
          description: Cannot disable your own account
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/users/{id}:enable:
    post:
      operationId: postUserEnable
      summary: Re-enable a disabled user account
      description: |
        Clears the disabled flag so the user can authenticate again with a
        fresh login (sessions revoked while disabled stay dead). RBAC:
        admin:user_manage. Spec api-users.
      x-required-permission: admin:user_manage
      x-audit-events: [admin.user.enabled]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200':
          description: The re-enabled user
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UserResponse'}
        '403':
          description: Caller lacks admin:user_manage permission
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '404':
          description: User not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/roles:create:
    post:
      operationId: postRolesCreate
      summary: Create a custom role
      x-required-permission: role:write
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CustomRoleCreateRequest'}
      responses:
        '201':
          description: Custom role created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/CustomRoleResponse'}
        '400':
          description: Permission unknown
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '409':
          description: Role id taken
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/roles:
    get:
      operationId: getRoles
      summary: List built-in roles
      x-required-permission: role:read
      responses:
        '200':
          description: Role list
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AdminRolesResponse'}
        '403':
          description: Caller lacks role:read
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/credentials:
    get:
      operationId: getCredentials
      summary: List credentials (metadata only)
      x-required-permission: credential:read
      responses:
        '200':
          description: Credential metadata list
          content:
            application/json:
              schema: {$ref: '#/components/schemas/CredentialListResponse'}
        '403':
          description: Caller lacks credential:read
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
    post:
      operationId: postCredentials
      summary: Create a credential
      x-required-permission: credential:write
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CredentialCreateRequest'}
      responses:
        '201':
          description: Credential created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/CredentialResponse'}
        '400':
          description: Validation, invalid scope, host not found, or invalid SSH key
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '409':
          description: Multiple system defaults
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/credentials/{id}:
    get:
      operationId: getCredentialByID
      summary: Fetch a credential's metadata
      x-required-permission: credential:read
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200':
          description: Credential metadata
          content:
            application/json:
              schema: {$ref: '#/components/schemas/CredentialResponse'}
        '404':
          description: Credential not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
    patch:
      operationId: patchCredentialByID
      summary: Update a credential in place
      description: >
        Partial update of an existing active credential. Only the fields
        present in the body change; omitted fields are left untouched.
        Secret material (password, private_key, private_key_passphrase)
        is re-encrypted only when a non-empty value is supplied — omitting
        a secret keeps the stored ciphertext, so metadata can be edited
        without re-entering the key or password. scope and scope_id are
        immutable. Setting is_default=true on a system credential atomically
        demotes the previous system default.
      x-required-permission: credential:write
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CredentialUpdateRequest'}
      responses:
        '200':
          description: Updated credential metadata
          content:
            application/json:
              schema: {$ref: '#/components/schemas/CredentialResponse'}
        '400':
          description: Validation failure (unknown auth_method, missing required secret)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '404':
          description: Credential not found or already soft-deleted
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '409':
          description: is_default=true collides with an existing system default
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
    delete:
      operationId: deleteCredentialByID
      summary: Soft-delete a credential
      x-required-permission: credential:delete
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '204':
          description: Deleted (is_active=false)
        '404':
          description: Credential not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/credentials/{id}:clone:
    post:
      operationId: postCredentialClone
      summary: Clone a credential into a new scope (system → host or host → host)
      description: >
        Copies the source credential's encrypted secret material verbatim
        into a new row with the target scope/scope_id. Used by the bulk
        import flow to attach a chosen credential template to each newly
        imported host without re-prompting for the secret material.
      x-required-permission: credential:write
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CredentialCloneRequest'}
      responses:
        '201':
          description: Clone created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/CredentialResponse'}
        '400':
          description: Invalid scope, host not found, or validation failure
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '404':
          description: Source credential not found or already soft-deleted
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '409':
          description: is_default=true collides with an existing system default
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/hosts:
    get:
      operationId: getHosts
      summary: List hosts
      x-required-permission: host:read
      parameters:
        - {name: environment, in: query, required: false, schema: {type: string}}
        - {name: tag, in: query, required: false, schema: {type: string}}
      responses:
        '200':
          description: Host list
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HostListResponse'}
        '403':
          description: Caller lacks host:read
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
    post:
      operationId: postHosts
      summary: Create a host
      x-required-permission: host:write
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/HostCreateRequest'}
      responses:
        '201':
          description: Host created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HostResponse'}
        '400':
          description: Validation failure (bad hostname, ip, port, etc.)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '409':
          description: Hostname already exists in environment
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/hosts/{id}:
    get:
      operationId: getHostByID
      summary: Fetch a host with liveness + compliance enrichment
      x-required-permission: host:read
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
        - name: framework
          in: query
          description: Filter compliance_summary to host_rule_state rows whose framework_refs contains this key (v1.2.0). Liveness is unaffected.
          schema: {type: string}
      responses:
        '200':
          description: Host detail (includes liveness + compliance_summary)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HostDetailResponse'}
        '404':
          description: Host not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
    patch:
      operationId: patchHostByID
      summary: Update mutable host fields
      x-required-permission: host:write
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/HostUpdateRequest'}
      responses:
        '200':
          description: Host updated
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HostResponse'}
        '400':
          description: Validation failure
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '404':
          description: Host not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
    delete:
      operationId: deleteHostByID
      summary: Soft-delete a host
      x-required-permission: host:delete
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '204':
          description: Deleted (deleted_at set)
        '404':
          description: Host not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/hosts/{host_id}/credentials:resolve:
    post:
      operationId: postHostCredentialsResolve
      summary: Resolve the credential that will be used for a host
      x-required-permission: credential:read
      parameters:
        - {name: host_id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200':
          description: Resolved credential metadata
          content:
            application/json:
              schema: {$ref: '#/components/schemas/CredentialResponse'}
        '404':
          description: No credential available for host or system default
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/hosts/{host_id}/maintenance:
    put:
      operationId: putHostMaintenance
      summary: Pause/resume liveness probes for a single host
      description: >
        Toggling maintenance_mode=true causes listProbeTargets to skip
        the host on every subsequent tick. The host_liveness row is left
        untouched, so resuming maintenance picks up from the last
        recorded state. v1.3.0.
      x-required-permission: host:write
      parameters:
        - {name: host_id, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/HostMaintenanceRequest'}
      responses:
        '200':
          description: Updated host
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HostResponse'}
        '404':
          description: Host not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/hosts/{host_id}/monitoring/history:
    get:
      operationId: getHostMonitoringHistory
      summary: Tail the host's monitoring-history rows (most recent first)
      description: >
        Returns up to `limit` most-recent host_monitoring_history rows
        for diagnostics. Each row captures the per-layer pass/fail flags
        the multi-layer probe recorded. v1.3.0.
      x-required-permission: host:read
      parameters:
        - {name: host_id, in: path, required: true, schema: {type: string, format: uuid}}
        - name: limit
          in: query
          required: false
          schema: {type: integer, minimum: 1, maximum: 500, default: 50}
      responses:
        '200':
          description: History rows newest-first
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HostMonitoringHistoryResponse'}
        '404':
          description: Host not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/audit/events:
    get:
      operationId: getAuditEvents
      summary: List audit events (cursor-paginated, newest first)
      parameters:
        - name: action
          in: query
          schema: {type: string}
        - name: correlation_id
          in: query
          schema: {type: string}
        - name: actor_type
          in: query
          schema: {type: string}
        - name: since
          in: query
          schema: {type: string, format: date-time}
        - name: until
          in: query
          schema: {type: string, format: date-time}
        - name: cursor
          in: query
          schema: {type: string}
        - name: limit
          in: query
          schema: {type: integer, minimum: 1, maximum: 200, default: 50}
      responses:
        '200':
          description: Page of audit events
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AuditEventsPage'}
        '400':
          $ref: '#/components/responses/BadRequest'

  # Spec: app/specs/api/fleet-observability.spec.yaml (v1.1.0)
  /api/v1/fleet/score:
    get:
      operationId: getFleetScore
      summary: Fleet-wide compliance score (passing/total)
      parameters:
        - name: framework
          in: query
          description: Filter to host_rule_state rows whose framework_refs contains this key (v1.1.0).
          schema: {type: string}
      responses:
        '200':
          description: Fleet score
          content:
            application/json:
              schema: {$ref: '#/components/schemas/FleetScore'}
        '401':
          description: Authentication required
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '403':
          description: Caller lacks system:read permission
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/fleet/liveness:
    get:
      operationId: getFleetLiveness
      summary: Host counts by reachability status
      responses:
        '200':
          description: Liveness rollup
          content:
            application/json:
              schema: {$ref: '#/components/schemas/FleetLiveness'}
        '401':
          description: Authentication required
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '403':
          description: Caller lacks system:read permission
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/fleet/top-failing-rules:
    get:
      operationId: getFleetTopFailingRules
      summary: Rules with the most failing hosts (descending)
      parameters:
        - name: framework
          in: query
          description: Filter to host_rule_state rows whose framework_refs contains this key (v1.1.0).
          schema: {type: string}
        - name: limit
          in: query
          schema: {type: integer, minimum: 1, maximum: 1000, default: 50}
      responses:
        '200':
          description: Ranked rule failures
          content:
            application/json:
              schema: {$ref: '#/components/schemas/FleetTopFailingRules'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401':
          description: Authentication required
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '403':
          description: Caller lacks system:read permission
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/fleet/top-failing-hosts:
    get:
      operationId: getFleetTopFailingHosts
      summary: Hosts with the most failing rules (descending)
      parameters:
        - name: framework
          in: query
          description: Filter to host_rule_state rows whose framework_refs contains this key (v1.1.0).
          schema: {type: string}
        - name: limit
          in: query
          schema: {type: integer, minimum: 1, maximum: 1000, default: 50}
      responses:
        '200':
          description: Ranked host failures
          content:
            application/json:
              schema: {$ref: '#/components/schemas/FleetTopFailingHosts'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401':
          description: Authentication required
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '403':
          description: Caller lacks system:read permission
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/fleet/recent-changes:
    get:
      operationId: getFleetRecentChanges
      summary: Recent transactions (state changes), newest first
      parameters:
        - name: framework
          in: query
          description: Filter to transactions whose framework_refs contains this key (v1.1.0).
          schema: {type: string}
        - name: since
          in: query
          description: Filter to transactions strictly newer than this RFC3339 timestamp
          schema: {type: string, format: date-time}
        - name: limit
          in: query
          schema: {type: integer, minimum: 1, maximum: 1000, default: 50}
      responses:
        '200':
          description: Recent transaction page
          content:
            application/json:
              schema: {$ref: '#/components/schemas/FleetRecentChanges'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401':
          description: Authentication required
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '403':
          description: Caller lacks system:read permission
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/fleet/connectivity/breakdown:
    get:
      operationId: getFleetConnectivityBreakdown
      summary: 4-state connectivity breakdown (online/degraded/critical/down/never_probed)
      description: |
        Derived per-state host counts for the Settings → Scanning &
        monitoring page. Bands come from `consecutive_failures`
        hysteresis: online=reachable+consec=0, degraded=reachable+consec>=1,
        critical=unreachable+consec<3, down=consec>=3, never_probed=no row.
        Counts sum to active host count. Spec api-fleet-connectivity-breakdown.
      responses:
        '200':
          description: Per-state counts
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ConnectivityBreakdown'}
        '403':
          description: Caller lacks system:read permission
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/system/connectivity/config:
    get:
      operationId: getSystemConnectivityConfig
      summary: Read the connectivity-monitor runtime config + baked-in defaults
      responses:
        '200':
          description: Current config + defaults sub-object
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ConnectivityConfigResponse'}
        '403':
          description: Caller lacks system:read permission
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
    put:
      operationId: putSystemConnectivityConfig
      summary: Update connectivity-monitor runtime config
      description: |
        Persists the new config, signals the in-process liveness service
        to Reload, and emits system.config.changed. Bounds are validated
        at the handler boundary — out-of-range values return 400.
        Spec api-system-connectivity.
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ConnectivityConfig'}
      responses:
        '200':
          description: Updated config snapshot
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ConnectivityConfig'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '403':
          description: Caller lacks system:write permission
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/system/intelligence/config:
    get:
      operationId: getSystemIntelligenceConfig
      summary: Read the OS Intelligence scheduler runtime config + baked-in defaults
      description: |
        Returns the persisted IntelligenceConfig (or DefaultIntelligence
        when no row exists) PLUS the baked-in defaults sub-object so the
        UI can render a "reset to defaults" affordance without a
        round-trip. Mirrors api-system-connectivity v1.0.
        Spec api-system-intelligence-config.
      responses:
        '200':
          description: Current config + defaults sub-object
          content:
            application/json:
              schema: {$ref: '#/components/schemas/IntelligenceConfigResponse'}
        '403':
          description: Caller lacks system:read permission
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
    put:
      operationId: putSystemIntelligenceConfig
      summary: Update OS Intelligence scheduler runtime config
      description: |
        Persists the new config (interval_sec 300..86400, rate_limit
        1..200, maintenance_global boolean). Emits
        system.config.changed in the same write transaction. The
        in-process scheduler picks up the new values at the top of
        its next cycle — no hot-reload signal needed.
        Spec api-system-intelligence-config.
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/IntelligenceConfig'}
      responses:
        '200':
          description: Updated config snapshot
          content:
            application/json:
              schema: {$ref: '#/components/schemas/IntelligenceConfig'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '403':
          description: Caller lacks system:config:write permission
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/system/discovery/config:
    get:
      operationId: getSystemDiscoveryConfig
      summary: Read the OS discovery scheduler runtime config + baked-in defaults
      description: |
        Returns the persisted DiscoveryConfig (or DefaultDiscovery when
        no row exists) PLUS the baked-in defaults sub-object so the UI
        can render a "reset to defaults" affordance without a round-trip.
        Mirrors api-system-intelligence-config v1.0.
        Spec api-system-discovery-config.
      responses:
        '200':
          description: Current config + defaults sub-object
          content:
            application/json:
              schema: {$ref: '#/components/schemas/DiscoveryConfigResponse'}
        '403':
          description: Caller lacks system:read permission
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
    put:
      operationId: putSystemDiscoveryConfig
      summary: Update OS discovery scheduler runtime config
      description: |
        Persists the new config (interval_sec 3600..604800, rate_limit
        1..500, detect_on_first_contact boolean, maintenance_global
        boolean). Emits system.config.changed in the same write
        transaction. The in-process scheduler picks up the new values
        at the top of its next tick — no hot-reload signal needed.
        Spec api-system-discovery-config.
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/DiscoveryConfig'}
      responses:
        '200':
          description: Updated config snapshot
          content:
            application/json:
              schema: {$ref: '#/components/schemas/DiscoveryConfig'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '403':
          description: Caller lacks system:config:write permission
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/system/discovery/sweep:
    post:
      operationId: postSystemDiscoverySweep
      summary: Enqueue a host.discovery job for every host with NULL os_discovered_at
      description: |
        One-off manual sweep used by the "Run now" affordance on the
        Settings page. Enqueues host.discovery jobs for non-deleted,
        non-maintenance hosts whose hosts.os_discovered_at IS NULL.
        Hosts already discovered are NOT re-enqueued — this is a
        catch-up, not a forced re-fingerprint. Returns the count of
        jobs enqueued so the UI can confirm the action.
        Spec api-system-discovery-config.
      responses:
        '200':
          description: Sweep dispatched
          content:
            application/json:
              schema: {$ref: '#/components/schemas/DiscoverySweepResponse'}
        '403':
          description: Caller lacks system:config:write permission
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/system/scan/config:
    get:
      operationId: getSystemScanConfig
      summary: Read the adaptive compliance scan scheduler config + baked-in defaults
      description: |
        Returns the persisted ScanConfig (or DefaultScan when no row
        exists) PLUS the baked-in defaults sub-object so the UI can
        render a "reset to defaults" affordance without a round-trip.
        The six per-state intervals are the adaptive scheduler's tier
        ladder (scan plan decision #4: systemconfig, not a policy file).
        Spec api-system-scan-config.
      responses:
        '200':
          description: Current config + defaults sub-object
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ScanConfigResponse'}
        '403':
          description: Caller lacks system:read permission
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
    put:
      operationId: putSystemScanConfig
      summary: Update the adaptive compliance scan scheduler config
      description: |
        Persists the new config. Ladder minutes are CLAMPED into
        [5, 2880] and rate_limit into [1, 100] rather than rejected
        (the response echoes the clamped values); emits
        system.config.changed in the same write transaction. The
        in-process scheduler refreshes the config at the top of its
        next 60s tick. Spec api-system-scan-config.
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ScanConfig'}
      responses:
        '200':
          description: Updated (clamped) config snapshot
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ScanConfig'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '403':
          description: Caller lacks system:config:write permission
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/system/scan/schedule-preview:
    get:
      operationId: getSystemScanSchedulePreview
      summary: 24h forward projection of the compliance scan schedule
      description: |
        Read-only projection of host_compliance_schedule over the next
        24 hours (NOT a dry-run dispatch): per-hour due counts for the
        Settings schedule strip, the soonest next_scheduled_scan, the
        count of hosts already due, and the live scan queue depth.
        Spec api-system-scan-config.
      responses:
        '200':
          description: Schedule projection
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ScanSchedulePreview'}
        '403':
          description: Caller lacks system:read permission
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/fleet/compliance/states:
    get:
      operationId: getFleetComplianceStates
      summary: Fleet host counts per compliance state
      description: |
        One row per ComplianceState in ladder order (critical,
        non_compliant, partial, mostly_compliant, compliant, unknown)
        with the count of live hosts whose host_compliance_schedule
        row is in that state. States with zero hosts are still listed
        so the Settings steppers can render a stable six-row layout.
        Spec api-system-scan-config.
      responses:
        '200':
          description: Per-state host counts
          content:
            application/json:
              schema: {$ref: '#/components/schemas/FleetComplianceStates'}
        '403':
          description: Caller lacks host:read permission
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/system/scan/variables:
    get:
      operationId: getSystemScanVariables
      summary: List the corpus-used kensa rule-template variables with defaults and overrides
      description: |
        One entry per variable the installed rule corpus actually
        references (kensa ships more built-in defaults than the corpus
        uses; unused ones are not listed). Each entry carries the
        built-in default, the operator override when set, the count
        and ids of affected rules, and the configure_me flag marking
        organization-specific placeholder defaults
        (rsyslog_remote_server, chrony_ntp_pool, banner_text) that
        operators should always review. Spec api-system-scan-config.
      responses:
        '200':
          description: Corpus-used variables sorted by name
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ScanVariablesResponse'}
        '403':
          description: Caller lacks system:read permission
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
    put:
      operationId: putSystemScanVariables
      summary: Replace the operator variable overrides
      description: |
        PUT replaces the FULL override map (absent names revert to the
        built-in defaults). Unknown variable names (not used by the
        installed corpus) are rejected with 400 naming the offending
        key; overrides equal to the built-in default are dropped at
        write time. Emits system.config.changed. The scan path reloads
        the rule corpus with the merged variables on the next scan.
        Spec api-system-scan-config.
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ScanVariableOverrides'}
      responses:
        '200':
          description: The normalized override map that was persisted
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ScanVariableOverrides'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '403':
          description: Caller lacks system:config:write permission
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /api/v1/hosts/{id}/exceptions:
    get:
      operationId: getHostExceptions
      summary: List a host's compliance exceptions
      description: |
        Per-host exception list for the Compliance tab + Watchlist row.
        By default returns open rows (requested + approved); ?history=true
        returns every row. RBAC: exception:read. Spec
        api-compliance-exceptions.
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
        - name: history
          in: query
          required: false
          schema: {type: boolean, default: false}
      responses:
        '200':
          description: Exceptions, newest first
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ExceptionList'}
        '404':
          description: Unknown or deleted host
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '403':
          description: Caller lacks exception:read permission
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
    post:
      operationId: postHostException
      summary: Request a compliance exception (rule waiver) on a host
      description: |
