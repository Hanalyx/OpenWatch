# OpenWatch — Policies admin domain (skeleton)
#
# Admin endpoints for policy-as-data lifecycle: view current, reload, install
# new versions, query history. This file covers MANAGEMENT of the five policy
# types defined in app/docs/policies_as_data.md. The policies themselves
# (exceptions, approvals, schedules, alert_thresholds, remediation) govern
# behavior in OTHER domains (compliance.yaml, alerts.yaml, remediation.yaml).
#
# Fidelity: skeleton — operations, extensions, descriptions; schemas stubbed.
#
# Registry cross-references:
#   - Permissions: app/auth/permissions.yaml — policy:{read,reload,install}
#   - Audit events: app/audit/events.yaml — policy.{loaded,invalid}
#       (policy.applied is forensic/per-evaluation; not emitted by admin endpoints)
#   - Error codes: app/api/error_codes.yaml — policy.{invalid,version_mismatch,not_found}
#   - Design: app/docs/policies_as_data.md §7 (loading lifecycle)

openapi: 3.1.0
info:
  title: OpenWatch — Policies Admin API
  version: 0.1.0-skeleton

paths:

  # ===========================================================================
  # Current state
  # ===========================================================================

  /api/v1/admin/policies:
    get:
      operationId: listLoadedPolicies
      summary: List the currently-active policy of each type (one row per policy_type).
      description: |
        Returns the active policy per type with version, signed_by, source_hash,
        effective_from, and loaded_at. Inactive types (no policy file present)
        show as `version: 0.0.0` with the built-in default flag.
      x-required-permission: policy:read
      responses:
        '200': {description: Active policies (one per type).}

  /api/v1/admin/policies:types:
    get:
      operationId: getPolicyTypes
      summary: Return the registry of known policy types and their schemas.
      description: |
        Returns metadata for the five policy types (id, description, schema
        URL, current active version). Frontend uses to render policy editors
        and validate uploads client-side before submission.
      x-required-permission: policy:read
      responses:
        '200': {description: Policy types registry.}

  # ===========================================================================
  # Per-type
  # ===========================================================================

  /api/v1/admin/policies/{policy_type}:
    parameters:
      - {name: policy_type, in: path, required: true, schema: {type: string, enum: [exceptions, approvals, schedules, alert_thresholds, remediation]}}
    get:
      operationId: getActivePolicy
      summary: Get the full content of the currently-active policy for one type.
      description: |
        Returns the parsed policy YAML (rules, metadata, signature info). The
        signature value is omitted from the response; signature validation is
        opaque to the caller.
      x-required-permission: policy:read
      responses:
        '200': {description: Active policy detail.}
        '404':
          description: Policy type unknown.
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

  /api/v1/admin/policies/{policy_type}/history:
    parameters:
      - {name: policy_type, in: path, required: true, schema: {type: string}}
    get:
      operationId: getPolicyTypeHistory
      summary: Paginated history of all loaded versions for one policy type.
      description: |
        Source for forensic queries like "what was our alert_thresholds policy
        on March 15?" — drives the policy_history table backing the audit chain.
      x-required-permission: policy:read
      parameters:
        - {name: cursor, in: query, schema: {type: [string, 'null']}}
        - {name: limit,  in: query, schema: {type: integer, minimum: 1, maximum: 100, default: 25}}
        - {name: active_at, in: query, schema: {type: string, format: date-time}, description: Return only the version that was active at this timestamp.}
      responses:
        '200':
          description: Page of policy versions for this type.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: {type: array, items: {type: object}}
                  next_cursor: {type: [string, 'null']}

  # ===========================================================================
  # Actions: reload, install
  # ===========================================================================

  /api/v1/admin/policies:reload:
    post:
      operationId: reloadPolicies
      summary: Trigger a policy reload (SIGHUP equivalent via API).
      description: |
        Re-reads policy files from disk; verifies signatures; validates schemas;
        monotonic-version-checks; atomic-swaps into runtime state. Per-type
        outcomes returned: `{loaded | invalid | unchanged}`. Best-effort:
        failure of one type does not roll back others. See policies_as_data.md
        §7.2 for the full reload lifecycle.
      x-required-permission: policy:reload
      x-audit-events: [policy.loaded, policy.invalid]
      parameters:
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string}}
      requestBody:
        description: 'Optional — `{ "types": ["exceptions", ...] }` to reload a subset; omit to reload all.'
        content: {application/json: {schema: {type: object, additionalProperties: true}}}
      responses:
        '200':
          description: All requested types loaded (or were unchanged).
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items: {type: object}
        '207':
          description: Multi-status — some types succeeded, some failed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items: {type: object}
        '503':
          description: Another reload in progress; retry later.
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

  /api/v1/admin/policies:install:
    post:
      operationId: installPolicy
      summary: Install a new signed policy version (writes to disk, then reloads that type).
      description: |
        Accepts a signed YAML policy file. Validates signature against
        embedded admin public keys, parses against the type-specific schema,
        and (if valid) writes to `/opt/openwatch/policies/{type}.yaml`,
        archives the prior version, and reloads the type atomically.
        Dangerous: a malformed install does not crash the running policy
        (previous state retained), but a successful install changes runtime
        behavior immediately.
      x-required-permission: policy:install
      x-audit-events: [policy.loaded, policy.invalid]
      parameters:
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/yaml:
            schema: {type: string, description: Signed policy YAML document.}
          application/json:
            schema: {type: object, additionalProperties: true, description: 'Wrapper: { "policy_yaml": "..." }'}
      responses:
        '200': {description: Installed and active. Returns the new version metadata.}
        '400':
          description: Invalid payload (parse failure, schema violation, signature failure, version regression).
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

# =============================================================================
# Shared components
# =============================================================================

components:

  responses:
    Unauthorized: {description: Authentication required, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
    Forbidden:    {description: Permission denied,         content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
    NotFound:     {description: Resource not found,         content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}

  schemas:
    ErrorEnvelope:
      # See app/api/error_codes.yaml for the canonical registry of codes.
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, fault, retryable, human_message]
          properties:
            code: {type: string, examples: [policy.invalid, policy.version_mismatch, policy.not_found]}
            fault: {type: string, enum: [client, server, policy, external]}
            retryable: {type: boolean}
            human_message: {type: string}
            detail: {type: object, additionalProperties: true}
            correlation_id: {type: string}
