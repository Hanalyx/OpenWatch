# OpenWatch — Admin domain (skeleton)
#
# High-privilege administration: users, custom roles, SSO providers, retention
# policies, system settings. Every operation is dangerous, audit-emitting,
# and gated by the `admin:*` permission family.
#
# Notes on scope:
#   - Custom-role CRUD ships in Stage 2 alongside user management. Stage 0
#     ships GET /admin/roles (built-ins only); CUD endpoints return 503 in
#     Stage 0 builds.
#   - The /admin/policies:* and /admin/license:* surfaces live in their own
#     files (policies.yaml, license.yaml).
#
# Fidelity: skeleton — operations, extensions, descriptions; schemas stubbed.
#
# Registry cross-references:
#   - Permissions: app/auth/permissions.yaml — admin:{user_manage,role_manage,
#       sso_provider,retention_policy,system_setting}
#   - Audit events: app/audit/events.yaml — admin.{user.*,role.changed,
#       sso_provider.*,retention_policy.changed,system_setting.changed},
#       authz.{role.assigned,role.removed}
#   - Error codes: app/api/error_codes.yaml — resource.{builtin,not_found,conflict},
#       validation.{field_unknown,field_format}

openapi: 3.1.0
info:
  title: OpenWatch — Admin API
  version: 0.1.0-skeleton

paths:

  # ===========================================================================
  # Users
  # ===========================================================================

  /api/v1/admin/users:
    get:
      operationId: listUsers
      summary: List admin-managed user accounts.
      x-required-permission: admin:user_manage
      parameters:
        - {name: status, in: query, schema: {type: string, enum: [active, disabled, locked]}}
        - {name: role,   in: query, schema: {type: string}, description: Filter to users holding this role.}
        - {name: q,      in: query, schema: {type: string}, description: Search on email/display_name.}
        - {name: cursor, in: query, schema: {type: [string, 'null']}}
        - {name: limit,  in: query, schema: {type: integer, minimum: 1, maximum: 200, default: 50}}
      responses:
        '200':
          description: Page of users.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: {type: array, items: {type: object}}
                  next_cursor: {type: [string, 'null']}

    post:
      operationId: createUser
      summary: Create a new user account.
      x-required-permission: admin:user_manage
      x-audit-events: [admin.user.created, authz.role.assigned]
      parameters:
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string}}
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, additionalProperties: true}}}
      responses:
        '201': {description: User created.}
        '409':
          description: User with this email already exists.
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

  /api/v1/admin/users/{user_id}:
    parameters:
      - {name: user_id, in: path, required: true, schema: {type: string, format: uuid}}
    get:
      operationId: getUser
      summary: Get a user (roles, status, MFA enrollment, last login).
      x-required-permission: admin:user_manage
      responses:
        '200': {description: User detail.}
        '404': {$ref: '#/components/responses/NotFound'}

    patch:
      operationId: updateUser
      summary: Update user (profile fields, status, role assignments).
      description: |
        Role changes within this PATCH emit `authz.role.assigned` and
        `authz.role.removed` audit events per role added/removed. The
        request body uses list-replacement semantics for `roles`.
      x-required-permission: admin:user_manage
      x-audit-events: [admin.user.updated, authz.role.assigned, authz.role.removed]
      parameters:
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string}}
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, additionalProperties: true}}}
      responses:
        '200': {description: User updated.}
        '404': {$ref: '#/components/responses/NotFound'}

    delete:
      operationId: deleteUser
      summary: Delete a user account (dangerous; revokes all sessions).
      x-required-permission: admin:user_manage
      x-audit-events: [admin.user.deleted, auth.token.revoked]
      responses:
        '204': {description: User deleted.}
        '404': {$ref: '#/components/responses/NotFound'}

  # ===========================================================================
  # Roles — built-in (Stage 0) + custom (Stage 2)
  # ===========================================================================

  /api/v1/admin/roles:
    get:
      operationId: listRoles
      summary: List roles (built-in + custom).
      description: |
        Stage 0 returns the 5 built-in roles. Stage 2 adds custom roles
        created via POST. Each row carries `is_built_in: bool`.
      x-required-permission: admin:role_manage
      responses:
        '200': {description: Role list.}

    post:
      operationId: createRole
      summary: Create a custom role (Stage 2; returns 503 in Stage 0 builds).
      description: |
        Validates every permission in the list against the RBAC registry
        (`app/auth/permissions.yaml`). Bare wildcard `*` is reserved for the
        built-in `admin` role and rejected here. Dangerous permissions
        included produce a warnings array in the response.
      x-required-permission: admin:role_manage
      x-audit-events: [admin.role.changed]
      parameters:
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string}}
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, additionalProperties: true}}}
      responses:
        '201': {description: Custom role created.}
        '400':
          description: Validation error (unknown permission, bare `*`, invalid id format).
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}
        '409':
          description: Role id collides with an existing role.
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

  /api/v1/admin/roles/{role_id}:
    parameters:
      - {name: role_id, in: path, required: true, schema: {type: string}}
    get:
      operationId: getRole
      summary: Get a role definition (permissions list, is_built_in, metadata).
      x-required-permission: admin:role_manage
      responses:
        '200': {description: Role detail.}
        '404': {$ref: '#/components/responses/NotFound'}

    put:
      operationId: updateRole
      summary: Replace a custom role's definition. Built-in roles return 405.
      x-required-permission: admin:role_manage
      x-audit-events: [admin.role.changed]
      parameters:
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string}}
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, additionalProperties: true}}}
      responses:
        '200': {description: Role updated.}
        '405':
          description: Built-in role cannot be modified.
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}
        '404': {$ref: '#/components/responses/NotFound'}

    delete:
      operationId: deleteRole
      summary: Delete a custom role. Built-in roles return 405; in-use roles return 409.
      x-required-permission: admin:role_manage
      x-audit-events: [admin.role.changed]
      responses:
        '204': {description: Role deleted.}
        '405':
          description: Built-in role cannot be deleted.
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}
        '409':
          description: Role is assigned to users; unassign first.
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

  # ===========================================================================
  # SSO Providers
  # ===========================================================================

  /api/v1/admin/sso/providers:
    get:
      operationId: listSsoProviders
      summary: List configured SSO providers (OIDC, SAML).
      x-required-permission: admin:sso_provider
      responses:
        '200':
          description: List of providers (secrets redacted).
          content:
            application/json:
              schema: {type: object, properties: {items: {type: array, items: {type: object}}}}

    post:
      operationId: createSsoProvider
      summary: Configure a new SSO provider.
      description: |
        Validates provider config (issuer URL, client_id, metadata). For
        OIDC: discovery URL is hit at create time and metadata is cached.
        For SAML: SP metadata is returned in the response for IdP setup.
      x-required-permission: admin:sso_provider
      x-audit-events: [admin.sso_provider.created]
      parameters:
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string}}
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, additionalProperties: true}}}
      responses:
        '201': {description: Provider configured.}

  /api/v1/admin/sso/providers/{provider_id}:
    parameters:
      - {name: provider_id, in: path, required: true, schema: {type: string, format: uuid}}
    patch:
      operationId: updateSsoProvider
      summary: Update SSO provider config (enable/disable, rotate client_secret).
      x-required-permission: admin:sso_provider
      x-audit-events: [admin.sso_provider.updated]
      parameters:
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string}}
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, additionalProperties: true}}}
      responses:
        '200': {description: Provider updated.}
        '404': {$ref: '#/components/responses/NotFound'}

    delete:
      operationId: deleteSsoProvider
      summary: Remove an SSO provider (dangerous; users authenticated via this provider lose access).
      x-required-permission: admin:sso_provider
      x-audit-events: [admin.sso_provider.deleted]
      responses:
        '204': {description: Provider removed.}
        '404': {$ref: '#/components/responses/NotFound'}

  # ===========================================================================
  # Retention policies
  # ===========================================================================

  /api/v1/admin/retention:
    get:
      operationId: getRetentionPolicy
      summary: Get retention durations for audit events, scan results, logs, transactions.
      x-required-permission: admin:retention_policy
      responses:
        '200': {description: Retention settings.}

    patch:
      operationId: updateRetentionPolicy
      summary: Update retention durations (dangerous; shorter retention = data loss on next sweep).
      x-required-permission: admin:retention_policy
      x-audit-events: [admin.retention_policy.changed]
      parameters:
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string}}
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, additionalProperties: true}}}
      responses:
        '200': {description: Retention updated.}

  # ===========================================================================
  # System settings
  # ===========================================================================

  /api/v1/admin/settings:
    get:
      operationId: getSystemSettings
      summary: Get system settings (TLS, listener, log level, feature flags).
      x-required-permission: admin:system_setting
      responses:
        '200': {description: System settings.}

    patch:
      operationId: updateSystemSettings
      summary: Update system settings (high impact; some require restart).
      x-required-permission: admin:system_setting
      x-audit-events: [admin.system_setting.changed]
      parameters:
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string}}
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, additionalProperties: true}}}
      responses:
        '200': {description: Settings updated. Returns which settings require a restart to take effect.}

# =============================================================================
# Shared components
# =============================================================================

components:

  responses:
    Unauthorized: {description: Authentication required, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
    Forbidden:    {description: Permission denied,         content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
    NotFound:     {description: Resource not found,         content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}

  schemas:
    ErrorEnvelope:
      # See app/api/error_codes.yaml for the canonical registry of codes.
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, fault, retryable, human_message]
          properties:
            code: {type: string, examples: [resource.builtin, resource.conflict, validation.field_unknown]}
            fault: {type: string, enum: [client, server, policy, external]}
            retryable: {type: boolean}
            human_message: {type: string}
            detail: {type: object, additionalProperties: true}
            correlation_id: {type: string}
