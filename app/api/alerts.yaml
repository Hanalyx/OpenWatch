# OpenWatch — Alerts domain (skeleton)
#
# Alert lifecycle: read, acknowledge, resolve, manual create. Threshold
# *configuration* is policy-driven (see app/docs/policies_as_data.md §5.4
# and policies.yaml `:install` for alert_thresholds policy management);
# this file covers the *alerts themselves*, not the thresholds that fire them.
#
# Fidelity: skeleton — operations, extensions, descriptions; schemas stubbed.
#
# Registry cross-references:
#   - Permissions: app/auth/permissions.yaml — alert:{read,acknowledge,resolve,write}
#   - Audit events: app/audit/events.yaml — alert.{created,acknowledged,resolved,threshold.changed}
#   - Policies: alert_thresholds (governs when alerts fire; configured via policies.yaml)
#   - Error codes: app/api/error_codes.yaml — transition.invalid, resource.not_found

openapi: 3.1.0
info:
  title: OpenWatch — Alerts API
  version: 0.1.0-skeleton

paths:

  # ===========================================================================
  # Alerts collection
  # ===========================================================================

  /api/v1/alerts:
    get:
      operationId: listAlerts
      summary: List alerts with filtering and cursor pagination.
      description: |
        Filterable by severity, status, host, framework, alert_type, and time
        range. Default sort: created_at desc.
      x-required-permission: alert:read
      parameters:
        - {name: severity, in: query, schema: {type: string, enum: [info, warning, critical]}}
        - {name: status,   in: query, schema: {type: string, enum: [open, acknowledged, resolved]}}
        - {name: alert_type, in: query, schema: {type: string}}
        - {name: host_id,  in: query, schema: {type: string, format: uuid}}
        - {name: framework, in: query, schema: {type: string}}
        - {name: created_after,  in: query, schema: {type: string, format: date-time}}
        - {name: created_before, in: query, schema: {type: string, format: date-time}}
        - {name: cursor, in: query, schema: {type: [string, 'null']}}
        - {name: limit,  in: query, schema: {type: integer, minimum: 1, maximum: 200, default: 50}}
      responses:
        '200':
          description: Page of alerts.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: {type: array, items: {type: object}}
                  next_cursor: {type: [string, 'null']}

    post:
      operationId: createAlert
      summary: Manually create an alert (integration push or operator-driven).
      description: |
        Most alerts are system-generated by the alert_thresholds policy on
        scan completion or drift. This endpoint exists for external systems
        and integration plugins that push alerts inward. Audit emits
        `alert.created` with `detail.source = "api"`.
      x-required-permission: alert:write
      x-audit-events: [alert.created]
      parameters:
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string}}
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, additionalProperties: true}}}
      responses:
        '201': {description: Alert created.}

  /api/v1/alerts:stats:
    get:
      operationId: getAlertStats
      summary: Aggregated alert counts (by severity, status, time bucket).
      x-required-permission: alert:read
      parameters:
        - {name: group_by, in: query, schema: {type: string, enum: [severity, status, alert_type, host_id, framework, hour, day], default: severity}}
        - {name: since, in: query, schema: {type: string, format: date-time}}
        - {name: until, in: query, schema: {type: string, format: date-time}}
      responses:
        '200': {description: Aggregated counts.}

  # ===========================================================================
  # Single alert lifecycle
  # ===========================================================================

  /api/v1/alerts/{alert_id}:
    parameters:
      - {name: alert_id, in: path, required: true, schema: {type: string, format: uuid}}
    get:
      operationId: getAlert
      summary: Get one alert with full detail and policy version that fired it.
      x-required-permission: alert:read
      responses:
        '200': {description: Alert detail.}
        '404': {$ref: '#/components/responses/NotFound'}

  /api/v1/alerts/{alert_id}:acknowledge:
    parameters:
      - {name: alert_id, in: path, required: true, schema: {type: string, format: uuid}}
    post:
      operationId: acknowledgeAlert
      summary: Acknowledge an alert (suppresses repeat notifications for the debounce window).
      x-required-permission: alert:acknowledge
      x-audit-events: [alert.acknowledged]
      parameters:
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string}}
      requestBody:
        content: {application/json: {schema: {type: object, additionalProperties: true}}}
      responses:
        '200': {description: Acknowledged.}
        '409':
          description: Illegal transition (e.g., already resolved).
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

  /api/v1/alerts/{alert_id}:resolve:
    parameters:
      - {name: alert_id, in: path, required: true, schema: {type: string, format: uuid}}
    post:
      operationId: resolveAlert
      summary: Mark an alert as resolved.
      x-required-permission: alert:resolve
      x-audit-events: [alert.resolved]
      parameters:
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string}}
      requestBody:
        content: {application/json: {schema: {type: object, additionalProperties: true}}}
      responses:
        '200': {description: Resolved.}
        '409':
          description: Illegal transition.
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

  /api/v1/alerts/{alert_id}/audit-events:
    parameters:
      - {name: alert_id, in: path, required: true, schema: {type: string, format: uuid}}
    get:
      operationId: getAlertAuditEvents
      summary: Audit-event sub-resource for one alert (created → acknowledged → resolved chain).
      x-required-permission: alert:read
      parameters:
        - {name: cursor, in: query, schema: {type: [string, 'null']}}
        - {name: limit,  in: query, schema: {type: integer, minimum: 1, maximum: 200, default: 50}}
      responses:
        '200':
          description: Page of audit events related to this alert.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: {type: array, items: {type: object}}
                  next_cursor: {type: [string, 'null']}

# =============================================================================
# Shared components
# =============================================================================

components:

  responses:
    Unauthorized: {description: Authentication required, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
    Forbidden:    {description: Permission denied,         content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
    NotFound:     {description: Resource not found,         content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}

  schemas:
    ErrorEnvelope:
      # See app/api/error_codes.yaml for the canonical registry of codes.
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, fault, retryable, human_message]
          properties:
            code: {type: string, examples: [transition.invalid, resource.not_found, authz.permission_denied]}
            fault: {type: string, enum: [client, server, policy, external]}
            retryable: {type: boolean}
            human_message: {type: string}
            detail: {type: object, additionalProperties: true}
            correlation_id: {type: string}
