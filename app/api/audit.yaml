openapi: 3.1.0

# ============================================================================
# Audit Events API
# ============================================================================
# Surface for the audit log: list, get, query, export, and taxonomy lookup.
#
# Per agent-first §1, the audit log is a first-class queryable API resource —
# not a back-channel. Agents verify operation effects by querying audit events
# with the correlation_id from their original request.
#
# Design source: app/docs/audit_event_taxonomy.md
# Registry source: app/audit/events.yaml
#
# Status: DRAFT for design review
# Last updated: 2026-04-29
# ============================================================================

info:
  title: OpenWatch Audit Events API
  version: 1.0.0-draft
  description: |
    Append-only audit log for compliance, forensics, and agent verification.

servers:
  - url: https://openwatch.example.com/api/v1

components:
  parameters:
    EventId:
      name: event_id
      in: path
      required: true
      schema: {type: string, format: uuid}

    Limit:
      name: limit
      in: query
      schema: {type: integer, minimum: 1, maximum: 500, default: 50}

    Cursor:
      name: cursor
      in: query
      schema: {type: string}

    Sort:
      name: sort
      in: query
      schema: {type: string, default: "occurred_at:desc"}
      description: Default `occurred_at:desc`. Most recent first.

    Fields:
      name: fields
      in: query
      schema: {type: string}

  responses:
    BadRequest: {description: Validation error, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
    Unauthorized: {description: Auth required, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
    Forbidden: {description: Permission denied, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
    NotFound: {description: Not found, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}

  schemas:
    ErrorEnvelope:
      # See app/api/error_codes.yaml for the canonical registry of codes.
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, fault, retryable, human_message]
          properties:
            code: {type: string, examples: [audit.query_invalid, audit.export_too_large]}
            fault: {type: string, enum: [client, server, policy, external]}
            retryable: {type: boolean}
            human_message: {type: string}
            detail: {type: object, additionalProperties: true}
            correlation_id: {type: string}

    Cursor:
      type: object
      required: [items, next_cursor]
      properties:
        items: {type: array, items: {}}
        next_cursor: {type: [string, 'null']}
        total_estimate: {type: integer}
        _links:
          type: object
          properties:
            next: {type: string, format: uri}

    # ----------------------------------------------------------------
    # AuditEvent — canonical envelope
    # ----------------------------------------------------------------
    AuditEvent:
      type: object
      required: [id, occurred_at, recorded_at, action, severity, outcome, actor, correlation_id]
      properties:
        id:
          type: string
          format: uuid
          description: UUIDv7 — sortable by time

        occurred_at:
          type: string
          format: date-time
          description: When the event actually happened

        recorded_at:
          type: string
          format: date-time
          description: When the writer persisted it. Always >= occurred_at. Lag = recorded_at - occurred_at.

        action:
          type: string
          description: Stable code from the registry. See /audit/events:taxonomy.
          examples: [auth.login.success, host.created, scan.completed]

        severity:
          type: string
          enum: [info, warning, error, critical]

        outcome:
          type: string
          enum: [success, failure, denied]

        actor:
          $ref: '#/components/schemas/Actor'

        resource:
          $ref: '#/components/schemas/AuditResource'

        correlation_id:
          type: string
          description: Request correlation ID; ties events from the same request.

        parent_event_id:
          type: [string, 'null']
          format: uuid
          description: Causally prior event (e.g., scan completion linked to its session).

        policy_version:
          type: [string, 'null']
          description: Policy version applied. See agent-first principle 2.

        detail:
          type: object
          additionalProperties: true
          description: |
            Structured fields specific to the action. Schema is documented per
            event in the registry (`/audit/events:taxonomy`). Sensitive fields
            (passwords, keys, tokens) are pre-redacted.

        redactions:
          type: array
          items: {type: string}
          description: Field names that were scrubbed from `detail` before storage.

        signature:
          type: [string, 'null']
          description: Optional Ed25519 signature over canonical event form.

    Actor:
      type: object
      required: [type, label]
      properties:
        type:
          type: string
          enum: [user, api_key, agent, system, scheduler]
        id:
          type: [string, 'null']
          description: UUID for user/api_key; null for system/scheduler
        label:
          type: string
          description: Human-readable identifier (username, key name, "scheduler", etc.)
        ip_address:
          type: [string, 'null']
        user_agent:
          type: [string, 'null']
        session_id:
          type: [string, 'null']
          format: uuid

    AuditResource:
      type: object
      required: [type]
      properties:
        type:
          type: string
          examples: [host, scan, user, license, alert, exception]
        id:
          type: string
        label:
          type: string
          description: Human-readable identifier (hostname, user email, etc.)

    # ----------------------------------------------------------------
    # Query DSL (for POST /audit/events:query)
    # ----------------------------------------------------------------
    AuditQuery:
      type: object
      properties:
        filter:
          $ref: '#/components/schemas/QueryFilter'
        sort:
          type: array
          items:
            type: object
            required: [field, direction]
            properties:
              field: {type: string}
              direction: {type: string, enum: [asc, desc]}
        limit:
          type: integer
          minimum: 1
          maximum: 500
          default: 50
        cursor:
          type: string

    QueryFilter:
      oneOf:
        - $ref: '#/components/schemas/SimpleFilter'
        - type: object
          properties:
            and:
              type: array
              items: {$ref: '#/components/schemas/QueryFilter'}
        - type: object
          properties:
            or:
              type: array
              items: {$ref: '#/components/schemas/QueryFilter'}
        - type: object
          properties:
            not:
              $ref: '#/components/schemas/QueryFilter'

    SimpleFilter:
      type: object
      required: [field, op]
      properties:
        field:
          type: string
          examples: [action, severity, actor.id, resource.type, correlation_id, occurred_at]
        op:
          type: string
          enum: [eq, ne, in, not_in, gt, gte, lt, lte, prefix, contains]
        value:
          oneOf:
            - {type: string}
            - {type: number}
            - {type: boolean}
        values:
          type: array
          items: {oneOf: [{type: string}, {type: number}]}

    # ----------------------------------------------------------------
    # Taxonomy
    # ----------------------------------------------------------------
    Taxonomy:
      type: object
      properties:
        version: {type: integer}
        categories:
          type: array
          items:
            type: object
            properties:
              id: {type: string}
              description: {type: string}
        events:
          type: array
          items:
            type: object
            properties:
              code: {type: string}
              category: {type: string}
              severity: {type: string}
              description: {type: string}
              actor_types: {type: array, items: {type: string}}
              detail_schema: {type: object}

  securitySchemes:
    BearerJWT: {type: http, scheme: bearer, bearerFormat: JWT}
    ApiKey: {type: http, scheme: bearer, bearerFormat: ApiKey}

security:
  - BearerJWT: []
  - ApiKey: []

# ============================================================================
# PATHS
# ============================================================================
paths:

  # =========================================================================
  # /audit/events — list, with filters
  # =========================================================================
  /audit/events:
    get:
      summary: List audit events
      description: |
        Cursor-paginated, time-ordered (default desc). Filter by action,
        actor, resource, correlation_id, severity, outcome, time range.

        For complex queries (boolean combinations, range expressions), use
        POST /audit/events:query.
      x-required-permission: AUDIT_READ
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Fields'
        - {name: action, in: query, schema: {type: string}, description: "Comma-separated. Supports prefix wildcard: `action=auth.*`"}
        - {name: severity, in: query, schema: {type: string}, description: "Comma-separated."}
        - {name: outcome, in: query, schema: {type: string, enum: [success, failure, denied]}}
        - {name: actor_id, in: query, schema: {type: string}}
        - {name: actor_type, in: query, schema: {type: string}}
        - {name: resource_type, in: query, schema: {type: string}}
        - {name: resource_id, in: query, schema: {type: string}}
        - {name: correlation_id, in: query, schema: {type: string}}
        - {name: occurred_after, in: query, schema: {type: string, format: date-time}}
        - {name: occurred_before, in: query, schema: {type: string, format: date-time}}
      responses:
        '200':
          description: Page of audit events
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Cursor'
                  - properties:
                      items:
                        type: array
                        items: {$ref: '#/components/schemas/AuditEvent'}
        '400': {$ref: '#/components/responses/BadRequest'}

  /audit/events/{event_id}:
    parameters:
      - $ref: '#/components/parameters/EventId'

    get:
      summary: Get single audit event
      x-required-permission: AUDIT_READ
      responses:
        '200':
          description: Event
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AuditEvent'}
        '404': {$ref: '#/components/responses/NotFound'}

  # =========================================================================
  # Complex queries via DSL
  # =========================================================================
  /audit/events:query:
    post:
      summary: Complex audit query (DSL)
      description: |
        For boolean combinations, range expressions, and detail-field
        filtering. Uses the same DSL pattern as POST /transactions:query.

        Required for clients that need to ask "auth failures from IP X
        between time T1 and T2" — beyond what query params support.
      x-required-permission: AUDIT_READ
      x-required-feature: audit_query
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/AuditQuery'}
      responses:
        '200':
          description: Query result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Cursor'
                  - properties:
                      items:
                        type: array
                        items: {$ref: '#/components/schemas/AuditEvent'}
        '400':
          description: Query DSL invalid
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}
        '402':
          description: audit_query feature not licensed
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  # =========================================================================
  # Export (license-gated)
  # =========================================================================
  /audit/events:export:
    get:
      summary: Export audit events
      description: |
        Returns inline for small results. For large results, returns 202 +
        job ID. Format chosen via Accept: text/csv | application/json | application/pdf.

        License-gated on `audit_export`.
      x-required-permission: AUDIT_READ
      x-required-feature: audit_export
      parameters:
        - {name: action, in: query, schema: {type: string}}
        - {name: occurred_after, in: query, schema: {type: string, format: date-time}}
        - {name: occurred_before, in: query, schema: {type: string, format: date-time}}
      responses:
        '200':
          description: Inline export
          content:
            text/csv: {schema: {type: string}}
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/AuditEvent'}
            application/pdf:
              schema: {type: string, format: binary}
        '202':
          description: Large export queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id: {type: string, format: uuid}
                  _links:
                    type: object
                    properties:
                      self: {type: string, format: uri}
        '402':
          description: audit_export feature not licensed
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  # =========================================================================
  # Taxonomy — the registry, served as data
  # =========================================================================
  /audit/events:taxonomy:
    get:
      summary: Get audit event taxonomy
      description: |
        Returns the parsed contents of `app/audit/events.yaml`. Lets the
        frontend render filters, agents discover what events exist, and
        support staff diagnose "what does code X mean?"

        Available to any authenticated user; the taxonomy isn't a secret.
      x-required-permission: SYSTEM_READ
      responses:
        '200':
          description: Taxonomy
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Taxonomy'}

  # =========================================================================
  # Statistics — for the audit dashboard
  # =========================================================================
  /audit/events:stats:
    get:
      summary: Audit event statistics
      description: |
        Aggregate counts by action, severity, outcome, actor type — over a
        time window. Backs the audit overview UI.
      x-required-permission: AUDIT_READ
      parameters:
        - {name: occurred_after, in: query, schema: {type: string, format: date-time}}
        - {name: occurred_before, in: query, schema: {type: string, format: date-time}}
        - {name: group_by, in: query, schema: {type: string, default: "action"}, description: "action | severity | outcome | actor_type | hour | day"}
      responses:
        '200':
          description: Aggregate statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  window:
                    type: object
                    properties:
                      from: {type: string, format: date-time}
                      to: {type: string, format: date-time}
                  total: {type: integer}
                  groups:
                    type: array
                    items:
                      type: object
                      properties:
                        key: {type: string}
                        count: {type: integer}

# ============================================================================
# Per-resource audit sub-resources (cross-referenced from other domain specs)
# ============================================================================
# These are sugar over GET /audit/events?resource_type=X&resource_id=Y. They
# exist for path discoverability but resolve to the same backing query.
#
#   GET /hosts/{host_id}/audit-events
#   GET /scans/{scan_id}/audit-events
#   GET /users/{user_id}/audit-events
#   GET /scan-sessions/{session_id}/audit-events
#
# Each is defined in the corresponding domain's spec file with a reference to
# this spec's AuditEvent schema and Cursor wrapper.
# ============================================================================
