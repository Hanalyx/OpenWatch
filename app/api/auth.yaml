# OpenWatch — Auth domain (skeleton)
#
# Self-service authentication, MFA, sessions, password management, and identity
# lookup endpoints. Admin-managed user CRUD lives in admin.yaml.
#
# Fidelity: skeleton — operations, extensions, descriptions; schemas stubbed.
# Full schemas land in Stage 2 alongside implementation.
#
# Registry cross-references:
#   - Permissions: app/auth/permissions.yaml (`auth:*`, `admin:*` for /permissions:registry)
#   - License features: app/license/features.yaml
#   - Audit events: app/audit/events.yaml (`auth.*` namespace, `authz.*`)
#   - Error codes: app/api/error_codes.yaml (`auth.*`, `authz.*`, `validation.*`)

openapi: 3.1.0
info:
  title: OpenWatch — Auth API
  version: 0.1.0-skeleton

paths:

  # ===========================================================================
  # Login / session
  # ===========================================================================

  /api/v1/auth/login:
    post:
      operationId: login
      summary: Authenticate with credentials; returns access + refresh tokens.
      description: |
        Accepts password (and optional MFA challenge response). On success
        returns access token (~30m TTL) and refresh token (~7d TTL).
        MFA-enrolled users that omit `mfa_response` get 401 with
        `error.code = "auth.mfa_required"` and a `challenge_id` in detail.
      security: []        # anonymous endpoint
      x-audit-events: [auth.login.success, auth.login.failure, auth.token.issued]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              # Stage 2 schema: {username, password, mfa_response?, challenge_id?}
              additionalProperties: true
      responses:
        '200': {description: Authentication succeeded; tokens returned.}
        '401':
          description: Invalid credentials, MFA required, or MFA failed.
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}
        '403':
          description: Account locked.
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}
        '429':
          description: Rate-limited (too many failed attempts from this IP).
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

  /api/v1/auth/logout:
    post:
      operationId: logout
      summary: Revoke the current session and tokens.
      x-required-permission: auth:read     # any authenticated user can log themselves out
      x-audit-events: [auth.logout, auth.token.revoked]
      responses:
        '204': {description: Logged out; tokens revoked.}
        '401': {$ref: '#/components/responses/Unauthorized'}

  /api/v1/auth:refresh:
    post:
      operationId: refreshToken
      summary: Exchange a refresh token for a new access token.
      description: |
        Action-style endpoint (not a sub-resource). Caller submits a valid
        refresh token; receives a new access token. May rotate the refresh
        token (returns a new one); old refresh token revoked.
      security: []
      x-audit-events: [auth.token.refreshed, auth.token.issued, auth.token.revoked]
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, additionalProperties: true}}}
      responses:
        '200': {description: New tokens returned.}
        '401':
          description: Refresh token invalid, expired, or revoked.
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

  # ===========================================================================
  # MFA enrollment and lifecycle
  # ===========================================================================

  /api/v1/auth/mfa:enroll:
    post:
      operationId: enrollMfa
      summary: Begin MFA enrollment (TOTP or FIDO2).
      x-required-permission: auth:write
      x-audit-events: [auth.mfa.enrolled]
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, additionalProperties: true}}}
      responses:
        '200':
          description: Enrollment challenge issued (e.g., TOTP secret + QR data).
        '409':
          description: MFA already enrolled.
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

  /api/v1/auth/mfa:validate:
    post:
      operationId: validateMfa
      summary: Complete MFA challenge (during login or enrollment confirmation).
      security: []     # called during login with challenge_id, before full auth
      x-audit-events: [auth.mfa.validated, auth.mfa.failed]
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, additionalProperties: true}}}
      responses:
        '200': {description: MFA passed; login completes or enrollment confirms.}
        '401':
          description: MFA challenge failed.
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

  /api/v1/auth/mfa:disable:
    post:
      operationId: disableMfa
      summary: Disable MFA on the calling user (requires recent reauth).
      x-required-permission: auth:write
      x-audit-events: [auth.mfa.disabled]
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, additionalProperties: true}}}
      responses:
        '204': {description: MFA disabled.}
        '401':
          description: Reauth required.
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

  # ===========================================================================
  # Password management
  # ===========================================================================

  /api/v1/auth/password:change:
    post:
      operationId: changePassword
      summary: Change own password (requires current password).
      x-required-permission: auth:write
      x-audit-events: [auth.token.revoked]   # current sessions invalidated on password change
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, additionalProperties: true}}}
      responses:
        '204': {description: Password changed; other sessions revoked.}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '422':
          description: New password fails complexity policy.
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

  /api/v1/auth/password:reset:
    post:
      operationId: requestPasswordReset
      summary: Request a password reset email (always returns 202; no enumeration).
      security: []
      x-audit-events: []  # see note in detail; reset requests are audited via auth.login.failure semantics
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, additionalProperties: true}}}
      responses:
        '202': {description: Reset email dispatched if the account exists. Always returns 202 to avoid enumeration.}

  /api/v1/auth/password:reset-complete:
    post:
      operationId: completePasswordReset
      summary: Complete password reset with a token from the reset email.
      security: []
      x-audit-events: [auth.token.revoked]
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, additionalProperties: true}}}
      responses:
        '204': {description: Password reset; user must log in fresh.}
        '401':
          description: Reset token invalid or expired.
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

  # ===========================================================================
  # Self-service identity
  # ===========================================================================

  /api/v1/auth/me:
    get:
      operationId: getMe
      summary: Get the calling user's profile (id, email, roles, MFA status).
      x-required-permission: auth:read
      responses:
        '200': {description: Profile.}
        '401': {$ref: '#/components/responses/Unauthorized'}

  /api/v1/auth/me/permissions:
    get:
      operationId: getMyPermissions
      summary: Get the calling user's effective permissions.
      description: |
        Returns the union of permissions across all roles assigned to the
        calling user, with category wildcards expanded against the current
        RBAC registry. Includes `license_gated_unavailable` listing
        permissions the user technically has but the license currently denies
        (helps frontends hide buttons that would always 402).
      x-required-permission: auth:read
      responses:
        '200': {description: Effective permission set.}
        '401': {$ref: '#/components/responses/Unauthorized'}

  /api/v1/auth/me/sessions:
    get:
      operationId: listMySessions
      summary: List the calling user's active sessions.
      x-required-permission: auth:read
      parameters:
        - {name: cursor, in: query, schema: {type: [string, 'null']}}
        - {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 100, default: 25}}
      responses:
        '200':
          description: Page of sessions.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: {type: array, items: {type: object}}
                  next_cursor: {type: [string, 'null']}

  /api/v1/auth/me/sessions/{session_id}:
    parameters:
      - {name: session_id, in: path, required: true, schema: {type: string, format: uuid}}
    delete:
      operationId: revokeMySession
      summary: Revoke one of the calling user's sessions.
      x-required-permission: auth:write
      x-audit-events: [auth.token.revoked]
      responses:
        '204': {description: Session revoked.}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404':
          description: Session not found or not owned by caller.
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

  # ===========================================================================
  # RBAC registry lookup (non-secret; any authenticated user)
  # ===========================================================================

  /api/v1/auth/permissions:registry:
    get:
      operationId: getPermissionsRegistry
      summary: Return the full RBAC registry (permissions + built-in roles).
      description: |
        Returns categories, permissions (with dangerous/license_gated metadata),
        and built-in role definitions. Frontends use this to render permission
        selectors and role editors. Non-secret — any authenticated user can read.
      x-required-permission: auth:read
      responses:
        '200': {description: Full registry.}
        '401': {$ref: '#/components/responses/Unauthorized'}

# =============================================================================
# Shared components
# =============================================================================

components:

  responses:
    Unauthorized:
      description: Authentication required or token invalid.
      content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}
    Forbidden:
      description: Permission denied.
      content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

  schemas:
    ErrorEnvelope:
      # See app/api/error_codes.yaml for the canonical registry of codes.
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, fault, retryable, human_message]
          properties:
            code: {type: string, examples: [auth.invalid_credentials, auth.mfa_required, auth.token_expired]}
            fault: {type: string, enum: [client, server, policy, external]}
            retryable: {type: boolean}
            human_message: {type: string}
            detail: {type: object, additionalProperties: true}
            correlation_id: {type: string}
