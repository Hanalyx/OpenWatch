# OpenWatch — Notifications domain (skeleton)
#
# Notification channels (slack, email, webhook, jira, pagerduty) and delivery
# history. Channels are addresses; what TO send is determined by the
# alert_thresholds policy (per-rule channels: default + critical override).
#
# Fidelity: skeleton — operations, extensions, descriptions; schemas stubbed.
#
# Registry cross-references:
#   - Permissions: app/auth/permissions.yaml — notification:{read,write,delete,test}
#   - Audit events: app/audit/events.yaml — notification.{channel.created,channel.updated,
#       channel.deleted,dispatched,delivery.succeeded,delivery.failed}
#   - Error codes: app/api/error_codes.yaml — resource.{not_found,conflict,gone}

openapi: 3.1.0
info:
  title: OpenWatch — Notifications API
  version: 0.1.0-skeleton

paths:

  # ===========================================================================
  # Channels collection
  # ===========================================================================

  /api/v1/notifications/channels:
    get:
      operationId: listNotificationChannels
      summary: List notification channels.
      x-required-permission: notification:read
      parameters:
        - {name: channel_type, in: query, schema: {type: string, enum: [slack, email, webhook, jira, pagerduty]}}
        - {name: enabled, in: query, schema: {type: boolean}}
        - {name: cursor, in: query, schema: {type: [string, 'null']}}
        - {name: limit,  in: query, schema: {type: integer, minimum: 1, maximum: 200, default: 50}}
      responses:
        '200':
          description: Page of channels.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: {type: array, items: {type: object}}
                  next_cursor: {type: [string, 'null']}

    post:
      operationId: createNotificationChannel
      summary: Create a notification channel.
      description: |
        Channel config (URL, recipients, credentials, etc.) is type-specific.
        Credentials in the request body are encrypted at rest and never
        returned by subsequent GET operations.
      x-required-permission: notification:write
      x-audit-events: [notification.channel.created]
      parameters:
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string}}
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, additionalProperties: true}}}
      responses:
        '201': {description: Channel created.}
        '409':
          description: A channel with the same name already exists.
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

  # ===========================================================================
  # Single channel
  # ===========================================================================

  /api/v1/notifications/channels/{channel_id}:
    parameters:
      - {name: channel_id, in: path, required: true, schema: {type: string, format: uuid}}
    get:
      operationId: getNotificationChannel
      summary: Get a channel (credentials redacted).
      x-required-permission: notification:read
      responses:
        '200': {description: Channel detail.}
        '404': {$ref: '#/components/responses/NotFound'}

    patch:
      operationId: updateNotificationChannel
      summary: Update channel config (PATCH-with-status semantics; partial update).
      x-required-permission: notification:write
      x-audit-events: [notification.channel.updated]
      parameters:
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string}}
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, additionalProperties: true}}}
      responses:
        '200': {description: Channel updated.}
        '404': {$ref: '#/components/responses/NotFound'}

    delete:
      operationId: deleteNotificationChannel
      summary: Delete a notification channel (dangerous; alerts targeting this channel will fail to dispatch).
      x-required-permission: notification:delete
      x-audit-events: [notification.channel.deleted]
      responses:
        '204': {description: Channel deleted.}
        '404': {$ref: '#/components/responses/NotFound'}
        '409':
          description: Channel is referenced by the active alert_thresholds policy; remove references first or use force flag.
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

  /api/v1/notifications/channels/{channel_id}:test:
    parameters:
      - {name: channel_id, in: path, required: true, schema: {type: string, format: uuid}}
    post:
      operationId: testNotificationChannel
      summary: Send a synthetic test notification through the channel.
      description: |
        Synchronous delivery attempt. Returns delivery_id and outcome
        (success | transient_failure | permanent_failure). Useful after
        creating or modifying a channel to verify config.
      x-required-permission: notification:test
      x-audit-events: [notification.dispatched, notification.delivery.succeeded, notification.delivery.failed]
      parameters:
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string}}
      requestBody:
        content: {application/json: {schema: {type: object, additionalProperties: true}}}
      responses:
        '200': {description: Test result (success or per-channel failure detail).}
        '404': {$ref: '#/components/responses/NotFound'}
        '502':
          description: Downstream channel rejected the test (external fault).
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

  # ===========================================================================
  # Delivery history
  # ===========================================================================

  /api/v1/notifications/deliveries:
    get:
      operationId: listNotificationDeliveries
      summary: List dispatch attempts (paginated, filterable).
      description: |
        Forensic view of every notification dispatched: channel, alert_id,
        timestamp, outcome, retries, latency. Subject to retention policy.
      x-required-permission: notification:read
      parameters:
        - {name: channel_id, in: query, schema: {type: string, format: uuid}}
        - {name: alert_id, in: query, schema: {type: string, format: uuid}}
        - {name: outcome, in: query, schema: {type: string, enum: [succeeded, failed, pending]}}
        - {name: dispatched_after,  in: query, schema: {type: string, format: date-time}}
        - {name: dispatched_before, in: query, schema: {type: string, format: date-time}}
        - {name: cursor, in: query, schema: {type: [string, 'null']}}
        - {name: limit,  in: query, schema: {type: integer, minimum: 1, maximum: 200, default: 50}}
      responses:
        '200':
          description: Page of delivery attempts.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: {type: array, items: {type: object}}
                  next_cursor: {type: [string, 'null']}

  /api/v1/notifications/deliveries/{delivery_id}:
    parameters:
      - {name: delivery_id, in: path, required: true, schema: {type: string, format: uuid}}
    get:
      operationId: getNotificationDelivery
      summary: Get one delivery attempt (full request/response payload, redacted).
      x-required-permission: notification:read
      responses:
        '200': {description: Delivery detail.}
        '404': {$ref: '#/components/responses/NotFound'}

# =============================================================================
# Shared components
# =============================================================================

components:

  responses:
    Unauthorized: {description: Authentication required, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
    Forbidden:    {description: Permission denied,         content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
    NotFound:     {description: Resource not found,         content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}

  schemas:
    ErrorEnvelope:
      # See app/api/error_codes.yaml for the canonical registry of codes.
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, fault, retryable, human_message]
          properties:
            code: {type: string, examples: [resource.not_found, resource.conflict, validation.field_format]}
            fault: {type: string, enum: [client, server, policy, external]}
            retryable: {type: boolean}
            human_message: {type: string}
            detail: {type: object, additionalProperties: true}
            correlation_id: {type: string}
