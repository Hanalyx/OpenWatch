# OpenWatch — Remediation domain (skeleton)
#
# Compliance remediation: request → approve → dry-run → execute → rollback.
# Read endpoints (list, get, audit) are unrestricted by license so operators
# can review what's been done. ACT endpoints (:dry-run, :execute, :rollback)
# require the OpenWatch+ `remediation_execution` feature.
#
# Governed by two policies (see app/docs/policies_as_data.md):
#   - approvals policy   — who can approve, dual-approval rules, timeouts
#   - remediation policy — auto-execute allowed, require_dry_run_first,
#                          blocklist patterns, max_concurrent
#
# Fidelity: skeleton — operations, extensions, descriptions; schemas stubbed.
#
# Registry cross-references:
#   - Permissions: app/auth/permissions.yaml — remediation:{read,request,approve,execute,rollback}
#       (execute and rollback are license_gated under remediation_execution)
#   - License features: app/license/features.yaml — remediation_execution
#   - Audit events: app/audit/events.yaml — remediation.{requested,approved,executed,rolled_back}
#   - Error codes: app/api/error_codes.yaml — policy.denied, transition.invalid,
#       license.feature_unavailable, quota.concurrent_scan_limit (analog)

openapi: 3.1.0
info:
  title: OpenWatch — Remediation API
  version: 0.1.0-skeleton

paths:

  # ===========================================================================
  # Requests collection
  # ===========================================================================

  /api/v1/remediation/requests:
    get:
      operationId: listRemediationRequests
      summary: List remediation requests (paginated, filterable). Not license-gated.
      x-required-permission: remediation:read
      parameters:
        - {name: status, in: query, schema: {type: string, enum: [pending_approval, approved, rejected, dry_run_complete, executing, executed, rolled_back, failed]}}
        - {name: host_id, in: query, schema: {type: string, format: uuid}}
        - {name: rule_id, in: query, schema: {type: string}}
        - {name: requester_id, in: query, schema: {type: string, format: uuid}}
        - {name: created_after,  in: query, schema: {type: string, format: date-time}}
        - {name: created_before, in: query, schema: {type: string, format: date-time}}
        - {name: cursor, in: query, schema: {type: [string, 'null']}}
        - {name: limit,  in: query, schema: {type: integer, minimum: 1, maximum: 200, default: 50}}
      responses:
        '200':
          description: Page of remediation requests.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: {type: array, items: {type: object}}
                  next_cursor: {type: [string, 'null']}

    post:
      operationId: requestRemediation
      summary: Submit a remediation request.
      description: |
        Evaluated by the `remediation` policy at submission: blocklisted rules
        are rejected, `require_dry_run_first` is recorded, `requires_approval`
        determines the next-state. Returns 202 when approval required, 201
        when policy permits immediate dry-run (rare; default policy requires
        approval for everything).
      x-required-permission: remediation:request
      x-policy-evaluated: [remediation]
      x-audit-events: [remediation.requested]
      parameters:
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string}}
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, additionalProperties: true}}}
      responses:
        '201': {description: Request created; policy permits immediate progression.}
        '202': {description: Request created; awaiting approval. approval_id returned.}
        '403':
          description: Denied by remediation policy (blocklisted rule, etc.).
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

  # ===========================================================================
  # Single request
  # ===========================================================================

  /api/v1/remediation/requests/{request_id}:
    parameters:
      - {name: request_id, in: path, required: true, schema: {type: string, format: uuid}}
    get:
      operationId: getRemediationRequest
      summary: Get a remediation request (status, policy version, approver list, step plan).
      x-required-permission: remediation:read
      responses:
        '200': {description: Request detail.}
        '404': {$ref: '#/components/responses/NotFound'}

  # ===========================================================================
  # Approval lifecycle (not license-gated; viewing/approving is policy-bound only)
  # ===========================================================================

  /api/v1/remediation/requests/{request_id}:approve:
    parameters:
      - {name: request_id, in: path, required: true, schema: {type: string, format: uuid}}
    post:
      operationId: approveRemediation
      summary: Approve a remediation request.
      description: |
        Records this approver's vote. Approvals policy determines whether the
        request transitions to approved immediately or stays pending pending
        additional approvers (dual-approval rules).
      x-required-permission: remediation:approve
      x-policy-evaluated: [approvals]
      x-audit-events: [remediation.approved]
      parameters:
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string}}
      requestBody:
        content: {application/json: {schema: {type: object, additionalProperties: true}}}
      responses:
        '200': {description: Approval recorded; status returned (`approved` or still `pending_approval`).}
        '409':
          description: Illegal transition (already approved/rejected/executed); or self-approval rejected.
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

  /api/v1/remediation/requests/{request_id}:reject:
    parameters:
      - {name: request_id, in: path, required: true, schema: {type: string, format: uuid}}
    post:
      operationId: rejectRemediation
      summary: Reject a remediation request.
      x-required-permission: remediation:approve
      x-audit-events: [remediation.approved]   # the same event records rejection via detail.outcome
      parameters:
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string}}
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, additionalProperties: true}}}
      responses:
        '200': {description: Rejected.}
        '409':
          description: Illegal transition.
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

  # ===========================================================================
  # Execution actions — LICENSE-GATED
  # ===========================================================================

  /api/v1/remediation/requests/{request_id}:dry-run:
    parameters:
      - {name: request_id, in: path, required: true, schema: {type: string, format: uuid}}
    post:
      operationId: dryRunRemediation
      summary: Execute a dry-run (connects to hosts; reports what would change without applying).
      description: |
        Runs the remediation step plan in dry-run mode: SSH connects, Kensa
        equivalents are invoked with `--dry-run`, results are recorded. No
        actual host state changes. License-gated under `remediation_execution`
        because dry-run still consumes SSH connections and execution slots.
      x-required-permission: remediation:execute
      x-required-feature: remediation_execution
      x-policy-evaluated: [remediation]
      x-audit-events: [remediation.executed]
      parameters:
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string}}
      requestBody:
        content: {application/json: {schema: {type: object, additionalProperties: true}}}
      responses:
        '202': {description: 'Dry-run queued; status pollable via GET /requests/{id}.'}
        '409':
          description: Illegal state (request not approved, or already executing).
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}
        '402':
          description: License does not enable remediation_execution.
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

  /api/v1/remediation/requests/{request_id}:execute:
    parameters:
      - {name: request_id, in: path, required: true, schema: {type: string, format: uuid}}
    post:
      operationId: executeRemediation
      summary: Execute the remediation against real hosts (irreversible without rollback).
      description: |
        Real execution. Subject to remediation policy:
        `require_dry_run_first` may block if no successful dry-run is on
        record; `max_concurrent_executions` may defer to 503; `blocklist`
        rejects at 403. Approvals policy requires the request to be in the
        `approved` state.
      x-required-permission: remediation:execute
      x-required-feature: remediation_execution
      x-requires-approval: remediation.execute
      x-policy-evaluated: [remediation, approvals]
      x-audit-events: [remediation.executed]
      parameters:
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string}}
      requestBody:
        content: {application/json: {schema: {type: object, additionalProperties: true}}}
      responses:
        '202': {description: Execution queued.}
        '402':
          description: License denies remediation_execution.
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}
        '403':
          description: Denied by remediation policy.
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}
        '409':
          description: Illegal state (not approved, dry-run required first, already executed).
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}
        '503':
          description: Concurrent execution limit reached; retry after.
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

  /api/v1/remediation/requests/{request_id}:rollback:
    parameters:
      - {name: request_id, in: path, required: true, schema: {type: string, format: uuid}}
    post:
      operationId: rollbackRemediation
      summary: Roll back a previously-executed remediation.
      description: |
        Reverts the changes applied by the prior :execute. Only valid for
        requests in the `executed` state. Rollback success depends on the
        per-step rollback plans recorded at execute time.
      x-required-permission: remediation:rollback
      x-required-feature: remediation_execution
      x-requires-approval: remediation.execute
      x-audit-events: [remediation.rolled_back]
      parameters:
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string}}
      requestBody:
        content: {application/json: {schema: {type: object, additionalProperties: true}}}
      responses:
        '202': {description: Rollback queued.}
        '402': {$ref: '#/components/responses/LicenseUnavailable'}
        '409':
          description: Illegal state (not executed, or already rolled back).
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

  # ===========================================================================
  # Sub-resources (read-only; not license-gated)
  # ===========================================================================

  /api/v1/remediation/requests/{request_id}/steps:
    parameters:
      - {name: request_id, in: path, required: true, schema: {type: string, format: uuid}}
    get:
      operationId: listRemediationSteps
      summary: Step-by-step execution detail (planned, dry-run results, executed results).
      x-required-permission: remediation:read
      responses:
        '200': {description: Step list with per-step outcome.}
        '404': {$ref: '#/components/responses/NotFound'}

  /api/v1/remediation/requests/{request_id}/audit-events:
    parameters:
      - {name: request_id, in: path, required: true, schema: {type: string, format: uuid}}
    get:
      operationId: getRemediationAuditEvents
      summary: Audit-event sub-resource (request → approve → execute → rollback chain).
      x-required-permission: remediation:read
      parameters:
        - {name: cursor, in: query, schema: {type: [string, 'null']}}
        - {name: limit,  in: query, schema: {type: integer, minimum: 1, maximum: 200, default: 50}}
      responses:
        '200':
          description: Page of audit events for this request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: {type: array, items: {type: object}}
                  next_cursor: {type: [string, 'null']}

# =============================================================================
# Shared components
# =============================================================================

components:

  responses:
    Unauthorized:        {description: Authentication required, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
    Forbidden:           {description: Permission or policy denial, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
    NotFound:            {description: Resource not found, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
    LicenseUnavailable:  {description: License does not enable remediation_execution, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}

  schemas:
    ErrorEnvelope:
      # See app/api/error_codes.yaml for the canonical registry of codes.
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, fault, retryable, human_message]
          properties:
            code: {type: string, examples: [license.feature_unavailable, policy.denied, transition.invalid]}
            fault: {type: string, enum: [client, server, policy, external]}
            retryable: {type: boolean}
            human_message: {type: string}
            detail: {type: object, additionalProperties: true}
            correlation_id: {type: string}
