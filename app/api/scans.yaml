openapi: 3.1.0

# ============================================================================
# Scans API — second worked example for OpenWatch rebuild
# ============================================================================
# Today's backend exposes ~50 scan-related endpoints split across lifecycle,
# Kensa metadata reads, templates, execution helpers, bulk scans, and reports.
# This consolidated design covers the same MUST capabilities in ~22 endpoints
# across three resources: Scans, ScanTemplates, ScanSessions.
#
# Major reductions:
#   - 12 /scans/kensa/* metadata endpoints → moved to /rules and /frameworks
#     (those resources are defined in separate spec files: rules.yaml,
#     frameworks.yaml).
#   - 3 /scans/{id}/report/{html,json,csv} → 1 /report with Accept header
#   - 4 /{id}/{stop,cancel,recover,*} verbs → PATCH (cancel) + :retry action
#   - /scans/quick, /hosts/{id}/quick-scan, /scans/rules/available → folded
#     into /scans with body params + /capabilities + /rules
#   - /scans/scanner/health → /health?component=scan-engine
#   - /scans/profiles, /scans/summary, /scans/capabilities → top-level
#     /capabilities and /analytics resources
#
# Status: DRAFT for design review
# Owner: rebuild planning
# Last updated: 2026-04-27
# ============================================================================

info:
  title: OpenWatch Scans API
  version: 1.0.0-draft
  description: |
    Execute compliance scans, manage scan templates, and orchestrate bulk
    scan sessions. Kensa is the default and only execution engine; no
    engine-specific URL prefix is needed.

    All mutating endpoints support `Idempotency-Key`. All list endpoints are
    cursor-paginated. All errors follow the canonical envelope.

servers:
  - url: https://openwatch.example.com/api/v1

# ============================================================================
# Reusable components — common ones inherited from a shared spec in production.
# Duplicated here so this file is self-contained for review.
# ============================================================================
components:

  parameters:
    ScanId:
      name: scan_id
      in: path
      required: true
      schema: {type: string, format: uuid}

    TemplateId:
      name: template_id
      in: path
      required: true
      schema: {type: string, format: uuid}

    SessionId:
      name: session_id
      in: path
      required: true
      schema: {type: string, format: uuid}

    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema: {type: string, format: uuid}

    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      schema: {type: string}

    Limit:
      name: limit
      in: query
      schema: {type: integer, minimum: 1, maximum: 500, default: 50}

    Cursor:
      name: cursor
      in: query
      schema: {type: string}

    Sort:
      name: sort
      in: query
      schema: {type: string}

    Fields:
      name: fields
      in: query
      schema: {type: string}

    Include:
      name: include
      in: query
      schema: {type: string}

  responses:
    BadRequest: {description: Validation error, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
    Unauthorized: {description: Auth required, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
    Forbidden: {description: Permission denied, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
    NotFound: {description: Not found, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
    Conflict: {description: State / idempotency / policy conflict, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
    ServerError: {description: Internal error, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}

  schemas:
    ErrorEnvelope:
      # See app/api/error_codes.yaml for the canonical registry of codes.
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, fault, retryable, human_message]
          properties:
            code: {type: string, examples: [scan.already_running, scan.kensa_error, transition.invalid]}
            fault: {type: string, enum: [client, server, policy, external]}
            retryable: {type: boolean}
            human_message: {type: string}
            detail: {type: object, additionalProperties: true}
            correlation_id: {type: string}

    Cursor:
      type: object
      required: [items, next_cursor]
      properties:
        items: {type: array, items: {}}
        next_cursor: {type: [string, 'null']}
        total_estimate: {type: integer}
        _links:
          type: object
          properties:
            next: {type: string, format: uri}

    Job:
      type: object
      required: [job_id, status]
      properties:
        job_id: {type: string, format: uuid}
        status: {type: string, enum: [queued, running, completed, failed]}
        progress:
          type: object
          properties:
            total: {type: integer}
            completed: {type: integer}
            failed: {type: integer}
        result: {type: object, additionalProperties: true}
        error: {$ref: '#/components/schemas/ErrorEnvelope'}
        _links:
          type: object
          properties:
            self: {type: string, format: uri}

    # ----------------------------------------------------------------
    # Scan
    # ----------------------------------------------------------------
    Scan:
      type: object
      x-state-machine:
        states: [queued, running, completed, failed, cancelled]
        transitions:
          - {from: queued, to: running, trigger: server}
          - {from: queued, to: cancelled, trigger: api}
          - {from: running, to: completed, trigger: server}
          - {from: running, to: failed, trigger: server}
          - {from: running, to: cancelled, trigger: api}
          # completed, failed, cancelled are terminal.
          # To rerun a failed scan, use POST /scans/{id}:retry (creates a new scan).
      required: [id, host_id, status, framework, created_at]
      properties:
        id: {type: string, format: uuid}
        host_id: {type: string, format: uuid}
        template_id: {type: string, format: uuid, description: Optional template that produced this scan}
        framework: {type: string, examples: [cis-rhel9-v2.0.0, stig-rhel9-v2r7]}
        profile: {type: string, description: Optional rule subset within framework}
        rule_subset:
          type: array
          items: {type: string}
          description: Optional explicit rule IDs to scan; overrides framework/profile.
        status: {type: string, enum: [queued, running, completed, failed, cancelled]}
        progress:
          type: object
          properties:
            rules_total: {type: integer}
            rules_completed: {type: integer}
            percent: {type: number, format: float}
        result_summary:
          type: object
          description: Populated on completion. Use /findings for full detail.
          properties:
            compliance_score: {type: number, format: float}
            passed: {type: integer}
            failed: {type: integer}
            skipped: {type: integer}
            errored: {type: integer}
            severity_breakdown:
              type: object
              additionalProperties:
                type: object
                properties:
                  passed: {type: integer}
                  failed: {type: integer}
        initiator:
          type: object
          description: Who or what started this scan
          properties:
            type: {type: string, enum: [user, scheduler, api_key, agent]}
            id: {type: string}
        session_id:
          type: string
          format: uuid
          description: Set if part of a bulk ScanSession.
        started_at: {type: string, format: date-time}
        completed_at: {type: string, format: date-time}
        created_at: {type: string, format: date-time}
        error:
          type: object
          description: Set when status=failed
          properties:
            code: {type: string}
            human_message: {type: string}

    ScanCreate:
      type: object
      required: [host_id]
      properties:
        host_id: {type: string, format: uuid}
        template_id:
          type: string
          format: uuid
          description: |
            If set, framework/profile/rule_subset are taken from the template
            unless explicitly overridden in this request.
        framework: {type: string}
        profile: {type: string}
        rule_subset:
          type: array
          items: {type: string}
        priority:
          type: string
          enum: [low, normal, high]
          default: normal

    ScanPatch:
      type: object
      properties:
        status:
          type: string
          enum: [cancelled]
          description: |
            Only `cancelled` is settable from the API. Other states are
            server-controlled. Returns 409 + `transition.invalid` if scan is
            already terminal.
        cancellation_reason: {type: string}

    # ----------------------------------------------------------------
    # Scan validation request (pre-flight)
    # ----------------------------------------------------------------
    ScanValidationRequest:
      type: object
      required: [host_id]
      properties:
        host_id: {type: string, format: uuid}
        template_id: {type: string, format: uuid}
        framework: {type: string}

    ScanValidationResult:
      type: object
      required: [is_valid]
      properties:
        is_valid: {type: boolean}
        host_reachable: {type: boolean}
        host_credentials_present: {type: boolean}
        framework_supported: {type: boolean}
        platform_supported: {type: boolean}
        rule_count: {type: integer, description: Rules that would execute}
        warnings: {type: array, items: {type: string}}
        blockers: {type: array, items: {type: string}}

    # ----------------------------------------------------------------
    # Finding
    # ----------------------------------------------------------------
    Finding:
      type: object
      required: [id, scan_id, rule_id, status]
      properties:
        id: {type: string, format: uuid}
        scan_id: {type: string, format: uuid}
        host_id: {type: string, format: uuid}
        rule_id: {type: string}
        rule_title: {type: string}
        status: {type: string, enum: [pass, fail, skip, error]}
        severity: {type: string, enum: [low, medium, high, critical, info]}
        framework_refs:
          type: array
          items:
            type: object
            properties:
              framework: {type: string}
              control_id: {type: string}
        evidence:
          type: object
          description: |
            Full Kensa evidence envelope (command, stdout, expected, actual).
            JSONB column on scan_findings.
          additionalProperties: true
        skip_reason: {type: string}
        exception_id:
          type: string
          format: uuid
          description: Set if this finding is currently exempted by a compliance exception.
        evaluated_at: {type: string, format: date-time}

    # ----------------------------------------------------------------
    # ScanTemplate
    # ----------------------------------------------------------------
    ScanTemplate:
      type: object
      required: [id, name, framework, created_at]
      properties:
        id: {type: string, format: uuid}
        name: {type: string}
        description: {type: string}
        framework: {type: string, examples: [cis-rhel9-v2.0.0, stig-rhel9-v2r7]}
        profile: {type: string}
        rule_subset:
          type: array
          items: {type: string}
        platform_filter:
          type: array
          items: {type: string, examples: [rhel9, ubuntu24]}
          description: |
            If set, this template is only suggested for matching platforms.
            Empty/null means applicable to any platform the framework supports.
        type: {type: string, enum: [standard, quick], default: standard}
        is_default: {type: boolean, default: false}
        created_by: {type: string, format: uuid}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}

    ScanTemplateCreate:
      type: object
      required: [name, framework]
      properties:
        name: {type: string}
        description: {type: string}
        framework: {type: string}
        profile: {type: string}
        rule_subset:
          type: array
          items: {type: string}
        platform_filter:
          type: array
          items: {type: string}
        type: {type: string, enum: [standard, quick], default: standard}
        is_default: {type: boolean, default: false}

    ScanTemplatePatch:
      type: object
      properties:
        name: {type: string}
        description: {type: string}
        framework: {type: string}
        profile: {type: string}
        rule_subset:
          type: array
          items: {type: string}
        platform_filter:
          type: array
          items: {type: string}
        type: {type: string, enum: [standard, quick]}
        is_default:
          type: boolean
          description: |
            Setting true demotes any other default template of the same type.

    # ----------------------------------------------------------------
    # ScanSession (bulk scan orchestration)
    # ----------------------------------------------------------------
    ScanSession:
      type: object
      x-state-machine:
        states: [queued, running, completed, partial, cancelled]
        transitions:
          - {from: queued, to: running, trigger: server}
          - {from: queued, to: cancelled, trigger: api}
          - {from: running, to: completed, trigger: server, condition: all_scans_succeeded}
          - {from: running, to: partial, trigger: server, condition: some_scans_failed}
          - {from: running, to: cancelled, trigger: api}
      required: [id, status, total_hosts, created_at]
      properties:
        id: {type: string, format: uuid}
        name: {type: string, description: Optional human label for the bulk run}
        status: {type: string, enum: [queued, running, completed, partial, cancelled]}
        total_hosts: {type: integer}
        scans_started: {type: integer}
        scans_completed: {type: integer}
        scans_failed: {type: integer}
        scans_cancelled: {type: integer}
        progress_percent: {type: number, format: float}
        template_id: {type: string, format: uuid}
        framework: {type: string}
        initiator:
          type: object
          properties:
            type: {type: string, enum: [user, api_key, agent]}
            id: {type: string}
        started_at: {type: string, format: date-time}
        completed_at: {type: string, format: date-time}
        created_at: {type: string, format: date-time}
        _links:
          type: object
          properties:
            scans: {type: string, format: uri, description: List scans in this session}

    ScanSessionCreate:
      type: object
      required: [host_ids]
      properties:
        host_ids:
          type: array
          items: {type: string, format: uuid}
          minItems: 1
          maxItems: 5000
        name: {type: string}
        template_id: {type: string, format: uuid}
        framework: {type: string}
        profile: {type: string}
        rule_subset:
          type: array
          items: {type: string}
        priority:
          type: string
          enum: [low, normal, high]
          default: normal
        # If neither template_id nor (framework + profile/rule_subset) is given, the request fails.

    ScanSessionPatch:
      type: object
      properties:
        status:
          type: string
          enum: [cancelled]
        name: {type: string}
        cancellation_reason: {type: string}

  securitySchemes:
    BearerJWT: {type: http, scheme: bearer, bearerFormat: JWT}
    ApiKey: {type: http, scheme: bearer, bearerFormat: ApiKey}

security:
  - BearerJWT: []
  - ApiKey: []

# ============================================================================
# PATHS
# ============================================================================
paths:

  # =========================================================================
  # Scans collection
  # =========================================================================
  /scans:
    get:
      summary: List scans
      description: |
        Cursor-paginated. Supports filtering by host_id, status, framework,
        session_id, and time ranges.
      x-required-permission: SCAN_READ
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Fields'
        - $ref: '#/components/parameters/Include'
        - {name: host_id, in: query, schema: {type: string, format: uuid}}
        - {name: status, in: query, schema: {type: string}, description: "Comma-separated."}
        - {name: framework, in: query, schema: {type: string}}
        - {name: session_id, in: query, schema: {type: string, format: uuid}}
        - {name: started_after, in: query, schema: {type: string, format: date-time}}
        - {name: started_before, in: query, schema: {type: string, format: date-time}}
      responses:
        '200':
          description: Page of scans
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Cursor'
                  - properties:
                      items:
                        type: array
                        items: {$ref: '#/components/schemas/Scan'}
        '400': {$ref: '#/components/responses/BadRequest'}

    post:
      summary: Execute a scan (single)
      description: |
        Queues a single scan. For bulk scans, use POST /scan-sessions.
        Returns 202 + the queued scan resource.

        Idempotency: replays of the same key return the same scan.
      x-required-permission: SCAN_WRITE
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ScanCreate'}
      responses:
        '202':
          description: Scan queued
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Scan'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '409':
          description: |
            Possible codes:
              - `scan.already_running` (host has an active scan; concurrency policy)
              - `idempotency.key_reused`
              - `host.unreachable_recently` (anti-storm policy)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /scans:validate:
    post:
      summary: Pre-flight scan validation
      description: |
        Verifies host reachability, credential presence, framework support, and
        platform compatibility before queueing a scan. No scan is created.
      x-required-permission: SCAN_READ
      x-rate-limit-bucket: validation
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ScanValidationRequest'}
      responses:
        '200':
          description: Validation result. `is_valid=false` is still 200.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ScanValidationResult'}
        '400': {$ref: '#/components/responses/BadRequest'}

  # =========================================================================
  # Single scan
  # =========================================================================
  /scans/{scan_id}:
    parameters:
      - $ref: '#/components/parameters/ScanId'

    get:
      summary: Get scan
      description: |
        Use `?include=host,template,findings` to embed related resources.
        For paginated findings, use `/scans/{scan_id}/findings` instead.
      x-required-permission: SCAN_READ
      parameters:
        - $ref: '#/components/parameters/Fields'
        - $ref: '#/components/parameters/Include'
      responses:
        '200':
          description: Scan
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Scan'}
        '404': {$ref: '#/components/responses/NotFound'}

    patch:
      summary: Update scan (status / metadata)
      description: |
        The only API-settable status transition is `cancelled`. Setting status
        on an already-terminal scan returns 409 + `transition.invalid`.
      x-required-permission: SCAN_WRITE
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ScanPatch'}
      responses:
        '200':
          description: Updated scan
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Scan'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Conflict'}

    delete:
      summary: Delete scan
      description: |
        Removes the scan and its findings. Does NOT delete the underlying
        compliance state in `host_rule_state` or `transactions` — those are
        the canonical state record and survive scan deletion.
      x-required-permission: SCAN_DELETE
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204': {description: Deleted}
        '404': {$ref: '#/components/responses/NotFound'}

  # =========================================================================
  # Scan actions (true side-effect operations, not status transitions)
  # =========================================================================
  /scans/{scan_id}:retry:
    parameters:
      - $ref: '#/components/parameters/ScanId'

    post:
      summary: Retry a failed scan
      description: |
        Creates a NEW scan with the same configuration as the source scan.
        The source scan stays in its terminal state. Returns the new scan.

        Use this instead of trying to PATCH a failed scan back to queued
        (terminal states do not transition).
      x-required-permission: SCAN_WRITE
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: New scan queued
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Scan'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409':
          description: |
            `scan.not_failed` — only failed/cancelled scans can be retried.
            For new scans, use POST /scans.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /scans/{scan_id}:rescan-rule:
    parameters:
      - $ref: '#/components/parameters/ScanId'

    post:
      summary: Re-run one rule against the same host
      description: |
        Creates a NEW scan with `rule_subset = [rule_id]` against the same
        host. Useful for verifying remediation without re-running the entire
        framework. Returns the new (small) scan.
      x-required-permission: SCAN_WRITE
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rule_id]
              properties:
                rule_id: {type: string}
      responses:
        '202':
          description: Targeted scan queued
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Scan'}
        '404': {$ref: '#/components/responses/NotFound'}

  /scans/{scan_id}:verify:
    parameters:
      - $ref: '#/components/parameters/ScanId'

    post:
      summary: Verify scan results integrity
      description: |
        Re-checks the Ed25519 signature on the scan's evidence envelope and
        confirms the findings match the canonical compliance state. Returns
        a verification report.
      x-required-permission: SCAN_READ
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_valid: {type: boolean}
                  signature_valid: {type: boolean}
                  state_consistent: {type: boolean}
                  discrepancies:
                    type: array
                    items: {type: object}
        '404': {$ref: '#/components/responses/NotFound'}

  /scans/{scan_id}:remediate:
    parameters:
      - $ref: '#/components/parameters/ScanId'

    post:
      summary: Apply remediation to failed findings
      description: |
        **MAYBE feature in Phase 1 triage.** License-gated (OpenWatch+).
        Creates a remediation request from this scan's failed findings.
      x-required-permission: REMEDIATION_WRITE
      x-required-feature: remediation_execution
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                finding_ids:
                  type: array
                  items: {type: string, format: uuid}
                  description: Subset of findings to remediate. Default = all failed.
                dry_run: {type: boolean, default: false}
      responses:
        '202':
          description: Remediation queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  remediation_request_id: {type: string, format: uuid}
                  _links:
                    type: object
                    properties:
                      self: {type: string, format: uri}
        '404': {$ref: '#/components/responses/NotFound'}
        '402':
          description: License does not include remediation
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  # =========================================================================
  # Findings sub-resource
  # =========================================================================
  /scans/{scan_id}/findings:
    parameters:
      - $ref: '#/components/parameters/ScanId'

    get:
      summary: List findings for a scan
      description: |
        Cursor-paginated. Filter by status, severity, rule, exception state.
        Use `?status=fail` to replace today's `/failed-rules` endpoint.
      x-required-permission: SCAN_READ
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Include'
        - {name: status, in: query, schema: {type: string}, description: "Comma-separated. fail | pass | skip | error."}
        - {name: severity, in: query, schema: {type: string}, description: "Comma-separated."}
        - {name: rule_id, in: query, schema: {type: string}}
        - {name: exempted, in: query, schema: {type: boolean}, description: "Filter to currently-exempted findings."}
      responses:
        '200':
          description: Page of findings
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Cursor'
                  - properties:
                      items:
                        type: array
                        items: {$ref: '#/components/schemas/Finding'}
        '404': {$ref: '#/components/responses/NotFound'}

  # =========================================================================
  # Report sub-resource (content negotiation)
  # =========================================================================
  /scans/{scan_id}/report:
    parameters:
      - $ref: '#/components/parameters/ScanId'

    get:
      summary: Export scan report
      description: |
        Returns the report in the format requested via `Accept`.
        Replaces today's three endpoints (`/report/json`, `/report/html`,
        `/report/csv`).
      x-required-permission: SCAN_READ
      responses:
        '200':
          description: Report in requested format
          content:
            application/json:
              schema:
                type: object
                description: Structured scan report
                additionalProperties: true
            text/html:
              schema: {type: string}
            text/csv:
              schema: {type: string}
        '404': {$ref: '#/components/responses/NotFound'}
        '406':
          description: Unsupported format
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  # =========================================================================
  # Scan Templates collection
  # =========================================================================
  /scan-templates:
    get:
      summary: List scan templates
      description: |
        Filter `?type=quick` to replace today's `/scans/templates/quick` listing.
        Filter `?host_id=` to filter by platform compatibility (replaces
        `/scans/templates/host/{id}`).
      x-required-permission: SCAN_READ
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Sort'
        - {name: type, in: query, schema: {type: string, enum: [standard, quick]}}
        - {name: framework, in: query, schema: {type: string}}
        - {name: host_id, in: query, schema: {type: string, format: uuid}, description: "Filter to templates whose platform_filter matches this host."}
        - {name: is_default, in: query, schema: {type: boolean}}
      responses:
        '200':
          description: Page of templates
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Cursor'
                  - properties:
                      items:
                        type: array
                        items: {$ref: '#/components/schemas/ScanTemplate'}

    post:
      summary: Create scan template
      x-required-permission: SCAN_WRITE
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ScanTemplateCreate'}
      responses:
        '201':
          description: Template created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ScanTemplate'}
        '400': {$ref: '#/components/responses/BadRequest'}

  /scan-templates/{template_id}:
    parameters:
      - $ref: '#/components/parameters/TemplateId'

    get:
      summary: Get template
      x-required-permission: SCAN_READ
      responses:
        '200':
          description: Template
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ScanTemplate'}
        '404': {$ref: '#/components/responses/NotFound'}

    patch:
      summary: Update template
      description: |
        Setting `is_default: true` automatically demotes any other default
        template of the same type.
      x-required-permission: SCAN_WRITE
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ScanTemplatePatch'}
      responses:
        '200':
          description: Updated template
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ScanTemplate'}
        '404': {$ref: '#/components/responses/NotFound'}

    delete:
      summary: Delete template
      x-required-permission: SCAN_DELETE
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204': {description: Deleted}
        '404': {$ref: '#/components/responses/NotFound'}
        '409':
          description: Template still in use by a recurring schedule
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /scan-templates/{template_id}:clone:
    parameters:
      - $ref: '#/components/parameters/TemplateId'

    post:
      summary: Clone a template
      description: Creates a new template by copying this one. Returns the new template.
      x-required-permission: SCAN_WRITE
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: {type: string, description: Optional new name. Defaults to "Copy of <original>"}
      responses:
        '201':
          description: Cloned template
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ScanTemplate'}
        '404': {$ref: '#/components/responses/NotFound'}

  # =========================================================================
  # Scan Sessions (bulk scan orchestration)
  # =========================================================================
  /scan-sessions:
    get:
      summary: List bulk scan sessions
      x-required-permission: SCAN_READ
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Sort'
        - {name: status, in: query, schema: {type: string}}
        - {name: started_after, in: query, schema: {type: string, format: date-time}}
      responses:
        '200':
          description: Page of sessions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Cursor'
                  - properties:
                      items:
                        type: array
                        items: {$ref: '#/components/schemas/ScanSession'}

    post:
      summary: Start a bulk scan session
      description: |
        Queues N scans, one per host_id. The session tracks aggregate progress.
        Each scan in the session is a normal Scan resource (`/scans/{id}`).

        For single-host scans, use POST /scans directly.
      x-required-permission: SCAN_WRITE
      x-rate-limit-bucket: bulk-write
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ScanSessionCreate'}
      responses:
        '202':
          description: Session created and scans queued
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ScanSession'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '409':
          description: |
            Possible codes:
              - `idempotency.key_reused`
              - `session.host_limit_exceeded` (>5,000 hosts)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorEnvelope'}

  /scan-sessions/{session_id}:
    parameters:
      - $ref: '#/components/parameters/SessionId'

    get:
      summary: Get bulk scan session (with progress)
      description: |
        Use `_links.scans` (or `GET /scans?session_id={id}`) for the per-host
        scan list.
      x-required-permission: SCAN_READ
      responses:
        '200':
          description: Session with current progress
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ScanSession'}
        '404': {$ref: '#/components/responses/NotFound'}

    patch:
      summary: Update session (cancel)
      description: |
        Setting `status: "cancelled"` cancels all queued and running scans
        in the session. Already-completed scans stay completed; their
        results are preserved.
      x-required-permission: SCAN_WRITE
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ScanSessionPatch'}
      responses:
        '200':
          description: Updated session
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ScanSession'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Conflict'}

# ============================================================================
# Endpoints intentionally NOT in this spec (rationale)
# ============================================================================
# - /scans/legacy [POST]                        → LEGACY; not rebuilt (NEVER list)
# - /scans/{id}/stop, /cancel                   → PATCH with status=cancelled
# - /scans/{id}/recover                         → POST /scans/{id}:retry
# - /scans/{id}/apply-fix                       → POST /scans/{id}:remediate
# - /scans/{id}/results                         → GET /scans/{id} + /findings
# - /scans/{id}/failed-rules                    → GET /scans/{id}/findings?status=fail
# - /scans/{id}/report/{html,json,csv}          → GET /scans/{id}/report (Accept header)
# - /scans/templates/quick                      → GET /scan-templates?type=quick
# - /scans/templates/host/{id}                  → GET /scan-templates?host_id={id}
# - /scans/templates/{id}/{apply,set-default}   → POST /scans (with template_id) / PATCH (is_default)
# - /scans/templates/{id}/clone                 → POST /scan-templates/{id}:clone
# - /scans/hosts/{id}/quick-scan                → POST /scans (with template_id of quick template)
# - /scans/validate                             → POST /scans:validate
# - /scans/verify                               → POST /scans/{id}:verify
# - /scans/profiles                             → GET /capabilities?component=scans (separate spec)
# - /scans/summary                              → GET /analytics/scans (separate spec)
# - /scans/capabilities                         → GET /capabilities?component=scans
# - /scans/scanner/health                       → GET /health?component=scan-engine
# - /scans/rules/available                      → GET /rules?status=active (rules.yaml)
# - /scans/bulk-scan, /sessions/*               → /scan-sessions resource
# - /scans/kensa, /scans/kensa/frameworks/*,
#   /scans/kensa/rules/*, /scans/kensa/controls/*,
#   /scans/kensa/sync, /scans/kensa/sync-stats,
#   /scans/kensa/compliance-state/{host_id}     → moved to /rules, /frameworks,
#                                                   /controls, /admin/operations,
#                                                   /hosts/{id}/compliance
#                                                   (separate spec files)
#
# Total endpoints in this spec: 22
#   - Scans: 12 (list, create, validate, get, update, delete, retry, rescan-rule,
#     verify, remediate, findings, report)
#   - Scan Templates: 6 (list, create, get, update, delete, clone)
#   - Scan Sessions: 4 (list, create, get, update)
#
# Same MUST capabilities as ~50 endpoints in current backend.
# ============================================================================
