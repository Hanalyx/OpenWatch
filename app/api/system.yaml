# OpenWatch — System / meta domain (skeleton)
#
# The "what is this thing" endpoints: health (liveness/readiness), version
# (build metadata), capabilities (runtime feature surface).
#
# Anonymous by design for /health and /version (load balancers and monitoring
# probes have no creds); /capabilities requires auth (it can reveal license
# tier and enabled features, which are non-public).
#
# Fidelity: skeleton — operations, extensions, descriptions; schemas stubbed.
#
# Registry cross-references:
#   - Permissions: app/auth/permissions.yaml — system:read (for /capabilities only)
#   - Audit events: none (read-only meta endpoints; high-volume from probes,
#       auditing them would drown the signal)
#   - Error codes: app/api/error_codes.yaml — server.unavailable (in 503 paths)

openapi: 3.1.0
info:
  title: OpenWatch — System API
  version: 0.1.0-skeleton

paths:

  /api/v1/health:
    get:
      operationId: getHealth
      summary: Liveness + readiness probe.
      description: |
        Returns `{status: "healthy" | "degraded" | "starting", db_connected: bool,
        version: "..."}`. Health is meant for monitoring/load-balancer probes:
        it is anonymous, cheap (one DB ping), and high-frequency-friendly.
        A `503` response indicates the service is unable to serve traffic
        (DB down, mid-shutdown, startup not complete).
      security: []
      responses:
        '200': {description: Healthy and ready.}
        '503':
          description: Unavailable (degraded or starting).
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

  /api/v1/version:
    get:
      operationId: getVersion
      summary: Build metadata (semver, commit, build time, FIPS flag, Kensa version).
      description: |
        Returns build metadata useful for diagnostics. Anonymous — version
        strings are non-secret and operators need them in support tickets.
        Includes `fips: bool` (true if built with microsoft/go FIPS toolchain).
      security: []
      responses:
        '200': {description: Build metadata.}

  /api/v1/capabilities:
    get:
      operationId: getCapabilities
      summary: Runtime capability surface (license tier, enabled features, available frameworks, plugin list).
      description: |
        Returns what this running instance can do right now: license tier
        (free | openwatch_plus | enterprise), enabled features (from the
        active license), frameworks loaded from Kensa mappings, plugins
        registered, FIPS mode, supported auth methods (password, oidc, saml).
        Requires authentication: license-tier and feature lists are
        considered non-public in some deployment models.
      x-required-permission: system:read
      responses:
        '200': {description: Capabilities summary.}
        '401': {$ref: '#/components/responses/Unauthorized'}

# =============================================================================
# Shared components
# =============================================================================

components:

  responses:
    Unauthorized: {description: Authentication required, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}

  schemas:
    ErrorEnvelope:
      # See app/api/error_codes.yaml for the canonical registry of codes.
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, fault, retryable, human_message]
          properties:
            code: {type: string, examples: [server.unavailable, server.internal]}
            fault: {type: string, enum: [client, server, policy, external]}
            retryable: {type: boolean}
            human_message: {type: string}
            detail: {type: object, additionalProperties: true}
            correlation_id: {type: string}
