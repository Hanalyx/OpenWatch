<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Terminal — openwatch</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-0: #0b0c0f; --bg-1: #111317; --bg-2: #161a20; --bg-3: #1c2129;
    --line: #232831; --line-2: #2c323d;
    --fg-0: #f3f5f8; --fg-1: #cfd4dd; --fg-2: #8a93a3; --fg-3: #5b6473;
    --crit: oklch(64% 0.20 25); --crit-bg: oklch(35% 0.12 25 / 0.18);
    --warn: oklch(78% 0.15 75); --warn-bg: oklch(50% 0.12 75 / 0.16);
    --ok: oklch(72% 0.16 155); --ok-bg: oklch(45% 0.10 155 / 0.18);
    --info: oklch(70% 0.13 245); --info-bg: oklch(45% 0.12 245 / 0.18);
    --ubuntu: #e95420; --rhel: #ee0000;
    --radius: 8px; --radius-sm: 6px;
    --term-bg: #06070a;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body { background: var(--bg-0); color: var(--fg-0); font-family: 'Inter', system-ui, sans-serif; font-size: 14px; line-height: 1.45; -webkit-font-smoothing: antialiased; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: "calt" 0; }
  a { color: inherit; text-decoration: none; }

  .app { display: grid; grid-template-columns: 56px 1fr; height: 100vh; }
  .sidebar { background: var(--bg-1); border-right: 1px solid var(--line); display: flex; flex-direction: column; align-items: center; padding: 14px 0; gap: 4px; }
  .logo { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, oklch(70% 0.13 245), oklch(60% 0.20 290)); display: grid; place-items: center; font-weight: 700; color: white; margin-bottom: 12px; }
  .nav-btn { width: 40px; height: 40px; display: grid; place-items: center; border-radius: 8px; color: var(--fg-2); cursor: pointer; transition: 120ms; background: transparent; border: 0; }
  .nav-btn:hover { background: var(--bg-2); color: var(--fg-0); }
  .nav-btn.active { background: var(--bg-3); color: var(--fg-0); box-shadow: inset 2px 0 0 var(--info); }
  .nav-spacer { flex: 1; }

  main { display: flex; flex-direction: column; min-width: 0; height: 100vh; }
  .topbar { background: var(--bg-1); border-bottom: 1px solid var(--line); flex-shrink: 0; }
  .topbar-row { display: flex; align-items: center; padding: 12px 24px; gap: 16px; }
  .crumbs { color: var(--fg-2); font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .crumbs .sep { color: var(--fg-3); }
  .mode-seg { display: inline-flex; background: var(--bg-2); border: 1px solid var(--line); border-radius: 8px; padding: 3px; gap: 2px; margin-left: 8px; }
  .mode-seg button { border: 0; background: transparent; color: var(--fg-2); font-family: inherit; font-size: 13px; font-weight: 500; padding: 6px 14px; border-radius: 6px; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; }
  .mode-seg button.active { background: var(--bg-3); color: var(--fg-0); }
  .mode-seg button.active svg { color: var(--info); }
  .topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .avatar { width: 30px; height: 30px; background: var(--info); color: #0a1424; border-radius: 50%; display: grid; place-items: center; font-weight: 600; font-size: 13px; }
  .icon-btn { width: 34px; height: 34px; border-radius: 6px; color: var(--fg-2); cursor: pointer; background: var(--bg-1); border: 1px solid var(--line); display: inline-grid; place-items: center; transition: 120ms; }
  .icon-btn:hover { background: var(--bg-2); color: var(--fg-0); }

  .btn { height: 32px; border-radius: var(--radius-sm); border: 1px solid var(--line); background: var(--bg-1); color: var(--fg-0); font-family: inherit; font-weight: 500; font-size: 13px; padding: 0 12px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: 120ms; }
  .btn:hover { background: var(--bg-2); border-color: var(--line-2); }
  .btn.primary { background: var(--info); border-color: var(--info); color: #0a1424; font-weight: 600; }
  .btn.primary:hover { filter: brightness(1.08); }
  .btn.danger { background: var(--crit); border-color: var(--crit); color: white; font-weight: 600; }
  .btn.sm { height: 28px; font-size: 12px; padding: 0 10px; }
  .btn[disabled] { opacity: 0.4; cursor: not-allowed; }

  /* Avatar dropdown */
  .user-menu { position: relative; }
  .avatar-btn { border: 0; cursor: pointer; font-family: inherit; padding: 0; }
  .avatar-menu { position: absolute; right: 0; top: calc(100% + 10px); width: 244px; background: var(--bg-1); border: 1px solid var(--line); border-radius: 10px; box-shadow: 0 16px 40px rgba(0,0,0,0.45); padding: 6px; z-index: 60; }
  .avatar-menu[hidden] { display: none; }
  .am-head { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid var(--line); margin-bottom: 6px; }
  .am-head .avatar { width: 36px; height: 36px; }
  .am-name { font-weight: 600; font-size: 13px; }
  .am-email { color: var(--fg-2); font-size: 12px; }
  .am-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 6px; color: var(--fg-1); font-size: 13px; cursor: pointer; }
  .am-item:hover { background: var(--bg-2); color: var(--fg-0); }
  .am-item svg { color: var(--fg-2); }
  .am-item.danger { color: var(--crit); }
  .am-item.danger:hover { background: var(--crit-bg); }
  .am-div { height: 1px; background: var(--line); margin: 6px 4px; }

  /* Workspace */
  .workspace { display: grid; grid-template-columns: 240px 1fr; flex: 1; min-height: 0; transition: grid-template-columns 160ms ease; }
  .workspace.rail-collapsed { grid-template-columns: 46px 1fr; }
  .workspace.rail-collapsed .rail-head, .workspace.rail-collapsed .rail-hint, .workspace.rail-collapsed #rail { display: none; }
  .workspace.rail-collapsed .host-rail { padding: 14px 0; }
  .rail-toggle { cursor: pointer; color: var(--fg-3); width: 24px; height: 24px; display: grid; place-items: center; border-radius: 5px; }
  .rail-toggle:hover { background: var(--bg-2); color: var(--fg-0); }
  .rail-expand { display: none; }
  .workspace.rail-collapsed .rail-expand { display: flex; flex-direction: column; align-items: center; gap: 14px; cursor: pointer; color: var(--fg-2); width: 100%; }
  .workspace.rail-collapsed .rail-expand:hover { color: var(--fg-0); }
  .rail-expand .rx-label { writing-mode: vertical-rl; transform: rotate(180deg); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-3); }
  .rail-expand .rx-count { font-size: 11px; font-weight: 600; color: var(--info); background: var(--info-bg); border-radius: 999px; padding: 1px 6px; font-variant-numeric: tabular-nums; }
  .host-rail { border-right: 1px solid var(--line); background: var(--bg-1); padding: 14px 12px; overflow-y: auto; }
  .rail-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; padding: 0 6px; }
  .rail-head h3 { margin: 0; font-size: 13px; font-weight: 600; }
  .rail-hint { color: var(--fg-3); font-size: 11px; padding: 0 6px 10px; }
  .rail-group h4 { margin: 12px 6px 6px; font-size: 10px; font-weight: 600; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.08em; }
  .host-item { display: flex; align-items: center; gap: 9px; padding: 8px; border-radius: 6px; cursor: pointer; transition: 100ms; border: 1px solid transparent; }
  .host-item:hover { background: var(--bg-2); }
  .host-item.sel { background: var(--bg-3); border-color: var(--line-2); }
  .host-item .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .host-item .dot.reachable { background: var(--ok); box-shadow: 0 0 0 3px var(--ok-bg); }
  .host-item .dot.down { background: var(--crit); }
  .host-item .dot.maintenance { background: var(--warn); }
  .host-item .hi { flex: 1; min-width: 0; }
  .host-item .hn { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .host-item .hs { font-size: 11px; color: var(--fg-3); }
  .host-item .check { width: 16px; height: 16px; border: 1.5px solid var(--line-2); border-radius: 4px; display: grid; place-items: center; flex-shrink: 0; }
  .host-item.sel .check { background: var(--info); border-color: var(--info); }
  .host-item.sel .check::after { content: ""; width: 7px; height: 4px; border-left: 2px solid #0a1424; border-bottom: 2px solid #0a1424; transform: rotate(-45deg) translate(0, -1px); }
  .host-item.disabled { opacity: 0.55; }
  .host-item.disabled .check { border-style: dashed; }
  .os-pill { font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 3px; }
  .os-pill.Ubuntu { background: color-mix(in oklab, var(--ubuntu) 22%, transparent); color: var(--ubuntu); }
  .os-pill.RHEL { background: color-mix(in oklab, var(--rhel) 25%, transparent); color: oklch(72% 0.16 25); }

  .stage { display: flex; flex-direction: column; min-width: 0; min-height: 0; }

  /* ───── LIVE mode ───── */
  .live-bar { display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
  .live-bar .lb-title { font-size: 13px; color: var(--fg-2); }
  .live-bar .lb-title strong { color: var(--fg-0); }
  .sync-toggle { display: inline-flex; align-items: center; gap: 8px; height: 30px; padding: 0 12px; border: 1px solid var(--line); border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; color: var(--fg-1); background: var(--bg-1); }
  .sync-toggle.on { border-color: color-mix(in oklab, var(--warn) 50%, var(--line)); color: var(--warn); background: var(--warn-bg); }
  .sync-toggle .sd { width: 8px; height: 8px; border-radius: 50%; background: var(--fg-3); }
  .sync-toggle.on .sd { background: var(--warn); }

  .panes { flex: 1; display: flex; gap: 1px; background: var(--line); min-height: 0; }
  .pane { flex: 1 1 0; background: var(--term-bg); display: flex; flex-direction: column; min-width: 0; min-height: 0; position: relative; transition: flex-basis 160ms ease; }
  .pane.collapsed { flex: 0 0 42px; }
  .pane.collapsed .pane-body, .pane.collapsed .pane-overlay { display: none; }
  .pane.collapsed .pane-head { flex-direction: column; height: 100%; justify-content: flex-start; gap: 12px; padding: 10px 0; cursor: pointer; align-items: center; }
  .pane.collapsed .pane-head:hover { background: var(--bg-2); }
  .pane.collapsed .pane-head .traffic, .pane.collapsed .pane-head .pdot, .pane.collapsed .pane-head .pclose { display: none; }
  .pane.collapsed .pt { writing-mode: vertical-rl; transform: rotate(180deg); flex: none; }
  .collapse-btn { color: var(--fg-3); cursor: pointer; width: 22px; height: 22px; display: grid; place-items: center; border-radius: 4px; flex-shrink: 0; }
  .collapse-btn:hover { background: var(--bg-2); color: var(--fg-0); }
  .pane.focused { box-shadow: inset 0 0 0 2px color-mix(in oklab, var(--info) 60%, transparent); }
  .pane-head { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--bg-1); border-bottom: 1px solid var(--line); flex-shrink: 0; }
  .pane-head .traffic { display: flex; gap: 5px; }
  .pane-head .traffic span { width: 10px; height: 10px; border-radius: 50%; background: var(--bg-3); }
  .pane-head .pt { flex: 1; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--fg-1); }
  .pane-head .pdot { width: 7px; height: 7px; border-radius: 50%; }
  .pane-head .pdot.reachable { background: var(--ok); }
  .pane-head .pclose { color: var(--fg-3); cursor: pointer; width: 22px; height: 22px; display: grid; place-items: center; border-radius: 4px; }
  .pane-head .pclose:hover { background: var(--bg-2); color: var(--fg-0); }
  .pane-body { flex: 1; overflow-y: auto; padding: 12px 14px; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; line-height: 1.6; color: #c8d0db; cursor: text; }
  .pane-body .pl { white-space: pre-wrap; word-break: break-word; }
  .pane-body .u-host { color: #8ad7ff; } .pane-body .path { color: #c8b768; } .pane-body .cmd { color: #e8edf4; }
  .pane-body .out { color: #c8d0db; } .pane-body .err { color: oklch(72% 0.18 25); } .pane-body .dim { color: #5b6473; }
  .pane-prompt { display: flex; align-items: baseline; gap: 6px; }
  .pane-prompt .cur { display: inline-block; width: 7px; height: 14px; background: #c8d0db; animation: blink 1s steps(2) infinite; vertical-align: text-bottom; }
  @keyframes blink { 50% { opacity: 0; } }
  .pane-overlay { position: absolute; inset: 0; background: color-mix(in oklab, var(--term-bg) 92%, transparent); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; text-align: center; padding: 24px; }
  .pane-overlay .oi { width: 52px; height: 52px; border-radius: 50%; display: grid; place-items: center; }
  .pane-overlay.down .oi { background: var(--crit-bg); color: var(--crit); }
  .pane-overlay.maintenance .oi { background: var(--warn-bg); color: var(--warn); }
  .pane-overlay h4 { margin: 0; font-size: 14px; }
  .pane-overlay p { margin: 0; color: var(--fg-2); font-size: 12px; max-width: 260px; }

  .empty-stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; color: var(--fg-2); text-align: center; padding: 40px; }
  .empty-stage .ei { width: 56px; height: 56px; border-radius: 14px; background: var(--bg-2); display: grid; place-items: center; color: var(--fg-3); }
  .empty-stage h3 { margin: 0; color: var(--fg-1); font-size: 16px; }
  .empty-stage p { margin: 0; font-size: 13px; max-width: 340px; }

  /* Command bar (shared, live mode) */
  .cmd-bar { flex-shrink: 0; border-top: 1px solid var(--line); background: var(--bg-1); padding: 10px 16px; display: flex; align-items: center; gap: 10px; }
  .cmd-target { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--fg-2); white-space: nowrap; }
  .cmd-target .arrow { color: var(--fg-3); }
  .cmd-target .tg { color: var(--info); }
  .cmd-target .tg.sync { color: var(--warn); }
  .cmd-input { flex: 1; display: flex; align-items: center; gap: 8px; background: var(--term-bg); border: 1px solid var(--line); border-radius: 6px; padding: 0 12px; height: 38px; }
  .cmd-input .ps { color: var(--ok); font-family: 'JetBrains Mono', monospace; font-size: 13px; }
  .cmd-input input { flex: 1; background: transparent; border: 0; outline: 0; color: var(--fg-0); font-family: 'JetBrains Mono', monospace; font-size: 13px; }

  /* ───── BROADCAST mode ───── */
  .bcast { flex: 1; overflow-y: auto; padding: 18px 24px 40px; }
  .target-card { background: var(--bg-1); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 14px; }
  .target-card h3 { margin: 0 0 10px; font-size: 13px; font-weight: 600; }
  .quick-picks { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .qp { height: 30px; padding: 0 12px; border-radius: 999px; border: 1px solid var(--line); background: var(--bg-2); color: var(--fg-2); font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .qp:hover { color: var(--fg-0); border-color: var(--line-2); }
  .blast { display: flex; align-items: center; gap: 14px; padding: 12px 14px; background: var(--bg-2); border: 1px solid var(--line); border-radius: 8px; font-size: 13px; flex-wrap: wrap; }
  .blast .seg-bar { flex: 1; min-width: 160px; height: 8px; border-radius: 4px; overflow: hidden; display: flex; background: var(--bg-3); }
  .blast .seg-bar .s-ok { background: var(--ok); } .blast .seg-bar .s-down { background: var(--crit); } .blast .seg-bar .s-maint { background: var(--warn); }
  .blast .b-stat { display: inline-flex; align-items: center; gap: 6px; color: var(--fg-2); font-variant-numeric: tabular-nums; }
  .blast .b-stat .d { width: 8px; height: 8px; border-radius: 50%; }
  .blast .b-stat .d.ok { background: var(--ok); } .blast .b-stat .d.down { background: var(--crit); } .blast .b-stat .d.maint { background: var(--warn); }
  .blast .b-stat b { color: var(--fg-0); }

  .run-card { background: var(--bg-1); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 14px; }
  .kactions { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .kchip { height: 30px; padding: 0 12px; border-radius: 6px; border: 1px solid var(--line); background: var(--bg-2); color: var(--fg-1); font-size: 12px; font-weight: 500; cursor: pointer; font-family: 'JetBrains Mono', monospace; display: inline-flex; align-items: center; gap: 7px; }
  .kchip:hover { border-color: var(--line-2); background: var(--bg-3); }
  .kchip svg { color: var(--info); }
  .run-row { display: flex; align-items: center; gap: 10px; }
  .run-input { flex: 1; display: flex; align-items: center; gap: 8px; background: var(--term-bg); border: 1px solid var(--line); border-radius: 6px; padding: 0 12px; height: 40px; }
  .run-input .ps { color: var(--ok); font-family: 'JetBrains Mono', monospace; font-size: 13px; }
  .run-input input { flex: 1; background: transparent; border: 0; outline: 0; color: var(--fg-0); font-family: 'JetBrains Mono', monospace; font-size: 13px; }
  .dry-toggle { display: inline-flex; align-items: center; gap: 7px; font-size: 12px; color: var(--fg-2); cursor: pointer; white-space: nowrap; }
  .dry-toggle .tk { width: 32px; height: 18px; background: var(--bg-3); border: 1px solid var(--line-2); border-radius: 999px; position: relative; transition: 140ms; }
  .dry-toggle .tk::after { content: ""; position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; border-radius: 50%; background: var(--fg-2); transition: 140ms; }
  .dry-toggle.on .tk { background: var(--ok); border-color: var(--ok); } .dry-toggle.on .tk::after { left: 15px; background: white; }

  /* Reconciled results */
  .results-head { display: flex; align-items: center; justify-content: space-between; margin: 18px 0 10px; }
  .results-head h3 { margin: 0; font-size: 14px; font-weight: 600; }
  .results-head .rsum { color: var(--fg-2); font-size: 12px; }
  .rgroup { background: var(--bg-1); border: 1px solid var(--line); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
  .rgroup-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px; cursor: pointer; }
  .rgroup-head:hover { background: var(--bg-2); }
  .rgroup-head .chev { color: var(--fg-3); transition: transform 120ms; }
  .rgroup.open .rgroup-head .chev { transform: rotate(90deg); }
  .rgroup-head .rg-pip { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .rgroup.ok .rg-pip { background: var(--ok); } .rgroup.failed .rg-pip { background: var(--crit); } .rgroup.skipped .rg-pip { background: var(--warn); }
  .rgroup-head .rg-label { flex: 1; font-size: 13px; font-weight: 500; }
  .rgroup-head .rg-count { color: var(--fg-2); font-size: 12px; font-variant-numeric: tabular-nums; }
  .rg-hosts { display: flex; flex-wrap: wrap; gap: 5px; padding: 0 16px 12px; }
  .rg-hostchip { font-family: 'JetBrains Mono', monospace; font-size: 11px; background: var(--bg-2); border: 1px solid var(--line); border-radius: 4px; padding: 2px 8px; color: var(--fg-1); }
  .rg-output { background: var(--term-bg); border-top: 1px solid var(--line); padding: 12px 16px; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; line-height: 1.6; white-space: pre-wrap; color: #c8d0db; }
  .rg-output.err { color: oklch(72% 0.18 25); }
  .rgroup-body[hidden] { display: none; }

  .confirm-scrim { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 90; display: none; align-items: center; justify-content: center; }
  .confirm-scrim.show { display: flex; }
  .confirm { width: 440px; max-width: 92vw; background: var(--bg-1); border: 1px solid color-mix(in oklab, var(--crit) 40%, var(--line)); border-radius: 12px; padding: 22px; }
  .confirm .ci { width: 40px; height: 40px; border-radius: 10px; background: var(--crit-bg); color: var(--crit); display: grid; place-items: center; margin-bottom: 12px; }
  .confirm h3 { margin: 0 0 6px; font-size: 16px; }
  .confirm p { margin: 0 0 14px; color: var(--fg-2); font-size: 13px; line-height: 1.5; }
  .confirm .cf { display: flex; gap: 8px; justify-content: flex-end; }
</style>
</head>

<div class="app">
  <aside class="sidebar">
    <div class="logo">ow</div>

    <div class="ci"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.7a2 2 0 0 1 3.4 0l8 14a2 2 0 0 1-1.7 3H4.3a2 2 0 0 1-1.7-3z"/><path d="M12 9v4M12 17h.01"/></svg></div>
    <h3 id="confirmTitle">Run on Production hosts?</h3>
    <p id="confirmBody"></p>
    <div class="cf"><button class="btn" id="confirmCancel">Cancel</button><button class="btn danger" id="confirmGo">Run anyway</button></div>
  </div>

<script>
  const HOSTS = {
    "owas-ub5s2": { os: "Ubuntu", group: "Production", term: "reachable", ip: "192.168.1.217" },
    "owas-rhn01": { os: "RHEL", group: "Production", term: "down", ip: "192.168.1.213" },
    "owas-hrm01": { os: "RHEL", group: "Production", term: "down", ip: "192.168.1.202" },
    "owas-ub4m2": { os: "Ubuntu", group: "Development", term: "maintenance", ip: "192.168.1.214" },
    "192.168.1.212": { os: "Ubuntu", group: "Development", term: "maintenance", ip: "192.168.1.212" },
    "owas-tst01": { os: "RHEL", group: "Development", term: "maintenance", ip: "192.168.1.203" },
    "owas-tst02": { os: "RHEL", group: "Development", term: "maintenance", ip: "192.168.1.211" },
  };
  const ORDER = Object.keys(HOSTS);
  const TERM_LABEL = { reachable: "SSH reachable", down: "unreachable", maintenance: "maintenance" };

  let mode = "live";
  const live = { hosts: [], focus: null, sync: false, buffers: {}, collapsed: new Set() };
  const bcast = { targets: new Set(), dryRun: true, lastCmd: "" };

  // ───── Fake shell responder (OS-aware) ─────
  function respond(cmd, host) {
    const os = HOSTS[host].os;
    const c = cmd.trim();
    if (c === "") return [];
    if (/^uname(\s|$)/.test(c)) return [os === "RHEL"
      ? "Linux " + host + " 5.14.0-427.el9.x86_64 #1 SMP x86_64 GNU/Linux"
      : "Linux " + host + " 6.8.0-101-generic #103-Ubuntu SMP x86_64 GNU/Linux"];
    if (/^whoami$/.test(c)) return ["owadmin"];
    if (/^pwd$/.test(c)) return ["/home/owadmin"];
    if (/^id$/.test(c)) return ["uid=1000(owadmin) gid=1000(owadmin) groups=1000(owadmin),27(sudo)"];
    if (/^uptime$/.test(c)) return [" 14:46:12 up 43 days,  1:04,  1 user,  load average: 0.04, 0.08, 0.06"];
    if (/^ls/.test(c)) return ["bin   dev  home  lib    mnt  proc  run   srv  tmp  var", "boot  etc  lib64 media  opt  root  sbin  sys  usr"];
    if (/ufw status|firewall-cmd --state/.test(c)) return [{ err: true, t: os === "RHEL" ? "not running" : "Status: inactive" }];
    if (/systemctl is-active auditd|systemctl status auditd/.test(c)) return os === "RHEL"
      ? ["active"] : [{ err: true, t: "inactive (masked)" }];
    if (/cat \/etc\/os-release|os-release/.test(c)) return os === "RHEL"
      ? ['NAME="Red Hat Enterprise Linux"', 'VERSION="9.4 (Plow)"'] : ['NAME="Ubuntu"', 'VERSION="24.04.3 LTS (Noble Numbat)"'];
    if (/^kensa check/.test(c)) return os === "RHEL" ? ["71/508 passed · 437 failed · 14.0%"] : ["191/508 passed · 317 failed · 37.6%"];
    if (/^kensa plan/.test(c)) return ["plan: 17 fixes (16 atomic, 1 non-transactional) — no changes applied"];
    if (/^echo /.test(c)) return [c.slice(5)];
    if (/^sudo /.test(c)) return respond(c.slice(5), host);
    return [c.split(" ")[0] + ": done"];
  }

  // ───── Host rail ─────
  function renderRail() {
    const groups = ["Production", "Development"];
    const railTitle = document.getElementById("railTitle");
    const railHint = document.getElementById("railHint");
    railTitle.textContent = mode === "live" ? "Live shells" : "Targets";
    railHint.textContent = mode === "live" ? "Pick up to 3 reachable hosts." : "Select hosts to broadcast to.";
    let html = "";
    groups.forEach(g => {
      const hs = ORDER.filter(h => HOSTS[h].group === g);
      html += '<div class="rail-group"><h4>' + g + '</h4>';
      hs.forEach(h => {
        const d = HOSTS[h];
        const sel = mode === "live" ? live.hosts.includes(h) : bcast.targets.has(h);
        const liveDisabled = mode === "live" && d.term !== "reachable";
        html += '<div class="host-item ' + (sel ? "sel " : "") + (liveDisabled ? "disabled" : "") + '" data-host="' + h + '">' +
          '<span class="dot ' + d.term + '"></span>' +
          '<div class="hi"><div class="hn">' + h + '</div><div class="hs">' + TERM_LABEL[d.term] + '</div></div>' +
          '<span class="os-pill ' + d.os + '">' + d.os + '</span>' +
          '<span class="check"></span></div>';
      });
      html += '</div>';
    });
    const rail = document.getElementById("rail");
    rail.innerHTML = html;
    rail.querySelectorAll(".host-item").forEach(it => it.addEventListener("click", () => toggleHost(it.dataset.host)));
  }

  function toggleHost(h) {
    if (mode === "live") {
      if (HOSTS[h].term !== "reachable") {
        // still allow opening to SHOW the offline state, but cap at 3
        if (!live.hosts.includes(h) && live.hosts.length >= 3) return;
      }
      if (live.hosts.includes(h)) { live.hosts = live.hosts.filter(x => x !== h); if (live.focus === h) live.focus = live.hosts[0] || null; }
      else { if (live.hosts.length >= 3) return; live.hosts.push(h); live.focus = h; if (!live.buffers[h]) seedBuffer(h); }
      renderRail(); renderLive();
    } else {
      if (bcast.targets.has(h)) bcast.targets.delete(h); else bcast.targets.add(h);
      renderRail(); renderBroadcast();
    }
  }

  function seedBuffer(h) {
    const d = HOSTS[h];
    if (d.term === "reachable") {
      live.buffers[h] = [
        { t: "Last login: Tue " + d.ip + " from 10.20.4.18", cls: "dim" },
        { prompt: true, cmd: "" },
      ];
    } else { live.buffers[h] = []; }
  }

  // ───── Live mode ─────
  function renderLive() {
    const stage = document.getElementById("stage");
    if (live.hosts.length === 0) {
      stage.innerHTML = '<div class="empty-stage"><div class="ei"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg></div><h3>No live sessions</h3><p>Pick up to 3 hosts from the rail to open interactive SSH shells side by side. Toggle <strong>Sync input</strong> to type into all of them at once.</p></div>';
      return;
    }
    const n = live.hosts.length;
    const syncOn = live.sync && n > 1;
    const tgt = syncOn ? '<span class="tg sync">all ' + n + ' panes (synced)</span>' : '<span class="tg">' + (live.focus || live.hosts[0]) + '</span>';
    stage.innerHTML =
      '<div class="live-bar">' +
        '<div class="lb-title"><strong>' + n + '</strong> live ' + (n === 1 ? "session" : "sessions") + '</div>' +
        (n > 1 ? '<div class="sync-toggle ' + (live.sync ? "on" : "") + '" id="syncToggle"><span class="sd"></span>Sync input to all panes</div>' : '') +
        '<div style="flex:1"></div>' +
        '<span style="color:var(--fg-3); font-size:12px;">Click a pane to focus · ⏎ to run</span>' +
      '</div>' +
      '<div class="panes n' + n + '" id="panes">' + live.hosts.map(paneHtml).join("") + '</div>' +
      '<div class="cmd-bar">' +
        '<div class="cmd-target"><span class="arrow">send to →</span> ' + tgt + '</div>' +
        '<div class="cmd-input"><span class="ps">$</span><input id="liveInput" autocomplete="off" spellcheck="false" placeholder="' + (reachableLive().length ? "type a command…" : "no reachable panes — open a reachable host") + '" ' + (reachableLive().length ? "" : "disabled") + ' /></div>' +
      '</div>';

    live.hosts.forEach(h => { const b = document.querySelector('.pane[data-host="' + h + '"] .pane-body'); if (b) b.scrollTop = b.scrollHeight; });
    const st = document.getElementById("syncToggle");
    if (st) st.addEventListener("click", () => { live.sync = !live.sync; renderLive(); });
    document.querySelectorAll(".pane").forEach(p => p.addEventListener("click", (e) => {
      if (e.target.closest(".pclose")) return;
      live.focus = p.dataset.host; document.querySelectorAll(".pane").forEach(x => x.classList.toggle("focused", x === p));
    }));
    document.querySelectorAll(".pclose").forEach(c => c.addEventListener("click", (e) => { e.stopPropagation(); toggleHost(c.closest(".pane").dataset.host); }));
    document.querySelectorAll("[data-collapse]").forEach(c => c.addEventListener("click", (e) => {
      e.stopPropagation(); const h = c.dataset.collapse; live.collapsed.add(h);
      if (live.focus === h) live.focus = live.hosts.find(x => !live.collapsed.has(x)) || null;
      renderLive();
    }));
    document.querySelectorAll("[data-expand]").forEach(c => c.addEventListener("click", (e) => {
      e.stopPropagation(); const h = c.dataset.expand; live.collapsed.delete(h); live.focus = h; renderLive();
    }));
    const input = document.getElementById("liveInput");
    if (input) {
      input.focus();
      input.addEventListener("keydown", (e) => { if (e.key === "Enter") { runLive(input.value); input.value = ""; } });
    }
    document.querySelectorAll(".pane.focused").length || (document.querySelector('.pane[data-host="' + (live.focus || live.hosts[0]) + '"]') || {}).classList?.add("focused");
  }

  function reachableLive() { return live.hosts.filter(h => HOSTS[h].term === "reachable"); }

  function paneHtml(h) {
    const d = HOSTS[h];
    const focused = (live.focus || live.hosts[0]) === h;
    if (live.collapsed.has(h)) {
      return '<div class="pane collapsed" data-host="' + h + '"><div class="pane-head" data-expand="' + h + '">' +
        '<span class="collapse-btn" title="Expand pane"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></span>' +
        '<span class="pt">owadmin@' + h + '</span></div></div>';
    }
    let overlay = "";
    if (d.term === "down") overlay = '<div class="pane-overlay down"><div class="oi"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m1 1 22 22"/><path d="M16.7 12.7A6 6 0 0 0 8 8"/><path d="M5 12.6A10 10 0 0 1 12 9"/></svg></div><h4>SSH connection refused</h4><p>Host unreachable for 18 min. Retry from Hosts, or open an incident.</p><button class="btn sm">Retry connection</button></div>';
    else if (d.term === "maintenance") overlay = '<div class="pane-overlay maintenance"><div class="oi"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></div><h4>Host in maintenance</h4><p>Live access paused via the <strong>Development</strong> group. Resume in Groups to connect.</p><a href="Groups.html" class="btn sm">Open Groups</a></div>';
    const body = (live.buffers[h] || []).map(renderLine).join("");
    return '<div class="pane ' + (focused ? "focused" : "") + '" data-host="' + h + '">' +
      '<div class="pane-head"><span class="traffic"><span></span><span></span><span></span></span>' +
        '<span class="pdot ' + d.term + '" style="' + (d.term === "reachable" ? "" : "display:none") + '"></span>' +
        '<span class="pt">owadmin@' + h + '</span>' +
        '<span class="collapse-btn" data-collapse="' + h + '" title="Collapse pane"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></span>' +
        '<span class="pclose" title="Close"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></span></div>' +
      '<div class="pane-body">' + body + '</div>' + overlay + '</div>';
  }

  function renderLine(l) {
    if (l.prompt) return '<div class="pane-prompt"><span class="u-host">owadmin@host</span><span style="color:#c8d0db">:</span><span class="path">~</span><span style="color:#c8d0db">$</span> <span class="cur"></span></div>';
    if (l.cmd !== undefined) return '<div class="pl"><span class="u-host">owadmin</span><span class="dim">:~$</span> <span class="cmd">' + escapeHtml(l.cmd) + '</span></div>';
    return '<div class="pl ' + (l.cls || "out") + '">' + escapeHtml(l.t) + '</div>';
  }
  function escapeHtml(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

  function runLive(cmd) {
    if (!cmd.trim()) return;
    const targets = live.sync && live.hosts.length > 1 ? reachableLive() : [live.focus].filter(h => h && HOSTS[h].term === "reachable");
    targets.forEach(h => {
      const buf = live.buffers[h];
      buf.pop(); // remove trailing prompt
      buf.push({ cmd: cmd });
      respond(cmd, h).forEach(r => { if (typeof r === "string") buf.push({ t: r, cls: "out" }); else buf.push({ t: r.t, cls: r.err ? "err" : "out" }); });
      buf.push({ prompt: true, cmd: "" });
    });
    renderLive();
  }

  // ───── Broadcast mode ─────
  function renderBroadcast() {
    const stage = document.getElementById("stage");
    const targets = [...bcast.targets];
    const okN = targets.filter(h => HOSTS[h].term === "reachable").length;
    const downN = targets.filter(h => HOSTS[h].term === "down").length;
    const maintN = targets.filter(h => HOSTS[h].term === "maintenance").length;
    const prodN = targets.filter(h => HOSTS[h].group === "Production").length;
    const total = targets.length;

    stage.innerHTML =
      '<div class="bcast">' +
        '<div class="target-card">' +
          '<h3>Targets</h3>' +
          '<div class="quick-picks">' +
            '<button class="qp" data-pick="all">All hosts</button>' +
            '<button class="qp" data-pick="reachable">Reachable only</button>' +
            '<button class="qp" data-pick="Production">Production</button>' +
            '<button class="qp" data-pick="Development">Development</button>' +
            '<button class="qp" data-pick="RHEL">RHEL</button>' +
            '<button class="qp" data-pick="Ubuntu">Ubuntu</button>' +
            '<button class="qp" data-pick="none">Clear</button>' +
          '</div>' +
          (total === 0
            ? '<div style="color:var(--fg-3); font-size:13px;">No targets selected. Use a quick-pick above or the rail.</div>'
            : '<div class="blast">' +
                '<div class="seg-bar">' +
                  (okN ? '<span class="s-ok" style="width:' + (okN/total*100) + '%"></span>' : '') +
                  (downN ? '<span class="s-down" style="width:' + (downN/total*100) + '%"></span>' : '') +
                  (maintN ? '<span class="s-maint" style="width:' + (maintN/total*100) + '%"></span>' : '') +
                '</div>' +
                '<span class="b-stat"><b>' + total + '</b> targets</span>' +
                '<span class="b-stat"><span class="d ok"></span><b>' + okN + '</b> reachable</span>' +
                (downN ? '<span class="b-stat"><span class="d down"></span><b>' + downN + '</b> unreachable</span>' : '') +
                (maintN ? '<span class="b-stat"><span class="d maint"></span><b>' + maintN + '</b> maintenance</span>' : '') +
                (prodN ? '<span class="b-stat" style="color:var(--warn);">⚠ ' + prodN + ' Production</span>' : '') +
              '</div>') +
        '</div>' +

        '<div class="run-card">' +
          '<div class="kactions">' +
            '<button class="kchip" data-k="kensa check"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="9"/></svg>kensa check</button>' +
            '<button class="kchip" data-k="kensa plan"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9"/><path d="M3 12V3h9"/></svg>kensa plan</button>' +
            '<button class="kchip" data-k="kensa remediate"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a4 4 0 0 0-5.4 5.4L3 18v3h3l6.3-6.3a4 4 0 0 0 5.4-5.4l-2.1 2.1-2-2 2.1-2.1z"/></svg>kensa remediate</button>' +
            '<button class="kchip" data-k="systemctl is-active auditd">systemctl is-active auditd</button>' +
            '<button class="kchip" data-k="uname -a">uname -a</button>' +
          '</div>' +
          '<div class="run-row">' +
            '<div class="run-input"><span class="ps">⌘</span><input id="bcastInput" autocomplete="off" spellcheck="false" placeholder="command to run on ' + total + ' host' + (total === 1 ? "" : "s") + '…" value="' + escapeHtml(bcast.lastCmd) + '" /></div>' +
            '<div class="dry-toggle ' + (bcast.dryRun ? "on" : "") + '" id="dryToggle" title="Dry-run preview (no changes applied)"><span class="tk"></span>Dry-run</div>' +
            '<button class="btn primary" id="runBcast"' + (total === 0 ? " disabled" : "") + '><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="6,4 20,12 6,20"/></svg>Run</button>' +
          '</div>' +
        '</div>' +

        '<div id="results"></div>' +
      '</div>';

    stage.querySelectorAll(".qp").forEach(b => b.addEventListener("click", () => quickPick(b.dataset.pick)));
    const dt = document.getElementById("dryToggle"); dt.addEventListener("click", () => { bcast.dryRun = !bcast.dryRun; dt.classList.toggle("on", bcast.dryRun); });
    stage.querySelectorAll(".kchip").forEach(k => k.addEventListener("click", () => { document.getElementById("bcastInput").value = k.dataset.k; }));
    const ri = document.getElementById("bcastInput");
    ri.addEventListener("keydown", (e) => { if (e.key === "Enter") attemptRun(); });
    document.getElementById("runBcast").addEventListener("click", attemptRun);
  }

  function quickPick(p) {
    bcast.targets.clear();
    if (p === "all") ORDER.forEach(h => bcast.targets.add(h));
    else if (p === "reachable") ORDER.filter(h => HOSTS[h].term === "reachable").forEach(h => bcast.targets.add(h));
    else if (p === "Production" || p === "Development") ORDER.filter(h => HOSTS[h].group === p).forEach(h => bcast.targets.add(h));
    else if (p === "RHEL" || p === "Ubuntu") ORDER.filter(h => HOSTS[h].os === p).forEach(h => bcast.targets.add(h));
    renderRail(); renderBroadcast();
  }

  function attemptRun() {
    const cmd = document.getElementById("bcastInput").value.trim();
    if (!cmd || bcast.targets.size === 0) return;
    bcast.lastCmd = cmd;
    const prod = [...bcast.targets].filter(h => HOSTS[h].group === "Production");
    const destructive = /remediate/.test(cmd) && !bcast.dryRun;
    if (destructive && prod.length) {
      document.getElementById("confirmBody").innerHTML = "You're about to run <b>" + escapeHtml(cmd) + "</b> on <b>" + prod.length + " Production host" + (prod.length === 1 ? "" : "s") + "</b> with dry-run OFF — this will commit changes. Each rule still runs Capture→Validate with per-rule rollback.";
      document.getElementById("confirmScrim").classList.add("show");
      document.getElementById("confirmGo").onclick = () => { document.getElementById("confirmScrim").classList.remove("show"); runBroadcast(cmd); };
    } else { runBroadcast(cmd); }
  }

  function runBroadcast(cmd) {
    const targets = [...bcast.targets];
    // Build result per host, then reconcile (group by status+output)
    const groups = {};
    targets.forEach(h => {
      const d = HOSTS[h];
      let key, label, status, output;
      if (d.term === "down") { status = "failed"; output = "ssh: connect to host " + d.ip + " port 22: Connection refused"; key = "failed"; label = "Connection refused"; }
      else if (d.term === "maintenance") { status = "skipped"; output = "skipped — host in maintenance (Development group)"; key = "skipped"; label = "Skipped — maintenance"; }
      else {
        let lines = respond(cmd, h).map(r => typeof r === "string" ? r : r.t);
        if (/remediate/.test(cmd) && bcast.dryRun) lines = ["[dry-run] " + (lines[0] || "no changes")];
        output = lines.join("\n") || "(no output)";
        status = "ok"; key = "ok:" + output; label = output.split("\n")[0];
      }
      (groups[key] = groups[key] || { status, label, output, hosts: [] }).hosts.push(h);
    });
    const order = { ok: 0, failed: 1, skipped: 2 };
    const arr = Object.values(groups).sort((a, b) => order[a.status] - order[b.status] || b.hosts.length - a.hosts.length);
    const okHosts = targets.filter(h => HOSTS[h].term === "reachable").length;
    const res = document.getElementById("results");
    res.innerHTML =
      '<div class="results-head"><h3>Results</h3><div class="rsum">' + arr.length + ' distinct ' + (arr.length === 1 ? "result" : "results") + ' across ' + targets.length + ' hosts · <span class="mono">$ ' + escapeHtml(cmd) + '</span></div></div>' +
      arr.map((g, i) => {
        return '<div class="rgroup ' + g.status + ' open">' +
          '<div class="rgroup-head"><span class="chev"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></span>' +
            '<span class="rg-pip"></span><span class="rg-label">' + escapeHtml(g.label) + '</span>' +
            '<span class="rg-count">' + g.hosts.length + ' host' + (g.hosts.length === 1 ? "" : "s") + '</span></div>' +
          '<div class="rgroup-body">' +
            '<div class="rg-hosts">' + g.hosts.map(h => '<span class="rg-hostchip">' + h + '</span>').join("") + '</div>' +
            (g.status !== "skipped" ? '<div class="rg-output ' + (g.status === "failed" ? "err" : "") + '">' + escapeHtml(g.output) + '</div>' : '') +
          '</div></div>';
      }).join("");
    res.querySelectorAll(".rgroup-head").forEach(h => h.addEventListener("click", () => {
      const g = h.closest(".rgroup"); g.classList.toggle("open"); g.querySelector(".rgroup-body").hidden = !g.classList.contains("open");
    }));
  }

  // ───── Mode switch + init ─────
  document.getElementById("mode").addEventListener("click", (e) => {
    const b = e.target.closest("button"); if (!b) return;
    mode = b.dataset.mode;
    document.querySelectorAll("#mode button").forEach(x => x.classList.toggle("active", x === b));
    renderRail();
    if (mode === "live") renderLive(); else renderBroadcast();
  });
  document.getElementById("confirmCancel").addEventListener("click", () => document.getElementById("confirmScrim").classList.remove("show"));

  // Host panel collapse
  function updateRailCount() {
    const n = mode === "live" ? live.hosts.length : bcast.targets.size;
    const el = document.getElementById("rxCount");
    if (el) { el.textContent = n; el.style.display = n ? "" : "none"; }
  }
  document.getElementById("railToggle").addEventListener("click", () => { document.getElementById("workspace").classList.add("rail-collapsed"); updateRailCount(); });
  document.getElementById("railExpand").addEventListener("click", () => document.getElementById("workspace").classList.remove("rail-collapsed"));

  (function () {
    const btn = document.getElementById('avatarBtn'), menu = document.getElementById('avatarMenu');
    btn.addEventListener('click', function (e) { e.stopPropagation(); const open = menu.hidden; menu.hidden = !open; btn.setAttribute('aria-expanded', String(open)); });
    document.addEventListener('click', function (e) { if (!menu.hidden && !menu.contains(e.target) && e.target !== btn) menu.hidden = true; });
  })();

  // Seed: open ub5s2 live by default
  live.hosts = ["owas-ub5s2"]; live.focus = "owas-ub5s2"; seedBuffer("owas-ub5s2");
  renderRail();
  renderLive();
</script>

</body>
