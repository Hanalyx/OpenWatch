spec:
  id: api-fleet-connectivity-breakdown
  title: Fleet connectivity breakdown — 4-state derived counts
  version: "1.0.0"
  status: approved
  tier: 2

  context:
    system: openwatch-go
    feature: Derived per-state host counts for the Settings → Scanning & monitoring connectivity table
    description: >
      api-fleet-observability AC-03 exposes
      {reachable, unreachable, unknown, never_probed} via
      GET /fleet/liveness. That's enough for a fleet-health KPI but
      the Settings page renders a 4-state breakdown (Online, Degraded,
      Critical, Down) derived from consecutive_failures hysteresis
      bands.

      This endpoint computes those bands directly from host_liveness
      so the UI doesn't have to fan out to per-host queries:

        online       — reachability_status='reachable' AND
                       consecutive_failures=0
        degraded     — reachability_status='reachable' AND
                       consecutive_failures>=1
        critical     — reachability_status='unreachable' AND
                       consecutive_failures<3
        down         — consecutive_failures>=3
        never_probed — no host_liveness row exists

      Counts are derived from a single SQL query — no joins to the
      hosts table beyond the existence check for soft-delete.

    related_specs:
      - api-fleet-observability
      - system-liveness-loop
      - system-rbac

  objective:
    summary: >
      One GET endpoint that returns five integer counts summing to
      the count of active (non-soft-deleted) hosts. Same auth model
      as the rest of /api/v1/fleet/* (system:read).
    scope:
      includes:
        - GET /api/v1/fleet/connectivity/breakdown
        - Derivation logic in internal/fleetrollup (extends existing
          service, no new package)
        - system:read RBAC
        - Typed response struct ConnectivityBreakdown in openapi.yaml
      excludes:
        - Per-state interval values (those are config, not breakdown
          counts — see api-system-connectivity)
        - Per-host detail (the existing GET /hosts/{id} liveness
          sub-object covers this)
        - Maintenance count (UI's "Maintenance" row stays unwired
          this slice; tracked in BACKLOG with per-host maintenance)

  constraints:
    - id: C-01
      description: The endpoint MUST be GET only. POST/PUT/DELETE return 405
      type: technical
      enforcement: error
    - id: C-02
      description: The endpoint MUST require system:read permission via auth.EnforcePermission. Anonymous AND authenticated-without-permission both return 403 authz.permission_denied
      type: security
      enforcement: error
    - id: C-03
      description: Counts MUST sum exactly to the count of active hosts (hosts.deleted_at IS NULL). The never_probed count fills any difference between active-hosts and (online+degraded+critical+down)
      type: technical
      enforcement: error
    - id: C-04
      description: Derivation logic MUST live in internal/fleetrollup/service.go as ConnectivityBreakdown(ctx) ([5-field struct], error). The handler MUST delegate without re-implementing SQL
      type: technical
      enforcement: error
    - id: C-05
      description: Response shape MUST be a typed struct in openapi.yaml (ConnectivityBreakdown) with int64 fields online, degraded, critical, down, never_probed. No map[string]any
      type: technical
      enforcement: error
    - id: C-06
      description: The breakdown SQL MUST execute in a single round-trip (one Query call). No per-state subqueries from the handler
      type: technical
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: GET /api/v1/fleet/connectivity/breakdown returns 200 with {online, degraded, critical, down, never_probed} as int64. Typed struct.
      priority: critical
      references_constraints: [C-05]
    - id: AC-02
      description: On a fleet with 5 hosts where 2 have host_liveness rows (one reachable consec=0, one unreachable consec=4) and 3 have no rows, the response is {online:1, degraded:0, critical:0, down:1, never_probed:3}.
      priority: critical
      references_constraints: [C-03]
    - id: AC-03
      description: On a fleet with one host whose host_liveness row has reachability_status='reachable' AND consecutive_failures=1, the response classifies that host as degraded (online:0, degraded:1, critical:0, down:0).
      priority: critical
      references_constraints: [C-03]
    - id: AC-04
      description: On a fleet with one host whose host_liveness row has reachability_status='unreachable' AND consecutive_failures=2, the response classifies that host as critical (online:0, degraded:0, critical:1, down:0).
      priority: critical
      references_constraints: [C-03]
    - id: AC-05
      description: On a fleet with one host whose host_liveness row has consecutive_failures=5, the response classifies that host as down (regardless of reachability_status — high failure count dominates).
      priority: critical
      references_constraints: [C-03]
    - id: AC-06
      description: On an empty fleet (zero hosts), the response is {online:0, degraded:0, critical:0, down:0, never_probed:0} — never an error.
      priority: high
    - id: AC-07
      description: Anonymous request returns 403 authz.permission_denied.
      priority: critical
      references_constraints: [C-02]
    - id: AC-08
      description: POST /api/v1/fleet/connectivity/breakdown returns 405 method_not_allowed.
      priority: high
      references_constraints: [C-01]
    - id: AC-09
      description: Source inspection — internal/server/fleet_handlers.go's GetFleetConnectivityBreakdown handler contains NO SQL (no SELECT/INSERT/UPDATE) and NO direct pool.Query/Exec calls. All data access goes through fleetrollup.Service.ConnectivityBreakdown.
      priority: critical
      references_constraints: [C-04]
    - id: AC-10
      description: Source inspection — internal/fleetrollup/service.go's ConnectivityBreakdown method issues exactly one pool.QueryRow call. No N+1 fan-out.
      priority: high
      references_constraints: [C-06]
