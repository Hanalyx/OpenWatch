spec:
  id: api-hosts
  title: Host inventory CRUD HTTP surface + Slice B enrichments
  version: "1.4.0"
  status: approved
  tier: 2

  context:
    system: openwatch-go
    feature: Admin endpoints for managing the host inventory
    description: >
      HTTP face of the host inventory service. Lists, creates, fetches,
      updates (PATCH), and soft-deletes host records. List supports
      environment + tag filters (single-tag for Slice A; multi-tag and
      cursor pagination land in Slice B). All endpoints require host:*
      permissions enforced by auth.EnforcePermission.
    related_specs:
      - system-host-inventory
      - system-rbac
      - api-credentials

  objective:
    summary: >
      One endpoint group for "what machines does the platform know about
      and how do we reach them." Hostname + IP + port + environment +
      tags = the minimum identity-and-routing surface. Scan history,
      connectivity probe results, and OS discovery are produced by other
      services and land here as joined reads in later slices.
    scope:
      includes:
        - GET / POST /hosts
        - GET / PATCH / DELETE /hosts/{id}
        - "Filters: ?environment=..., ?tag=..."
        - "GET /hosts/{id} response carries optional liveness sub-object (host_liveness LEFT JOIN) — v1.1.0"
        - "GET /hosts/{id} response carries compliance_summary sub-object (passing/failing/total derived from host_rule_state) — v1.1.0"
        - "GET /hosts response items carry optional liveness sub-object so the list view can render reachability + freshness without per-row follow-up calls — v1.3.0"
        - "GET /hosts + GET /hosts/{id} response items carry denormalized OS fields (os_family, os_version, architecture, platform_identifier, os_discovered_at) — populated by system-host-discovery v1.0.0, NULL pre-Discovery — v1.4.0"
      excludes:
        - "Bulk import — deferred to A.5"
        - "Connectivity-check trigger — needs scan executor, deferred"
        - "Cursor pagination + multi-tag — deferred"

  constraints:
    - id: C-01
      description: POST and PATCH MUST validate IP address syntax at the API boundary; net.ParseIP rejects malformed input
      type: security
      enforcement: error
    - id: C-02
      description: POST MUST require host:write; GET MUST require host:read; PATCH MUST require host:write; DELETE MUST require host:delete
      type: security
      enforcement: error
    - id: C-03
      description: DELETE is soft delete — sets deleted_at; subsequent GET returns 404; the row remains physically present (deleted_at IS NOT NULL)
      type: technical
      enforcement: error
    - id: C-04
      description: PATCH MUST NOT change hostname, created_by, created_at, or id (immutable in Slice A); only the patchable fields the UpdateParams struct exposes may be mutated
      type: technical
      enforcement: error
    - id: C-05
      description: GET /hosts/{id} response MUST include the host's liveness as either a populated sub-object (when host_liveness has a row) or null (when no probe has run yet); reachability values are constrained to the host_liveness CHECK enum (reachable/unreachable/unknown)
      type: technical
      enforcement: error
    - id: C-06
      description: GET /hosts/{id} response MUST include a compliance_summary sub-object with passing, failing, skipped, error, and total counts derived from host_rule_state. A host with no rule_state rows MUST receive zeros — never null and never an error
      type: technical
      enforcement: error
    - id: C-07
      description: GET /hosts/{id} MUST accept optional ?framework=<framework_id> (v1.2.0 addendum). When present, compliance_summary counts are derived ONLY from host_rule_state rows whose framework_refs JSONB contains the given framework_id key. The liveness sub-object is unaffected by ?framework= (liveness is OS-agnostic, not framework-scoped)
      type: technical
      enforcement: error
    - id: C-08
      description: ?framework= matching is exact-key lookup on the framework_refs JSONB, same semantics as api-fleet-observability C-08. No fuzzy matching, no case folding
      type: technical
      enforcement: error
    - id: C-09
      description: GET /hosts response items MUST include a liveness sub-object (when host_liveness has a row for the host) or null (when no probe has run yet). The shape matches the GET /hosts/{id} liveness sub-object exactly — same field names, same enum values. The list endpoint MUST load liveness via a single batched query keyed by host_id (no N+1)
      type: technical
      enforcement: error
    - id: C-10
      description: 'v1.4.0 — GET /hosts and GET /hosts/{id} response items MUST include 5 denormalized OS fields: os_family (string nullable), os_version (string nullable), architecture (string nullable), platform_identifier (string nullable), os_discovered_at (date-time nullable). Values come from hosts.os_* columns (populated by system-host-discovery PR 1.1 via migration 0017). Pre-Discovery hosts MUST receive NULL for all five fields — never empty strings, never errors'
      type: technical
      enforcement: error
    - id: C-11
      description: 'v1.4.0 — The list endpoint MUST read OS fields in the SAME query that selects the row (no follow-up query, no JOIN). The columns are denormalized onto hosts specifically so a single SELECT covers them; an N+1 fetch here would defeat the denormalization'
      type: performance
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: POST /hosts with admin caller and valid body (hostname, ip_address) returns 201 with the host JSON.
      priority: critical
      references_constraints: [C-02]
    - id: AC-02
      description: POST /hosts with a caller missing host:write returns 403 authz.permission_denied; no host is inserted.
      priority: critical
      references_constraints: [C-02]
    - id: AC-03
      description: POST /hosts with an empty hostname or malformed ip_address returns 400 hosts.invalid_input; no row inserted.
      priority: critical
      references_constraints: [C-01]
    - id: AC-04
      description: POST /hosts with a hostname that already exists in the same environment returns 409 hosts.duplicate.
      priority: critical
    - id: AC-05
      description: GET /hosts with host:read returns 200 with a JSON array of hosts; soft-deleted rows are excluded.
      priority: critical
      references_constraints: [C-02, C-03]
    - id: AC-06
      description: GET /hosts?environment=staging returns only hosts whose environment matches the filter exactly.
      priority: critical
    - id: AC-07
      description: GET /hosts?tag=critical returns only hosts whose tags array contains "critical".
      priority: critical
    - id: AC-08
      description: GET /hosts/{id} returns 200 with the host JSON for an active row; 404 hosts.not_found for unknown or soft-deleted ids.
      priority: critical
    - id: AC-09
      description: PATCH /hosts/{id} with valid fields returns 200 with the updated host; updated_at advances; immutable fields (hostname, created_by, created_at, id) are preserved per C-04.
      priority: critical
      references_constraints: [C-04]
    - id: AC-10
      description: PATCH /hosts/{id} with a malformed ip_address returns 400 hosts.invalid_input; no fields are mutated.
      priority: critical
      references_constraints: [C-01]
    - id: AC-11
      description: DELETE /hosts/{id} with host:delete returns 204; subsequent GET returns 404; the underlying row still exists (deleted_at IS NOT NULL).
      priority: critical
      references_constraints: [C-02, C-03]
    - id: AC-12
      description: DELETE /hosts/{id} with a caller missing host:delete returns 403; the row is NOT soft-deleted.
      priority: critical
      references_constraints: [C-02]
    - id: AC-13
      description: GET /hosts/{id} for a host that has a host_liveness row returns 200 with liveness.reachability_status equal to the stored value and liveness.last_probe_at populated.
      priority: critical
      references_constraints: [C-05]
    - id: AC-14
      description: GET /hosts/{id} for a host that has no host_liveness row returns 200 with liveness=null — never an error, never a synthesised default.
      priority: critical
      references_constraints: [C-05]
    - id: AC-15
      description: GET /hosts/{id} for a host with seeded host_rule_state rows returns 200 with compliance_summary populated with the correct passing, failing, skipped, error, and total counts.
      priority: critical
      references_constraints: [C-06]
    - id: AC-16
      description: GET /hosts/{id} for a host with no host_rule_state rows returns 200 with compliance_summary populated with all zero counts — never null and never an error.
      priority: critical
      references_constraints: [C-06]
    - id: AC-17
      description: GET /hosts/{id}?framework=cis_rhel9_v2.0.0 returns compliance_summary counts computed only from host_rule_state rows whose framework_refs contains "cis_rhel9_v2.0.0" as a top-level key. Rows mapped to other frameworks are excluded; the liveness sub-object is identical to the unfiltered response.
      priority: critical
      references_constraints: [C-07, C-08]
    - id: AC-18
      description: GET /hosts/{id}?framework=<framework_id> on a host whose rule_state rows do NOT reference that framework returns 200 with compliance_summary all zeros — never an error, never a 404.
      priority: high
      references_constraints: [C-07]
    - id: AC-19
      description: GET /hosts returns 200 with each host item carrying a populated liveness sub-object (when a host_liveness row exists) or null (when no probe has run). Field shape matches GET /hosts/{id}.liveness exactly. The handler MUST issue at most one liveness query for the whole list (batched WHERE host_id = ANY($1)) — never one query per host.
      priority: critical
      references_constraints: [C-09]
    - id: AC-20
      description: 'v1.4.0 — GET /hosts/{id} on a host whose hosts.os_family column is NULL (no Discovery has run yet) returns 200 with each of os_family, os_version, architecture, platform_identifier, os_discovered_at either null OR omitted entirely from the JSON. Either form is acceptable — both serialize to a Go *string == nil after decode'
      priority: critical
      references_constraints: [C-10]
    - id: AC-21
      description: 'v1.4.0 — GET /hosts/{id} on a host whose hosts.os_family = "rhel" (Discovery has populated it) returns 200 with the five OS fields populated to the column values. Verified by UPDATEing the hosts row directly and asserting the response carries the values'
      priority: critical
      references_constraints: [C-10]
    - id: AC-22
      description: 'v1.4.0 — GET /hosts returns each item with the same five OS fields (NULL pre-Discovery, populated post-Discovery). Source inspection: the list-query SELECT clause contains os_family, os_version, architecture, platform_identifier, os_discovered_at columns — no follow-up read, no JOIN to host_system_info'
      priority: critical
      references_constraints: [C-10, C-11]
