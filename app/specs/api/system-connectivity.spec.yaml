spec:
  id: api-system-connectivity
  title: System connectivity-monitor — config + status endpoints
  version: "1.0.0"
  status: approved
  tier: 2

  context:
    system: openwatch-go
    feature: HTTP surface for reading/writing the connectivity-monitor config and reading the live probe-loop status
    description: >
      Three endpoints under /api/v1/system/connectivity/:

        GET  /system/connectivity/config  (system:read)
        PUT  /system/connectivity/config  (system:write)
        GET  /system/connectivity/status  (system:read)

      Config endpoints wrap services-connectivity-config — GET returns
      {interval_sec, timeout_sec, unreachable_threshold, rate_limit,
      maintenance_global, defaults}; PUT validates the body and
      delegates to systemconfig.SetConnectivity, then signals the
      live liveness Service to Reload().

      Status endpoint exposes the in-process liveness.MetricsSnapshot
      (last_probe_at, probe_count, probe_success_count,
      probe_failure_count, state_transition_count) plus the
      maintenance_active flag — so the Settings → Scanning &
      monitoring page can show real "Last sweep" instead of a fake
      timestamp.

    related_specs:
      - services-connectivity-config
      - system-liveness-loop
      - system-rbac

  objective:
    summary: >
      Thin handlers — parse, validate, delegate. No SQL, no business
      logic. Typed response structs in openapi.yaml.
    scope:
      includes:
        - GET /api/v1/system/connectivity/config
        - PUT /api/v1/system/connectivity/config
        - GET /api/v1/system/connectivity/status
        - RBAC enforcement (system:read for GETs, system:write for PUT)
        - Typed openapi.yaml schemas (ConnectivityConfig,
          ConnectivityStatus)
        - PUT signals liveness Service to Reload() — handler holds a
          reference to the live service for the signal call
      excludes:
        - Per-state interval config (deferred — backend uses one global
          interval)
        - History endpoint (no config_history table; rely on audit log)
        - Trigger-probe endpoint (lives under /hosts/{id} — separate
          spec api-host-connectivity-check)
        - WebSocket / SSE streaming of status (poll-only)

  constraints:
    - id: C-01
      description: GET /system/connectivity/config MUST return the persisted config OR the baked-in defaults, plus a separate "defaults" sub-object so the UI can render a "reset to defaults" affordance without round-tripping
      type: technical
      enforcement: error
    - id: C-02
      description: PUT /system/connectivity/config MUST require system:write. Anonymous OR system:read-only callers get 403 authz.permission_denied
      type: security
      enforcement: error
    - id: C-03
      description: PUT body fields MUST be validated at the handler boundary — interval_sec 60..86400, timeout_sec 1..30, unreachable_threshold 1..10, rate_limit 1..200. Out-of-range values return 400 validation.range_exceeded with field name in detail
      type: technical
      enforcement: error
    - id: C-04
      description: A successful PUT MUST signal the live liveness Service to Reload(). The signal is best-effort — if the service has shut down, the PUT still returns 200 (the persisted state is what matters)
      type: technical
      enforcement: error
    - id: C-05
      description: GET /system/connectivity/status MUST return the in-process metrics snapshot from liveness.Metrics().Snapshot() PLUS the current maintenance_global from systemconfig. Both system:read-allowed
      type: technical
      enforcement: error
    - id: C-06
      description: Handlers MUST NOT contain SQL. All persistence flows through internal/systemconfig; live metrics come from internal/liveness/Service.Metrics()
      type: technical
      enforcement: error
    - id: C-07
      description: All response shapes MUST be typed structs in openapi.yaml — no map[string]any
      type: technical
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: GET /api/v1/system/connectivity/config on a fresh database returns 200 with config equal to the baked-in defaults AND defaults sub-object equal to the same values. Verified by integration test against freshAPIServer.
      priority: critical
      references_constraints: [C-01, C-07]
    - id: AC-02
      description: PUT /api/v1/system/connectivity/config with {interval_sec:600, timeout_sec:10, unreachable_threshold:3, rate_limit:25, maintenance_global:false} returns 200 with the saved snapshot; the subsequent GET returns the same values.
      priority: critical
      references_constraints: [C-03]
    - id: AC-03
      description: PUT with {interval_sec:10} returns 400 validation.range_exceeded with detail.field="interval_sec"; persisted state is unchanged.
      priority: critical
      references_constraints: [C-03]
    - id: AC-04
      description: PUT with {interval_sec:99999} returns 400 validation.range_exceeded with detail.field="interval_sec" (above the 86400 cap).
      priority: high
      references_constraints: [C-03]
    - id: AC-05
      description: PUT with {unreachable_threshold:0} returns 400 validation.range_exceeded with detail.field="unreachable_threshold".
      priority: high
      references_constraints: [C-03]
    - id: AC-06
      description: PUT as an authenticated viewer (system:read only) returns 403 authz.permission_denied. Persisted state unchanged.
      priority: critical
      references_constraints: [C-02]
    - id: AC-07
      description: PUT as anonymous (no session) returns 403 authz.permission_denied.
      priority: critical
      references_constraints: [C-02]
    - id: AC-08
      description: GET /api/v1/system/connectivity/status returns 200 with last_probe_at (RFC3339 timestamp OR null when probe loop hasn't ticked), probe_count, probe_success_count, probe_failure_count, state_transition_count, maintenance_active. Typed response struct.
      priority: critical
      references_constraints: [C-05, C-07]
    - id: AC-09
      description: GET /system/connectivity/status as anonymous returns 403 authz.permission_denied.
      priority: critical
      references_constraints: [C-02]
    - id: AC-10
      description: Source inspection — internal/server/systemconfig_handlers.go contains no SQL statements. All persistence calls go through internal/systemconfig; live metrics from internal/liveness/Service.
      priority: critical
      references_constraints: [C-06]
    - id: AC-11
      description: A successful PUT followed by an inspection of the liveness Service confirms the new IntervalSec is in effect — the service's internal interval value matches the PUT body. Tested via the Service.WithInterval seam exposed for testing (the handler calls Service.Reload which re-reads from systemconfig).
      priority: critical
      references_constraints: [C-04]
    - id: AC-12
      description: POST /api/v1/system/connectivity/config returns 405 method_not_allowed.
      priority: high
      references_constraints: [C-02]
