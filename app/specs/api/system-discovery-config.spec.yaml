spec:
  id: api-system-discovery-config
  title: OS discovery scheduler runtime config + manual sweep HTTP surface
  version: "1.0.0"
  status: approved
  tier: 1

  context:
    system: openwatch-go
    feature: Admin endpoints for the OS discovery scheduler — read/update config and trigger a one-off fleet sweep
    description: >
      The OS discovery scheduler reads four fields from system_config
      under KeyDiscovery ("discovery"): interval_sec (per-host cadence),
      rate_limit (per-tick enqueue cap), detect_on_first_contact (gates
      the host-create auto-enqueue), maintenance_global (kill-switch).

      This spec covers the HTTP surface for reading and updating that
      config — mirrors api-system-intelligence-config v1.0 verbatim —
      plus a one-off sweep endpoint operators use from the Settings UI
      "Run now" button.

      Boundaries (system-discovery-scheduler C-04, C-05):

        interval_sec  : 3600..604800  (1 h .. 7 d)
        rate_limit    : 1..500

      detect_on_first_contact has no bounds — it is a boolean policy.
      maintenance_global has no bounds — it is a boolean kill-switch.

      RBAC: GET requires system:read, PUT requires system:config:write,
      POST sweep requires system:config:write (same bar as the
      PUT — sweep dispatches the same workload the config governs).

      Sweep semantics: POST /api/v1/system/discovery/sweep enqueues
      host.discovery jobs for every host whose hosts.os_discovered_at is
      NULL, ignoring the per-host interval. Respects
      hosts.maintenance_mode and hosts.deleted_at. Returns the count of
      jobs enqueued so the UI can report "queued N discoveries."

      Out of scope: hot-reload signal to the in-process scheduler. The
      scheduler reads the config at the top of each tick and picks up
      new values on the next tick — no signal needed.

    related_specs:
      - system-discovery-scheduler
      - system-host-discovery
      - system-config
      - api-system-intelligence-config
      - system-audit-emission

  objective:
    summary: >
      Three endpoints under /api/v1/system/discovery — GET and PUT for
      the persisted scheduler config, POST sweep for the manual
      "discover everything now" affordance. Mirrors
      api-system-intelligence-config so operators see one consistent
      admin surface across both schedulers.
    scope:
      includes:
        - "GET /api/v1/system/discovery/config — returns active + defaults"
        - "PUT /api/v1/system/discovery/config — validates + persists"
        - "POST /api/v1/system/discovery/sweep — enqueues host.discovery for every NULL-os_discovered_at host"
        - "Audit emission via systemconfig.SetDiscovery (post-commit) and audit.HostDiscoverySweepRequested for sweep"
      excludes:
        - "Hot-reload signaling — scheduler picks up new values on next tick"
        - "Per-host overrides — interval_sec is fleet-wide"
        - "Status endpoint — scheduler exposes no in-process metrics that need read access here"

  constraints:
    - id: C-01
      description: 'GET response MUST wrap both the active config AND the baked-in defaults as a single object {config, defaults}. Same contract as api-system-intelligence-config C-01'
      type: technical
      enforcement: error
    - id: C-02
      description: 'GET MUST require system:read; PUT MUST require system:config:write; POST sweep MUST require system:config:write. Same RBAC bar as the PUT — sweep is the same authority class'
      type: security
      enforcement: error
    - id: C-03
      description: 'PUT MUST validate bounds at the handler boundary: interval_sec 3600..604800, rate_limit 1..500. Out-of-range MUST return 400 validation.range_exceeded with detail.field naming the offending key. Bounds match system-discovery-scheduler C-04 + C-05'
      type: technical
      enforcement: error
    - id: C-04
      description: 'PUT MUST persist via systemconfig.SetDiscovery which emits audit.SystemConfigChanged with both old + new snapshots in the same transaction. The audit emission is post-commit'
      type: technical
      enforcement: error
    - id: C-05
      description: 'A malformed JSON body MUST return 400 validation.field_required. An empty body MUST return 400 (the PUT requires the full config — partial updates are NOT supported in v1.0)'
      type: technical
      enforcement: error
    - id: C-06
      description: 'POST sweep MUST enqueue host.discovery jobs for every non-deleted host whose hosts.os_discovered_at IS NULL AND maintenance_mode = false. Hosts already discovered are NOT re-enqueued — the manual sweep is a "catch up" affordance, not a forced re-fingerprint'
      type: technical
      enforcement: error
    - id: C-07
      description: 'POST sweep response MUST include the count of jobs enqueued as {enqueued: N} so the UI can render an actionable confirmation. Zero is a valid response when no hosts are due'
      type: technical
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: 'GET /api/v1/system/discovery/config with system:read returns 200 with body {config:{interval_sec,rate_limit,detect_on_first_contact,maintenance_global}, defaults:{interval_sec:86400,rate_limit:25,detect_on_first_contact:true,maintenance_global:false}}. When no row exists in system_config the active config equals the defaults'
      priority: critical
      references_constraints: [C-01]
    - id: AC-02
      description: 'GET /api/v1/system/discovery/config with a caller missing system:read returns 403 authz.permission_denied'
      priority: critical
      references_constraints: [C-02]
    - id: AC-03
      description: 'PUT /api/v1/system/discovery/config with system:config:write and a valid body {interval_sec:43200,rate_limit:50,detect_on_first_contact:false,maintenance_global:false} returns 200 with the updated config. Subsequent GET reflects the new values'
      priority: critical
      references_constraints: [C-02, C-04]
    - id: AC-04
      description: 'PUT with a caller missing system:config:write returns 403 authz.permission_denied and the persisted config is unchanged'
      priority: critical
      references_constraints: [C-02]
    - id: AC-05
      description: 'PUT with interval_sec=600 (below the 3600 floor) returns 400 validation.range_exceeded with detail.field="interval_sec". PUT with interval_sec=700000 (above the 604800 ceiling) returns the same. Persisted state MUST NOT change in either case'
      priority: critical
      references_constraints: [C-03]
    - id: AC-06
      description: 'PUT with rate_limit=0 (below the 1 floor) returns 400 validation.range_exceeded with detail.field="rate_limit". PUT with rate_limit=600 (above the 500 ceiling) returns the same'
      priority: critical
      references_constraints: [C-03]
    - id: AC-07
      description: 'A successful PUT emits exactly one audit.SystemConfigChanged event whose detail.old_value reflects the prior persisted snapshot and detail.new_value reflects the just-saved snapshot'
      priority: critical
      references_constraints: [C-04]
    - id: AC-08
      description: 'POST /api/v1/system/discovery/sweep with system:config:write returns 200 {enqueued:N} where N is the count of host.discovery jobs enqueued. Hosts H1 (os_discovered_at NULL, maintenance off) → enqueued. H2 (os_discovered_at set) → skipped. H3 (maintenance_mode=true) → skipped. H4 (deleted_at NOT NULL) → skipped. Response reports N=1'
      priority: critical
      references_constraints: [C-06, C-07]
    - id: AC-09
      description: 'POST sweep with a caller missing system:config:write returns 403 authz.permission_denied and no jobs are enqueued'
      priority: critical
      references_constraints: [C-02]
    - id: AC-10
      description: 'POST sweep with zero due hosts (every host already has os_discovered_at set, all hosts in maintenance, or the fleet is empty) returns 200 {enqueued:0} — not 204 and not an error. Zero is a valid steady state'
      priority: high
      references_constraints: [C-07]
