spec:
  id: services-connectivity-config
  title: Connectivity-monitor runtime config — persistence + reload contract
  version: "1.0.0"
  status: approved
  tier: 2

  context:
    system: openwatch-go
    feature: Operator-tunable runtime config for the host liveness probe loop
    description: >
      Slice B's liveness service ships with hardcoded defaults
      (DefaultProbeInterval = 5m, DefaultProbeTimeout = 5s,
      DefaultUnreachableThreshold = 2). This spec lets operators tune
      those values at runtime — and pause the probe loop entirely via
      a maintenance flag — without rebuilding the binary.

      Persistence is a single-row-per-key system_config table (key
      TEXT PK, value JSONB, updated_at, updated_by). The
      ConnectivityConfig struct hydrates from a deterministic key
      namespace ("connectivity.*"). The liveness service reads the
      current config snapshot at boot AND on a Reload() call so a PUT
      can rotate the live cadence without restart.

      A `maintenance_global` flag, when true, makes
      listProbeTargets return empty — the loop still ticks but probes
      no hosts. Per-host maintenance is out of scope here (no
      hosts.maintenance_paused column ships in this slice; tracked in
      backlog).

    related_specs:
      - system-liveness-loop
      - system-config
      - system-audit-emission

  objective:
    summary: >
      A typed config struct + persistence layer + reload hook.
      Defaults match the liveness Default* constants for backward
      compatibility. PUT mutates persisted state, emits
      system.config.changed, and signals the liveness Service to
      pick up the new values on the next tick.
    scope:
      includes:
        - system_config table (key TEXT PK, value JSONB, updated_at,
          updated_by)
        - internal/systemconfig/ package — Get/Set + typed
          ConnectivityConfig load/save
        - liveness.Service consumes config (replaces hardcoded
          Default* on boot AND on Reload signal)
        - Audit on every Set (system.config.changed)
        - Default seed at first read (no migration data; defaults
          baked into Go code)
        - maintenance_global flag → listProbeTargets returns empty
      excludes:
        - Per-host maintenance flag (no hosts.maintenance_paused
          column; tracked in BACKLOG)
        - Per-state intervals (single global interval — UI's
          per-state Online/Degraded/Down intervals are visual; backend
          uses one cadence)
        - Quiet hours / jitter window / retry policy advanced fields
          (deferred)
        - Group-level maintenance (no groups entity)

  constraints:
    - id: C-01
      description: ConnectivityConfig MUST include fields IntervalSec (int, 60-86400), TimeoutSec (int, 1-30), UnreachableThreshold (int, 1-10), RateLimit (int, 1-200), MaintenanceGlobal (bool). Bounds enforced at the systemconfig.SetConnectivity boundary
      type: technical
      enforcement: error
    - id: C-02
      description: systemconfig.LoadConnectivity returns the persisted snapshot OR built-in defaults when no row exists. NEVER returns an error for "no config" — only for DB errors
      type: technical
      enforcement: error
    - id: C-03
      description: systemconfig.SetConnectivity MUST emit audit.SystemConfigChanged with detail {key, old_value, new_value, changed_by}. The old_value is the snapshot BEFORE the write, captured in the same transaction
      type: security
      enforcement: error
    - id: C-04
      description: liveness.NewService MUST accept the config snapshot at construction. The service MUST expose Reload(ctx) that re-reads from systemconfig and atomically swaps the active values. The next tick uses the new values
      type: technical
      enforcement: error
    - id: C-05
      description: When config.MaintenanceGlobal == true, liveness.listProbeTargets MUST return an empty slice. The tick still runs, the empty-slice case logs at info level with maintenance_active=true, and no host_liveness row is written
      type: technical
      enforcement: error
    - id: C-06
      description: Defaults MUST match the existing liveness Default* constants verbatim — IntervalSec=300, TimeoutSec=5, UnreachableThreshold=2, RateLimit=50, MaintenanceGlobal=false. Existing deployments see no behavior change until an operator writes new config
      type: technical
      enforcement: error
    - id: C-07
      description: Both systemconfig.LoadConnectivity and SetConnectivity MUST be safe for concurrent callers. Implementation uses pgx pool's transactional API; no in-process cache (the cache is the DB)
      type: technical
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: systemconfig.LoadConnectivity on a freshly-migrated database (no rows in system_config) returns the baked-in defaults — IntervalSec=300, TimeoutSec=5, UnreachableThreshold=2, RateLimit=50, MaintenanceGlobal=false.
      priority: critical
      references_constraints: [C-02, C-06]
    - id: AC-02
      description: systemconfig.SetConnectivity({IntervalSec:600,...}) followed by LoadConnectivity returns the saved snapshot — no further roundtrips, no stale-cache surprise.
      priority: critical
      references_constraints: [C-02]
    - id: AC-03
      description: SetConnectivity with IntervalSec=10 (below the 60s minimum) returns validation error config.invalid; the persisted state is unchanged.
      priority: critical
      references_constraints: [C-01]
    - id: AC-04
      description: SetConnectivity with UnreachableThreshold=0 returns validation error config.invalid (1-10 range).
      priority: high
      references_constraints: [C-01]
    - id: AC-05
      description: A successful SetConnectivity emits exactly one system.config.changed audit event with old_value, new_value, and changed_by populated. The old_value reflects the snapshot prior to the write.
      priority: critical
      references_constraints: [C-03]
    - id: AC-06
      description: liveness.NewService accepts a ConnectivityConfig snapshot at construction. After calling svc.Reload(ctx) with a new persisted config, the next tick uses the new IntervalSec for ticker reset, TimeoutSec for probe timeout, and UnreachableThreshold for hysteresis. Verified by source inspection of service.go.
      priority: critical
      references_constraints: [C-04]
    - id: AC-07
      description: With MaintenanceGlobal=true persisted, the next liveness tick calls listProbeTargets and receives an empty slice; no rows in host_liveness change; the tick logs "maintenance_active=true". Verified by a unit test that toggles the config and asserts the metrics.ProbeCount counter does not advance.
      priority: critical
      references_constraints: [C-05]
    - id: AC-08
      description: Source inspection — internal/liveness/service.go contains NO direct references to DefaultProbeInterval, DefaultProbeTimeout, or DefaultUnreachableThreshold in the Run / tick / ProbeHost code paths. All three are read from the Service's config snapshot.
      priority: critical
      references_constraints: [C-04, C-06]
    - id: AC-09
      description: Concurrent SetConnectivity from two goroutines completes without deadlock and leaves the persisted state equal to one of the two writers' inputs (last-writer-wins via UPSERT). No partial-row corruption.
      priority: high
      references_constraints: [C-07]
