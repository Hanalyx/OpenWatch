spec:
  id: system-job-queue
  title: PostgreSQL job queue with correlation propagation
  version: "1.0.0"
  status: approved
  tier: 1

  context:
    system: openwatch-go
    feature: Async job queue
    description: >
      A PostgreSQL-native job queue using the SELECT ... FOR UPDATE SKIP
      LOCKED pattern. Correlation propagation is built into the Enqueue
      and Dequeue helpers so Stage-2 callers cannot bypass the contract.
      Enqueue extracts correlation_id from the caller's context; Dequeue
      restores it onto a fresh worker context. Lint forbids raw INSERT
      INTO job_queue outside internal/queue/.
    related_specs:
      - system-correlation
      - system-audit-emission
      - system-db

  objective:
    summary: >
      Make async work obey the same correlation contract as synchronous
      work. A job picked up by a worker must carry the originating
      request's correlation_id; cron-triggered jobs carry a fresh
      cron- ID. Drift becomes impossible because the queue helpers are
      the only public API to insert or claim rows.
    scope:
      includes:
        - Enqueue/Dequeue helpers with correlation built in
        - SKIP LOCKED dequeue (multi-worker safe)
        - At-least-once delivery (with attempt count)
        - Cron tick that generates per-tick correlation IDs
      excludes:
        - Job retry/backoff strategies (deferred)
        - Distributed scheduler election (single-node Stage 0)

  constraints:
    - id: C-01
      description: Enqueue MUST extract correlation_id from ctx and return an error if none is set (programming-error guard)
      type: security
      enforcement: error
    - id: C-02
      description: Dequeue MUST return a fresh context with the row's correlation_id set; caller's ctx (which may carry the worker-loop's own ID) MUST NOT leak into per-job execution
      type: security
      enforcement: error
    - id: C-03
      description: The job_queue row MUST persist correlation_id alongside status, payload, attempts
      type: technical
      enforcement: error
    - id: C-04
      description: Dequeue MUST use SELECT ... FOR UPDATE SKIP LOCKED so concurrent workers do not double-claim
      type: technical
      enforcement: error
    - id: C-05
      description: Cron tick MUST generate a fresh cron- correlation_id per tick; jobs enqueued in one tick share that ID
      type: technical
      enforcement: error
    - id: C-06
      description: Forbidigo lint MUST reject raw "INSERT INTO job_queue" outside internal/queue/ and "http.DefaultClient" outside internal/httpclient/
      type: technical
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: Enqueue(ctx, jobType, payload) persists a job_queue row with status=pending, correlation_id from ctx, attempts=0, payload as JSONB.
      priority: critical
      references_constraints: [C-01, C-03]
    - id: AC-02
      description: Enqueue called with context.Background() (no correlation_id) returns ErrMissingCorrelation; no row written.
      priority: critical
      references_constraints: [C-01]
    - id: AC-03
      description: Dequeue claims one pending job atomically (SKIP LOCKED) and updates status to processing.
      priority: critical
      references_constraints: [C-04]
    - id: AC-04
      description: Dequeue returns a fresh context with the job's correlation_id; the caller's ctx is not used for derivation.
      priority: critical
      references_constraints: [C-02]
    - id: AC-05
      description: Two concurrent Dequeue calls against one pending row return one job and one "no row" — no double-claim.
      priority: critical
      references_constraints: [C-04]
    - id: AC-06
      description: Complete(ctx, jobID) marks a job as completed; subsequent Dequeue calls skip it.
      priority: high
    - id: AC-07
      description: Fail(ctx, jobID, err) marks a job as failed with the error message; subsequent Dequeue calls skip it.
      priority: high
    - id: AC-08
      description: job_queue schema includes id (UUID PK), job_type, payload (JSONB), correlation_id (NOT NULL), status, attempts, created_at, locked_at, completed_at, error.
      priority: critical
      references_constraints: [C-03]
    - id: AC-09
      description: Per-tick correlation_id from the cron scheduler has prefix "cron-" and is distinct across ticks.
      priority: high
      references_constraints: [C-05]
    - id: AC-10
      description: Enqueue p99 latency < 5ms against local DB (single INSERT).
      priority: medium
    - id: AC-11
      description: Lint forbids raw "INSERT INTO job_queue" outside internal/queue/ and "http.DefaultClient" outside internal/httpclient/.
      priority: high
      references_constraints: [C-06]
