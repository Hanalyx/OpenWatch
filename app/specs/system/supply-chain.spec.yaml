spec:
  id: system-supply-chain
  title: Supply-chain governance — module allowlist, vulnerability, SBOM
  version: "1.0.0"
  status: draft
  tier: 1

  context:
    system: openwatch-go
    feature: Third-party dependency allowlist + vulnerability + reproducibility gates
    description: >
      OpenWatch Go's third-party dependency surface is gated by an explicit
      allowlist in app/.golangci.yml's depguard linter — list-mode "strict"
      so any unlisted import fails the lint. govulncheck blocks merge on any
      reachable CVE (declared canonically in release-ci-gates). Dependabot
      raises PRs against the Go ecosystem so versions don't drift silently.
      CI runs every go command with -mod=readonly and asserts that
      `go mod tidy` is a no-op so neither builds nor lints can mutate
      go.mod or go.sum on the side. Release tags produce a CycloneDX 1.5
      SBOM artifact that downstream consumers can verify against this
      spec's allowlist.

  objective:
    summary: >
      Adding a new third-party module requires a deliberate, reviewable
      change to BOTH go.mod AND the depguard allowlist in the same PR.
      Drift cannot pass CI because depguard fails closed on unlisted
      imports, tidy fails on go.mod / go.sum drift, and govulncheck
      blocks on any reachable CVE. Release SBOMs document exactly what
      shipped.
    scope:
      includes:
        - depguard allowlist gating direct third-party imports
        - go.mod / go.sum drift detection in CI
        - GOFLAGS=-mod=readonly enforcement in CI build commands
        - Dependabot Go ecosystem coverage
        - CycloneDX 1.5+ SBOM artifact on every release tag
      excludes:
        - Vendoring (we do not commit vendor/)
        - Private module proxy (today public Go proxy is used)
        - Signed module verification beyond go.sum hashes
        - Allowlisting of transitive (indirect) modules — depguard sees
          only direct imports; indirect modules are pinned by go.sum

  constraints:
    - id: C-01
      description: app/.golangci.yml MUST enable depguard with list-mode "strict"; any third-party import not on the allow list fails the lint with a clear error message
      type: security
      enforcement: error
    - id: C-02
      description: Every third-party module directly imported by any .go file in app/ MUST have a matching allow entry in depguard. Transitive (indirect) deps are NOT required to be allowlisted — they appear in go.sum and are pinned, but depguard does not see them
      type: security
      enforcement: error
    - id: C-03
      description: CI lint, test, and build steps MUST run with GOFLAGS=-mod=readonly (or pass -mod=readonly explicitly) so go commands cannot silently mutate go.mod or go.sum
      type: security
      enforcement: error
    - id: C-04
      description: CI MUST run `go mod tidy` after checkout and fail on any resulting diff to go.mod or go.sum (drift detection); enforced via `git diff --exit-code go.mod go.sum`
      type: security
      enforcement: error
    - id: C-05
      description: .github/dependabot.yml MUST include at least one updates entry with package-ecosystem "gomod" pointing at /app so Go module updates get automatic PRs
      type: security
      enforcement: error
    - id: C-06
      description: The release workflow MUST produce a CycloneDX 1.5+ JSON SBOM artifact for every tagged release; produced by cyclonedx-gomod or equivalent and uploaded as a workflow artifact
      type: security
      enforcement: error
    - id: C-07
      description: govulncheck MUST gate every merge to main (cross-references release-ci-gates C-03). This spec records the dependency without duplicating the enforcement
      type: security
      enforcement: warning
    - id: C-08
      description: The depguard allow list MUST permit $gostd (Go standard library) and github.com/Hanalyx/openwatch (the internal module); without these, every file would fail
      type: technical
      enforcement: error

  # Process note (not a spec-enforced constraint): adding or upgrading a
  # third-party module MUST update both app/go.mod AND the depguard
  # allowlist in the same PR. The spec's version SHOULD be bumped (semver
  # minor) whenever the allowlist changes. Reviewers enforce this; CI
  # catches the structural side via AC-03 (every imported module is
  # allowlisted).

  acceptance_criteria:
    - id: AC-01
      description: app/.golangci.yml's enabled linters list includes "depguard" alongside the existing forbidigo entry; source-inspection on linters.enable verifies.
      priority: critical
      references_constraints: [C-01]
    - id: AC-02
      description: app/.golangci.yml contains a linters-settings.depguard block with rules.main.list-mode set to "strict"; source-inspection verifies.
      priority: critical
      references_constraints: [C-01]
    - id: AC-03
      description: For every distinct third-party import path appearing in any .go file under app/, a matching module prefix is present on the depguard allow list. The test extracts import strings from source, maps each to its module, asserts each module appears on the allowlist. No unlisted import passes.
      priority: critical
      references_constraints: [C-02]
    - id: AC-04
      description: A test fixture that imports an unlisted module (e.g., github.com/example/forbidden) causes `golangci-lint run` to exit non-zero with a depguard violation message naming the unlisted import.
      priority: critical
      references_constraints: [C-01, C-02]
    - id: AC-05
      description: .github/workflows/go-ci.yml's lint, test, and build steps either set GOFLAGS=-mod=readonly in the env block OR pass -mod=readonly as an explicit flag on every go command; source-inspection verifies.
      priority: critical
      references_constraints: [C-03]
    - id: AC-06
      description: .github/workflows/go-ci.yml has a step (or a step in another workflow that runs on every PR) that executes `go mod tidy` followed by `git diff --exit-code -- go.mod go.sum`; source-inspection verifies the step's presence.
      priority: critical
      references_constraints: [C-04]
    - id: AC-07
      description: .github/dependabot.yml contains at least one updates entry with package-ecosystem "gomod" and directory pointing at "/app"; source-inspection verifies.
      priority: critical
      references_constraints: [C-05]
    - id: AC-08
      description: .github/workflows/release.yml (or equivalent release workflow) has a step that runs cyclonedx-gomod (or syft) and uploads the resulting SBOM as a workflow artifact named appropriately for the release tag.
      priority: high
      references_constraints: [C-06]
    - id: AC-09
      description: A generated CycloneDX SBOM artifact validates against the published CycloneDX 1.5 JSON schema (https://cyclonedx.org/schema/bom-1.5.schema.json); end-to-end validation.
      priority: high
      references_constraints: [C-06]
    - id: AC-10
      description: depguard's allow list explicitly includes both "$gostd" and "github.com/Hanalyx/openwatch"; source-inspection verifies.
      priority: critical
      references_constraints: [C-08]
    - id: AC-11
      description: This spec cross-references release-ci-gates by mentioning system-release-ci-gates C-03 in its description; verifies the govulncheck dependency is non-orphan.
      priority: medium
      references_constraints: [C-07]
