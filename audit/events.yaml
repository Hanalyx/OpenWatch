# OpenWatch Audit Event Registry
#
# Source of truth for the audit taxonomy. Codegen produces:
#   - internal/audit/events.gen.go (typed Go constants)
#   - documentation rendered for /audit/events:taxonomy endpoint
#
# Build invariants enforced:
#   - Every event code matches ^[a-z][a-z0-9_]*(\.[a-z][a-z0-9_]*){1,2}$
#   - Every code references a defined category
#   - detail_schema (when present) is valid JSON Schema
#   - No duplicates between events and deprecated_events
#
# Naming rules: see app/docs/audit_event_taxonomy.md §4.1
# Adding a new code: see §4.2

version: 1

categories:
  - id: auth
    description: Authentication and session lifecycle
  - id: authz
    description: Authorization decisions and RBAC
  - id: host
    description: Host management and discovery
  - id: credential
    description: SSH credential lifecycle
  - id: scan
    description: Scan execution and lifecycle
  - id: compliance
    description: Compliance state, exceptions, baselines, drift
  - id: alert
    description: Alert generation and lifecycle
  - id: notification
    description: Notification dispatch and delivery
  - id: license
    description: License install, expiry, feature gating
  - id: policy
    description: Policy load, validation, application (Principle 2)
  - id: remediation
    description: Remediation requests and execution
  - id: integration
    description: External system integration (Jira, webhooks, plugins)
  - id: system
    description: Service lifecycle and configuration
  - id: scheduler
    description: Adaptive scheduler ticks, dispatch, policy enforcement (Slice B.1a)
  - id: admin
    description: Administrative operations
  - id: diagnostics
    description: Stage-0 diagnostic endpoints and worker

events:
  # =========================================================================
  # auth — authentication and session lifecycle
  # =========================================================================
  - code: auth.login.success
    severity: info
    description: User authenticated successfully
    actor_types: [user]
    detail_schema:
      type: object
      properties:
        auth_method: {type: string, enum: [password, sso_oidc, sso_saml, api_key]}
        mfa_used: {type: boolean}

  - code: auth.login.failure
    severity: warning
    description: Authentication attempt failed
    actor_types: [user]
    detail_schema:
      type: object
      properties:
        reason: {type: string, enum: [invalid_credentials, account_locked, mfa_required, mfa_failed, sso_failed]}
        auth_method: {type: string}

  - code: auth.logout
    severity: info
    description: User explicitly logged out
    actor_types: [user]

  - code: auth.token.issued
    severity: info
    description: Access or refresh token issued
    detail_schema:
      type: object
      properties:
        token_type: {type: string, enum: [access, refresh]}
        ttl_seconds: {type: integer}

  - code: auth.token.refreshed
    severity: info
    description: Refresh token used to issue new access token
    actor_types: [user, api_key]

  - code: auth.token.revoked
    severity: warning
    description: Token added to revocation blacklist
    actor_types: [user, system]
    detail_schema:
      type: object
      properties:
        reason: {type: string, enum: [user_logout, admin_revoke, suspicious_activity, token_rotation, session_expiry]}

  - code: auth.mfa.enrolled
    severity: info
    description: User completed MFA enrollment
    detail_schema:
      type: object
      properties:
        method: {type: string, enum: [totp, fido2]}

  - code: auth.mfa.validated
    severity: info
    description: MFA challenge passed during login

  - code: auth.mfa.failed
    severity: warning
    description: MFA challenge failed

  - code: auth.mfa.disabled
    severity: warning
    description: User disabled MFA on their account

  - code: auth.session.created
    severity: info
    description: New session opened

  - code: auth.session.expired
    severity: info
    description: Session timed out (idle or absolute)
    detail_schema:
      type: object
      properties:
        reason: {type: string, enum: [idle_timeout, absolute_timeout]}

  - code: auth.session.revoked
    severity: info
    description: Session revoked (explicit logout or admin action)

  - code: auth.password.changed
    severity: info
    description: User's password was successfully updated

  - code: auth.password.policy_failed
    severity: warning
    description: Password change rejected by the NIST 800-63B policy validator

  - code: auth.api_key.created
    severity: info
    description: API key issued

  - code: auth.api_key.revoked
    severity: warning
    description: API key invalidated

  - code: auth.policy.updated
    severity: warning
    description: Workspace authentication policy changed (require-MFA, session timeouts)

  # =========================================================================
  # authz — RBAC and authorization
  # =========================================================================
  - code: authz.permission.denied
    severity: warning
    description: RBAC denied an authenticated request
    detail_schema:
      type: object
      properties:
        required_permission: {type: string}
        route: {type: string}

  - code: authz.role.assigned
    severity: warning
    description: Role assigned to user

  - code: authz.role.removed
    severity: warning
    description: Role removed from user

  # =========================================================================
  # host — host management and discovery
  # =========================================================================
  - code: host.created
    severity: info

  - code: host.updated
    severity: info

  - code: host.deleted
    severity: warning

  - code: host.connectivity.checked
    severity: info
    detail_schema:
      type: object
      properties:
        ping_success: {type: boolean}
        ssh_accessible: {type: boolean}
        response_time_ms: {type: integer}

  - code: host.platform.detected
    severity: info
    detail_schema:
      type: object
      properties:
        os_family: {type: string}
        os_version: {type: string}
        platform_identifier: {type: string}

  - code: host.discovery.completed
    severity: info
    description: Host OS fingerprint Discovery run finished successfully; carries the captured facts as detail
    detail_schema:
      type: object
      properties:
        os_family: {type: string}
        os_version: {type: string}
        kernel_release: {type: string}
        architecture: {type: string}
        discovered_at: {type: string, format: date-time}

  - code: host.intelligence.refreshed
    severity: info

  # =========================================================================
  # OS Intelligence taxonomy — recurring snapshot diff events.
  # Spec: app/specs/system/os-intelligence.spec.yaml.
  # =========================================================================
  - code: account.user.locked
    severity: warning
    description: User account lock detected via passwd/shadow comparison
    detail_schema:
      type: object
      properties:
        user: {type: string}
  - code: account.user.unlocked
    severity: info
    description: User account unlock detected via passwd/shadow comparison
    detail_schema:
      type: object
      properties:
        user: {type: string}
  - code: account.user.created
    severity: warning
    description: New user account appeared in /etc/passwd since prior snapshot
    detail_schema:
      type: object
      properties:
        user: {type: string}
        uid: {type: integer}
  - code: account.user.deleted
    severity: warning
    description: User account removed from /etc/passwd since prior snapshot
    detail_schema:
      type: object
      properties:
        user: {type: string}
  - code: account.user.privileged_group_added
    severity: critical
    description: User added to wheel/sudo/admin group since prior snapshot
    detail_schema:
      type: object
      properties:
        user:  {type: string}
        group: {type: string}
  - code: account.password.expired
    severity: warning
    description: Password expiry crossed since prior snapshot
    detail_schema:
      type: object
      properties:
        user: {type: string}
  - code: account.password.expiring
    severity: info
    description: Password expiry within warning window
    detail_schema:
      type: object
      properties:
        user: {type: string}
        days_remaining: {type: integer}
  - code: account.ssh_key.added
    severity: warning
    description: New authorized_keys entry detected for a user
    detail_schema:
      type: object
      properties:
        user:        {type: string}
        fingerprint: {type: string}
  - code: account.ssh_key.removed
    severity: info
    description: authorized_keys entry removed for a user
    detail_schema:
      type: object
      properties:
        user:        {type: string}
        fingerprint: {type: string}
  - code: account.sudo.failure_threshold
    severity: warning
    description: Sudo failure count crossed the per-cycle threshold
    detail_schema:
      type: object
      properties:
        user:  {type: string}
        count: {type: integer}

  - code: security.login.new_source_ip
    severity: warning
    description: Known user logged in from previously-unseen source IP
    detail_schema:
      type: object
      properties:
        user:      {type: string}
        source_ip: {type: string}
  - code: security.login.failed_threshold
    severity: warning
    description: Failed login count crossed the per-cycle threshold
    detail_schema:
      type: object
      properties:
        user:  {type: string}
        count: {type: integer}
  - code: security.selinux.denied
    severity: warning
    description: SELinux denial entry observed in audit log since prior cycle
    detail_schema:
      type: object
      properties:
        denial: {type: string}
  - code: security.apparmor.denied
    severity: warning
    description: AppArmor denial entry observed in audit log since prior cycle
    detail_schema:
      type: object
      properties:
        denial: {type: string}
  - code: security.firewall.rule_changed
    severity: error
    description: Firewall ruleset hash changed since prior cycle
    detail_schema:
      type: object
      properties:
        prior_hash:   {type: string}
        current_hash: {type: string}
  - code: security.port.opened
    severity: error
    description: New listening port observed
    detail_schema:
      type: object
      properties:
        port:     {type: integer}
        protocol: {type: string}

  - code: system.package.installed
    severity: info
    description: Newly installed package observed
    detail_schema:
      type: object
      properties:
        name:    {type: string}
        version: {type: string}
  - code: system.package.updated
    severity: info
    description: Package upgraded to a new version
    detail_schema:
      type: object
      properties:
        name:    {type: string}
        prior:   {type: string}
        current: {type: string}
  - code: system.package.removed
    severity: warning
    description: Previously-installed package no longer present
    detail_schema:
      type: object
      properties:
        name: {type: string}
  - code: system.kernel.updated
    severity: warning
    description: New kernel installed; reboot likely pending
    detail_schema:
      type: object
      properties:
        prior:   {type: string}
        current: {type: string}
  - code: system.reboot.required
    severity: warning
    description: Host indicates a reboot is required (vendor marker file present)
  - code: system.reboot.completed
    severity: info
    description: Host uptime fell below the prior cycle's value — reboot completed
  - code: system.config.file_changed
    severity: error
    description: Critical host config file content hash changed (e.g. /etc/sudoers)
    detail_schema:
      type: object
      properties:
        path:         {type: string}
        prior_hash:   {type: string}
        current_hash: {type: string}
  - code: system.service.started
    severity: info
    description: Systemd unit transitioned to active
    detail_schema:
      type: object
      properties:
        unit: {type: string}
  - code: system.service.stopped
    severity: info
    description: Systemd unit transitioned to inactive
    detail_schema:
      type: object
      properties:
        unit: {type: string}
  - code: system.service.failed
    severity: error
    description: Systemd unit transitioned to failed
    detail_schema:
      type: object
      properties:
        unit: {type: string}
  - code: system.filesystem.mounted
    severity: info
    description: Mountpoint that did not exist in prior cycle is now mounted
    detail_schema:
      type: object
      properties:
        mountpoint: {type: string}
        source:     {type: string}
  - code: system.filesystem.unmounted
    severity: warning
    description: Previously-mounted mountpoint is no longer mounted
    detail_schema:
      type: object
      properties:
        mountpoint: {type: string}

  - code: host.bulk_imported
    severity: info
    detail_schema:
      type: object
      properties:
        total_processed: {type: integer}
        successful: {type: integer}
        failed: {type: integer}

  # =========================================================================
  # credential — SSH credential lifecycle
  # =========================================================================
  - code: credential.created
    severity: info
    detail_schema:
      type: object
      properties:
        credential_id: {type: string}
        scope: {type: string, enum: [system, host]}
        auth_method: {type: string, enum: [ssh_key, password, both]}

  - code: credential.updated
    severity: info
    detail_schema:
      type: object
      properties:
        credential_id: {type: string}
        scope: {type: string, enum: [system, host]}
        auth_method: {type: string, enum: [ssh_key, password, both]}
        secret_rotated: {type: boolean}

  - code: credential.deleted
    severity: warning
    detail_schema:
      type: object
      properties:
        credential_id: {type: string}

  # =========================================================================
  # scan — scan execution and lifecycle
  # =========================================================================
  - code: scan.queued
    severity: info
    detail_schema:
      type: object
      properties:
        framework: {type: string}
        template_id: {type: [string, 'null']}

  - code: scan.started
    severity: info

  - code: scan.completed
    severity: info
    detail_schema:
      type: object
      properties:
        compliance_score: {type: number}
        passed: {type: integer}
        failed: {type: integer}
        skipped: {type: integer}

  - code: scan.failed
    severity: error
    detail_schema:
      type: object
      properties:
        error_code: {type: string}
        error_message: {type: string}

  - code: scan.cancelled
    severity: warning
    detail_schema:
      type: object
      properties:
        cancellation_reason: {type: string}

  - code: scan.session.created
    severity: info
    detail_schema:
      type: object
      properties:
        total_hosts: {type: integer}

  - code: scan.session.cancelled
    severity: warning

  - code: scan.template.created
    severity: info

  - code: scan.template.updated
    severity: info

  - code: scan.template.deleted
    severity: warning

  # =========================================================================
  # compliance — state, exceptions, baselines, drift
  # =========================================================================
  - code: compliance.state.changed
    severity: info
    description: Rule state transition (write-on-change pattern)
    detail_schema:
      type: object
      properties:
        rule_id: {type: string}
        previous_status: {type: string, enum: [pass, fail, skip, error]}
        new_status: {type: string, enum: [pass, fail, skip, error]}

  - code: finding.persisted
    severity: info
    actor_types: [system]
    description: A single rule finding was persisted to the transaction log (one per transactions row insert). Spec system-transaction-log-writer AC-09.
    detail_schema:
      type: object
      properties:
        host_id: {type: string}
        rule_id: {type: string}
        scan_id: {type: string}
        change_kind: {type: string, enum: [first_seen, state_changed, severity_changed]}
        status: {type: string, enum: [pass, fail, skipped, error]}
        prior_status: {type: string, enum: [pass, fail, skipped, error, none]}

  - code: writer.apply.failed
    severity: error
    actor_types: [system]
    description: writer.Apply rolled back the entire batch due to a DB error (FK violation, deadlock, oversize evidence). Spec system-transaction-log-writer AC-15.
    detail_schema:
      type: object
      properties:
        scan_id: {type: string}
        host_id: {type: string}
        reason: {type: string, enum: [fk_violation, deadlock, evidence_oversize, sqlc_error, unknown]}
        rule_count_attempted: {type: integer}
        offending_rule_id: {type: string}

  - code: compliance.exception.requested
    severity: info

  - code: compliance.exception.approved
    severity: warning

  - code: compliance.exception.rejected
    severity: info

  - code: compliance.exception.revoked
    severity: warning

  - code: compliance.exception.expired
    severity: info

  - code: compliance.baseline.established
    severity: info

  - code: compliance.baseline.cleared
    severity: warning

  - code: compliance.drift.detected
    severity: warning
    detail_schema:
      type: object
      properties:
        drift_type: {type: string, enum: [major, minor, improvement]}
        score_delta: {type: number}

  - code: compliance.snapshot.created
    severity: info

  # =========================================================================
  # alert — alert lifecycle
  # =========================================================================
  - code: alert.created
    severity: info
    detail_schema:
      type: object
      properties:
        alert_type: {type: string}
        alert_severity: {type: string}

  - code: alert.acknowledged
    severity: info

  - code: alert.silenced
    severity: info
    description: Operator silenced an alert (active -> silenced)
    detail_schema:
      type: object
      properties:
        prior_state:    {type: string}
        until:          {type: [string, 'null'], format: date-time}
        reason:         {type: string}

  - code: alert.unsilenced.auto
    severity: info
    description: Lifecycle sweep re-armed a silenced alert whose silenced_until elapsed
    detail_schema:
      type: object
      properties:
        silenced_until: {type: string, format: date-time}

  - code: alert.resolved
    severity: info

  - code: alert.dismissed
    severity: warning
    description: Operator marked an alert as irrelevant (terminal state)
    detail_schema:
      type: object
      properties:
        prior_state: {type: string}
        reason:      {type: string}

  - code: alert.threshold.changed
    severity: warning

  # =========================================================================
  # notification — channel dispatch
  # =========================================================================
  - code: notification.dispatched
    severity: info
    detail_schema:
      type: object
      properties:
        channel_type: {type: string, enum: [slack, email, webhook, jira, pagerduty]}
        delivery_id: {type: string}

  - code: notification.delivery.failed
    severity: error

  - code: notification.delivery.succeeded
    severity: info

  - code: notification.channel.created
    severity: info

  - code: notification.channel.updated
    severity: info

  - code: notification.channel.deleted
    severity: warning

  # =========================================================================
  # license — install, expiry, feature gating, quotas
  # =========================================================================
  - code: license.installed
    severity: info

  - code: license.invalid
    severity: error

  - code: license.expiring_soon
    severity: warning

  - code: license.expired
    severity: error

  - code: license.feature_check_denied
    severity: warning
    detail_schema:
      type: object
      properties:
        feature: {type: string}
        suppressed_count: {type: integer, description: Events deduped within 1-min window}

  - code: license.quota_exceeded
    severity: warning
    detail_schema:
      type: object
      properties:
        quota: {type: string}
        limit: {type: integer}
        current: {type: integer}

  - code: license.clock_rollback_detected
    severity: critical

  - code: license.tampered
    severity: critical

  # =========================================================================
  # policy — domain logic as data (agent-first Principle 2)
  # =========================================================================
  - code: policy.loaded
    severity: info
    detail_schema:
      type: object
      properties:
        policy_type: {type: string}
        policy_version: {type: string}

  - code: policy.invalid
    severity: error

  - code: policy.applied
    severity: info
    description: Operation evaluated against a versioned policy
    detail_schema:
      type: object
      properties:
        policy_type: {type: string}
        policy_version: {type: string}
        decision: {type: string, enum: [allow, deny, defer]}

  # =========================================================================
  # remediation — license-gated
  # =========================================================================
  - code: remediation.requested
    severity: info

  - code: remediation.approved
    severity: warning

  - code: remediation.executed
    severity: warning
    detail_schema:
      type: object
      properties:
        dry_run: {type: boolean}
        steps_succeeded: {type: integer}
        steps_failed: {type: integer}

  - code: remediation.rolled_back
    severity: warning

  # =========================================================================
  # integration — external systems
  # =========================================================================
  - code: integration.webhook.delivered
    severity: info

  - code: integration.webhook.failed
    severity: error

  - code: integration.webhook.subscribed
    severity: info
    description: External subscriber registered for event delivery
    detail_schema:
      type: object
      properties:
        event_types: {type: array, items: {type: string}}
        target_url: {type: string}

  - code: integration.webhook.unsubscribed
    severity: warning
    description: Webhook subscription deleted; no further deliveries

  - code: integration.plugin.installed
    severity: info

  - code: integration.plugin.executed
    severity: info

  # =========================================================================
  # system — service lifecycle and configuration
  # =========================================================================
  - code: system.startup
    severity: info
    actor_types: [system]
    description: Service has booted and is accepting requests

  - code: system.shutdown
    severity: info
    actor_types: [system]

  - code: system.config.changed
    severity: warning
    actor_types: [user, system]
    description: An operator-tunable runtime config value was updated via the system_config table
    detail_schema:
      type: object
      properties:
        config_key: {type: string}
        old_value: {type: object}
        new_value: {type: object}
        changed_by: {type: string}

  - code: system.intelligence.sudo_password_used
    severity: warning
    actor_types: [system]
    description: |
      Emitted exactly once per host per cycle when the SSH dial layer used
      the credential's stored password as the sudo password (sudo -S fallback)
      because the host did not honor sudo -n NOPASSWD for one or more probe
      commands. Gated on system_config.security.allow_credential_sudo_password.
      Spec: system-ssh-connectivity v1.1.0 C-09..C-12 + AC-16.
    detail_schema:
      type: object
      required: [credential_id, host_id, command_count]
      properties:
        credential_id: {type: string, format: uuid}
        host_id:       {type: string, format: uuid}
        command_count: {type: integer, minimum: 1}

  - code: system.migration.applied
    severity: info
    detail_schema:
      type: object
      properties:
        migration_id: {type: string}

  - code: system.health.degraded
    severity: error
    detail_schema:
      type: object
      properties:
        component: {type: string}
        reason: {type: string}

  - code: system.health.recovered
    severity: info

  # =========================================================================
  # scheduler — adaptive scheduler ticks, dispatch, policy enforcement
  # =========================================================================
  - code: scheduler.startup.failed
    severity: error
    actor_types: [system]
    description: Scheduler refused to start because the schedules policy was missing or failed Ed25519 verification
    detail_schema:
      type: object
      properties:
        reason: {type: string, enum: [policy_missing, signature_invalid, revoked_key, parse_error]}
        policy_path: {type: string}

  - code: scheduler.schedule.updated
    severity: info
    actor_types: [system, user]
    description: A row in host_compliance_schedule was updated (next_scheduled_scan, maintenance_mode, or manual override)
    detail_schema:
      type: object
      properties:
        host_id: {type: string}
        change_kind: {type: string, enum: [next_scan_advanced, maintenance_set, maintenance_cleared, post_scan_update, manual_override]}
        prior:
          type: object
        new:
          type: object

  - code: scheduler.policy.reload.rejected
    severity: error
    actor_types: [system]
    description: Runtime policy reload was rejected; the previous valid policy remains active
    detail_schema:
      type: object
      properties:
        reason: {type: string, enum: [signature_invalid, revoked_key, parse_error, version_regression]}
        policy_version_attempted: {type: string}
        policy_version_active: {type: string}

  - code: scheduler.policy.clamped
    severity: warning
    actor_types: [system]
    description: A tier interval in the schedules policy was clamped to the safety floor (5 min) or ceiling (48 h)
    detail_schema:
      type: object
      properties:
        tier: {type: string}
        original_minutes: {type: integer}
        clamped_minutes: {type: integer}
        clamp_kind: {type: string, enum: [min_floor, max_ceiling]}

  - code: scheduler.policy.revoked_key.rejected
    severity: error
    actor_types: [system]
    description: A schedules policy was signed by a previously-rotated (revoked) signing key and rejected even though the Ed25519 signature was mathematically valid
    detail_schema:
      type: object
      properties:
        key_fingerprint: {type: string}
        policy_version: {type: string}

  - code: scheduler.job.hmac_rejected
    severity: error
    actor_types: [system]
    description: A dequeued scan job failed HMAC verification; the job payload was tampered after enqueue
    detail_schema:
      type: object
      properties:
        job_id: {type: string}
        host_id: {type: string}
        failure: {type: string, enum: [hmac_mismatch, payload_missing_hmac]}

  - code: scheduler.tick.dispatched
    severity: info
    actor_types: [system]
    description: Scheduler tick dispatched zero or more scan jobs to the queue
    detail_schema:
      type: object
      properties:
        due_count: {type: integer}
        dispatched_count: {type: integer}
        skipped_maintenance_count: {type: integer}
        skipped_backoff_count: {type: integer}

  - code: worker.loop.tick
    severity: info
    actor_types: [system]
    description: Periodic heartbeat from openwatch worker — at 55..65s intervals (60s nominal with jitter)
    detail_schema:
      type: object
      properties:
        idle_count: {type: integer}
        claimed_count: {type: integer}
        in_flight_count: {type: integer}
        completed_since_last_tick: {type: integer}

  # =========================================================================
  # admin — high-privilege operations
  # =========================================================================
  - code: admin.user.created
    severity: warning

  - code: admin.user.updated
    severity: warning

  - code: admin.user.deleted
    severity: warning

  - code: admin.role.changed
    severity: warning

  - code: admin.system_setting.changed
    severity: warning

  - code: admin.retention_policy.changed
    severity: warning

  - code: admin.sso_provider.created
    severity: warning

  - code: admin.sso_provider.updated
    severity: warning
    description: SSO provider config changed (enable/disable, secret rotation, metadata refresh)
    detail_schema:
      type: object
      properties:
        provider_type: {type: string, enum: [oidc, saml]}
        fields_changed: {type: array, items: {type: string}}

  - code: admin.sso_provider.deleted
    severity: warning

  # =========================================================================
  # diagnostics — Stage 0 demo endpoints and worker
  # =========================================================================
  - code: diagnostics.test_job_completed
    severity: info
    description: Worker drained a diagnostics.test_job and emitted this completion event
    actor_types: [system]

# Deprecated codes retained for read compatibility on historical data.
# Never emit these from new code. Build fails if any source emits a deprecated code.
deprecated_events: []
