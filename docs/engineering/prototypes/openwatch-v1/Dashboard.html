<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dashboard — openwatch</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-0: #0b0c0f; --bg-1: #111317; --bg-2: #161a20; --bg-3: #1c2129;
    --line: #232831; --line-2: #2c323d;
    --fg-0: #f3f5f8; --fg-1: #cfd4dd; --fg-2: #8a93a3; --fg-3: #5b6473;
    --crit: oklch(64% 0.20 25); --crit-bg: oklch(35% 0.12 25 / 0.18);
    --warn: oklch(78% 0.15 75); --warn-bg: oklch(50% 0.12 75 / 0.16);
    --ok: oklch(72% 0.16 155); --ok-bg: oklch(45% 0.10 155 / 0.18);
    --info: oklch(70% 0.13 245); --info-bg: oklch(45% 0.12 245 / 0.18);
    --radius: 8px; --radius-sm: 6px;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg-0); color: var(--fg-0); font-family: 'Inter', system-ui, sans-serif; font-size: 14px; line-height: 1.45; -webkit-font-smoothing: antialiased; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: "calt" 0; }
  a { color: inherit; text-decoration: none; }

  .app { display: grid; grid-template-columns: 56px 1fr; min-height: 100vh; }
  .sidebar { background: var(--bg-1); border-right: 1px solid var(--line); display: flex; flex-direction: column; align-items: center; padding: 14px 0; gap: 4px; position: sticky; top: 0; height: 100vh; }
  .logo { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, oklch(70% 0.13 245), oklch(60% 0.20 290)); display: grid; place-items: center; font-weight: 700; color: white; margin-bottom: 12px; }
  .nav-btn { width: 40px; height: 40px; display: grid; place-items: center; border-radius: 8px; color: var(--fg-2); cursor: pointer; transition: 120ms; background: transparent; border: 0; }
  .nav-btn:hover { background: var(--bg-2); color: var(--fg-0); }
  .nav-btn.active { background: var(--bg-3); color: var(--fg-0); box-shadow: inset 2px 0 0 var(--info); }
  .nav-spacer { flex: 1; }

  .topbar { position: sticky; top: 0; z-index: 30; background: color-mix(in oklab, var(--bg-0) 92%, transparent); backdrop-filter: blur(8px); border-bottom: 1px solid var(--line); }
  .topbar-row { display: flex; align-items: center; padding: 14px 28px; gap: 16px; }
  .crumbs { color: var(--fg-2); font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .crumbs .sep { color: var(--fg-3); }
  .topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .avatar { width: 30px; height: 30px; background: var(--info); color: #0a1424; border-radius: 50%; display: grid; place-items: center; font-weight: 600; font-size: 13px; }
  .icon-btn { width: 34px; height: 34px; border-radius: 6px; color: var(--fg-2); cursor: pointer; background: var(--bg-1); border: 1px solid var(--line); display: inline-grid; place-items: center; transition: 120ms; }
  .icon-btn:hover { background: var(--bg-2); color: var(--fg-0); }

  .btn { height: 34px; border-radius: var(--radius-sm); border: 1px solid var(--line); background: var(--bg-1); color: var(--fg-0); font-family: inherit; font-weight: 500; font-size: 13px; padding: 0 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: 120ms; }
  .btn:hover { background: var(--bg-2); border-color: var(--line-2); }
  .btn.primary { background: var(--info); border-color: var(--info); color: #0a1424; font-weight: 600; }
  .btn.sm { height: 28px; font-size: 12px; padding: 0 10px; }

  /* Avatar dropdown */
  .user-menu { position: relative; }
  .avatar-btn { border: 0; cursor: pointer; font-family: inherit; padding: 0; }
  .avatar-menu { position: absolute; right: 0; top: calc(100% + 10px); width: 244px; background: var(--bg-1); border: 1px solid var(--line); border-radius: 10px; box-shadow: 0 16px 40px rgba(0,0,0,0.45); padding: 6px; z-index: 60; }
  .avatar-menu[hidden] { display: none; }
  .am-head { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid var(--line); margin-bottom: 6px; }
  .am-head .avatar { width: 36px; height: 36px; }
  .am-name { font-weight: 600; font-size: 13px; }
  .am-email { color: var(--fg-2); font-size: 12px; }
  .am-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 6px; color: var(--fg-1); font-size: 13px; cursor: pointer; }
  .am-item:hover { background: var(--bg-2); color: var(--fg-0); }
  .am-item svg { color: var(--fg-2); }
  .am-item.danger { color: var(--crit); }
  .am-item.danger:hover { background: var(--crit-bg); }
  .am-div { height: 1px; background: var(--line); margin: 6px 4px; }

  /* Dashboard toolbar */
  .dash-head { padding: 20px 28px 6px; display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
  .dash-head h1 { margin: 0; font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
  .dash-head .greet { color: var(--fg-2); font-size: 13px; margin-top: 2px; }
  .dash-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .role-seg, .seg { display: inline-flex; background: var(--bg-1); border: 1px solid var(--line); border-radius: 8px; padding: 3px; gap: 2px; }
  .role-seg button, .seg button { border: 0; background: transparent; color: var(--fg-2); font-family: inherit; font-size: 12px; font-weight: 500; padding: 6px 12px; border-radius: 6px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
  .role-seg button.active, .seg button.active { background: var(--bg-3); color: var(--fg-0); }
  .role-seg button.active svg { color: var(--info); }

  .edit-banner { margin: 12px 28px 0; padding: 10px 16px; background: var(--info-bg); border: 1px solid color-mix(in oklab, var(--info) 30%, var(--line)); border-radius: 8px; display: none; align-items: center; gap: 12px; font-size: 13px; color: var(--fg-1); }
  .edit-banner.show { display: flex; }
  .edit-banner svg { color: var(--info); }

  /* Grid */
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; padding: 16px 28px 60px; align-items: stretch; }
  .widget { background: var(--bg-1); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; grid-column: span 1; display: flex; flex-direction: column; height: 100%; }
  .widget.w2 { grid-column: span 2; }
  .widget.w4 { grid-column: span 4; }
  .w-head { display: flex; align-items: center; gap: 8px; padding: 12px 14px 10px; }
  .w-head .w-title { font-size: 12px; font-weight: 600; color: var(--fg-2); text-transform: uppercase; letter-spacing: 0.05em; flex: 1; }
  .w-head .w-link { color: var(--fg-3); width: 24px; height: 24px; display: grid; place-items: center; border-radius: 5px; }
  .w-head .w-link:hover { background: var(--bg-2); color: var(--fg-0); }
  .w-body { padding: 0 14px 14px; flex: 1; }

  /* Edit-mode controls */
  .w-ctl { display: none; align-items: center; gap: 2px; }
  .grid.editing .w-ctl { display: inline-flex; }
  .grid.editing .w-link { display: none; }
  .grid.editing .widget { cursor: grab; border-style: dashed; border-color: var(--line-2); }
  .grid.editing .widget.dragging { opacity: 0.4; }
  .grid.editing .widget.drop-target { border-color: var(--info); box-shadow: inset 0 0 0 1px var(--info); }
  .w-ctl button { width: 24px; height: 24px; border: 0; background: transparent; color: var(--fg-3); cursor: pointer; border-radius: 5px; display: grid; place-items: center; }
  .w-ctl button:hover { background: var(--bg-2); color: var(--fg-0); }
  .w-ctl button.rm:hover { background: var(--crit-bg); color: var(--crit); }
  .drag-handle { color: var(--fg-3); cursor: grab; display: none; }
  .grid.editing .drag-handle { display: inline-flex; }

  /* Widget content primitives */
  .kpi-v { font-size: 34px; font-weight: 600; letter-spacing: -0.02em; line-height: 1; font-variant-numeric: tabular-nums; display: flex; align-items: baseline; gap: 6px; }
  .kpi-v .u { font-size: 15px; color: var(--fg-2); font-weight: 500; }
  .kpi-v.crit { color: var(--crit); } .kpi-v.warn { color: var(--warn); } .kpi-v.ok { color: var(--ok); }
  .kpi-s { color: var(--fg-3); font-size: 12px; margin-top: 8px; }
  .kpi-delta { font-size: 12px; font-weight: 600; margin-top: 6px; }
  .kpi-delta.down { color: var(--crit); } .kpi-delta.up { color: var(--ok); }

  .barline { display: grid; grid-template-columns: 96px 1fr 44px; gap: 10px; align-items: center; padding: 7px 0; font-size: 13px; }
  .barline .bn { color: var(--fg-1); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .barline .bt { height: 7px; background: var(--bg-3); border-radius: 4px; overflow: hidden; }
  .barline .bt > span { display: block; height: 100%; border-radius: 4px; }
  .barline .bp { text-align: right; font-weight: 600; font-variant-numeric: tabular-nums; font-size: 12px; }

  .listrow { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-top: 1px solid var(--line); font-size: 13px; }
  .listrow:first-child { border-top: 0; }
  .listrow .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .listrow .dot.crit { background: var(--crit); } .listrow .dot.warn { background: var(--warn); } .listrow .dot.ok { background: var(--ok); } .listrow .dot.info { background: var(--info); }
  .listrow .ln { flex: 1; min-width: 0; }
  .listrow .ln .lt { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .listrow .ln .ls { color: var(--fg-3); font-size: 11px; }
  .listrow .lv { color: var(--fg-2); font-size: 12px; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .listrow .mono { font-family: 'JetBrains Mono', monospace; }
  .sev-tag { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; padding: 2px 7px; border-radius: 4px; }
  .sev-tag.high { background: var(--crit-bg); color: var(--crit); } .sev-tag.med { background: var(--warn-bg); color: var(--warn); } .sev-tag.low { background: var(--info-bg); color: var(--info); }

  .bignum { display: flex; align-items: baseline; gap: 10px; }
  .bignum .n { font-size: 48px; font-weight: 700; letter-spacing: -0.03em; line-height: 1; font-variant-numeric: tabular-nums; }

  /* Add-widget tray */
  .tray-scrim { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 70; opacity: 0; pointer-events: none; transition: 150ms; }
  .tray-scrim.show { opacity: 1; pointer-events: auto; }
  .tray { position: fixed; top: 0; right: 0; height: 100vh; width: 380px; max-width: 92vw; background: var(--bg-1); border-left: 1px solid var(--line); z-index: 80; transform: translateX(100%); transition: transform 200ms ease; display: flex; flex-direction: column; }
  .tray.show { transform: translateX(0); }
  .tray-head { padding: 18px 20px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
  .tray-head h3 { margin: 0; font-size: 15px; font-weight: 600; }
  .tray-body { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 8px; }
  .tray-item { display: flex; align-items: center; gap: 12px; padding: 12px; border: 1px solid var(--line); border-radius: 8px; cursor: pointer; transition: 100ms; }
  .tray-item:hover { background: var(--bg-2); border-color: var(--line-2); }
  .tray-item.added { opacity: 0.45; pointer-events: none; }
  .tray-item .ti { width: 34px; height: 34px; border-radius: 8px; background: var(--bg-3); display: grid; place-items: center; color: var(--fg-2); flex-shrink: 0; }
  .tray-item .tn { font-weight: 500; font-size: 13px; }
  .tray-item .td { color: var(--fg-3); font-size: 11px; margin-top: 1px; }
  .tray-item .plus { margin-left: auto; color: var(--info); }
  .tray-item.added .plus { color: var(--ok); }
</style>
</head>

    <a href="Activity.html"><button class="nav-btn" title="Activity"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></button></a>
    <a href="Reports.html"><button class="nav-btn" title="Reports"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m7 14 4-4 3 3 5-6"/></svg></button></a>
    <a href="Terminal.html"><button class="nav-btn" title="Terminal"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg></button></a>
    <div class="nav-spacer"></div>
    <button class="nav-btn" title="Settings" onclick="location.href='Settings.html'"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .4 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.4 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.9.4l-.1.1A2 2 0 1 1 4.3 17.1l.1-.1a1.7 1.7 0 0 0 .4-1.9 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.4-1.9l-.1-.1A2 2 0 1 1 6.9 4.3l.1.1a1.7 1.7 0 0 0 1.9.4H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.4l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.4 1.9V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg></button>
  </aside>

  <main>
    <div class="topbar">
      <div class="topbar-row">
        <div class="crumbs"><span style="color: var(--fg-0)">Dashboard</span></div>
        <div class="topbar-actions">
          <button class="icon-btn" title="Notifications" onclick="location.href='Activity.html'" style="position:relative;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10 21a2 2 0 0 0 4 0"/></svg><span style="position:absolute; top:6px; right:6px; width:7px; height:7px; background: var(--crit); border-radius:50%; box-shadow: 0 0 0 2px var(--bg-0);"></span></button>
          <div class="user-menu">
            <button class="avatar avatar-btn" id="avatarBtn" aria-haspopup="menu" aria-expanded="false" title="Account">A</button>
            <div class="avatar-menu" id="avatarMenu" hidden role="menu">
              <div class="am-head"><div class="avatar">A</div><div><div class="am-name">Alex Liang</div><div class="am-email">alex@gonaibo.com</div></div></div>
              <a class="am-item" role="menuitem" href="Settings.html#profile"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>Your profile</a>
              <a class="am-item" role="menuitem" href="Settings.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .4 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.4 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.9.4l-.1.1A2 2 0 1 1 4.3 17.1l.1-.1a1.7 1.7 0 0 0 .4-1.9 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.4-1.9l-.1-.1A2 2 0 1 1 6.9 4.3l.1.1a1.7 1.7 0 0 0 1.9.4H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.4l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.4 1.9V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>Settings</a>
              <a class="am-item" role="menuitem" href="Settings.html#about"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>Help &amp; docs</a>
              <div class="am-div"></div>
              <a class="am-item danger" role="menuitem" href="#"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/></svg>Sign out</a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="dash-head">
      <div>
        <h1>Good afternoon, Alex</h1>
        <div class="greet" id="greet">Operator view · 7 hosts · last updated just now</div>
      </div>
      <div class="dash-controls">
        <div class="role-seg" id="roleSeg">
          <button data-role="operator" class="active"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9"/><path d="M3 12V3h9"/></svg>Operator</button>
          <button data-role="compliance"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Compliance</button>
          <button data-role="executive"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>Executive</button>
          <button data-role="security"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>Security</button>
        </div>
        <div class="seg" id="rangeSeg">
          <button data-range="24h" class="active">24h</button>
          <button data-range="7d">7d</button>
          <button data-range="30d">30d</button>
        </div>
        <button class="btn" id="resetBtn" title="Reset to role default"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9"/><path d="M3 12V3h9"/></svg></button>
        <button class="btn" id="editBtn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 1 1 3 3L7 19l-4 1 1-4z"/></svg>Edit</button>
      </div>
    </div>

    <div class="edit-banner" id="editBanner">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9h14M5 15h14M9 5v14"/></svg>
      <span>Editing <strong id="editRole">Operator</strong> dashboard — drag to reorder, resize, or remove widgets. Changes save automatically.</span>
      <div style="flex:1"></div>
      <button class="btn sm" id="addBtn"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>Add widget</button>
      <button class="btn sm primary" id="doneBtn">Done</button>
    </div>

    <div class="grid" id="grid"></div>
  </main>
</div>

<div class="tray-scrim" id="trayScrim"></div>
<aside class="tray" id="tray">
  <div class="tray-head"><h3>Add a widget</h3><button class="icon-btn" id="trayClose"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
  <div class="tray-body" id="trayBody"></div>
</aside>

<script>
  // ───── Widget library: each is a lens into a page ─────
  function spark(data, color, h) {
    h = h || 46; const W = 240, pad = 4, max = Math.max(...data), min = Math.min(...data);
    const x = i => pad + (i / (data.length - 1)) * (W - pad * 2);
    const y = v => h - pad - ((v - min) / ((max - min) || 1)) * (h - pad * 2);
    const line = data.map((v, i) => (i ? "L" : "M") + x(i).toFixed(1) + " " + y(v).toFixed(1)).join(" ");
    const area = line + " L" + x(data.length - 1).toFixed(1) + " " + (h - pad) + " L" + x(0).toFixed(1) + " " + (h - pad) + " Z";
    return '<svg width="100%" height="' + h + '" viewBox="0 0 ' + W + ' ' + h + '" preserveAspectRatio="none"><path d="' + area + '" fill="' + color + '" opacity="0.14"/><path d="' + line + '" fill="none" stroke="' + color + '" stroke-width="2"/></svg>';
  }
  const trend30 = [33,34,33,35,34,36,35,37,36,37,38,37,38,37,38,39,38,39,38,39,40,39,38,37,38,37,34,31,28,24];

  const WIDGETS = {
    "kpi-fleet":     { title: "Hosts online", w: 1, link: "Host Management.html", icon: '<rect x="2" y="4" width="20" height="13" rx="2"/><path d="M8 21h8"/>', render: () => '<div class="kpi-v crit">1<span class="u">/ 7</span></div><div class="kpi-delta down">▼ 6 down · 18m ago</div><div class="kpi-s">2 unreachable · 4 maintenance</div>' },
    "kpi-compliance":{ title: "Avg compliance", w: 1, link: "Scans.html", icon: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>', render: () => '<div class="kpi-v crit">24<span class="u">%</span></div><div class="kpi-delta down">▼ 4.2 pts vs. April</div><div class="kpi-s">target ≥ 80%</div>' },
    "kpi-scans":     { title: "Scans today", w: 1, link: "Scans.html", icon: '<circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>', render: () => '<div class="kpi-v">3</div><div class="kpi-s">1 running · 2 failed · 4 skipped</div>' },
    "kpi-alerts":    { title: "Open alerts", w: 1, link: "Activity.html", icon: '<path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10 21a2 2 0 0 0 4 0"/>', render: () => '<div class="kpi-v warn">8</div><div class="kpi-s">3 high · 4 medium · 1 info</div>' },
    "trend":         { title: "Compliance trend · 30d", w: 2, link: "Reports.html", icon: '<path d="M3 3v18h18"/><path d="m7 14 4-4 3 3 5-6"/>', render: () => '<div style="margin-top:2px">' + spark(trend30, "var(--crit)", 70) + '</div><div class="kpi-s" style="display:flex; justify-content:space-between; margin-top:6px;"><span>30 days ago · 33%</span><span style="color:var(--crit)">today · 24% (▼ recent drift)</span></div>' },
    "framework":     { title: "Framework posture", w: 1, link: "Scans.html", icon: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>', render: () => bar("CIS", 21, "crit") + bar("DISA STIG", 19, "crit") + bar("NIST 800-53", 24, "crit") + bar("PCI DSS", 31, "warn") },
    "coverage":      { title: "Scan coverage", w: 1, link: "Scans.html", icon: '<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>', render: () => '<div class="bignum"><div class="n" style="color:var(--crit)">1</div><div style="color:var(--fg-2); font-size:13px;">of 7 hosts<br/>have fresh data</div></div><div style="margin-top:10px;">' + cov("Current", 1, "ok") + cov("Failing", 2, "crit") + cov("Paused (maint.)", 4, "warn") + '</div>' },
    "hosts-down":    { title: "Hosts down", w: 1, link: "Host Management.html", icon: '<rect x="2" y="4" width="20" height="13" rx="2"/>', render: () => listrows([["crit","owas-rhn01","Production · 41d","unreachable"],["crit","owas-hrm01","Production · 41d","unreachable"],["warn","owas-tst01","Development","maintenance"],["warn","owas-tst02","Development","maintenance"]]) },
    "top-rules":     { title: "Top failed rules", w: 1, link: "Scans.html", icon: '<path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="9"/>', render: () => ruleRows([["high","Host firewall inactive","CIS-3.5.1.1","7 hosts"],["high","SSH root login enabled","CIS-5.2.8","6 hosts"],["high","auditd not running","CIS-4.1.1.1","4 hosts"],["med","Password max age","CIS-5.4.1.1","5 hosts"]]) },
    "activity":      { title: "Recent activity", w: 2, link: "Activity.html", icon: '<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>', render: () => listrows([["crit","Host became unreachable","owas-rhn01 · 18m ago","host_unreachable"],["crit","Compliance dropped 12.5pp","owas-ub5s2 · 1h ago","drift_major"],["warn","Scan failed — credentials","owas-tst02 · 5h ago","scan_failed"],["info","Baseline updated to 36.2%","by alex · 1d ago","baseline"]]) },
    "exceptions":    { title: "Exceptions expiring", w: 1, link: "Scans.html", icon: '<circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/>', render: () => listrows([["warn","MOTD banner waiver","CIS-1.7.1 · owas-ub4m2","7 days"],["info","Wireless disabled waiver","CIS-3.1.2 · Development","no expiry"]]) },
    "remediation":   { title: "Remediation · 30d", w: 1, link: "Scans.html", icon: '<path d="M14.7 6.3a4 4 0 0 0-5.4 5.4L3 18v3h3l6.3-6.3a4 4 0 0 0 5.4-5.4l-2.1 2.1-2-2 2.1-2.1z"/>', render: () => '<div class="kpi-v ok">18</div><div class="kpi-s">17 committed · 1 rolled back</div><div style="margin-top:10px;">' + bar("Atomic", 94, "ok") + '</div>' },
    "reports":       { title: "Recent reports", w: 1, link: "Reports.html", icon: '<path d="M3 3v18h18"/><path d="m7 14 4-4 3 3 5-6"/>', render: () => listrows([["info","Executive Summary","May 2026 · signed","PDF"],["info","CIS RHEL 9 Attestation","Q2 · signed","OSCAL"],["info","Remediation Activity","30d · signed","JSON"]]) },
    "group-health":  { title: "Group health", w: 2, link: "Groups.html", icon: '<path d="m12 2 9 5-9 5-9-5 9-5z"/><path d="m3 12 9 5 9-5"/>', render: () => bar("Production", 22, "crit") + bar("Development", 16, "warn") + bar("DR · Warm", 26, "crit") + bar("RHEL", 14, "crit") + bar("Ubuntu", 37, "warn") },
    "risks":         { title: "Risk highlights", w: 2, link: "Reports.html", icon: '<path d="M10.3 3.7a2 2 0 0 1 3.4 0l8 14a2 2 0 0 1-1.7 3H4.3a2 2 0 0 1-1.7-3z"/><path d="M12 9v4M12 17h.01"/>', render: () => ruleRows([["high","6 hosts have no fresh data","coverage gap","critical"],["high","Firewall inactive fleet-wide","CIS-3.5.1.1","7 hosts"],["med","MFA not enforced","4 of 12 members","auth"]]) },
    "mttr":          { title: "Drift response", w: 1, link: "Activity.html", icon: '<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>', render: () => '<div class="kpi-v">3.4<span class="u">h</span></div><div class="kpi-s">median drift → remediation</div><div class="kpi-delta up" style="margin-top:6px;">▲ faster than last month</div>' },
    "security":      { title: "Auth posture", w: 1, link: "Settings.html", icon: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>', render: () => '<div class="kpi-v warn">8<span class="u">/ 12</span></div><div class="kpi-s">members with MFA enrolled</div><div style="margin-top:10px;">' + cov("MFA enforced", 0, "crit") + cov("SSO active", 1, "ok") + '</div>' },
  };

  function bar(name, pct, tier) { return '<div class="barline"><span class="bn">' + name + '</span><span class="bt"><span style="width:' + pct + '%; background:var(--' + tier + ')"></span></span><span class="bp" style="color:var(--' + tier + ')">' + pct + '%</span></div>'; }
  function cov(name, n, tier) { return '<div class="listrow" style="padding:5px 0;"><span class="dot ' + tier + '"></span><span class="ln"><span class="lt" style="font-size:12px; font-weight:400; color:var(--fg-2)">' + name + '</span></span><span class="lv" style="color:var(--' + tier + '); font-weight:600;">' + n + '</span></div>'; }
  function listrows(rows) { return rows.map(r => '<div class="listrow"><span class="dot ' + r[0] + '"></span><span class="ln"><span class="lt">' + r[1] + '</span><span class="ls">' + r[2] + '</span></span><span class="lv mono">' + r[3] + '</span></div>').join(""); }
  function ruleRows(rows) { return rows.map(r => '<div class="listrow"><span class="sev-tag ' + r[0] + '">' + r[0] + '</span><span class="ln"><span class="lt">' + r[1] + '</span><span class="ls mono">' + r[2] + '</span></span><span class="lv">' + r[3] + '</span></div>').join(""); }

  // ───── Role presets ─────
  const PRESETS = {
    operator:   [["kpi-fleet",1],["kpi-alerts",1],["kpi-scans",1],["kpi-compliance",1],["coverage",1],["hosts-down",1],["activity",2]],
    compliance: [["kpi-compliance",1],["kpi-fleet",1],["framework",1],["coverage",1],["trend",2],["top-rules",1],["exceptions",1],["group-health",2]],
    executive:  [["kpi-compliance",1],["kpi-fleet",1],["kpi-alerts",1],["mttr",1],["trend",2],["risks",2],["remediation",1],["reports",1]],
    security:   [["kpi-alerts",1],["security",1],["coverage",1],["top-rules",1],["activity",2],["exceptions",1]],
  };
  const ROLE_LABEL = { operator: "Operator", compliance: "Compliance", executive: "Executive", security: "Security" };

  let role = "operator", editing = false, range = "24h";
  let layout = [];

  function lsKey(r) { return "ow-dash-" + r; }
  function loadLayout() {
    const saved = localStorage.getItem(lsKey(role));
    layout = saved ? JSON.parse(saved) : PRESETS[role].map(([id, w]) => ({ id, w }));
  }
  function saveLayout() { localStorage.setItem(lsKey(role), JSON.stringify(layout)); }

  function renderGrid() {
    const grid = document.getElementById("grid");
    grid.innerHTML = layout.map((it, idx) => {
      const wdef = WIDGETS[it.id]; if (!wdef) return "";
      return '<div class="widget w' + it.w + '" data-idx="' + idx + '" data-id="' + it.id + '"' + (editing ? ' draggable="true"' : '') + '>' +
        '<div class="w-head">' +
          '<span class="drag-handle"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="6" r="1"/><circle cx="15" cy="6" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="9" cy="18" r="1"/><circle cx="15" cy="18" r="1"/></svg></span>' +
          '<span class="w-title">' + wdef.title + '</span>' +
          '<span class="w-ctl">' +
            '<button class="rz" title="Resize">' + (it.w === 1 ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3"/><path d="m21 3-7 7M3 21l7-7"/></svg>' : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3H5a2 2 0 0 0-2 2v4M15 21h4a2 2 0 0 0 2-2v-4"/><path d="M3 3l7 7M21 21l-7-7"/></svg>') + '</button>' +
            '<button class="rm" title="Remove"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>' +
          '</span>' +
          '<a class="w-link" href="' + wdef.link + '" title="Open"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17 17 7M7 7h10v10"/></svg></a>' +
        '</div>' +
        '<div class="w-body">' + wdef.render() + '</div>' +
      '</div>';
    }).join("");
    if (editing) wireDnd();
    grid.querySelectorAll(".rm").forEach(b => b.addEventListener("click", (e) => { e.stopPropagation(); const i = +b.closest(".widget").dataset.idx; layout.splice(i, 1); saveLayout(); renderGrid(); }));
    grid.querySelectorAll(".rz").forEach(b => b.addEventListener("click", (e) => { e.stopPropagation(); const i = +b.closest(".widget").dataset.idx; layout[i].w = layout[i].w === 1 ? 2 : 1; saveLayout(); renderGrid(); }));
  }

  // Drag and drop reorder
  let dragIdx = null;
  function wireDnd() {
    const grid = document.getElementById("grid");
    grid.querySelectorAll(".widget").forEach(w => {
      w.addEventListener("dragstart", () => { dragIdx = +w.dataset.idx; w.classList.add("dragging"); });
      w.addEventListener("dragend", () => { w.classList.remove("dragging"); grid.querySelectorAll(".widget").forEach(x => x.classList.remove("drop-target")); });
      w.addEventListener("dragover", (e) => { e.preventDefault(); grid.querySelectorAll(".widget").forEach(x => x.classList.toggle("drop-target", x === w && +w.dataset.idx !== dragIdx)); });
      w.addEventListener("drop", (e) => {
        e.preventDefault(); const dropIdx = +w.dataset.idx;
        if (dragIdx == null || dragIdx === dropIdx) return;
        const [moved] = layout.splice(dragIdx, 1);
        layout.splice(dropIdx, 0, moved);
        dragIdx = null; saveLayout(); renderGrid();
      });
    });
  }

  // Add-widget tray
  function renderTray() {
    const present = new Set(layout.map(l => l.id));
    document.getElementById("trayBody").innerHTML = Object.entries(WIDGETS).map(([id, w]) =>
      '<div class="tray-item ' + (present.has(id) ? "added" : "") + '" data-add="' + id + '">' +
        '<div class="ti"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">' + w.icon + '</svg></div>' +
        '<div><div class="tn">' + w.title + '</div><div class="td">' + w.link.replace(".html", "") + '</div></div>' +
        '<span class="plus">' + (present.has(id) ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>' : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>') + '</span>' +
      '</div>').join("");
    document.querySelectorAll("[data-add]").forEach(it => it.addEventListener("click", () => {
      const id = it.dataset.add; if (layout.find(l => l.id === id)) return;
      layout.push({ id, w: WIDGETS[id].w }); saveLayout(); renderGrid(); renderTray();
    }));
  }

  function setEditing(on) {
    editing = on;
    document.getElementById("grid").classList.toggle("editing", on);
    document.getElementById("editBanner").classList.toggle("show", on);
    document.getElementById("editBtn").style.display = on ? "none" : "";
    document.getElementById("editRole").textContent = ROLE_LABEL[role];
    renderGrid();
  }

  function setRole(r) {
    role = r; loadLayout();
    document.querySelectorAll("#roleSeg button").forEach(b => b.classList.toggle("active", b.dataset.role === r));
    document.getElementById("greet").textContent = ROLE_LABEL[r] + " view · 7 hosts · last updated just now";
    document.getElementById("editRole").textContent = ROLE_LABEL[r];
    renderGrid();
    if (editing) renderTray();
  }

  document.getElementById("roleSeg").addEventListener("click", (e) => { const b = e.target.closest("button"); if (b) setRole(b.dataset.role); });
  document.getElementById("rangeSeg").addEventListener("click", (e) => { const b = e.target.closest("button"); if (!b) return; document.querySelectorAll("#rangeSeg button").forEach(x => x.classList.toggle("active", x === b)); range = b.dataset.range; });
  document.getElementById("editBtn").addEventListener("click", () => setEditing(true));
  document.getElementById("doneBtn").addEventListener("click", () => setEditing(false));
  document.getElementById("resetBtn").addEventListener("click", () => { localStorage.removeItem(lsKey(role)); loadLayout(); renderGrid(); if (editing) renderTray(); });
  document.getElementById("addBtn").addEventListener("click", () => { renderTray(); document.getElementById("tray").classList.add("show"); document.getElementById("trayScrim").classList.add("show"); });
  function closeTray() { document.getElementById("tray").classList.remove("show"); document.getElementById("trayScrim").classList.remove("show"); }
  document.getElementById("trayClose").addEventListener("click", closeTray);
  document.getElementById("trayScrim").addEventListener("click", closeTray);

  (function () {
    const btn = document.getElementById('avatarBtn'), menu = document.getElementById('avatarMenu');
    btn.addEventListener('click', function (e) { e.stopPropagation(); const open = menu.hidden; menu.hidden = !open; btn.setAttribute('aria-expanded', String(open)); });
    document.addEventListener('click', function (e) { if (!menu.hidden && !menu.contains(e.target) && e.target !== btn) menu.hidden = true; });
  })();

  setRole("operator");
</script>

</body>
</html>
