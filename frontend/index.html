    <!-- CSP enforced via HTTP headers in production (nginx), not meta tag.
         Material-UI requires 'unsafe-inline' for style-src (emotion CSS-in-JS).
         Vite dev server requires 'unsafe-inline' for script-src (HMR).
         Production nginx config sets stricter CSP with style-src 'unsafe-inline'. -->
    <!-- Local fonts for enterprise environments -->
    <link rel="preload" href="/fonts/roboto/Roboto-Regular.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/roboto/Roboto-Medium.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/material-icons/MaterialIcons-Regular.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="/fonts/fonts.css">
    <title>OpenWatch - Security Compliance Monitoring</title>
  </head>
