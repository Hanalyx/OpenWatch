<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#004aad" />
    <title>OpenWatch</title>

    <!--
      No-FOUC color-scheme bootstrap.
      frontend-foundation C-02 / AC-01 / AC-15:
      Synchronous script BEFORE the React bundle parses. Reads the stored
      preference, falls back to system, and sets data-mui-color-scheme on
      <html> so the first paint is correct.

      MUI v7's getInitColorSchemeScript() produces a functionally identical
      script; we inline a small version here so the bundle does not need to
      execute first.
    -->
    <script>
      (function () {
        try {
          var key = 'ow-color-scheme';
          var stored = window.localStorage.getItem(key);
          var mode =
            stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system';
          var resolved =
            mode === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : mode;
          document.documentElement.setAttribute('data-mui-color-scheme', resolved);
          document.documentElement.style.colorScheme = resolved;
        } catch (e) {
          // localStorage / matchMedia failure -> default to dark
          document.documentElement.setAttribute('data-mui-color-scheme', 'dark');
        }
      })();
    </script>

    <!--
      Fonts are self-hosted: bundled from @fontsource in src/main.tsx, so the
      app pulls NOTHING from an external font CDN at runtime — required for
      air-gapped deployments. Do not re-add remote font <link> tags here.
    -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
