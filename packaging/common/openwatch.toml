# OpenWatch (Go) — default configuration shipped by the native package.
#
# Operators override values here. Environment-variable and CLI-flag
# layers are still respected (see config layering in
# internal/config/config.go).
#
# File mode: 0640, owner root:openwatch. The systemd unit reads it as
# the openwatch user.

[server]
listen   = "0.0.0.0:8443"
tls_cert = "/etc/openwatch/tls/cert.pem"
tls_key  = "/etc/openwatch/tls/key.pem"

[database]
# Replace with a real DSN. The package does not provision Postgres.
# Use /etc/openwatch/secrets.env to keep the password out of this file:
#   OPENWATCH_DATABASE_DSN=postgres://openwatch:...@host/openwatch?sslmode=require
dsn             = "postgres://openwatch@localhost/openwatch?sslmode=disable"
max_connections = 25

[logging]
level  = "info"
format = "json"

[identity]
# Signing material the server requires in production — it does NOT
# auto-generate these and will refuse to start if either is missing. The
# package's post-install step generates both into /etc/openwatch/keys on
# first install (generate-if-absent; upgrades never clobber them). These
# are the built-in defaults, shown here so the paths are discoverable and
# overridable; you normally do not need to change them.
#   jwt_private_key:     RSA >= 2048 PEM (PKCS#1 or PKCS#8), mode 0640 root:openwatch
#   credential_key_file: 32 raw bytes (AES-256), mode 0600 openwatch:openwatch
jwt_private_key     = "/etc/openwatch/keys/jwt_private.pem"
credential_key_file = "/etc/openwatch/keys/credential.key"
