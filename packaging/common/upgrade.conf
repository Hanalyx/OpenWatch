# OpenWatch upgrade behavior. Sourced (KEY=value, no spaces) by the package
# upgrade scriptlet and the backup-cleanup timer.

# Auto-backup the database (pg_dump) before applying migrations on upgrade.
# This is the restore point if a migration fails. Set to "no" ONLY if you run
# your own verified pre-upgrade backups.
AUTO_BACKUP=yes

# Where pre-upgrade dumps are written.
BACKUP_DIR=/var/lib/openwatch/backups

# How many days of dumps to keep. The most recent dump is ALWAYS kept,
# regardless of age, so you never lose your last restore point.
BACKUP_RETENTION_DAYS=30
