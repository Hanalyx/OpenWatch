spec: credentials
version: "1.0"
status: active
owner: engineering
summary: >
  Credential sharing route contract for Kensa remediation integration.
  Covers Kensa signature validation, host credential lookup, batch retrieval
  with size limits, system default credentials via CentralizedAuthService,
  and an unauthenticated health endpoint.

acceptance_criteria:
  - id: AC-1
    description: >
      All credential endpoints (except health) depend on validate_kensa_request
      which requires the X-Kensa-Signature header. Missing signature returns
      HTTP 401 UNAUTHORIZED with detail "Missing Kensa signature header".
  - id: AC-2
    description: >
      Host credential lookup (GET /hosts/{host_id}) returns HTTP 404 NOT_FOUND
      with detail "Host not found or inactive" when the host does not exist or
      has is_active=false.
  - id: AC-3
    description: >
      Credentials are decrypted from the encrypted_credentials column using
      base64.b64decode followed by json.loads to extract ssh_key and password.
  - id: AC-4
    description: >
      Batch endpoint (POST /hosts/batch) limits to 100 hosts per request.
      Exceeding this returns HTTP 400 BAD_REQUEST with detail
      "Maximum 100 hosts per batch request".
  - id: AC-5
    description: >
      System default credentials endpoint (GET /system/default) uses
      CentralizedAuthService via get_auth_service to resolve credentials
      with use_default=True.
  - id: AC-6
    description: >
      Health endpoint (GET /health) requires no authentication dependencies
      and returns status "healthy" with service name and timestamp.
