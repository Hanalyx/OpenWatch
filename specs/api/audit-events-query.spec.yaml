spec:
  id: api-audit-events-query
  title: Audit events list endpoint
  version: "1.1.0"
  status: approved
  tier: 2

  context:
    system: openwatch-go
    feature: Audit events query
    description: >
      GET /api/v1/audit/events returns a cursor-paginated list of audit
      events, newest-first, with optional filters by action, correlation_id,
      actor, and time window. Stage 0 ships the basic surface; the full
      audit query DSL lands Stage 2.

  objective:
    summary: >
      Make audit-as-API real: events are queryable from any authenticated
      caller via the API surface, not via direct DB access.
    scope:
      includes:
        - Cursor pagination (occurred_at DESC)
        - "Filters: action, correlation_id, actor_type, since, until"
      excludes:
        - Full DSL query (Stage 2)
        - Export endpoints

  constraints:
    - id: C-01
      description: Endpoint MUST accept GET only
      type: technical
      enforcement: error
    - id: C-02
      description: Default sort MUST be occurred_at DESC, id DESC (stable tiebreak)
      type: technical
      enforcement: error
    - id: C-03
      description: Default limit MUST be 50; maximum 200
      type: technical
      enforcement: error
    - id: C-04
      description: limit > 200 returns 400 pagination.limit_exceeded
      type: technical
      enforcement: error
    - id: C-05
      description: Each item MUST include id, correlation_id, action, severity, actor_type, occurred_at, recorded_at, detail (redacted), redactions
      type: technical
      enforcement: error
    - id: C-06
      description: GET /audit/events MUST require the audit:read permission. The audit trail is security-sensitive (actor ids, IPs, resource ids, action detail); an anonymous or unauthorized caller MUST receive 403 and MUST NOT receive any events. Enforcement is via auth.EnforcePermission(AuditRead) as the first statement of the handler, matching every sibling data handler.
      type: security
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: GET /audit/events (no params) returns 200 with up to 50 newest events ordered by occurred_at DESC.
      priority: critical
      references_constraints: [C-01, C-02, C-03]
    - id: AC-02
      description: ?limit=10 returns at most 10 events.
      priority: high
    - id: AC-03
      description: ?limit=500 returns 400 with error.code="pagination.limit_exceeded".
      priority: high
      references_constraints: [C-04]
    - id: AC-04
      description: ?action=auth.login.success returns only events with that action.
      priority: critical
    - id: AC-05
      description: ?correlation_id=<id> returns only events with that correlation_id.
      priority: critical
    - id: AC-06
      description: ?since and ?until filter the window inclusively on since and exclusively on until.
      priority: high
    - id: AC-07
      description: When >limit events match, response includes non-null next_cursor; follow-up call returns next page with no overlap.
      priority: high
    - id: AC-08
      description: When page contains last matching rows, next_cursor is null.
      priority: high
    - id: AC-09
      description: Each item carries id, correlation_id, action, severity, actor_type, occurred_at, recorded_at, detail, redactions.
      priority: critical
      references_constraints: [C-05]
    - id: AC-10
      description: Stored detail with redacted fields shows "<REDACTED>" placeholders; redactions lists scrubbed names.
      priority: critical
    - id: AC-11
      description: GET /audit/events with no session/credential (anonymous) returns 403 and no event body — the deny path runs before any query. A caller holding audit:read returns 200. (A role lacking audit:read is denied by the same auth.EnforcePermission mechanism, covered generically by system-rbac.)
      priority: critical
      references_constraints: [C-06]
