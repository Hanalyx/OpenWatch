spec:
  id: api-audit-events-query
  title: Audit events list endpoint
  version: "1.3.1"
  status: approved
  tier: 2

  context:
    system: openwatch-go
    feature: Audit events query
    description: >
      GET /api/v1/audit/events returns a cursor-paginated list of audit
      events, newest-first, with optional filters by action, correlation_id,
      actor, and time window. Stage 0 ships the basic surface; the full
      audit query DSL lands Stage 2.

  objective:
    summary: >
      Make audit-as-API real: events are queryable from any authenticated
      caller via the API surface, not via direct DB access.
    scope:
      includes:
        - Cursor pagination (occurred_at DESC)
        - "Filters: action, correlation_id, actor_type, since, until"
      excludes:
        - Full DSL query (Stage 2)
        - Export endpoints

  constraints:
    - id: C-01
      description: Endpoint MUST accept GET only
      type: technical
      enforcement: error
    - id: C-02
      description: 'Default sort MUST be occurred_at DESC, id DESC (stable tiebreak). v1.3.1 — the cursor MUST be the matching COMPOUND keyset "<RFC3339Nano occurred_at>|<id>", and the next-page predicate MUST be the row-value (occurred_at, id) < ($cursor_ts, $cursor_id) so a row sharing the boundary occurred_at is not dropped (a timestamp-only cursor with occurred_at < $cursor silently skipped boundary-tie rows). A legacy timestamp-only cursor (no "|") is rejected rather than degrading to the lossy predicate'
      type: technical
      enforcement: error
    - id: C-03
      description: Default limit MUST be 50; maximum 200
      type: technical
      enforcement: error
    - id: C-04
      description: limit > 200 returns 400 pagination.limit_exceeded
      type: technical
      enforcement: error
    - id: C-05
      description: Each item MUST include id, correlation_id, action, severity, actor_type, occurred_at, recorded_at, detail (redacted), redactions
      type: technical
      enforcement: error
    - id: C-06
      description: GET /audit/events MUST require the audit:read permission. The audit trail is security-sensitive (actor ids, IPs, resource ids, action detail); an anonymous caller MUST receive 401 auth.required and an authenticated-but-unauthorized caller 403 and MUST NOT receive any events. Enforcement is via auth.EnforcePermission(AuditRead) as the first statement of the handler, matching every sibling data handler.
      type: security
      enforcement: error
    - id: C-07
      description: 'v1.2.0 — Each item MUST include a server-rendered human-readable `message` ("<actor> <predicate>", e.g. "alice@example.com created a host"), built from action + actor_label + actor_type via the shared activity.FormatAudit formatter (the same one the activity feed audit leg uses, so the wording is consistent and a new action code never surfaces as a raw dotted enum). The item MUST also expose actor_label. The endpoint MUST accept optional resource_type and resource_id query filters (ANDed with the existing filters) so a caller can fetch one resource''s audit trail (e.g. a single host''s lifecycle events)'
      type: technical
      enforcement: error
    - id: C-08
      description: 'v1.3.0 — GET /api/v1/audit/events/export MUST stream the filtered audit trail as a downloadable attachment (NIST 800-53 AU-7). It is audit:read gated, accepts the same filters (action, actor_type, resource_type, resource_id, since, until), and returns the whole filtered set newest-first capped at 10000 rows (not one page). format=csv (default) emits a header row + one row per event with columns occurred_at, action, message, severity, actor_type, actor_label, actor_id, resource_type, resource_id, correlation_id; format=json emits the AuditEvent array. Both set Content-Disposition: attachment with a timestamped filename. The message column reuses activity.FormatAudit (same as the list). v1.3.1 hardening: (a) every CSV cell MUST be neutralized against spreadsheet formula injection (CWE-1236) — a value whose first character is =, +, -, @, tab, or CR is prefixed with a single quote so it renders as literal text, not an executed formula; (b) a truncated export (row count == the 10000 cap) MUST set an X-OpenWatch-Export-Truncated response header and log a warning, so a capped export is never silently mistaken for the complete trail'
      type: technical
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: GET /audit/events (no params) returns 200 with up to 50 newest events ordered by occurred_at DESC.
      priority: critical
      references_constraints: [C-01, C-02, C-03]
    - id: AC-02
      description: ?limit=10 returns at most 10 events.
      priority: high
    - id: AC-03
      description: ?limit=500 returns 400 with error.code="pagination.limit_exceeded".
      priority: high
      references_constraints: [C-04]
    - id: AC-04
      description: ?action=auth.login.success returns only events with that action.
      priority: critical
    - id: AC-05
      description: ?correlation_id=<id> returns only events with that correlation_id.
      priority: critical
    - id: AC-06
      description: ?since and ?until filter the window inclusively on since and exclusively on until.
      priority: high
    - id: AC-07
      description: When >limit events match, response includes non-null next_cursor; follow-up call returns next page with no overlap.
      priority: high
    - id: AC-08
      description: When page contains last matching rows, next_cursor is null.
      priority: high
    - id: AC-09
      description: Each item carries id, correlation_id, action, severity, actor_type, occurred_at, recorded_at, detail, redactions.
      priority: critical
      references_constraints: [C-05]
    - id: AC-10
      description: Stored detail with redacted fields shows "<REDACTED>" placeholders; redactions lists scrubbed names.
      priority: critical
    - id: AC-11
      description: GET /audit/events with no session/credential (anonymous) returns 401 auth.required and no event body — the deny path runs before any query. A caller holding audit:read returns 200. (A role lacking audit:read is denied by the same auth.EnforcePermission mechanism, covered generically by system-rbac.)
      priority: critical
      references_constraints: [C-06]
    - id: AC-12
      description: 'v1.2.0 — For a seeded audit event with action=host.created, actor_label="alice@example.com", resource_type="host", resource_id=<host uuid>, GET /audit/events returns that item with message="alice@example.com created a host" and actor_label="alice@example.com". GET /audit/events?resource_type=host&resource_id=<that uuid> returns only events for that resource (the seeded one present; an event for a different resource_id absent). The message is never the raw dotted action code.'
      priority: high
      references_constraints: [C-07]
    - id: AC-13
      description: 'v1.3.0 — GET /api/v1/audit/events/export (default csv) returns 200 with Content-Type text/csv and a Content-Disposition attachment; the body has the header row occurred_at,action,message,... and a data row whose message cell is the readable sentence (e.g. "alice@example.com created a host"), not the raw action code. ?format=json returns Content-Type application/json with the AuditEvent array. The resource_type/resource_id filters scope the export to one resource. An anonymous caller is denied (401/403) before any export.'
      priority: high
      references_constraints: [C-08]
    - id: AC-14
      description: 'v1.3.1 — csvSafe prefixes a single quote to any string beginning with =, +, -, @, tab, or CR and leaves other strings (and empty) unchanged. A CSV export of an audit event whose actor_label begins with "=" (a formula-injection attempt) writes the neutralized cell (prefixed with a quote), never a bare cell starting with the formula character. Behavioral test of csvSafe + an export integration assertion.'
      priority: high
      references_constraints: [C-08]
    - id: AC-15
      description: 'v1.3.1 — GET /api/v1/audit/events cursor pagination does NOT drop rows sharing the boundary occurred_at. Seeding four events at one identical instant and paging with limit=2 returns all four distinct ids across pages, none lost or duplicated. The emitted next_cursor is the compound "<ts>|<id>" form.'
      priority: high
      references_constraints: [C-02]
