spec:
  id: api-credentials
  title: Credential CRUD + host resolver HTTP surface
  version: "1.2.0"
  status: approved
  tier: 2

  context:
    system: openwatch-go
    feature: Admin endpoints for SSH credential management and host resolution
    description: >
      HTTP face of the credential store. Create / list / get / soft-delete
      system- or host-scope credentials. A separate resolver endpoint
      returns the metadata of the credential that would be used for a
      given host (host-scope wins, otherwise system default). The wire
      surface NEVER carries plaintext or ciphertext for password,
      private key, or passphrase — only metadata and key fingerprint /
      type / bits. Plaintext secrets exist only inside the credential
      package's dial path.
    related_specs:
      - system-credential-store
      - system-rbac
      - system-ssh-connectivity

  objective:
    summary: >
      One endpoint group for managing the SSH credentials the platform
      will use. Reads return metadata only — there is no path through
      the HTTP layer that exposes a stored secret. Resolver endpoint
      makes the host→credential decision observable for the UI without
      requiring callers to know about the tier rules.
    scope:
      includes:
        - GET / POST /credentials
        - GET / PATCH / DELETE /credentials/{id}
        - POST /hosts/{host_id}/credentials:resolve
        - "POST /credentials/{id}:clone — copies the source row's encrypted secret material into a new scope without re-prompting for the secret (v1.1.0)"
        - "PATCH /credentials/{id} — partial in-place update; omitted secrets keep the stored ciphertext; is_default=true auto-demotes the prior system default (v1.2.0)"
      excludes:
        - "Hard delete — only soft delete (is_active=false) ships; the API never hard-deletes"
        - "Pagination — list is flat in Slice A"
        - "scope / scope_id mutation via PATCH — a credential's scope is immutable; switch a host between default and override by creating/cloning/deleting host-scope rows"

  constraints:
    - id: C-01
      description: API responses MUST NEVER include plaintext or encrypted secret fields (password, private_key, private_key_passphrase, or their encrypted_* DB columns); only metadata + key fingerprint / type / bits / comment
      type: security
      enforcement: error
    - id: C-02
      description: POST /credentials MUST require credential:write; GET MUST require credential:read; DELETE MUST require credential:delete; the host resolver MUST require credential:read
      type: security
      enforcement: error
    - id: C-03
      description: SSH key inputs (auth_method=ssh_key or both) MUST be validated by the existing ssh.ValidateKey before storage; weak / unparseable keys MUST be rejected with 400
      type: security
      enforcement: error
    - id: C-04
      description: DELETE is soft delete only — the row is marked is_active=false; subsequent GET returns 404; the row is NEVER hard-deleted by the HTTP API
      type: technical
      enforcement: error
    - id: C-05
      description: POST /credentials/{id}:clone MUST copy the source row's encrypted_password / encrypted_private_key / encrypted_private_key_passphrase columns verbatim into the new row (no decrypt/re-encrypt round-trip). The HTTP request body MUST NOT carry plaintext secret material. The clone target scope/scope_id MUST be validated the same way POST /credentials validates them — host scope requires scope_id pointing at an existing host
      type: security
      enforcement: error
    - id: C-06
      description: PATCH /credentials/{id} MUST be a partial update — fields absent from the body are left unchanged. A secret field (password / private_key / private_key_passphrase) that is absent or empty MUST keep the stored ciphertext, with no re-entry required. scope and scope_id MUST NOT be mutable through PATCH. PATCH MUST require credential:write.
      type: technical
      enforcement: error
    - id: C-07
      description: When PATCH narrows auth_method away from a secret (e.g. both -> ssh_key drops the password), the now-unused ciphertext MUST be nulled, and the resulting credential MUST still carry the secret(s) its effective auth_method requires — from either a freshly supplied value or the retained ciphertext — otherwise the update is rejected 400 credentials.missing_secret with no row change. A freshly supplied private_key MUST pass ssh.ValidateAuthKey before it replaces the stored ciphertext.
      type: security
      enforcement: error
    - id: C-08
      description: PATCH setting is_default=true on a system-scope credential MUST atomically demote any prior active system default within the same transaction, preserving the one-active-system-default invariant. A soft-deleted (is_active=false) credential MUST NOT be revivable through PATCH and MUST return 404.
      type: technical
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: POST /credentials with admin caller and scope=system + auth_method=password body returns 201 with metadata; response body does NOT contain password / private_key / private_key_passphrase / encrypted_* keys.
      priority: critical
      references_constraints: [C-01, C-02]
    - id: AC-02
      description: POST /credentials with a caller missing credential:write returns 403 authz.permission_denied; no credential is inserted.
      priority: critical
      references_constraints: [C-02]
    - id: AC-03
      description: POST /credentials with scope=host but scope_id omitted returns 400 credentials.invalid_scope; no row inserted.
      priority: critical
    - id: AC-04
      description: POST /credentials with scope=host pointing at a non-existent host id returns 400 credentials.host_not_found; no row inserted.
      priority: critical
    - id: AC-05
      description: POST /credentials with auth_method=ssh_key and an unparseable private key returns 400 credentials.invalid_key; no row inserted.
      priority: critical
      references_constraints: [C-03]
    - id: AC-06
      description: POST /credentials with scope=system + is_default=true when another (system, is_default=true, is_active=true) credential already exists returns 409 credentials.multiple_system_defaults.
      priority: critical
    - id: AC-07
      description: GET /credentials with credential:read returns 200 + JSON array of metadata; response body contains no secret fields (password, private_key, private_key_passphrase, encrypted_*).
      priority: critical
      references_constraints: [C-01, C-02]
    - id: AC-08
      description: GET /credentials/{id} returns 200 + metadata for an active credential; returns 404 credentials.not_found for an unknown or already-soft-deleted id.
      priority: critical
    - id: AC-09
      description: DELETE /credentials/{id} with credential:delete returns 204; subsequent GET /credentials/{id} returns 404; the row is NOT removed from the database (is_active=false).
      priority: critical
      references_constraints: [C-02, C-04]
    - id: AC-10
      description: POST /hosts/{host_id}/credentials:resolve returns 200 with the host-scope credential's metadata when a host-scope credential exists for host_id with is_active=true.
      priority: critical
    - id: AC-11
      description: POST /hosts/{host_id}/credentials:resolve returns 200 with the system-default credential's metadata when no host-scope credential exists for host_id.
      priority: critical
    - id: AC-12
      description: POST /hosts/{host_id}/credentials:resolve returns 404 credentials.none_available when neither a host-scope nor a system-default credential is available for host_id.
      priority: critical
    - id: AC-13
      description: POST /credentials/{id}:clone with admin caller, an existing source credential, and a valid {scope=host, scope_id=<existing host>} body returns 201 with a new credential's metadata. The new row's username, auth_method, ssh_key_fingerprint, ssh_key_type, and ssh_key_bits match the source row exactly. The new row has scope=host and scope_id set to the request body's host id.
      priority: critical
      references_constraints: [C-05]
    - id: AC-14
      description: POST /credentials/{id}:clone with an unknown source id returns 404 credentials.not_found; no row inserted.
      priority: critical
      references_constraints: [C-05]
    - id: AC-15
      description: POST /credentials/{id}:clone with scope=host but scope_id pointing at a non-existent host id returns 400 credentials.host_not_found; no row inserted.
      priority: high
      references_constraints: [C-05]
    - id: AC-16
      description: PATCH /credentials/{id} with credential:write changing only metadata (name / description / username) returns 200 with the updated metadata; the response carries no secret fields; the stored ciphertext is unchanged so the credential still resolves with its original secret.
      priority: critical
      references_constraints: [C-01, C-02, C-06]
    - id: AC-17
      description: PATCH /credentials/{id} with a caller missing credential:write returns 403 authz.permission_denied; the credential is unchanged.
      priority: critical
      references_constraints: [C-02, C-06]
    - id: AC-18
      description: PATCH /credentials/{id} on an unknown id, or on an already-soft-deleted credential, returns 404 credentials.not_found; no row is modified or revived.
      priority: critical
      references_constraints: [C-08]
    - id: AC-19
      description: PATCH /credentials/{id} that would leave the effective auth_method without its required secret (e.g. auth_method=password supplied for a key-only credential with no password sent) returns 400 credentials.missing_secret; the credential is unchanged.
      priority: critical
      references_constraints: [C-07]
    - id: AC-20
      description: PATCH /credentials/{id} with is_default=true on a system credential while another active system default exists returns 200 and atomically demotes the prior default — the previously-default credential now reports is_default=false and the patched credential is the sole system default.
      priority: critical
      references_constraints: [C-08]
    - id: AC-21
      description: PATCH /credentials/{id} supplying a new private_key that fails NIST SP 800-57 validation returns 400 credentials.invalid_key; the stored ciphertext is unchanged.
      priority: high
      references_constraints: [C-07]
