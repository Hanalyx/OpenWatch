spec:
  id: api-diagnostics-echo
  title: Diagnostics echo endpoint
  version: "1.0.0"
  status: approved
  tier: 3

  context:
    system: openwatch
    feature: Stage-0 diagnostic endpoint
    description: >
      POST /api/v1/diagnostics:echo exercises the full request lifecycle:
      correlation propagation, idempotency replay, audit emission, error
      envelope. Echoes "message" back. Writes one audit event per unique
      correlation_id (replays not double-audited). Not a feature; exists
      to prove the toolchain composes.

  objective:
    summary: >
      Demonstrate that the foundation stack (correlation, idempotency,
      audit, error envelope) composes correctly under real HTTP traffic.
    scope:
      includes:
        - Request validation
        - Idempotency replay
        - Audit emission per unique key
      excludes:
        - Real business logic
        - Authentication (Stage 2)

  constraints:
    - id: C-01
      description: Endpoint MUST accept POST only; other methods return 405
      type: technical
      enforcement: error
    - id: C-02
      description: Request MUST include Idempotency-Key header; missing returns 400 idempotency.key_required
      type: technical
      enforcement: error
    - id: C-03
      description: Response MUST carry X-Correlation-Id
      type: technical
      enforcement: error
    - id: C-04
      description: audit event MUST be emitted once per unique correlation_id (replays do not double-emit)
      type: security
      enforcement: error
    - id: C-05
      description: All 4xx and 5xx responses MUST use the canonical error envelope
      type: technical
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: POST with valid body, Idempotency-Key, and X-Correlation-Id returns 200 OK with echoed message.
      priority: critical
      references_constraints: [C-01]
    - id: AC-02
      description: Response carries X-Correlation-Id matching client-supplied or server-generated value.
      priority: critical
      references_constraints: [C-03]
    - id: AC-03
      description: POST without Idempotency-Key returns 400 with error.code="idempotency.key_required".
      priority: critical
      references_constraints: [C-02]
    - id: AC-04
      description: POST with empty body returns 400 with error.code="validation.field_required".
      priority: high
      references_constraints: [C-05]
    - id: AC-05
      description: POST with body.message > 1024 chars returns 400 with error.code="validation.field_range".
      priority: high
    - id: AC-06
      description: Successful request writes exactly one audit event with action diagnostics.test_job_completed; replay with same Idempotency-Key writes no second event.
      priority: critical
      references_constraints: [C-04]
    - id: AC-07
      description: Replay with same Idempotency-Key and identical body returns identical response body and status (cached).
      priority: critical
    - id: AC-08
      description: Replay with same Idempotency-Key but different body returns 409 with error.code="idempotency.key_reused".
      priority: critical
    - id: AC-09
      description: GET /api/v1/diagnostics:echo returns 405 via chi-routed handler chain (carries X-Correlation-Id).
      priority: high
    - id: AC-10
      description: After successful POST, GET /audit/events?action=...&correlation_id=... returns exactly one row.
      priority: high
