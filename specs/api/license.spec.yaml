spec:
  id: api-license
  title: License inspection and dry-run verify endpoints
  version: "1.0.0"
  status: approved
  tier: 1

  context:
    system: openwatch
    feature: License inspection and verification
    description: >
      GET /api/v1/license returns the current license state: tier, status,
      enabled features, quotas, expiry, warnings. POST /api/v1/admin/license:verify
      dry-runs a candidate JWT. POST /api/v1/diagnostics:premium-echo
      demonstrates RequireFeature: 402 with envelope + audit when absent.

  objective:
    summary: >
      Make license state inspectable through the API. Make license
      validation testable before installation. Demonstrate the full
      gating chain end-to-end with a minimal endpoint.
    scope:
      includes:
        - Read endpoints (state, registry)
        - Dry-run verify
        - License-gated demo endpoint
      excludes:
        - Install endpoints (operator drops file + SIGHUP for Stage 0)
        - Quota query API

  constraints:
    - id: C-01
      description: GET /license response MUST include tier, status, features, quotas, expiry, warnings
      type: technical
      enforcement: error
    - id: C-02
      description: GET /license response MUST NOT return raw JWT, signature, or customer PII
      type: security
      enforcement: error
    - id: C-03
      description: POST /admin/license:verify response MUST include is_valid, verify_result (enum), features, exp, warnings
      type: technical
      enforcement: error
    - id: C-04
      description: POST /admin/license:verify MUST NOT install the license
      type: security
      enforcement: error
    - id: C-05
      description: :premium-echo MUST require premium_diagnostics feature; without license returns 402 license.feature_unavailable
      type: security
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: GET /license with no license file installed returns tier="free", status="no_license", features containing Stage-0 free features.
      priority: critical
      references_constraints: [C-01]
    - id: AC-02
      description: GET /license with valid openwatch_plus license includes tier="openwatch_plus", status="active", features listing every claim, exp populated.
      priority: critical
    - id: AC-03
      description: GET /license MUST NOT return raw JWT, signature, or customer PII (email, name).
      priority: critical
      references_constraints: [C-02]
    - id: AC-04
      description: POST /admin/license:verify with valid JWT returns is_valid=true, verify_result="valid", features populated.
      priority: critical
      references_constraints: [C-03]
    - id: AC-05
      description: POST /admin/license:verify with tampered JWT returns is_valid=false, verify_result="signature_invalid".
      priority: critical
    - id: AC-06
      description: POST /admin/license:verify does NOT change installed license; subsequent GET /license shows prior state.
      priority: critical
      references_constraints: [C-04]
    - id: AC-07
      description: POST /:premium-echo with no license returns 402 with error.code="license.feature_unavailable" and detail.feature="premium_diagnostics".
      priority: critical
      references_constraints: [C-05]
    - id: AC-08
      description: license.feature_check_denied audit event recorded after AC-07.
      priority: high
    - id: AC-09
      description: POST /:premium-echo with license that includes premium_diagnostics returns 200 with echoed message.
      priority: critical
    - id: AC-10
      description: Installing license (owlicgen + file drop + SIGHUP) makes GET /license reflect new state without restart.
      priority: high
