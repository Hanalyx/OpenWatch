spec:
  id: api-remediation
  title: Remediation governance - request/approve lifecycle, projected lift, and queued single-rule execute/rollback (OpenWatch Core, free)
  version: "1.1.0"
  status: approved
  tier: 1

  context:
    system: openwatch-go
    feature: >
      The free (AGPLv3 core) Phase 7 remediation surface: a see-govern-and-act
      loop over failing rules. Operators view what is remediable and the
      projected compliance-score lift, request a fix, route it through
      approval, then EXECUTE the approved single-rule fix (Tier A free core):
      an HMAC-signed remediation job is enqueued and a worker applies the rule
      on the host via Kensa (Capture/Apply/Validate/Commit), records the
      per-step journal, and flips the rule to pass in host_rule_state on a
      committed run. A previously executed request can be ROLLED BACK. execute
      and rollback are FREE (remediation:execute / remediation:rollback, no
      license). Only :dry-run remains unbuilt (501).
    description: >
      A remediation request is an operator's intent to fix a failing rule on a
      host ("apply the fix for rule X on host Y"). It carries a request ->
      approve | reject lifecycle, DB-backed, mirroring the exception governance
      overlay (api-compliance-exceptions). The free service NEVER connects to a
      host and NEVER mutates host_rule_state or transactions: Request, Approve,
      Reject are pure state transitions over remediation_requests, and
      ProjectLift is a read-only projection over host_rule_state.

      OPEN-CORE BOUNDARY: read (remediation:read), request
      (remediation:request), approve/reject (remediation:approve), and the act
      verbs execute (remediation:execute) and rollback (remediation:rollback)
      are ALL free core. execute/rollback enforce their dangerous-but-ungated
      permission (no license feature); a caller lacking the permission is 403.
      Only :dry-run remains unbuilt and returns 501 (no license gate).

      Execute/rollback are asynchronous and mirror the scan job path: the
      handler guards the request's state, enqueues an HMAC-signed remediation
      job on the PostgreSQL job queue (signed with the same queue key as scans,
      domain-separated), and returns 202 Accepted. One worker drains the queue
      and dispatches by job_type ("scan" vs "remediation"). The worker
      transitions approved -> executing -> executed | failed (execute) or
      executed -> rolled_back (rollback), writes the remediation_transactions
      journal, and on a committed execute flips THAT one rule to pass in
      host_rule_state via the transaction-log writer (Kensa's Validate runs
      before Commit, so the rule passes - no full re-scan), so the compliance
      score moves. It then emits remediation.executed / remediation.rolled_back
      and publishes remediation.completed on the event bus.

      Lifecycle: pending_approval -> approved | rejected -> executing ->
      executed | failed -> rolled_back. Separation of duties:
      the requester cannot review their own request (enforced in the service,
      on top of the distinct remediation:request vs remediation:approve RBAC
      permissions).

      Projected lift: ProjectLift reads host_rule_state.framework_refs for a
      failing rule and estimates the per-framework score delta if the rule
      flips to pass (one passing rule is 1/N of that framework's rules on the
      host). It is best-effort: when framework data is unavailable it returns an
      empty projection and never fails the request.

    related_specs:
      - api-compliance-exceptions
      - api-host-compliance
      - system-rbac
      - system-license-enforcement
      - system-audit-emission

  objective:
    summary: >
      A correct, auditable remediation request/approve lifecycle with
      separation of duties, one open request per host+rule, a read-only
      projected-lift estimate, and a license gate that keeps host mutation
      behind OpenWatch+ - all without ever touching a host in the free path.
    scope:
      includes:
        - remediation_requests + remediation_transactions tables (migration 0037)
        - The free lifecycle service - Request / Approve / Reject / Get / ListRequests / ListSteps / ProjectLift
        - The execution service methods - MarkExecuting / RecordExecution / MarkRolledBack + the remediation_transactions journal
        - The free HTTP endpoints (list, get, request, approve, reject, steps, audit-events)
        - The queued single-rule execute/rollback (Tier A free core) - HMAC-signed remediation job, worker dispatch by job_type, host_rule_state flip-to-pass on a committed run
      excludes:
        - :dry-run (returns 501, not yet built; no longer license-gated)
        - The fleet auto-remediation policy engine (remediation_auto, licensed)
        - Bulk / grouped remediation and Kensa rule ordering (blocked on a Kensa ratification)
        - Full re-scan after a remediation (only the single remediated rule is flipped to pass)

  constraints:
    - id: C-01
      description: 'The free remediation path NEVER mutates a host and NEVER writes host_rule_state or transactions: Request/Approve/Reject only write remediation_requests, and ProjectLift only reads host_rule_state. No free code path opens an SSH/Kensa transport (source inspection of internal/remediation)'
      type: technical
      enforcement: error
    - id: C-02
      description: 'At most ONE open remediation request may exist per (host_id, rule_id), enforced by a partial-unique index over in-flight statuses (pending_approval, approved, dry_run_complete, executing); a duplicate Request returns ErrDuplicateOpen. Terminal rows (rejected, executed, rolled_back, failed) are historical and do not block a fresh request'
      type: technical
      enforcement: error
    - id: C-03
      description: 'Lifecycle transitions are guarded: Approve and Reject require status=pending_approval; a transition from any other state returns ErrWrongState. The transition locks the row (FOR UPDATE) so concurrent reviewers cannot double-transition. Approve emits remediation.approved; Reject emits remediation.approved with detail.outcome=rejected (the registered taxonomy has no separate rejected code)'
      type: technical
      enforcement: error
    - id: C-04
      description: 'Separation of duties: Approve and Reject reject a reviewer equal to the requester (ErrSelfReview), independent of RBAC'
      type: security
      enforcement: error
    - id: C-05
      description: 'RBAC: request requires remediation:request, read endpoints require remediation:read, approve+reject require remediation:approve; anonymous callers are rejected on all. Request 404s hosts.not_found for an unknown host_id before any remediation write'
      type: security
      enforcement: error
    - id: C-06
      description: 'Execute/rollback are FREE core (Tier A), NOT license-gated. :execute requires remediation:execute; the request must be in approved state (409 otherwise); the handler enqueues an HMAC-signed remediation job (signed with the same queue key as scans, domain-separated) and returns 202. :rollback requires remediation:rollback; the request must be in executed state (409 otherwise); it enqueues a rollback job and returns 202. A caller lacking the permission is 403 (RBAC). :dry-run requires remediation:execute and returns 501 (unbuilt), no license gate. No remediation act endpoint returns 402.'
      type: security
      enforcement: error
    - id: C-08
      description: 'The worker drains ONE queue and dispatches by job_type. A remediation job HMAC-verifies its payload (request_id, host_id, rule_id, action, optional txn_id) before any host-mutating side effect; a missing/mismatched tag dead-letters the job (queue.Fail) and emits scheduler.job.hmac_rejected, with no executor call. The worker transitions approved -> executing (MarkExecuting, row-locked) -> executed | failed (RecordExecution), writes the remediation_transactions journal, and on a committed transaction flips that one rule to pass in host_rule_state via the transaction-log writer (idempotent on the request id as synthetic scan id). Rollback transitions executed -> rolled_back only on a clean restore. The worker emits remediation.executed / remediation.rolled_back and publishes remediation.completed on the event bus.'
      type: technical
      enforcement: error
    - id: C-07
      description: 'ProjectLift is read-only and best-effort: for a failing rule it returns per-framework projected score deltas derived from host_rule_state.framework_refs (delta ~= 100/N where N is the count of that framework''s rules on the host); when framework data is absent or unparseable it returns an empty projection and never errors or blocks the request'
      type: technical
      enforcement: warning

  acceptance_criteria:
    - id: AC-01
      description: 'Request inserts a pending_approval row (host_id, rule_id, requested_by, optional scan_run_id and projected-lift snapshot) and emits remediation.requested; a second Request for the same host+rule while one is open (pending_approval/approved/dry_run_complete/executing) returns ErrDuplicateOpen; an empty rule_id returns ErrInvalidInput; a fresh Request after the prior one reached a terminal state succeeds'
      priority: critical
      references_constraints: [C-02]
    - id: AC-02
      description: 'Approve (requester != reviewer) moves pending_approval->approved, sets reviewed_by/reviewed_at, emits remediation.approved; Reject moves pending_approval->rejected and emits remediation.approved with detail.outcome=rejected. Approving or Rejecting a non-pending_approval row returns ErrWrongState'
      priority: critical
      references_constraints: [C-03]
    - id: AC-03
      description: 'Approve and Reject with reviewer == requester return ErrSelfReview and leave the row unchanged'
      priority: critical
      references_constraints: [C-04]
    - id: AC-04
      description: 'No free remediation path writes host_rule_state or transactions, and no free path opens a host transport (source inspection of internal/remediation). ProjectLift returns per-framework deltas for a failing rule read from host_rule_state, and degrades to an empty projection (no error) when framework_refs is absent'
      priority: critical
      references_constraints: [C-01, C-07]
    - id: AC-05
      description: 'Endpoint RBAC + lifecycle: POST /api/v1/remediation/requests requires remediation:request and 404s an unknown host_id; GET /requests, GET /requests/{id}, GET /requests/{id}/steps require remediation:read; POST :approve and :reject require remediation:approve; anonymous callers are rejected on all. A full request->approve happy path round-trips through the HTTP layer'
      priority: critical
      references_constraints: [C-05, C-03]
    - id: AC-06
      description: 'Execute/rollback are FREE core: a caller WITH remediation:execute executing an approved request gets 202 and a remediation job is enqueued; a caller LACKING remediation:execute is 403; executing a non-approved request is 409; rolling back (remediation:rollback) a non-executed request is 409. No remediation act endpoint returns 402. :dry-run returns 501. request/approve/reject and the GET reads return their normal status codes.'
      priority: critical
      references_constraints: [C-06]
    - id: AC-07
      description: 'Worker execution path: a queued remediation job with a valid HMAC drives an approved request approved -> executing -> executed when the executor returns a committed transaction, writes a remediation_transactions journal row (kensa_txn_id, phase_result=committed), and flips the rule to pass in host_rule_state (the compliance score moves). A committed run that the executor reports as errored, or a host-side failure, transitions the request to failed and writes no flip. A job whose payload HMAC does not verify is dead-lettered (queue.Fail) with scheduler.job.hmac_rejected and no executor invocation.'
      priority: critical
      references_constraints: [C-08]
