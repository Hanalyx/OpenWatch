spec:
  id: api-reports
  title: Reports library - point-in-time Fleet Compliance Executive Summary artifacts (list / generate / fetch)
  version: "1.5.0"
  status: approved
  tier: 2

  context:
    system: openwatch-go
    feature: A library of immutable compliance reports whose one MVP kind, the Fleet Compliance Executive Summary, is computed from data that already exists and stored as a frozen JSON document
    description: >
      A report is a point-in-time, immutable compliance artifact. The MVP
      builds exactly ONE kind, the Fleet Compliance Executive Summary, and
      a three-endpoint surface over it: list the library, generate a new
      summary, and fetch one report with its stored content.

      DERIVED, THEN FROZEN (load-bearing): Generate computes a posture
      snapshot from data that already exists and writes it once. It reads
      host_rule_state for the pass and fail counts and the critical count,
      the active (non-deleted) host count from hosts, and the top failing
      rules (the rules failing on the most hosts) from host_rule_state.
      The same counting shape as the Groups fleet rollup is used so the
      numbers agree across the app: compliance_pct is passing over
      evaluated (evaluated = current_status in pass or fail) rounded half
      up to a whole percent, and nil when nothing has been evaluated (so
      an unscanned fleet is distinguishable from a fully failing one). The
      computed ExecutiveContent is marshalled to JSON and stored in the
      row's content column; the row is WRITE-ONCE and is never recomputed,
      so data_as_of records the instant the posture was sampled.

      CONTENT IS A WIRE CONTRACT: the detail view and any later renderer
      read the frozen JSON by exact key (compliance_pct, host_count,
      passing_rules, failing_rules, critical_issues, top_failing_rules).
      compliance_pct encodes as JSON null when unevaluated (not 0, not
      omitted) and top_failing_rules always serializes as a list (never
      JSON null), ordered most-failing first and capped at a small
      leadership-facing limit.

      STORAGE SHAPE: a report row carries a fixed title ("Fleet Compliance
      - Executive Summary"), a kind (only 'executive' in the MVP), a fixed
      scope_label ('All hosts'), data_as_of, generated_by (the calling
      principal's id, or 'system' when the request is anonymous), a format
      (always 'json' in the MVP), the JSON content, and created_at. The
      library lists newest first.

      RBAC: the two read endpoints (list, fetch) require host:read; the
      generate action requires host:write. Anonymous callers are rejected
      on all three. Handlers map report.ErrNotFound to 404
      (reports.not_found); a fetch for an unknown id 404s.

      Endpoints:
        GET  /api/v1/reports            - list the library, newest first (host:read)
        POST /api/v1/reports:generate   - generate an executive summary for all hosts (host:write)
        GET  /api/v1/reports/{id}       - fetch one report with its stored content (host:read)

    related_specs:
      - api-groups
      - api-host-compliance
      - system-rbac

  objective:
    summary: >
      A correct, auditable reports library whose one MVP kind, the Fleet
      Compliance Executive Summary, is computed once from the
      authoritative posture tables, stored as a frozen JSON document, and
      served behind a host:read view / host:write generate RBAC bar. No
      signing, no PDF or OSCAL rendering, no scheduled dispatch.
    scope:
      includes:
        - reports table (migration 0028) and the internal/report service
        - Generate / List / Get over the executive summary kind
        - The three HTTP endpoints with their RBAC bars (host:read view, host:write generate)
        - Executive content computed from host_rule_state (pass/fail counts, critical, compliance_pct) plus the active host count and the top failing rules
        - The frozen JSON content as a wire contract (exact keys, nil compliance encoding, list-never-null top-failing)
        - The write-once row whose data_as_of is the posture sample instant and whose format is json
      excludes:
        - OSCAL rendering or export (the OSCAL SAR/POA&M faces are a later phase)
        - The Scheduled dispatcher (auto-generated and delivered reports)
        - The Templates gallery (the six prototype templates beyond the one executive kind)
        - Retention sweeps (rows are kept; no expiry or purge in the MVP)
        - Report kinds other than executive (attestation, remediation, exceptions)
        - A "Signed" badge / Verify action in the UI (frontend; this spec covers the wire + endpoint)
        - A period dimension on the scope (applies to the trend) and an explicit host-set scope

  constraints:
    - id: C-01
      description: >-
        The frozen executive content is a JSON wire contract: it
        serializes the exact keys compliance_pct, host_count,
        passing_rules, failing_rules, critical_issues, top_failing_rules,
        and coverage (v1.2.0, an object with hosts_total, hosts_fresh,
        hosts_stale, hosts_unreachable); compliance_pct encodes as JSON
        null when nothing is evaluated (not 0, not omitted);
        top_failing_rules always serializes as a list (never JSON null),
        ordered most-failing first and capped at the small
        leadership-facing limit.
      type: technical
      enforcement: error
    - id: C-02
      description: >-
        compliance_pct is passing over evaluated (evaluated =
        current_status in pass or fail) rounded half up to a whole percent,
        and nil (never 0) when nothing has been evaluated, so an unscanned
        fleet is distinguishable from a fully failing one.
      type: technical
      enforcement: error
    - id: C-03
      description: >-
        The MVP generates exactly one kind: the artifact's identity is
        fixed (title "Fleet Compliance - Executive Summary", kind
        'executive', format 'json') and the top-failing embed limit is a
        small constant. scope_label is derived from the report's scope
        (v1.1.0) and defaults to "All hosts" for an unscoped report. The
        library lists newest first by created_at.
      type: technical
      enforcement: error
    - id: C-04
      description: >-
        Generate computes the executive content from the authoritative
        posture tables and freezes it: passing_rules, failing_rules, and
        critical_issues come from host_rule_state (failing rows of critical
        severity for critical_issues); host_count is the active (deleted_at
        IS NULL) host count; top_failing_rules lists the rules failing on
        the most hosts, ordered by failing host count then rule id. The row
        is write-once - data_as_of is the sampling instant, generated_by is
        the supplied actor, and the row is never recomputed thereafter. The
        row lives in report_snapshots (v1.3.0; renamed from reports).
      type: technical
      enforcement: error
    - id: C-05
      description: >-
        List returns every report ordered by created_at descending (newest
        first); Get returns one report by id or report.ErrNotFound, which
        the handler maps to 404 reports.not_found. Two generations yield
        two distinct immutable rows (no in-place update).
      type: technical
      enforcement: error
    - id: C-06
      description: >-
        RBAC: GET /api/v1/reports and GET /api/v1/reports/{id} require
        host:read; POST /api/v1/reports:generate requires host:write;
        anonymous callers are rejected on all three (auth.EnforcePermission
        with auth.HostRead or auth.HostWrite). A host:read-only caller is
        403 on generate. generated_by records the calling principal's id,
        or 'system' when the request is anonymous, and the wire surfaces no
        signing, PDF, or OSCAL fields.
      type: security
      enforcement: error
    - id: C-07
      description: >-
        v1.1.0 - Generate accepts an optional scope {group_id?,
        framework?}; an empty body generates the all-hosts, all-frameworks
        summary (the v1.0.0 behavior). group_id scopes the posture to that
        group's member hosts - manual groups via group_members, auto groups
        via hosts.os_family == match_family (resolved through the group
        service) - so host_count and every rule count reflect only those
        hosts; an empty group yields zero counts (distinct from unscoped).
        framework applies the same lens as the fleet rollup, counting only
        host_rule_state rows whose framework_refs contain the key
        (framework_refs ? key). The resolved scope (group_id, the group's
        display name frozen at generation time, framework) is stored on the
        row and echoed on the wire, and scope_label is derived as
        "<group name or All hosts>" optionally suffixed with " . <FRAMEWORK
        family>" (the family is the key's leading token, uppercased). An
        unknown group_id surfaces group.ErrNotFound, which the handler maps
        to 400 reports.invalid_scope; a malformed body maps to 400
        reports.invalid_request.
      type: technical
      enforcement: error
    - id: C-08
      description: >-
        v1.2.0 - Generate computes a coverage block over the same in-scope
        active hosts and freezes it on the content, so a reader can tell how
        much of the fleet the numbers actually reflect (the staleness
        disclosure / coverage caveat). hosts_total is the active host count
        in scope (host_count is derived from it, not queried twice);
        hosts_fresh counts hosts whose newest host_rule_state.last_checked_at
        is within the freshness window (24h); hosts_stale counts the rest
        (older-than-window OR never scanned), so hosts_fresh + hosts_stale ==
        hosts_total; hosts_unreachable counts in-scope hosts whose
        host_liveness.reachability_status is 'unreachable' (a host with no
        liveness row is unknown, NOT unreachable). Coverage respects the
        group scope (C-07) the same way the posture counts do.
      type: technical
      enforcement: error
    - id: C-09
      description: >-
        v1.3.0 - Snapshots are content-addressed. Generate stores a
        content_sha256 on the report_snapshots row: the hex SHA-256 of the
        canonical (service-marshaled) content - the exact bytes stored in
        content. Identical content yields an identical hash (content
        addressing), so two snapshots of an unchanged fleet share a
        content_sha256 while remaining distinct rows (distinct ids); a
        posture change changes the hash. content_sha256 is the stable
        identity the Ed25519 signature (C-11) signs over. The report_faces
        table is created for later rendered projections (PDF/CSV/OSCAL) but
        the executive JSON remains the canonical snapshot content, not a
        face row. content_sha256 is exposed on the Report wire.
      type: technical
      enforcement: error
    - id: C-10
      description: >-
        v1.4.0 - GET /api/v1/reports/{id}/export streams a rendered FACE of
        the report as a downloadable attachment (Content-Disposition
        attachment with a derived filename). format=pdf (default) renders a
        BOUNDED one-page executive PDF via the pure-Go go-pdf/fpdf core
        fonts (header + a fixed posture block + the coverage caveat, shown
        only when some host is stale/unreachable + the small top-failing
        list) - O(1) pages regardless of fleet size, never the full
        per-host/per-rule evidence; format=json returns the CANONICAL
        content (v1.5.0: re-marshaled so its bytes reproduce content_sha256
        byte-for-byte, since the stored jsonb is Postgres-normalized - this
        makes the snapshot offline-verifiable, sha256(json face) ==
        content_sha256). The PDF is rendered lazily on first request and
        cached in report_faces keyed by (snapshot_id, face) with status
        'ready', the byte size, and a blob_sha256 content address; a repeat
        export re-streams the cached bytes rather than re-rendering. RBAC:
        host:read. An unknown id is 404 reports.not_found; an unknown
        format is 400 reports.invalid_format (report.ErrInvalidFace).
      type: technical
      enforcement: error
    - id: C-11
      description: >-
        v1.5.0 - Report snapshots are Ed25519-signed for tamper-evidence.
        When a signer is wired, Generate signs the snapshot's content
        address with a domain-separated payload ("openwatch/report-snapshot
        /v1\n" + content_sha256) and stores the signature + the signing key
        id (a public fingerprint of the key) on the row; the Report wire
        exposes signature (base64) + signing_key_id (a service with no
        signer leaves them null). The signing key is a 32-byte raw Ed25519
        seed loaded from a config path (never stored in the DB), with an
        EPHEMERAL per-boot key when unconfigured (development; the
        signing-key endpoint reports ephemeral=true). GET
        /api/v1/reports/signing-key (host:read) returns the public key
        {key_id, algorithm: ed25519, public_key (base64), ephemeral} so a
        holder verifies a report's signature offline: reconstruct the
        domain-separated payload from content_sha256 and Ed25519-verify
        against the published key; re-hashing the canonical json face
        (C-10) confirms the content matches the signed hash. The endpoint is
        503 when no signer is wired.
      type: security
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: >-
        The executive content marshals to the exact wire keys
        (compliance_pct, host_count, passing_rules, failing_rules,
        critical_issues, top_failing_rules, and coverage - itself an object
        with hosts_total, hosts_fresh, hosts_stale, hosts_unreachable); a
        never-evaluated fleet encodes compliance_pct as JSON null (not 0,
        not omitted); an explicitly empty top-failing slice serializes as
        [] (never JSON null) and a populated one preserves the service's
        most-failing first order.
      priority: critical
      references_constraints: [C-01]
    - id: AC-02
      description: >-
        compliance_pct rounds passing over evaluated half up to a whole
        percent and returns nil (not 0) when nothing was evaluated, so the
        document distinguishes an unscanned fleet from a fully failing one.
      priority: critical
      references_constraints: [C-02]
    - id: AC-03
      description: >-
        The fixed executive identity is pinned: the title "Fleet Compliance
        - Executive Summary", kind 'executive', the default (unscoped)
        scope_label "All hosts", and the small top-failing embed cap are
        stable constants the library and any later signing depend on.
      priority: high
      references_constraints: [C-03]
    - id: AC-04
      description: >-
        Generate, over seeded host_rule_state and hosts, samples the live
        posture and freezes it: passing_rules and failing_rules match the
        pass and fail row counts, critical_issues counts the failing rows
        of critical severity, compliance_pct is the rounded
        passing-over-evaluated percent, host_count is the active host count
        (soft-deleted hosts excluded), and top_failing_rules leads with the
        rule failing on the most hosts. The stored row carries the fixed
        title/scope/kind/format, the supplied generated_by, and a
        data_as_of at the sampling instant.
      priority: critical
      references_constraints: [C-04, C-06]
    - id: AC-05
      description: >-
        Generate over a fleet with hosts but no evaluated rule_state rows
        reports nil compliance_pct (never scanned, not 0%), zero pass and
        fail and critical counts, the active host_count, and an empty
        (non-null) top_failing_rules list, so the document and any later
        renderer never see a JSON null slice.
      priority: high
      references_constraints: [C-01, C-02]
    - id: AC-06
      description: >-
        List returns reports newest first by created_at and an empty list
        before any generation; Get fetches the matching report by id and
        round-trips its generated_by; an unknown id returns ErrNotFound.
        Two generations yield two distinct immutable rows ordered by
        creation time (reports are never recomputed in place).
      priority: high
      references_constraints: [C-05]
    - id: AC-07
      description: >-
        v1.1.0 - scope_label is derived from the resolved scope:
        scopeLabel({}) = "All hosts"; a framework-only scope yields
        "All hosts . <FAMILY>" (e.g. "All hosts . CIS"); a group-only scope
        yields the group name; a group+framework scope yields
        "<group> . <FAMILY>". frameworkFamilyLabel shortens a framework key
        to its leading token uppercased (cis_rhel9_v2.0.0 -> CIS,
        stig_rhel9_v2r7 -> STIG, nist_800_53_r5 -> NIST) and maps the empty
        key to the empty string (no lens).
      priority: high
      references_constraints: [C-07]
    - id: AC-08
      description: >-
        v1.1.0 - A group-scoped Generate computes the posture over only the
        group's member hosts: the stored/echoed scope carries group_id and
        the group's display name, scope_label is the group name, and
        host_count plus the pass/fail/critical counts and top_failing_rules
        reflect the in-group host alone (an out-of-group host's rows do not
        inflate them). An unknown group_id returns group.ErrNotFound (which
        the handler maps to a 400 invalid-scope).
      priority: critical
      references_constraints: [C-07]
    - id: AC-09
      description: >-
        v1.1.0 - A framework-scoped Generate counts only host_rule_state
        rows whose framework_refs contain the lens key (framework_refs ?
        key): the echoed scope carries the framework, scope_label carries
        the family ("All hosts . CIS"), and a critical fail tagged only to a
        different framework is excluded from passing_rules, failing_rules,
        critical_issues, and top_failing_rules.
      priority: high
      references_constraints: [C-07]
    - id: AC-10
      description: >-
        v1.2.0 - Generate freezes a coverage block. Over a fleet of a fresh
        host (a host_rule_state check within 24h, reachable), a stale host
        (a check older than 24h), and a never-scanned + unreachable host,
        coverage reads hosts_total 3, hosts_fresh 1, hosts_stale 2 (the
        old-check host plus the never-scanned host), and hosts_unreachable 1
        (the host_liveness 'unreachable' host); a host with no liveness row
        is not counted unreachable, and host_count equals coverage
        hosts_total. An all-fresh fleet reads hosts_stale 0 and an
        all-unscanned fleet reads hosts_fresh 0 / hosts_stale == hosts_total.
      priority: high
      references_constraints: [C-08]
    - id: AC-11
      description: >-
        v1.3.0 - Generate stores a content-addressed snapshot:
        content_sha256 is a 64-char hex string; two generations over an
        unchanged fleet share the same content_sha256 while being distinct
        rows (distinct ids); seeding a new failing rule (a posture change)
        before a third generation yields a different content_sha256.
      priority: high
      references_constraints: [C-09]
    - id: AC-12
      description: >-
        v1.4.0 - renderExecutivePDF emits a structurally valid, non-trivial
        PDF from a report + its executive content: the bytes start with the
        %PDF- magic header and contain the %%EOF trailer, and the document
        is a single page (bounded by construction). Pure unit test (no DB).
      priority: high
      references_constraints: [C-10]
    - id: AC-13
      description: >-
        v1.4.0 - Export serves the json face as CANONICAL content (media
        application/json) whose sha256 equals content_sha256 (v1.5.0), and
        the pdf face as a rendered application/pdf document. The first pdf
        export writes a report_faces row (status 'ready', a 64-char
        blob_sha256, size_bytes == the byte length); a second pdf export
        re-streams the identical cached bytes. An unknown face returns
        ErrInvalidFace (handler 400 reports.invalid_format) and an unknown
        id returns ErrNotFound (handler 404).
      priority: high
      references_constraints: [C-10]
    - id: AC-14
      description: >-
        v1.5.0 - The signer signs a content address (Ed25519, domain
        separated) and VerifySignature confirms it with the public key; a
        tampered content address or the wrong key fails. An empty key path
        yields an ephemeral signer (Ephemeral() true); a 32-byte seed file
        loads a stable, non-ephemeral key (same seed -> same key id); a
        wrong-size seed errors. Pure unit test.
      priority: critical
      references_constraints: [C-11]
    - id: AC-15
      description: >-
        v1.5.0 - Generate with a wired signer stores an Ed25519 signature +
        signing_key_id that verify over the snapshot's content_sha256 (and
        survive a Get round-trip); a service with no signer leaves signature
        and signing_key_id null.
      priority: critical
      references_constraints: [C-11]
    - id: AC-16
      description: >-
        v1.5.0 - End to end over the API: POST /reports:generate (host:write)
        returns a report whose wire carries content_sha256, signature
        (base64), and signing_key_id. GET /api/v1/reports/signing-key
        (host:read) returns {key_id == the report's signing_key_id,
        algorithm "ed25519", public_key (base64), ephemeral true under the
        test's per-boot key}; decoding the public key and the signature and
        reconstructing the domain-separated payload from content_sha256
        Ed25519-verifies the report's signature. An anonymous caller is
        rejected (401/403) on the signing-key endpoint.
      priority: high
      references_constraints: [C-11]
