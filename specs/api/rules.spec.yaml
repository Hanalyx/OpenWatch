spec:
  id: api-rules
  title: Rule library API + normalization
  version: "1.0.0"
  status: approved
  tier: 2

  context:
    system: openwatch
    feature: Kensa rule-library browser
    description: >
      /api/v1/rules serves the full Kensa rule catalog as reference data
      for the rule-library browser on /scans. The corpus is static, so it
      is loaded once at boot into internal/kensa.RuleLibrary via kensa's
      PUBLIC rule read model (pkg/kensa.LoadRuleSummaries, kensa >= v0.4.3)
      and returned whole; the browser filters client-side. Kensa owns the
      normalization (framework references via internal/mappings, the
      remediation summary), so OpenWatch no longer re-parses the
      heterogeneous raw rule schema — it only re-shapes the result into
      plain Go types (framework_refs in the same framework_id -> control-ids
      form as scan results, plus the transactional flag and remediation
      facts). Risk level is intentionally OpenWatch's to own (kensa
      classifies it as operator policy, not a measurement fact).
    related_specs:
      - api-scans
      - api-host-compliance
      - system-rbac

  objective:
    summary: >
      One call — GET /api/v1/rules (scan:read) — returns every rule with
      its normalized framework refs and remediation summary.
    scope:
      includes:
        - Normalize References (nested per-framework map) -> framework_refs
        - Summarize the default implementation's remediation
        - GET /api/v1/rules returns the whole list + total, scan:read
      excludes:
        - Server-side search/filter/paging (client-side in the browser)
        - Per-rule remediation execution (Phase 7 remediation)
        - Reboot/risk fields (absent from the kensa rule schema; pending a
          Kensa-side read model)

  constraints:
    - id: C-01
      description: Framework references MUST come from kensa's public rule read model (pkg/kensa.LoadRuleSummaries / RuleFrameworkRefs, kensa >= v0.4.3), which normalizes the heterogeneous raw references via the canonical internal/mappings scheme — OpenWatch MUST NOT re-parse the raw References map. The handler groups the resulting []FrameworkRef into framework_id -> sorted control ids (the same shape as scan_results.framework_refs)
      type: technical
      enforcement: error
    - id: C-02
      description: The remediation summary MUST be kensa's host-independent RemediationSummary — available, the distinct mechanisms, restarts_services, and reboot_behavior ("boot-param" | "none") — plus the rule's transactional ("atomic") flag. It MUST NOT add a remediation risk level (kensa classifies risk as operator policy, owned by OpenWatch) nor a blanket requires-reboot boolean
      type: technical
      enforcement: error
    - id: C-03
      description: GET /api/v1/rules MUST require scan:read — an anonymous caller gets 401/403; the endpoint is unreachable without the permission
      type: security
      enforcement: error
    - id: C-04
      description: GET /api/v1/rules MUST return the whole normalized rule list and a total count; each item carries id, title, description, severity, category, tags, framework_refs, and remediation
      type: technical
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: groupRefs groups kensa's already-normalized FrameworkRef list (framework_id + control_id) into a framework_id -> control ids map, dropping empty ids and sorting each control slice.
      priority: critical
      references_constraints: [C-01]
    - id: AC-02
      description: fromSummary maps a kensa RuleSummary to the library item, carrying the transactional flag and the remediation facts (available, mechanisms, restarts_services, reboot_behavior) verbatim.
      priority: high
      references_constraints: [C-02]
    - id: AC-03
      description: An anonymous request to GET /api/v1/rules returns 401/403; a viewer session (which holds scan:read) returns 200.
      priority: critical
      references_constraints: [C-03]
    - id: AC-04
      description: GET /api/v1/rules returns total == len(rules) and a rules array whose items carry id/title/description/severity/category/tags/framework_refs/transactional/remediation; the remediation summary (available, mechanisms, restarts_services, reboot_behavior) distinguishes an automated remediation from a manual one.
      priority: high
      references_constraints: [C-04]
