spec:
  id: api-users
  title: User CRUD + custom-role administration
  version: "1.2.0"
  status: approved
  tier: 2

  context:
    system: openwatch-go
    feature: Admin endpoints for users and custom roles
    description: >
      HTTP face of the users + role-assignment service. All endpoints
      require admin-level permissions enforced by the existing
      auth.EnforcePermission middleware. Custom roles land here per
      docs/rbac_registry.md §8.3 — validated against the codegen-only
      auth.Permissions registry so a role granting an unknown
      permission cannot exist in the database.
    related_specs:
      - system-user-management
      - system-rbac

  objective:
    summary: >
      One spec for "manage who exists and what they can do." Users CRUD
      is the human-facing surface; custom-role creation is the
      RBAC-extension hook. Permission shape stays in code (codegen
      Permissions map) and role membership in DB (roles.permissions).
    scope:
      includes:
        - GET/POST /users
        - GET/DELETE /users/{id}
        - POST /users/{id}/roles:assign
        - POST /users/{id}/roles:unassign
        - POST /roles (custom role create)
        - "POST /users/{id}:reset-password (admin reset, own or another's)"
        - "POST /users/{id}:disable and :enable (account disable)"
      excludes:
        - "PUT /users/{id} (email patch) — deferred to A.5"
        - "DELETE / PUT /roles (built-ins can't be touched, custom-role delete deferred)"
        - "Pagination — Slice A returns a flat slice; Slice B adds cursor pagination"

  constraints:
    - id: C-01
      description: User read responses MUST NEVER include password_hash; the users.User struct already excludes it but every JSON shape MUST be audited
      type: security
      enforcement: error
    - id: C-02
      description: POST /users MUST require auth.UserWrite; GET requires auth.UserRead; DELETE requires auth.UserDelete; role assign/unassign require auth.RoleAssign; POST /roles requires auth.RoleWrite
      type: security
      enforcement: error
    - id: C-03
      description: POST /roles MUST validate every permission against auth.Permissions; unknown permission ⇒ 400 with detail.invalid_permissions
      type: security
      enforcement: error
    - id: C-04
      description: Custom role id MUST NOT collide with a built-in role id (viewer | auditor | ops_lead | security_admin | admin); collision ⇒ 409
      type: security
      enforcement: error
    - id: C-05
      description: POST /users/{id}/roles:assign MUST NOT let a caller grant a role more privileged than themselves. The assigned role's permission set MUST be a subset of the assigning caller's own permissions; otherwise the request is denied 403 and no role is assigned. This prevents privilege escalation via role assignment (mirrors the api-tokens C-03 rule; both use auth.RoleGrantsWithin).
      type: security
      enforcement: error
    - id: C-06
      description: 'POST /users/{id}:reset-password MUST require admin:user_manage and set the target''s password WITHOUT requiring the current password (administrator authority). The new password MUST run through the role-aware policy + breach screen (rejected => 400), and on success the target''s active sessions MUST be revoked so they re-authenticate. The target MAY be the caller themselves (admin reset of own password).'
      type: security
      enforcement: error
    - id: C-07
      description: 'POST /users/{id}:disable and :enable MUST require admin:user_manage. Disable sets users.disabled_at and MUST revoke the target''s active sessions; a disabled user MUST be unable to authenticate (the login path rejects them with a generic invalid-credentials response, no account-state enumeration, while the audit records reason=account_disabled). Enable clears disabled_at. An admin MUST NOT disable their own account (409 users.cannot_disable_self). Cookie sessions are cut off immediately via revocation + the login block; full Bearer-JWT / API-token disable enforcement is a documented hardening follow-up.'
      type: security
      enforcement: error
    - id: C-08
      description: 'Each admin user-management mutation MUST emit its audit code (admin.user.password_reset | admin.user.disabled | admin.user.enabled) carrying detail.target_user_id; an unknown or soft-deleted target MUST return 404 users.not_found.'
      type: technical
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: POST /users with admin caller and valid body returns 201 with the new user JSON; response body does NOT contain a password_hash key.
      priority: critical
      references_constraints: [C-01, C-02]
    - id: AC-02
      description: POST /users with a caller missing user:write returns 403 authz.permission_denied; no user is inserted.
      priority: critical
      references_constraints: [C-02]
    - id: AC-03
      description: POST /users with a weak password (fails NIST policy) returns 400; no user inserted.
      priority: critical
    - id: AC-04
      description: GET /users with auth.UserRead returns 200 with a JSON array of users; each item lacks password_hash.
      priority: critical
      references_constraints: [C-01, C-02]
    - id: AC-05
      description: GET /users with a caller missing user:read returns 403.
      priority: critical
      references_constraints: [C-02]
    - id: AC-06
      description: GET /users/{id} with admin caller returns 200 with the user; unknown id returns 404.
      priority: critical
    - id: AC-07
      description: DELETE /users/{id} with auth.UserDelete returns 204; subsequent GET returns 404.
      priority: critical
      references_constraints: [C-02]
    - id: AC-08
      description: POST /users/{id}/roles:assign with body {role_id - "viewer"} returns 204; user_roles row created; role:assign permission enforced.
      priority: critical
      references_constraints: [C-02]
    - id: AC-09
      description: POST /users/{id}/roles:assign with unknown role id returns 400 with error.code = "users.unknown_role".
      priority: critical
    - id: AC-10
      description: POST /users/{id}/roles:unassign returns 204; idempotent (second call also 204).
      priority: high
    - id: AC-11
      description: POST /roles with a fresh id and a list of valid permissions returns 201 with the role JSON; roles.permissions TEXT[] column populated.
      priority: critical
      references_constraints: [C-03]
    - id: AC-12
      description: POST /roles with id="admin" (built-in collision) returns 409 with error.code = "users.role_id_taken"; POST /roles with an unknown permission returns 400 with error.code = "users.unknown_permission" and detail.invalid_permissions listing them.
      priority: critical
      references_constraints: [C-03, C-04]
    - id: AC-13
      description: POST /users/{id}/roles:assign applies the auth.RoleGrantsWithin subset check before assigning — assigning a role within the caller's grant returns 204, and a role whose permissions exceed the caller's is denied 403 with no row written. (Only the admin role currently holds role:assign, and admin's grant covers every role, so the exceeds-grant denial is asserted directly on auth.RoleGrantsWithin; it becomes reachable if a non-admin role is ever granted role:assign.)
      priority: critical
      references_constraints: [C-05]
    - id: AC-14
      description: 'POST /users/{id}:reset-password as an admin on another user returns 204 with no current password; the target''s active sessions are revoked and the new password authenticates at login. A password that fails policy (too short/long/breached) returns 400 validation.password_policy and leaves the old password intact. A caller lacking admin:user_manage is 403.'
      priority: critical
      references_constraints: [C-06]
    - id: AC-15
      description: 'POST /users/{id}:reset-password targeting the caller''s OWN id returns 204 (an admin resets their own password without supplying the current one) and emits admin.user.password_reset with detail.self=true.'
      priority: high
      references_constraints: [C-06]
    - id: AC-16
      description: 'POST /users/{id}:disable as an admin returns 200 with disabled_at set; the disabled user can no longer log in (login returns the generic auth.invalid_credentials, audit reason=account_disabled) and their existing sessions are revoked. Emits admin.user.disabled with detail.target_user_id.'
      priority: critical
      references_constraints: [C-07]
    - id: AC-17
      description: 'POST /users/{id}:enable clears disabled_at (200, disabled_at null) and the user can authenticate again; emits admin.user.enabled.'
      priority: high
      references_constraints: [C-07]
    - id: AC-18
      description: 'An admin calling POST /users/{id}:disable with their OWN id is denied 409 users.cannot_disable_self and the account is unchanged (still able to authenticate).'
      priority: critical
      references_constraints: [C-07]
    - id: AC-19
      description: 'reset-password, :disable and :enable each return 404 users.not_found for an unknown/soft-deleted user, and each requires admin:user_manage (a caller without it is 403 before any state change).'
      priority: high
      references_constraints: [C-06, C-07, C-08]
