spec:
  id: frontend-host-detail
  title: Host Detail page layout, behavior, and empty-state contracts
  version: "1.2.0"
  status: approved
  tier: 2

  context:
    system: openwatch-go
    feature: Per-host inventory and compliance surface, prototype-faithful
    description: >
      The Host Detail page is the operator's drill-down for a single
      host. It mirrors the v1 prototype (app/docs/prototypes/openwatch-v1/Host
      Detail.html) — same sections, same card order, same empty-state
      pattern. Where the backend subsystem that populates a card does
      not exist yet (server intelligence, auto-scan scheduler, alerts,
      posture snapshots, hardware metrics), the card renders the
      prototype's "Not yet available" pattern and names the deferred
      backlog item so the operator understands it is not a bug.

      Path A from the SDD review: build the prototype shell now,
      every card slot present, real data where backends exist, honest
      empty states everywhere else. This forces backend work to land
      against a known UI contract and lets operators see the eventual
      surface today.

    related_specs:
      - api-hosts
      - system-liveness-loop
      - api-events-stream
      - system-event-bus

  objective:
    summary: >
      Render the prototype's six structural bands (back link, page-head
      with status badge + sub-line metadata, conditional offline
      banner, tabs row with 10 tabs, 4-column hero stat strip, two-
      column overview body) using real data from the API where it
      exists. Every card slot present even when its backend subsystem
      is deferred — empty states name the missing subsystem.
    scope:
      includes:
        - 'Back link to /hosts (chevron + label)'
        - 'Page-head: hostname (mono) + status badge + sub-line metadata + action row'
        - 'Conditional offline banner when monitoring_state is down/critical'
        - 'Tabs row with all 10 prototype tabs; only Overview is functional'
        - '4-column hero stat strip: Compliance, Auto-scan, Connectivity, Watchlist'
        - 'Two-column Overview body: left (Top failed rules, Server intelligence, Compliance trend); right (System, Recent activity)'
        - 'Empty-state cards that name the deferred backend subsystem'
      excludes:
        - 'Functional Compliance / Packages / Services / Users / Network / Audit log / Activity / Remediation / Terminal tabs — backend subsystems missing'
        - 'Hardware metric collection (CPU/Disk/Memory)'
        - 'Server intelligence collection (packages/services/users/network)'
        - 'Adaptive compliance scheduler'
        - 'Alert thresholds / Watchlist'
        - 'Posture snapshot trend chart'

  constraints:
    - id: C-01
      description: 'Page MUST present six structural bands in order: (1) back link, (2) page-head with hostname + status badge + sub-line + action row, (3) conditional offline banner, (4) tabs row, (5) hero stat strip, (6) two-column overview body. Missing or reordered bands fail visual parity with the prototype'
      type: technical
      enforcement: error
    - id: C-02
      description: 'Status badge inline with the hostname MUST use the v1.3.0 5-band classification (online/degraded/critical/down/maintenance/unknown). The legacy binary online/down badge is forbidden. Each band has its own color and label'
      type: technical
      enforcement: error
    - id: C-03
      description: 'Sub-line metadata row matches the prototype''s spacing pattern: IP (mono), environment chip, OS slot, Kernel slot, Uptime slot — in that order. OS appears BEFORE Kernel always (v1.0.4 — operator UX). When the distribution is known, the OS slot renders as "colored dot + distribution name" with no label prefix. When unknown, the slot still renders with bare "OS" prefix + em-dash placeholder (matching the Kernel / Uptime placeholder pattern). Kernel and Uptime carry their bare prefix + value or em-dash. NO colon-style "OS:" / "Kernel:" / "Uptime:" prefixes. Server intelligence collection populates these values (BACKLOG)'
      type: technical
      enforcement: error
    - id: C-04
      description: 'Tabs row MUST render all 10 prototype tabs in order: Overview, Compliance, Packages, Services, Users, Network, Audit log, Activity, Remediation, Terminal. Only Overview is functional in v1.0.0; selecting any other tab renders an empty-state stub that NAMES the deferred backend subsystem'
      type: technical
      enforcement: error
    - id: C-05
      description: 'Hero stat strip MUST contain four cards in order: Compliance, Auto-scan, Connectivity, Watchlist. Cards with data (Compliance from compliance_summary; Connectivity from host + liveness) render real values; cards without backend (Auto-scan, Watchlist) render the prototype empty-state with the backlog pointer'
      type: technical
      enforcement: error
    - id: C-06
      description: 'Overview body MUST be a two-column grid. Left column: Top failed rules, Server intelligence, Compliance trend. Right column: System, Recent activity. Empty-state cards MUST identify which backend subsystem populates them so operators do not mistake missing data for a bug'
      type: technical
      enforcement: error
    - id: C-07
      description: 'Maintenance toggle MUST render as a switch-style control inline with the page-head action row (not a separate button below the LivenessIndicator). Matches the prototype''s "Pause scans & alerts while maintenance is on" affordance'
      type: technical
      enforcement: error
    - id: C-08
      description: 'Offline banner MUST render ONLY when monitoring_state is down or critical AND last_state_change_at is more than 5 minutes ago. The banner body uses last_state_change_at to compute the "X minutes" delta. Online and degraded hosts never see the banner'
      type: technical
      enforcement: error
    - id: C-09
      description: 'Recent activity card MUST source events from the unified GET /api/v1/activity feed scoped to the current host (host_id=X). The endpoint UNIONs alert + transaction + intelligence + audit + monitoring per system-activity v1.1.0; each event carries a closed-enum severity which the card tints (crit for critical/high, warn for medium, ok for info, neutral for low). The card MUST render at most 5 rows (the overview slice) and provide a "View all" link to the host''s Activity tab. Empty feed renders the "No activity yet" empty state.'
      type: technical
      enforcement: error
    - id: C-10
      description: 'Compliance hero card MUST render the percentage from compliance_summary.passing / compliance_summary.total. When total is 0, render the prototype empty-state ("No scan data yet") rather than NaN%. Pass/fail stacked bar widths come from the same numerator/denominator. The header sub-cell shows "LAST SCAN <date>" (the prototype''s subhead) — the Framework selector belongs on the Compliance tab, NOT this hero card'
      type: technical
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: 'HostDetailPage source renders the six structural bands in declaration order: back-link region, page-head region (hostname + status badge + sub-line + action row), offline-banner conditional, tabs row, hero stat strip, two-column overview body. Source inspection asserts the sentinel components appear in order.'
      priority: critical
      references_constraints: [C-01]
    - id: AC-07
      description: 'Maintenance toggle is rendered as a switch-style control inline with the page-head action row. The control sits beside the Terminal / Run scan / Edit buttons, NOT in a separate column under the LivenessIndicator. Source inspection asserts the MaintenanceToggle is mounted from the page-head action row block.'
      priority: critical
      references_constraints: [C-07]
    - id: AC-02
      description: 404 response from GET /hosts/{id} renders a distinct "Host not found" region with a back-to-hosts CTA, NOT a generic error toast.
      priority: critical
    - id: AC-03
      description: 403 response from GET /hosts/{id} surfaces the authz.permission_denied code with an "Access denied" message in the body — host content is not rendered.
      priority: critical
    - id: AC-04
      description: 'Populated compliance_summary renders the correct math (Math.round(passing / total * 100)) and labels for each status (passing, failing, skipped, error). The label text matches the prototype''s wording exactly.'
      priority: critical
      references_constraints: [C-10]
    - id: AC-05
      description: 'compliance_summary with total=0 renders the prototype''s empty-state ("No compliance data for this host yet") rather than NaN%, matching the prototype''s "Not enough data yet" pattern.'
      priority: critical
      references_constraints: [C-10]
    - id: AC-06
      description: 'liveness=null on the HostLiveness sub-object renders the prototype''s "Not yet probed" copy in the connectivity slot. The status badge falls back to the unknown band.'
      priority: critical
      references_constraints: [C-02]
    - id: AC-08
      description: 'The Compliance tab framework filter updates the URL search param and re-fetches GET /hosts/{id}?framework=<id>. The TanStack Query queryKey includes the framework value so the cache key changes.'
      priority: critical
    - id: AC-09
      description: 'Edit button in the page-head action row opens EditHostModal wired to PATCH /api/v1/hosts/{id}; on success the host + hosts query keys are invalidated.'
      priority: critical
    - id: AC-14
      description: 'No console.log/warn/error call site embeds a PII field name (token, password, secret, evidence). Source-inspection of HostDetailPage.tsx.'
      priority: critical
    - id: AC-15
      description: 'Page-head sub-line carries IP (mono), environment chip, then THREE prototype-style slots in this exact order: OS, Kernel, Uptime. Each slot carries a bare prefix (no colon). OS renders the distribution name with a leading colored dot when known; when unknown it still renders with "OS" prefix + em-dash (v1.0.4 — operator wants the OS slot ALWAYS visible, before Kernel). Kernel + Uptime render their prefix + value or em-dash.'
      priority: critical
      references_constraints: [C-03]
    - id: AC-16
      description: 'Status badge inline with the hostname MUST use a band-aware StatusPill that renders the five v1.3.0 bands distinctly (online/degraded/critical/down/maintenance/unknown). The legacy binary online/down rendering is FORBIDDEN.'
      priority: critical
      references_constraints: [C-02]
    - id: AC-17
      description: 'Offline banner renders ONLY when monitoring_state is "down" or "critical" AND now - last_state_change_at >= 5 minutes. The banner body shows "Host unreachable for X minutes" computed from last_state_change_at. Online/degraded/maintenance/unknown hosts MUST NOT see the banner.'
      priority: critical
      references_constraints: [C-08]
    - id: AC-18
      description: 'Tabs row renders 10 tabs in this exact order: Overview, Compliance, Packages, Services, Users, Network, Audit log, Activity, Remediation, Terminal. Each non-Overview tab, when selected, renders an empty-state stub naming the deferred backend subsystem (e.g. "Server Intelligence collection — BACKLOG").'
      priority: critical
      references_constraints: [C-04]
    - id: AC-19
      description: 'Hero stat strip renders four cards in this exact order: Compliance, Auto-scan, Connectivity, Watchlist. Compliance + Connectivity have real backend data; Auto-scan + Watchlist render empty states naming the deferred subsystem.'
      priority: critical
      references_constraints: [C-05]
    - id: AC-20
      description: 'Connectivity hero card renders: SSH endpoint (mono, username + ip + port), Auth method label, Last seen relative-time from liveness.last_probe_at, and two actions (Reconnect, Edit credentials). When liveness=null, the card shows "Not yet probed" instead of the rows.'
      priority: critical
      references_constraints: [C-05]
    - id: AC-21
      description: 'Auto-scan card renders the prototype empty-state ("Auto-scan scheduler — coming soon") with a single sentence naming the adaptive compliance scheduler as the backend subsystem that will populate it.'
      priority: high
      references_constraints: [C-05]
    - id: AC-22
      description: 'Watchlist card renders the prototype empty-state ("Alerts subsystem — coming soon") naming the alerts/exceptions backend as the subsystem that will populate it.'
      priority: high
      references_constraints: [C-05]
    - id: AC-23
      description: 'Overview body is a CSS grid with two columns. Left column children in order: Top failed rules, Server intelligence, Compliance trend. Right column children in order: System, Recent activity.'
      priority: critical
      references_constraints: [C-06]
    - id: AC-24
      description: 'Top failed rules + Server intelligence + Compliance trend cards each render an empty-state naming the missing backend (compliance scanner / server intelligence collection / posture snapshots). The card shell (head + body container) renders even when empty so the grid stays balanced.'
      priority: high
      references_constraints: [C-06]
    - id: AC-25
      description: 'System card has three spec-groups in this order: Operating system, Hardware, Network. The Operating-system group is owned by frontend-host-detail-system-card v1.0.0 (wired to real Discovery + IntelligenceState data); the Hardware group renders the "Hardware metrics not collected" empty state; the Network group renders Primary IP + SSH endpoint + a Firewall placeholder. v1.0.5: "unknown" placeholder strings replaced with em-dash / "Not discovered yet" empty state — see frontend-host-detail-system-card.'
      priority: critical
      references_constraints: [C-06]
    - id: AC-26
      description: 'Recent activity card sources events from GET /api/v1/activity?host_id=X (the unified five-source feed per system-activity v1.1.0). It MUST slice the response to at most 5 rows (the overview limit) and render a "View all" link in the card header that routes to the host''s Activity tab. Severity tinting MUST follow the closed enum mapping (critical/high → crit color, medium → warn, info → ok, low → neutral). Empty response renders the "No activity yet" empty-state.'
      priority: critical
      references_constraints: [C-09]
    - id: AC-27
      description: 'Page pushes its breadcrumb trail ("Infrastructure / Hosts / <hostname>") into the global useBreadcrumbStore so the sticky TopBar renders it — same pattern as HostsListPage. NO inline crumbs element on the page body. The trail clears on unmount.'
      priority: high
      references_constraints: [C-01]
    - id: AC-28
      description: 'Tabs row MUST render an icon next to each label, matching the prototype''s tab affordance: grid icon for Overview, shield for Compliance, package for Packages, server for Services, users for Users, wifi for Network, file-text for Audit log, activity for Activity, wrench for Remediation, terminal for Terminal. Icons come from lucide-react.'
      priority: high
      references_constraints: [C-04]
    - id: AC-29
      description: 'HeroAutoScan empty state MUST render the prototype''s structured rows: a status line ("● Disabled" gray dot until the scheduler ships), Next row ("—"), Interval row ("—"), then a single-line footer naming the adaptive compliance scheduler. No "Not yet available" blob.'
      priority: high
      references_constraints: [C-05]
    - id: AC-30
      description: 'HeroWatchlist empty state MUST render the prototype''s structured rows: "Active alerts 0" with subtext "No alerts firing", "Exceptions 0" with subtext "No suppressed rules", then a single-line footer naming the alerts subsystem. No "Not yet available" blob.'
      priority: high
      references_constraints: [C-05]
    - id: AC-31
      description: 'HeroConnectivity MUST render a prominent status line under the header showing "● <band>" with the band color (e.g. "● Down" in red, "● Online" in green) so the operator can read connectivity state at a glance, matching the prototype.'
      priority: high
      references_constraints: [C-05]
    - id: AC-32
      description: 'Back navigation in the page-head MUST be a round chevron pill button to the LEFT of the hostname (matching the prototype''s back-btn affordance). The standalone "Hosts" text link above the page-head is removed; the breadcrumb in the TopBar plus the chevron pill cover both discoverability and one-click return.'
      priority: high
      references_constraints: [C-01]
    - id: AC-33
      description: 'Maintenance toggle MUST be a switch-style control with a visible round knob that slides on/off (not a checkbox-in-pill). The track + knob respect the band color when ON (warn-tinted). Matches the prototype''s switch affordance.'
      priority: high
      references_constraints: [C-07]
    - id: AC-34
      description: 'Offline banner MUST name the failing layer when liveness.last_error_type or per-layer counters allow inference. Map: icmp_* → "ping", tcp_*/banner_mismatch/connection_refused → "SSH", privilege_denied → "privilege escalation". Surface as a secondary line ("Failed at <layer>") so operators can route the right fix (network team vs sshd vs sudoers).'
      priority: critical
      references_constraints: [C-08]
    - id: AC-35
      description: 'HeroCompliance subhead in the card header MUST be "LAST SCAN <date>" (e.g. "LAST SCAN 4/19/2026" or "LAST SCAN —" when no scan has run), NOT a Framework selector. The Framework filter belongs on the Compliance tab when that tab ships; including it in the Overview hero clutters the affordance and was an explicit prototype miss.'
      priority: high
      references_constraints: [C-10]
    - id: AC-36
      description: 'v1.1.0 — the page-head Run scan button is LIVE (no longer a disabled placeholder): it POSTs /api/v1/hosts/{id}/scans with a crypto.randomUUID() Idempotency-Key header, disables itself while the request is pending, surfaces a 409 as a transient "Scan already running" note (not an error), and does NOT poll — the result refresh arrives via the scan.completed SSE topic (frontend-live-events C-07).'
      priority: critical
      references_constraints: [C-07]
    - id: AC-37
      description: 'v1.2.0 — the Top failed rules card is LIVE: it queries GET /api/v1/hosts/{id}/compliance/failed-rules with limit 5 (plus the ?framework= search param when present) under query key ["host", hostId, "failed_rules", ...] — prefixed ["host", hostId] so the scan.completed SSE invalidation refreshes it with no extra wiring. Rows render severity pill, catalog title, control ids (or native rule id) and category; the footer "View all N failed rules" uses total_failing and routes to the Compliance tab. Three honest states: never-scanned keeps the original empty copy, zero failing renders "No failing rules", and errors render inline with a Retry. Evidence is never requested or displayed (api-host-compliance C-02). No Remediate action until Phase 7.'
      priority: critical
      references_constraints: [C-10]
