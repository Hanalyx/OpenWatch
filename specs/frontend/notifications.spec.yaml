spec:
  id: frontend-notifications
  title: In-app notification bell — durable per-user feed (change-driven)
  version: "2.0.0"
  status: approved
  tier: 2

  context:
    system: openwatch-go
    feature: The TopBar notification bell and its Zustand store, the first consumer of report.ready
    description: >
      The TopBar bell is the in-app notification surface. Its first (and
      currently only) producer is the backend report.ready event: when a
      generated Framework Attestation's bulk faces finish rendering
      asynchronously (spec api-reports B3a), the useLiveEvents handler
      (spec frontend-live-events C-08 / AC-10) bumps an unread counter in a
      small Zustand store (useNotificationStore). The bell renders that
      counter as a badge and, on click, opens the Reports library and clears
      the counter.

      MVP scope is deliberately small and honest. The counter is
      SESSION-SCOPED: it lives only in the in-memory store, so a page
      refresh resets it. There is no server-side notification feed, no
      per-item read state, and no dropdown list of individual
      notifications. A richer feed (a dropdown of distinct notifications,
      multiple event types, durable per-user persistence) is a deferred
      follow-on and is NOT faked here — the bell shows a truthful count of
      report.ready events received this session, nothing more.

    related_specs:
      - frontend-live-events
      - api-reports
      - frontend-reports

  objective:
    summary: >
      A working notification bell driven by report.ready: a Zustand store
      exposing a session-scoped unread counter with bump/clear actions, and
      a TopBar bell that renders the count as a badge and navigates to
      /reports (clearing the count) on click. No faked feed, no faked
      persistence.
    scope:
      includes:
        - 'useNotificationStore: unreadReports counter + bumpReportReady + clearReports'
        - 'TopBar NotificationBell renders the count as a badge when unreadReports > 0'
        - 'Clicking the bell navigates to /reports and clears the counter'
      excludes:
        - 'A dropdown feed listing individual notifications (deferred)'
        - 'Server-side / cross-session persistence of notifications (deferred; the counter is session-scoped)'
        - 'Notification event types other than report.ready (deferred)'
        - 'The report.ready SSE handler itself (owned by frontend-live-events C-08)'

  constraints:
    - id: C-01
      description: >-
        v2.0.0 — the bell is backed by the DURABLE server feed, not a
        session counter. useNotifications (src/hooks/useNotifications.ts)
        exposes useNotificationFeed (a TanStack query of
        GET /api/v1/notifications/feed returning {items, unread_count}, polled
        on an interval) plus useMarkNotificationRead and
        useMarkAllNotificationsRead mutations that POST the :read / :read-all
        endpoints and invalidate the feed query key ['notifications','feed'].
        useLiveEvents also invalidates that key on report.ready
        (frontend-live-events C-08).
      type: technical
      enforcement: error
    - id: C-02
      description: >-
        v2.0.0 — the TopBar NotificationBell renders the badge from the feed's
        unread_count ONLY when greater than zero. Clicking the bell toggles a
        drawer listing the caller's recent notifications (severity dot + title
        + body); an item click marks it read (useMarkNotificationRead) and, when
        the notification carries a same-origin link, navigates there; a "Mark
        all read" control calls useMarkAllNotificationsRead. The bell is an
        enabled control (not the disabled "coming soon" stub) and its added copy
        carries no em-dash.
      type: technical
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: >-
        v2.0.0 source inspection: useNotifications (src/hooks/useNotifications.ts)
        defines useNotificationFeed querying GET /api/v1/notifications/feed under
        queryKey ['notifications','feed'], plus useMarkNotificationRead and
        useMarkAllNotificationsRead mutations that POST
        /api/v1/notifications/feed/{id}:read and /api/v1/notifications/feed:read-all
        and invalidate the feed query key on success.
      priority: critical
      references_constraints: [C-01]
    - id: AC-02
      description: >-
        v2.0.0 source inspection: TopBar's NotificationBell reads the unread
        count from the feed query (unread_count) and renders a badge only when
        it is greater than zero; clicking toggles a drawer, an item click calls
        the mark-read mutation, and a "Mark all read" control calls the
        mark-all mutation. The bell is not the disabled "coming soon" stub and
        its added copy contains no em-dash.
      priority: high
      references_constraints: [C-02]
