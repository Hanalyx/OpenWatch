spec:
  id: frontend-reports
  title: Reports page - Library table, Generate action, deferred Templates and Scheduled tabs
  version: "1.1.0"
  status: approved
  tier: 2

  context:
    system: openwatch-go
    feature: The /reports page - a Library tab listing generated reports with a Generate action, plus deferred Templates and Scheduled tabs, over api-reports
    description: >
      ReportsPage is the operator's compliance-artifact library over
      api-reports. The openwatch-v1 Reports.html prototype is a richer
      surface (a six-template gallery, a Scheduled dispatcher with
      delivery rows, a signed-report viewer modal, and an OSCAL artifact
      viewer), but most of that is backend-gated: the MVP backend signs
      nothing, renders no PDF or OSCAL, and runs no scheduler. This spec
      covers the data-faithful subset, styled to the prototype: a Library
      tab plus a Generate action, with the Templates and Scheduled tabs
      rendered as honest "coming soon" deferred states rather than faked
      data or signing.

      The Library tab issues a single query keyed ["reports"] against GET
      /api/v1/reports via api.GET from @/api/client and renders a table of
      the returned reports: the title, a type chip from kind, the
      scope_label, the data_as_of, the generated_by actor, and the format.
      A "Generate report" control POSTs /api/v1/reports:generate and, on
      success, invalidates the ["reports"] query so the new row appears.

      The Generate control is permission gated via
      useAuthStore.hasPermission("host:write"): a host:read-only caller
      sees the Library table but no Generate control. The server still
      enforces the bar; the UI gate is a usability layer.

      The Templates and Scheduled tabs render an explicit deferred state
      (a "coming soon" message naming what is not yet built) and call no
      endpoint, so the page never fakes a signed artifact or a schedule.
      Styling follows the dashboard primitives: cards, bottom-border tabs,
      and a type chip, built from inline styles over the --ow-* design
      tokens, with honest loading, empty, and error states
      (apiErrorMessage). UI copy carries no em-dashes.

    related_specs:
      - api-reports
      - frontend-scans
      - frontend-groups
      - frontend-foundation

  objective:
    summary: >
      Opening /reports shows the real Library of generated reports with a
      Generate action gated on host:write, and presents the Templates and
      Scheduled tabs as honest deferred states, with loading, empty, and
      error handling. No faked signing, PDF, OSCAL, or schedules.
    scope:
      includes:
        - 'ReportsPage at /reports: Library tab table from GET /api/v1/reports'
        - 'Library columns: title, type chip (kind), scope, data as of, generated by, format'
        - 'Generate action: POST /api/v1/reports:generate, ["reports"] invalidation, permission gated on host:write'
        - 'Templates and Scheduled tabs as honest "coming soon" deferred states (no endpoint, no faked data)'
        - 'Route mounted at path "reports" under protectedRoute and the sidebar Reports entry enabled'
        - 'Prototype styling on --ow-* tokens with honest loading / empty / error states'
      excludes:
        - 'The signed-report viewer modal and the "Signed" badge (the MVP stores no signature)'
        - 'PDF and OSCAL export plus the OSCAL artifact viewer (no rendering in the MVP)'
        - 'The six-template Templates gallery with a per-template builder (deferred to a coming-soon state)'
        - 'The Scheduled dispatcher with delivery rows and toggles (deferred to a coming-soon state)'
        - 'A scope or framework-lens or period picker on Generate (the MVP generates the executive summary for all hosts)'

  constraints:
    - id: C-01
      description: >-
        ReportsPage issues a single query keyed ["reports"] against GET
        /api/v1/reports via api.GET from @/api/client and renders a Library
        table off the response reports: each row shows the title, a type
        chip derived from kind, the scope_label, the data_as_of, the
        generated_by actor, and the format. router.tsx mounts ReportsPage
        at path "reports" under protectedRoute and the sidebar Reports
        entry is enabled.
      type: technical
      enforcement: error
    - id: C-02
      description: >-
        The Generate control POSTs /api/v1/reports:generate and
        invalidates the ["reports"] query on success so the new report
        appears. The control is permission gated via
        useAuthStore.hasPermission("host:write"): a host:read-only caller
        sees the Library table but no Generate control. The server still
        enforces the bar; the UI gate is a usability layer.
      type: security
      enforcement: error
    - id: C-04
      description: >-
        v1.1.0 - A scope picker beside the Generate control lets the
        generator scope the next report to a group. It is a select bound to
        a scopeGroupId state whose default option is "All hosts" (value
        ""); the other options are the groups from a ["groups"] query
        against GET /api/v1/groups. On generate the POST body includes
        group_id only when a group is selected (an empty selection posts the
        unscoped {} body). The picker renders only for a host:write caller
        (alongside the gated Generate control), and the groups query is
        enabled only then. The generated report's scope_label (already shown
        in the Library and detail) reflects the chosen scope.
      type: technical
      enforcement: error
    - id: C-03
      description: >-
        The Templates and Scheduled tabs render an explicit deferred state
        (a "coming soon" message) and call no endpoint, so the page never
        fakes a signed artifact, a PDF, an OSCAL document, or a schedule.
        Loading, empty, and error states are honest: apiErrorMessage drives
        the error text rather than a crash, and an empty Library renders an
        empty state rather than a blank table. Prose UI copy carries no
        em-dashes.
      type: technical
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: >-
        Source inspection: ReportsPage issues a single query with queryKey
        ["reports"] against "/api/v1/reports" via api.GET from @/api/client
        and renders a Library table whose rows read title, kind (as a type
        chip), scope_label, data_as_of, generated_by, and format off the
        response. router.tsx mounts ReportsPage at path "reports" under
        protectedRoute and the sidebar Reports entry is enabled.
      priority: critical
      references_constraints: [C-01]
    - id: AC-02
      description: >-
        Source inspection: the Generate control POSTs
        "/api/v1/reports:generate" and invalidates the queryKey ["reports"]
        on success. The control renders under hasPermission("host:write")
        from useAuthStore; a host:read-only caller sees no Generate control.
      priority: critical
      references_constraints: [C-02]
    - id: AC-03
      description: >-
        Source inspection: the Templates and Scheduled tabs render an
        explicit deferred ("coming soon") state and issue no api.GET for
        those tabs (no faked signing, PDF, OSCAL, or schedule data). The
        page renders honest loading, empty, and error states, with error
        text from apiErrorMessage and an empty-Library empty state.
      priority: high
      references_constraints: [C-03]
    - id: AC-04
      description: >-
        Source inspection: the page's only mutating request is the Generate
        POST to "/api/v1/reports:generate" (no PUT or DELETE), the card and
        tab chrome is styled with the --ow-* design tokens (no raw color
        literals for the chrome), and the prose UI copy contains no em-dash.
      priority: high
      references_constraints: [C-03]
    - id: AC-05
      description: >-
        v1.1.0 - Source inspection: a scope select bound to a scopeGroupId
        state offers an "All hosts" default (value "") plus options from a
        ["groups"] query against "/api/v1/groups"; the generate body sends
        group_id only when scopeGroupId is set (otherwise an empty body).
        The groups query is enabled on canGenerate so the picker is a
        host:write affordance.
      priority: high
      references_constraints: [C-04]
