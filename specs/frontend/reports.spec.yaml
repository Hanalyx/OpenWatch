spec:
  id: frontend-reports
  title: Reports page - Library table, Generate action, deferred Templates and Scheduled tabs
  version: "1.11.0"
  status: approved
  tier: 2

  context:
    system: openwatch
    feature: The /reports page - a Library tab listing generated reports with a Generate action, plus deferred Templates and Scheduled tabs, over api-reports
    description: >
      ReportsPage is the operator's compliance-artifact library over
      api-reports. The Library tab generates two report kinds (the Fleet
      Compliance Executive Summary and the Framework Attestation) and opens
      each in a kind-aware detail panel with Ed25519 signing + offline
      Verify and downloadable faces (PDF cover, CSV evidence, OSCAL SAR,
      canonical JSON). What remains prototype-only from the openwatch-v1
      Reports.html surface is the multi-template gallery BUILDER and the
      Scheduled dispatcher; those two tabs render honest "coming soon"
      deferred states rather than faked data.

      The Library tab issues a single query keyed ["reports"] against GET
      /api/v1/reports via api.GET from @/api/client and renders a table of
      the returned reports: the title, a type chip from kind, the
      scope_label, the data_as_of, the generated_by actor, and the format.
      A "Generate report" control POSTs /api/v1/reports:generate and, on
      success, invalidates the ["reports"] query so the new row appears.

      The Generate control is permission gated via
      useAuthStore.hasPermission("host:write"): a host:read-only caller
      sees the Library table but no Generate control. The server still
      enforces the bar; the UI gate is a usability layer.

      The Templates and Scheduled tabs render an explicit deferred state
      (a "coming soon" message naming what is not yet built) and call no
      endpoint, so the page never fakes a signed artifact or a schedule.
      Styling follows the dashboard primitives: cards, bottom-border tabs,
      and a type chip, built from inline styles over the --ow-* design
      tokens, with honest loading, empty, and error states
      (apiErrorMessage). UI copy carries no em-dashes.

    related_specs:
      - api-reports
      - frontend-scans
      - frontend-groups
      - frontend-foundation

  objective:
    summary: >
      Opening /reports shows the real Library of generated reports with a
      kind-aware Generate action gated on host:write, signed downloadable
      faces (PDF/CSV/OSCAL/JSON) with offline Verify, and the Templates and
      Scheduled tabs as honest deferred states, with loading, empty, and
      error handling. No faked data: the deferred tabs render coming-soon
      states rather than fabricated templates or schedules.
    scope:
      includes:
        - 'ReportsPage at /reports: Library tab table from GET /api/v1/reports'
        - 'Library columns: title, type chip (kind), scope, data as of, generated by, format'
        - 'Generate action: POST /api/v1/reports:generate (kind + scope + framework), ["reports"] invalidation, permission gated on host:write'
        - 'Kind-aware detail body, signing badge + offline Verify, and downloadable PDF/CSV/OSCAL/JSON faces'
        - 'Templates and Scheduled tabs as honest "coming soon" deferred states (no endpoint, no faked data)'
        - 'Route mounted at path "reports" under protectedRoute and the sidebar Reports entry enabled'
        - 'Prototype styling on --ow-* tokens with honest loading / empty / error states'
      excludes:
        - 'The multi-template gallery BUILDER (saving custom report templates; the report kinds themselves are live, deferred to a coming-soon state)'
        - 'The Scheduled dispatcher with delivery rows and toggles (deferred to a coming-soon state)'
        - 'A period dimension on Generate (applies to the trend, not the point-in-time report)'

  constraints:
    - id: C-01
      description: >-
        ReportsPage issues a single query keyed ["reports"] against GET
        /api/v1/reports via api.GET from @/api/client and renders a Library
        table off the response reports: each row shows the title, a type
        chip derived from kind, the scope_label, the data_as_of, the
        generated_by actor, and the format. router.tsx mounts ReportsPage
        at path "reports" under protectedRoute and the sidebar Reports
        entry is enabled.
      type: technical
      enforcement: error
    - id: C-02
      description: >-
        The Generate control POSTs /api/v1/reports:generate and
        invalidates the ["reports"] query on success so the new report
        appears. The control is permission gated via
        useAuthStore.hasPermission("host:write"): a host:read-only caller
        sees the Library table but no Generate control. The server still
        enforces the bar; the UI gate is a usability layer.
      type: security
      enforcement: error
    - id: C-04
      description: >-
        v1.1.0 - A scope picker beside the Generate control lets the
        generator scope the next report to a group. It is a select bound to
        a scopeGroupId state whose default option is "All hosts" (value
        ""); the other options are the groups from a ["groups"] query
        against GET /api/v1/groups. On generate the POST body includes
        group_id only when a group is selected (an empty selection posts the
        unscoped {} body). The picker renders only for a host:write caller
        (alongside the gated Generate control), and the groups query is
        enabled only then. The generated report's scope_label (already shown
        in the Library and detail) reflects the chosen scope.
      type: technical
      enforcement: error
    - id: C-08
      description: >-
        v1.5.0 (Phase B0) - A framework-lens picker sits beside the group
        scope picker (the lens deferred in A1, now that a fleet catalog
        exists). It is a select bound to a scopeFramework state with a
        default "All frameworks" (value "") option; the other options come
        from a ["report-frameworks"] query against GET
        /api/v1/reports/frameworks (each shows the framework key + rule
        count). It renders only for a host:write caller and only when the
        catalog is non-empty. On generate the POST body includes framework
        only when one is selected; the body is built from both pickers
        (group_id and/or framework), so an empty selection still posts {}.
      type: technical
      enforcement: error
    - id: C-05
      description: >-
        v1.2.0 - The report detail renders a coverage caveat
        (CoverageCaveat) from content.coverage: it appears only when
        hosts_stale > 0 or hosts_unreachable > 0 (returning null otherwise,
        so a fully fresh fleet shows no needless warning), and it discloses
        the stale-host and unreachable-host counts against hosts_total so a
        reader knows how far to trust the headline numbers. The caveat copy
        carries no em-dash.
      type: technical
      enforcement: error
    - id: C-06
      description: >-
        v1.3.0 - The report detail header renders Download controls
        (Download PDF + JSON) that GET /api/v1/reports/{id}/export with the
        matching format and trigger a browser download via a
        downloadReportFace helper (fetch with same-origin credentials so
        the session cookie authenticates the GET - no bearer token, no CSRF
        for a read; the rendered blob is saved via an object URL using the
        server's Content-Disposition filename). The controls disable while a
        download is in flight, and a failed download surfaces an error
        rather than silently doing nothing.
      type: technical
      enforcement: error
    - id: C-07
      description: >-
        v1.4.0 - When a report carries a signature the detail header shows a
        "Signed" badge and a Verify control. Verify runs a verifyReport
        helper that checks the report OFFLINE in the browser: it fetches
        GET /api/v1/reports/signing-key, re-hashes the canonical JSON face
        (GET export?format=json) with SHA-256 and compares it to
        content_sha256 (content integrity), then Ed25519-verifies the
        signature (Web Crypto) over the same domain-separated payload the
        server signs ("openwatch/report-snapshot/v1\n" + content_sha256).
        The Ed25519 step degrades gracefully where Web Crypto lacks it (the
        content hash is still verified). The result (verified / failed /
        content-only) is surfaced, and an ephemeral key is disclosed.
      type: security
      enforcement: error
    - id: C-09
      description: >-
        v1.6.0 (Phase B1b) - A report-kind selector sits in the header
        beside the scope pickers: a select bound to a reportKind state with
        options "Executive" (value "executive", the default) and
        "Attestation" (value "attestation"). On generate the POST body
        includes kind only when attestation is chosen (executive stays the
        implicit default, so an unscoped executive still posts {}). It
        renders only for a host:write caller. The detail header's primary
        download control is kind-aware: an executive report offers Download
        PDF, an attestation report offers Download CSV (the per-host,
        per-rule evidence face), switching on the resolved report's kind;
        JSON (the signed canonical face) is offered for both. The type chip
        labels attestation reports "Attestation". UI copy carries no
        em-dash.
      type: technical
      enforcement: error
    - id: C-10
      description: >-
        v1.7.0 - The report detail surfaces ALL faces that apply to the
        resolved report's kind, not just the primary + JSON. An attestation
        report additionally offers a PDF (the bounded cover) and an OSCAL
        SAR (the fleet assessment-results) download beside the primary CSV
        and JSON; an executive report has no extra faces (its PDF is the
        primary). The extra controls are driven by a secondaryFaces list
        keyed on the kind, each invoking the same onDownload handler (so
        they share the in-flight downloading state and downloadError
        surface), and downloadReportFace accepts the oscal_sar format. UI
        copy carries no em-dash.
      type: technical
      enforcement: error
    - id: C-11
      description: >-
        v1.8.0 - The report detail body is KIND-AWARE. An executive report
        renders the ExecutiveBody (posture rollup from the executive content
        keys). An attestation report renders a distinct AttestationBody from
        the attestation content shape (framework, hosts_total,
        hosts_attested, rollup) - NOT through asExecutiveContent, whose
        executive keys are absent from attestation content and would
        otherwise read as zero. AttestationBody renders the FROZEN
        compliance rollup carried on the attestation content
        (content.rollup): the compliance percent, checks evaluated, and
        passing/failing/skipped/errored counts, plus a top-failing-rules
        table - the same headline numbers the signed snapshot and the PDF
        cover show. It also shows the framework lens and the
        attested-of-in-scope coverage, discloses any in-scope hosts with no
        completed scan, and points the reader at the downloadable faces for
        the full per-host, per-rule breakdown. UI copy carries no em-dash.
      type: technical
      enforcement: error
    - id: C-12
      description: >-
        v1.9.0 (Phase C1) - The kind selector offers a third option,
        "Exception Register" (value "exception"); the generate body sends
        kind for any non-executive selection (executive stays the implicit
        default). The detail body branches to an ExceptionBody for the
        exception kind, rendering the frozen ExceptionContent: the waiver
        summary (total / active / pending review / expiring-within-30-days /
        rejected-revoked-expired) and a sampled soonest-expiring active-waiver
        table, pointing at the CSV face for the full register. The exception
        kind is CSV-led (primary download is the register CSV) with a PDF
        summary secondary and JSON; OSCAL SAR is not offered. kindLabel maps
        "exception" to "Exception Register". UI copy carries no em-dash.
      type: technical
      enforcement: error
    - id: C-13
      description: >-
        v1.10.0 (Phase C2) - The kind selector offers a fourth option,
        "Remediation Activity" (value "remediation"); when that kind is
        selected a period selector (Last 7 / 30 / 90 days) appears, bound to
        a periodDays state, and the generate body sends period_days only for
        the remediation kind. The detail body branches to a RemediationBody
        for the remediation kind, rendering the frozen RemediationContent:
        the period window, the request summary by outcome (total / executed /
        rolled_back / failed / rejected / pending), and a recent-activity
        sample, pointing at the CSV face for the full log. The remediation
        kind is CSV-led (primary download is the activity-log CSV) with a PDF
        summary secondary and JSON. kindLabel maps "remediation" to
        "Remediation Activity". UI copy carries no em-dash.
      type: technical
      enforcement: error
    - id: C-03
      description: >-
        The Templates tab renders an explicit deferred state (a "coming soon"
        message) and calls no endpoint, so the page never fakes a template
        gallery. (The Scheduled tab is live as of v1.11.0 - see C-14.)
        Loading, empty, and error states are honest: apiErrorMessage drives
        the error text rather than a crash, and an empty Library renders an
        empty state rather than a blank table. Prose UI copy carries no
        em-dashes.
      type: technical
      enforcement: error
    - id: C-14
      description: >-
        v1.11.0 (Phase C3) - The Scheduled tab is live: it renders a
        SchedulesTab over the report-schedule endpoints. It issues a
        ["report-schedules"] query against GET /api/v1/reports/schedules and
        a ["notification-channels"] query against GET
        /api/v1/notifications/channels, filtered to email channels for the
        delivery picker. A host:write caller sees a create form (name, kind,
        frequency with a weekday picker for weekly / day-of-month for
        monthly, and an email channel) that POSTs /api/v1/reports/schedules;
        each schedule row offers pause/resume (PATCH
        /api/v1/reports/schedules/{id} {enabled}) and delete (DELETE), all
        invalidating ["report-schedules"]. The create form is gated on
        canGenerate (host:write). Loading/empty/error states are honest. UI
        copy carries no em-dash.
      type: technical
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: >-
        Source inspection: ReportsPage issues a single query with queryKey
        ["reports"] against "/api/v1/reports" via api.GET from @/api/client
        and renders a Library table whose rows read title, kind (as a type
        chip), scope_label, data_as_of, generated_by, and format off the
        response. router.tsx mounts ReportsPage at path "reports" under
        protectedRoute and the sidebar Reports entry is enabled.
      priority: critical
      references_constraints: [C-01]
    - id: AC-02
      description: >-
        Source inspection: the Generate control POSTs
        "/api/v1/reports:generate" and invalidates the queryKey ["reports"]
        on success. The control renders under hasPermission("host:write")
        from useAuthStore; a host:read-only caller sees no Generate control.
      priority: critical
      references_constraints: [C-02]
    - id: AC-03
      description: >-
        Source inspection: the Templates and Scheduled tabs render an
        explicit deferred ("coming soon") state and issue no api.GET for
        those tabs (no faked signing, PDF, OSCAL, or schedule data). The
        page renders honest loading, empty, and error states, with error
        text from apiErrorMessage and an empty-Library empty state.
      priority: high
      references_constraints: [C-03]
    - id: AC-04
      description: >-
        Source inspection: the page's only mutating request is the Generate
        POST to "/api/v1/reports:generate" (no PUT or DELETE), the card and
        tab chrome is styled with the --ow-* design tokens (no raw color
        literals for the chrome), and the prose UI copy contains no em-dash.
      priority: high
      references_constraints: [C-03]
    - id: AC-05
      description: >-
        v1.1.0 - Source inspection: a scope select bound to a scopeGroupId
        state offers an "All hosts" default (value "") plus options from a
        ["groups"] query against "/api/v1/groups"; the generate body sends
        group_id only when scopeGroupId is set (otherwise an empty body).
        The groups query is enabled on canGenerate so the picker is a
        host:write affordance.
      priority: high
      references_constraints: [C-04]
    - id: AC-06
      description: >-
        v1.2.0 - Source inspection: a CoverageCaveat component reads
        coverage.hosts_stale and coverage.hosts_unreachable, returns null
        when both are 0, and otherwise renders a caveat disclosing the
        stale-host and unreachable-host counts against hosts_total. The
        ExecutiveBody narrows content.coverage (asCoverage) and renders the
        caveat. The caveat copy contains no em-dash.
      priority: high
      references_constraints: [C-05]
    - id: AC-07
      description: >-
        v1.3.0 - Source inspection: a downloadReportFace(id, format) helper
        fetches "/api/v1/reports/${id}/export?format=" with same-origin
        credentials and saves the response blob via an object URL (no
        Authorization header / bearer token - the session cookie carries
        the GET). ReportDetail renders Download PDF and JSON controls that
        call an onDownload handler invoking the helper, disable while a
        download is in flight (downloading state), and show a downloadError
        on failure.
      priority: high
      references_constraints: [C-06]
    - id: AC-08
      description: >-
        v1.4.0 - Source inspection: a verifyReport helper fetches
        "/api/v1/reports/signing-key", digests the json export face with
        SHA-256 and compares it to content_sha256, and Ed25519-verifies the
        signature via crypto.subtle.verify over the domain-separated payload
        ("openwatch/report-snapshot/v1\n" + content_sha256), with a
        try/catch fallback when Web Crypto lacks Ed25519. ReportDetail
        renders a "Signed" badge and a Verify control (gated on
        report.signature) that calls an onVerify handler and surfaces a
        verifyResult.
      priority: high
      references_constraints: [C-07]
    - id: AC-09
      description: >-
        v1.5.0 - Source inspection: a framework-lens select bound to a
        scopeFramework state offers an "All frameworks" default (value "")
        plus options from a ["report-frameworks"] query against
        "/api/v1/reports/frameworks"; the generate body sets framework only
        when scopeFramework is set (built alongside group_id). The
        frameworks query is enabled on canGenerate so the picker is a
        host:write affordance.
      priority: high
      references_constraints: [C-08]
    - id: AC-10
      description: >-
        v1.6.0 - Source inspection: a report-kind select bound to a
        reportKind state offers "executive" (default) and "attestation"
        options and renders under canGenerate; the generate body sets kind
        only when reportKind is "attestation". ReportDetail derives a
        kind-aware primary download from the resolved report kind
        (attestation yields a Download CSV control for the 'csv' face,
        otherwise Download PDF for 'pdf'), with the JSON control offered for
        both; downloadReportFace accepts the 'csv' format. kindLabel maps
        "attestation" to "Attestation". The added copy contains no em-dash.
      priority: high
      references_constraints: [C-09]
    - id: AC-11
      description: >-
        v1.7.0 - Source inspection: a secondaryFaces list is built from the
        resolved report kind - an attestation yields a 'pdf' entry and an
        'oscal_sar' entry (label "OSCAL SAR"), an executive yields none -
        and is rendered as extra download buttons that call onDownload(face)
        and reflect the downloading state. downloadReportFace's format union
        includes 'oscal_sar'. The added copy contains no em-dash.
      priority: high
      references_constraints: [C-10]
    - id: AC-12
      description: >-
        v1.8.0 - Source inspection: the detail body branches on the resolved
        report kind - an attestation renders AttestationBody(asAttestationContent(...)),
        otherwise ExecutiveBody(asExecutiveContent(...)). asAttestationContent
        narrows the attestation keys (framework, hosts_total, hosts_attested,
        attested) and asAttestationRollup narrows content.rollup;
        AttestationBody reads content.rollup and renders the compliance
        percent (r.compliance_pct), the passing/failing counts (r.passing /
        r.failing), and the top-failing table (r.top_failing.map), plus the
        framework lens and the hosts_attested-of-hosts_total coverage - not
        any executive content key. The added copy contains no em-dash.
      priority: high
      references_constraints: [C-11]
    - id: AC-13
      description: >-
        v1.9.0 - Source inspection: the kind selector includes an
        <option value="exception">Exception Register</option>; kindLabel maps
        "exception" to "Exception Register". The detail body branches to
        ExceptionBody(asExceptionContent(resolved.content)) for the exception
        kind. asExceptionContent narrows content.summary + content.exceptions;
        ExceptionBody reads content.summary and renders the waiver counts
        ("Total waivers", "Pending review") and the soonest-expiring list. The
        exception kind is CSV-led (csvLed = kind === 'attestation' || kind ===
        'exception'). The added copy contains no em-dash.
      priority: high
      references_constraints: [C-12]
    - id: AC-14
      description: >-
        v1.10.0 - Source inspection: the kind selector includes an
        <option value="remediation">Remediation Activity</option>; a period
        selector (aria-label "Remediation period") renders only when
        reportKind === 'remediation', and the generate body sets period_days
        for that kind. kindLabel maps "remediation" to "Remediation Activity".
        The detail body branches to
        RemediationBody(asRemediationContent(resolved.content)).
        asRemediationContent narrows the activity keys; RemediationBody
        renders the period + the outcome summary ("Total requests",
        s.executed, s.rolled_back) and the recent-activity table. The added
        copy contains no em-dash.
      priority: high
      references_constraints: [C-13]
    - id: AC-15
      description: >-
        v1.11.0 - Source inspection: the Scheduled tab renders <SchedulesTab>
        (not ComingSoon). SchedulesTab queries ["report-schedules"] against
        GET /api/v1/reports/schedules and ["notification-channels"] against
        GET /api/v1/notifications/channels (filtered to c.type === 'email'),
        and mutates via api.POST /api/v1/reports/schedules,
        api.PATCH /api/v1/reports/schedules/{id}, and api.DELETE
        /api/v1/reports/schedules/{id}, each invalidating ["report-schedules"].
        The create form is gated on canGenerate (canSubmit = canGenerate
        && ...). The added copy contains no em-dash.
      priority: high
      references_constraints: [C-14]
