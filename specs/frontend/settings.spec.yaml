spec:
  id: frontend-settings
  title: Settings — two-pane shell with 11 sub-pages
  version: "1.8.0"
  status: draft
  tier: 2

  context:
    system: openwatch-go
    feature: Workspace + personal settings surface — 11 categories grouped Workspace / Access / Personal, each its own routed sub-page
    description: >-
      Route /settings is a two-pane shell mirroring the v1 prototype
      (app/docs/prototypes/openwatch-v1/Settings.html). A 260px left
      nav holds three groups — Workspace, Access, Personal — with
      11 leaf pages between them. The main pane renders the active
      page via TanStack Router nested routes.

      v0 wires the four pages whose backends exist in Slice A
      (Profile, Preferences, SSH & credentials, Users & teams). The
      remaining seven pages render their structural shells with a
      "Backend pending" banner identifying the slice that unblocks
      each one. The shell visually matches the prototype regardless
      of wiring depth — operators see the same surface they would
      see when fully wired, just with disabled controls and pending
      banners.

      Profile combines four backend-wired sub-sections: profile
      identity (read-only from /auth/me until PATCH lands), password
      change (POST /auth/password:change), MFA enrollment +
      verification (POST /auth/mfa:enroll, /auth/mfa:verify), and
      active sessions (read-only "this device" placeholder until the
      sessions endpoint ships).

      Tier 2 — feature surface, not the auth boundary. Profile's
      MFA + password subsections are themselves security-sensitive
      but follow the auth-login spec contract.
    related_specs:
      - api-auth
      - api-credentials
      - api-users
      - frontend-foundation
      - frontend-auth-login

  objective:
    summary: >-
      An authenticated operator navigates /settings/* via the left
      nav. The Profile page surfaces their identity, lets them change
      password and enroll MFA against the live backend. Preferences
      persists theme/density/etc. to localStorage. Credentials and
      Users list against live endpoints. Other pages render their
      structural shells with disabled controls.
    scope:
      includes:
        - "Route /settings — redirects to /settings/profile by default"
        - "Two-pane shell — 260px left nav + main content"
        - "Left nav with 11 items in 3 groups plus search"
        - "Active nav item highlighted with warn-pip on Security & auth"
        - "Profile — identity from /auth/me + password change + MFA enroll + sessions placeholder"
        - "Preferences — theme/density/accent/landing/host-view/date-format/reduce-motion persisted to localStorage"
        - "SSH & credentials — list from GET /api/v1/credentials with Add (POST), Replace (POST+DELETE) and Delete (DELETE) modals"
        - "SSH keys section is a derived view of key-bearing credentials; Add/Replace/Delete a key operates on the parent credential"
        - "Users & teams — list from GET /api/v1/users (admin-gated), with roles per member, Invite (POST /users) and Manage (role assign/unassign + soft-delete) modals (v1.4.0)"
        - "Audit log — filterable, cursor-paginated GET /api/v1/audit/events, audit:read gated, read-only (v1.3.0)"
        - "About — version from GET /api/v1/version + license state from GET /api/v1/license (v1.3.0)"
        - "Notifications — Slack/webhook channel CRUD + test over /api/v1/notifications/channels, notification:read gated, secrets write-only (v1.5.0)"
        - "Security & auth — all three sections live: SSO OIDC provider CRUD (over /api/v1/sso/providers, admin:sso_provider, secret write-only) + authentication-policy (require-MFA + session timeouts, system:auth_policy_*) + API tokens (secret shown once); LoginPage renders Sign in with X buttons from /api/v1/sso/providers/enabled (v1.8.0)"
        - "Integrations — structural shell with Backend Pending banner"
        - "All control widgets themed via --ow-* tokens"
      excludes:
        - "PATCH /auth/me wiring (backend endpoint deferred)"
        - "Credential / User CRUD forms (dedicated specs pending)"
        - "Session listing + revoke (backend /auth/sessions deferred)"
        - "Sub-page deep-linking inside the seven stubbed pages"
        - "Full-document settings search"

  constraints:
    - id: C-01
      description: The route /settings MUST redirect to /settings/profile by default. Every leaf page MUST live under /settings/<id> with its own routed component
      type: technical
      enforcement: error
    - id: C-02
      description: >-
        The left nav MUST render 11 items in 3 groups (Workspace 5,
        Access 3, Personal 3). The active page MUST be highlighted
        (ow-bg-3 background, ow-info accent on icon). Inactive items
        hover to ow-bg-2
      type: technical
      enforcement: error
    - id: C-03
      description: >-
        Profile MUST render the identity returned from useAuthStore.
        The Save-changes button at the bottom of the profile-identity
        card MUST be disabled with a visible PATCH-pending hint — no
        broken POST is made
      type: technical
      enforcement: error
    - id: C-04
      description: >-
        Password change MUST POST to /api/v1/auth/password:change with
        current_password + new_password. Zod MUST enforce new_password
        length >= 15 AND new_password != current_password AND
        confirm_password == new_password BEFORE any POST. Password
        values MUST NOT appear in console output
      type: security
      enforcement: error
    - id: C-05
      description: >-
        MFA enrollment MUST POST to /api/v1/auth/mfa:enroll then render
        the returned provisioning_uri AND secret. Verification MUST
        POST a 6-digit otp to /api/v1/auth/mfa:verify; on success the
        auth store identity MFA flag is set true AND the section
        re-renders to the Enabled state
      type: security
      enforcement: error
    - id: C-06
      description: >-
        Preferences MUST persist to localStorage under key
        "ow-preferences" (via Zustand persist middleware). No backend
        POST is made. Reloading the browser restores the same
        selections
      type: technical
      enforcement: error
    - id: C-07
      description: >-
        SSH & credentials MUST fetch GET /api/v1/credentials and
        render one row per credential. Add/Edit/Delete buttons render
        but MUST be disabled
      type: technical
      enforcement: error
    - id: C-08
      description: >-
        Users & teams MUST be gated to roles with the admin permission.
        Non-admin sessions visiting /settings/users render the 403
        ForbiddenPage. Admin sessions see the list from GET
        /api/v1/users. v1.4.0 — the roster renders each member's roles
        (UserResponse.roles). Invite (POST /api/v1/users) and Manage
        (role assign/unassign via /users/{id}/roles:assign|:unassign,
        soft-delete via DELETE /users/{id}) open modals; all four
        mutations invalidate the ['users'] query on success. Write
        controls are gated on user:write (admin implies it).
      type: security
      enforcement: error
    - id: C-09
      description: >-
        The remaining stubbed page (Integrations) MUST render a
        BackendPendingBanner identifying the slice that unblocks it. Every
        interactive control on it MUST be disabled. (Security & auth keeps
        BackendPendingBanner only on its SSO section; its API-tokens and
        authentication-policy sections are live per C-16.)
      type: technical
      enforcement: error
    - id: C-10
      description: >-
        Every Settings widget MUST reference --ow-* CSS variables for
        color and surface. No hardcoded colors outside the token
        contract
      type: technical
      enforcement: error
    - id: C-11
      description: >-
        The left-nav search input MUST filter nav items by
        case-insensitive label substring. Empty query renders all
        groups; no-match renders no groups
      type: technical
      enforcement: error
    - id: C-12
      description: >-
        Every interactive element across all 11 pages MUST be
        reachable by keyboard alone. axe-core MUST report zero
        violations across wcag2a + wcag2aa in both color modes
      type: technical
      enforcement: error
    - id: C-13
      description: >-
        v1.3.0 — Audit log (src/pages/settings/AuditPage.tsx) MUST be
        gated on hasPermission('audit:read'): a caller without it
        renders the 403 ForbiddenPage and issues no request. With it,
        the page fetches GET /api/v1/audit/events via useInfiniteQuery
        keyed on the applied filters (action, actor_type, since, until),
        renders one row per event newest-first, and pages via the
        response next_cursor (Load more). Filter inputs are draft state
        applied on submit — typing MUST NOT issue a request per
        keystroke. The page is read-only: it MUST contain no write
        control (no POST/PATCH/PUT/DELETE).
      type: technical
      enforcement: error
    - id: C-14
      description: >-
        v1.3.0 — About MUST render license state from GET
        /api/v1/license (tier, status, entitled features, expiry) —
        never hardcoded. Version stays sourced from GET /api/v1/version.
      type: technical
      enforcement: error
    - id: C-15
      description: >-
        v1.5.0 — Notifications (src/pages/settings/NotificationsPage.tsx)
        MUST be gated on hasPermission('notification:read') (ForbiddenPage
        otherwise) and list channels from GET /api/v1/notifications/channels
        keyed ['notification-channels']. Add/Edit MUST POST/PATCH and Delete
        MUST DELETE that resource, and Test MUST POST the :test sub-route;
        every mutation invalidates ['notification-channels']. The page MUST
        render only the non-secret target_hint (never a url/token) and gate
        write/delete/test controls on notification:write/delete/test.
      type: security
      enforcement: error
    - id: C-16
      description: >-
        v1.6.0 — Security & auth (src/pages/settings/SecurityPage.tsx) MUST
        gate the page on hasPermission('admin') (ForbiddenPage otherwise)
        and render a live API-tokens section: list from GET /api/v1/tokens
        keyed ['api-tokens'] (token:read), Create via POST /api/v1/tokens
        (token:write) showing the returned secret ONCE with a copy control
        and a "won't be shown again" warning, Revoke via DELETE
        /api/v1/tokens/{id} (token:delete); each mutation invalidates
        ['api-tokens']. The list MUST render only the non-secret prefix.
        v1.7.0 — it MUST also render a live authentication-policy section:
        GET /api/v1/auth-policy keyed ['auth-policy'] (system:auth_policy_read),
        a require-MFA Toggle + idle/absolute timeout Steppers, Save via PUT
        /api/v1/auth-policy (system:auth_policy_write) invalidating
        ['auth-policy']. v1.8.0 — it MUST also render a live single-sign-on
        section (admin:sso_provider): OIDC provider CRUD keyed
        ['sso-providers'] over /api/v1/sso/providers (GET/POST/PUT/DELETE),
        the client secret write-only (edit form labels it "leave blank to
        keep"). All three Security sections are live; no section renders
        BackendPendingBanner.
      type: security
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: Navigating to /settings redirects to /settings/profile within one router tick. The left nav and the page-head both reflect Profile as active.
      priority: critical
      references_constraints: [C-01]
    - id: AC-02
      description: The left nav renders exactly 11 leaf items distributed as Workspace (5) + Access (3) + Personal (3). The Security & auth item carries a warn-tier pip in its right slot.
      priority: critical
      references_constraints: [C-02]
    - id: AC-03
      description: Typing "user" in the nav-search filters the visible list to "Users & teams" only; clearing the search restores all groups.
      priority: high
      references_constraints: [C-11]
    - id: AC-04
      description: Profile page renders the username and email returned by /auth/me. The big-avatar initials match the first 1-2 tokens of the username. The Save-changes button has aria-disabled=true.
      priority: critical
      references_constraints: [C-03]
    - id: AC-05
      description: Submitting the password-change form with current=valid + new=15+ chars + confirm=match issues exactly one POST /api/v1/auth/password:change with body {current_password, new_password}. On 200 the form clears and a green success banner renders inline.
      priority: critical
      references_constraints: [C-04]
    - id: AC-06
      description: Submitting current=wrong yields 401 auth.invalid_credentials; the form renders the error inline; the new + confirm fields are preserved.
      priority: critical
      references_constraints: [C-04]
    - id: AC-07
      description: Submitting new == current MUST fail zod validation client-side BEFORE any POST.
      priority: critical
      references_constraints: [C-04]
    - id: AC-08
      description: Submitting new < 15 chars fails zod validation client-side BEFORE any POST.
      priority: critical
      references_constraints: [C-04]
    - id: AC-09
      description: With mfa_enabled=false, clicking Begin enrollment issues POST /api/v1/auth/mfa:enroll AND renders the returned provisioning_uri AND the textual secret AND a 6-digit otp input.
      priority: critical
      references_constraints: [C-05]
    - id: AC-10
      description: Submitting a valid otp yields 200 from /api/v1/auth/mfa:verify; the section state transitions to Enabled (StatusPill tier=ok); the auth store identity.mfaEnabled becomes true.
      priority: critical
      references_constraints: [C-05]
    - id: AC-11
      description: Changing the Theme segmented control to Light updates the page's data-mui-color-scheme attribute AND writes "light" to localStorage under "ow-color-scheme". Reloading restores Light.
      priority: critical
      references_constraints: [C-06]
    - id: AC-12
      description: Changing any Preferences control writes to localStorage under "ow-preferences" within one tick. Reloading the browser restores the selection.
      priority: critical
      references_constraints: [C-06]
    - id: AC-13
      description: SSH & credentials renders the list returned by GET /api/v1/credentials. Each row shows name + scope + auth_method label. The Add credential and per-row Edit buttons are disabled.
      priority: high
      references_constraints: [C-07]
    - id: AC-14
      description: A non-admin user navigating to /settings/users sees the 403 ForbiddenPage. An admin user sees the list from GET /api/v1/users.
      priority: critical
      references_constraints: [C-08]
    - id: AC-15
      description: v1.6.0 — The remaining stubbed Settings page (Integrations — the only full stub now that Notifications, Audit log, About are wired, Security hosts a live API-tokens section, and Compliance policies hosts the live scan-variables section) renders a single BackendPendingBanner naming the slice. Visible controls render disabled. PoliciesPage lives in its own file with per-section banners on its remaining stub sections.
      priority: high
      references_constraints: [C-09]
    - id: AC-16
      description: A grep of src/pages/settings/ and src/components/settings/ finds zero occurrences of var(--mui- or hardcoded HEX literals outside the token-map files.
      priority: high
      references_constraints: [C-10]
    - id: AC-17
      description: Source-inspection — the password-change submit handler does NOT include any console.log/warn/error call that interpolates current_password, new_password, or confirm_password values.
      priority: critical
      references_constraints: [C-04]
    - id: AC-18
      description: axe-core scan of /settings/profile, /settings/preferences, /settings/credentials, /settings/users, /settings/audit, and /settings/notifications reports zero violations across wcag2a + wcag2aa in both color modes.
      priority: critical
      references_constraints: [C-12]
    - id: AC-19
      description: "v1.3.0 source-inspection + behavior: AuditPage gates on hasPermission('audit:read') returning ForbiddenPage when absent; it calls useInfiniteQuery against '/api/v1/audit/events' with getNextPageParam reading next_cursor; the filter form applies on submit (draft state distinct from the applied queryKey) so keystrokes issue no request; and the page contains no api.POST/PATCH/PUT/DELETE call (read-only)."
      priority: high
      references_constraints: [C-13]
    - id: AC-20
      description: "v1.3.0 source-inspection: AboutPage fetches GET /api/v1/license via useQuery keyed ['license'] and renders the returned tier/status/features (mapped through LICENSE_TIER_LABEL / LICENSE_STATUS), with no hardcoded tier or feature list; version stays sourced from GET /api/v1/version."
      priority: high
      references_constraints: [C-14]
    - id: AC-21
      description: "v1.4.0 source-inspection: the Invite member button is enabled (gated on user:write/admin, not statically disabled) and opens AddUserModal, which POSTs /api/v1/users with {username,email,password} and invalidates the ['users'] query on success. The roster renders user.roles per member."
      priority: high
      references_constraints: [C-08]
    - id: AC-22
      description: "v1.4.0 source-inspection: per-member Manage opens ManageUserModal, which assigns/unassigns roles via POST /api/v1/users/{id}/roles:assign and :unassign, soft-deletes via DELETE /api/v1/users/{id}, sources the assignable list from GET /api/v1/roles, and invalidates the ['users'] query on every mutation success."
      priority: high
      references_constraints: [C-08]
    - id: AC-23
      description: "v1.5.0 source-inspection: NotificationsPage gates on hasPermission('notification:read') returning ForbiddenPage when absent; it lists from GET /api/v1/notifications/channels keyed ['notification-channels']; Add/Edit call api.POST/PATCH '/api/v1/notifications/channels', Delete calls api.DELETE, Test calls POST '/api/v1/notifications/channels/{id}:test', and every mutation invalidates ['notification-channels']; the page renders channel.target_hint and references no response url/token field. AC-15 stub set excludes Notifications."
      priority: high
      references_constraints: [C-15]
    - id: AC-24
      description: "v1.6.0 source-inspection: SecurityPage gates the page on hasPermission('admin') (ForbiddenPage otherwise); the API-tokens section lists from GET /api/v1/tokens keyed ['api-tokens'], Create calls api.POST '/api/v1/tokens' and renders the returned token once (a copy control + a not-shown-again warning), Revoke calls api.DELETE '/api/v1/tokens/{id}', and both mutations invalidate ['api-tokens']; the list renders token.prefix and references no raw token/secret list field; write/delete controls gate on token:write/token:delete; the SSO section still renders BackendPendingBanner."
      priority: high
      references_constraints: [C-16]

    - id: AC-25
      description: "v1.7.0 source-inspection: SecurityPage's authentication-policy section loads GET /api/v1/auth-policy keyed ['auth-policy'] (gated on system:auth_policy_read), renders a require-MFA Toggle plus idle/absolute timeout Steppers seeded from the policy, and Saves via api.PUT '/api/v1/auth-policy' (gated on system:auth_policy_write) invalidating ['auth-policy']; LoginPage reads mfa_enrollment_required from the login response and routes to /settings/profile when it is set."
      priority: high
      references_constraints: [C-16]

    - id: AC-26
      description: "v1.8.0 source-inspection: SecurityPage's single-sign-on section is gated on admin:sso_provider and does OIDC provider CRUD keyed ['sso-providers'] — api.GET/POST '/api/v1/sso/providers', api.PUT/DELETE '/api/v1/sso/providers/{id}' — with the client secret write-only (edit form labels it 'leave blank to keep'); LoginPage fetches api.GET '/api/v1/sso/providers/enabled' and renders Sign in with X buttons that navigate to '/api/v1/auth/sso/${providerId}/login'."
      priority: high
      references_constraints: [C-16]
