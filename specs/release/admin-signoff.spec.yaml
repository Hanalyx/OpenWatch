spec:
  id: release-admin-signoff
  title: Release 0.2.0 sign-off — auth, users, hosts, credentials
  version: "1.0.0"
  status: approved
  tier: 2

  context:
    system: openwatch
    feature: 0.2.0 Definition of Done
    description: >
      Release 0.2.0 done means a reviewer can drive the full
      "log in → register a host → register a credential → resolve a
      credential for that host" loop using a real session cookie, with
      every layer (audit, RBAC, idempotency, identity binder) threading
      through. This spec captures each DoD step as a single AC and cites
      the covering spec where the underlying enforcement already lives.
    related_specs:
      - api-auth
      - api-users
      - api-credentials
      - api-hosts
      - system-auth-identity
      - system-user-management
      - system-credential-store
      - system-host-inventory
      - system-ssh-connectivity

  objective:
    summary: >
      Mechanical sign-off for the 0.2.0 release. The 13 ACs below are
      the objective contract: either the listed tests pass, or sign-off
      fails and the gap is named.
    scope:
      includes:
        - Real-identity end-to-end flow (session cookie or Bearer JWT
          only — no header-based identity bypass exists in the binary)
        - Per-spec coverage gates already enforced by their own ACs
        - Composition checks the per-spec tests do not enforce
          (resolver fall-through, audit pipeline across the surface)
      excludes:
        - "POST /hosts/{id}:connectivity-check (deferred — depends on
          the scan executor work that lands after 0.2.0)"
        - "OIDC/SAML initiate endpoints (deferred — license-gated
          feature, no endpoint shipped in 0.2.0)"
        - "Git tag, version bump, CHANGELOG (operator actions, not
          test-enforceable)"

  constraints:
    - id: C-01
      description: Every 0.2.0 spec MUST report 100% AC coverage under specter strict mode
      type: technical
      enforcement: error
    - id: C-02
      description: The composition E2E test MUST drive the full flow using only real session cookies — no header-based identity binder exists in the binary
      type: technical
      enforcement: error
    - id: C-03
      description: Each DoD step MUST either be covered by an enforcing test in this spec OR cited to its covering spec — no orphan DoD steps
      type: technical
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: DoD-20 — POST /api/v1/auth/login with valid username + password returns 200 with access_token, refresh_token, and a HttpOnly Secure SameSite=Lax session cookie. Covered by api-auth AC-01.
      priority: critical
      references_constraints: [C-03]
    - id: AC-02
      description: DoD-20 (MFA path) — POST /api/v1/auth/login with valid creds + a valid TOTP after enrollment returns 200. Covered by api-auth AC-05.
      priority: critical
    - id: AC-03
      description: DoD-21 — GET /api/v1/auth/me with a real session cookie returns the user's username + primary role. Covered by api-auth AC-10.
      priority: critical
    - id: AC-04
      description: DoD-22 — POST /api/v1/users with admin caller and valid body creates a user; the response JSON does NOT contain password_hash. Covered by api-users AC-01.
      priority: critical
    - id: AC-05
      description: DoD-23 — POST /api/v1/hosts with admin caller and a valid hostname + ip_address returns 201 with the host. Covered by api-hosts AC-01.
      priority: critical
    - id: AC-06
      description: DoD-24 — POST /api/v1/credentials with admin caller creates a credential; the response body does NOT contain plaintext or ciphertext secret fields. Covered by api-credentials AC-01.
      priority: critical
    - id: AC-07
      description: POST /api/v1/hosts/{host_id}/credentials:resolve returns the resolved credential's metadata — host-scope wins, otherwise system default. Covered by api-credentials AC-10, AC-11.
      priority: critical
    - id: AC-08
      description: DoD-26 (OIDC/SAML) — explicitly deferred; no SSO endpoint ships in 0.2.0. The sso_saml license feature exists in the registry; the endpoint that returns 402 lands with the SSO implementation.
      priority: high
    - id: AC-09
      description: End-to-end wire-through via TestAdminE2E_RealIdentity exercises the full admin surface (login → host → credentials → resolve → soft-delete) using only the session cookie, and confirms host.created, host.deleted, credential.created, credential.deleted audit rows landed.
      priority: critical
      references_constraints: [C-02]
    - id: AC-10
      description: DoD-17 — `specter coverage` reports 100% AC coverage across every Active spec in the registry; the 9 release-0.2.0 specs are present.
      priority: critical
      references_constraints: [C-01]
    - id: AC-11
      description: Stage-0 DoD steps 7-19 still pass — the addition of the production identity binder does NOT regress any earlier sign-off step. Covered by release-stage-0-signoff (all 13 ACs).
      priority: critical
    - id: AC-12
      description: Full module test suite (`go test ./...`) is green; full `golangci-lint run ./...` is green. Operator-mediated; verified at sign-off time.
      priority: critical
    - id: AC-13
      description: The previously-shipped X-Stub-Role / X-Stub-User-Id identity bypass is removed entirely from the production binary — no exported symbol in internal/auth, no middleware mount in server.go, no test-only header path. Tests authenticate via real session cookies minted by IssueSession against a per-role seeded user in the fixture. Covered by system-rbac AC-12 (negative source-inspection invariant).
      priority: critical
      references_constraints: [C-02]
    - id: AC-14
      description: The actual openwatch binary boots with the JWT signing key and credential DEK loaded from the configured paths, applies migrations, accepts the `create-admin` bootstrap subcommand, and serves /auth/login → 200 with a real access_token and openwatch_session cookie. Tested end-to-end by TestRuntimeBoot_LoginEndToEnd in packaging/tests/runtime_boot_test.go, which exercises the dist/openwatch binary against a real Postgres. Pins the negative invariant — running `serve` with an empty OPENWATCH_IDENTITY_JWT_PRIVATE_KEY MUST fail at boot (no silent fallback to ephemeral keys).
      priority: critical
      references_constraints: [C-02]
