spec:
  id: release-fips-build
  title: FIPS 140-3 build variant
  version: "1.0.0"
  status: approved
  tier: 1

  context:
    system: openwatch-go
    feature: FIPS-validated build
    description: >
      A second binary, openwatch-fips, built with Go 1.25's native
      GOFIPS140 mode (the in-toolchain FIPS 140-3 module). Identical
      functional surface to the non-FIPS binary; the only difference is
      that all cryptographic operations route through the FIPS module.
      The binary self-reports its FIPS state via `--version` so operators
      can verify what they deployed.
    related_specs:
      - release-package-build
      - system-license-validation

  objective:
    summary: >
      Customers with FIPS 140-3 obligations (federal, regulated industries)
      need a build that uses only FIPS-validated crypto. The same source
      tree, the same tests, the same packaging — only the toolchain
      invocation differs. Eliminates the failure mode where a FIPS binary
      drifts from its non-FIPS sibling.
    scope:
      includes:
        - GOFIPS140=v1.0.0 build via make build-fips
        - --version reports fips=true
        - FIPS module symbols present in the binary
        - Same test suite passes against the FIPS binary
      excludes:
        - Containerized FIPS image (Stage 2)
        - FIPS-mode enforcement at runtime (Stage 2; today the build is the gate)
        - Cross-compilation (host-arch only for Stage 0)

  constraints:
    - id: C-01
      description: make build-fips MUST invoke `go build` with GOFIPS140=v1.0.0 set in the environment
      type: security
      enforcement: error
    - id: C-02
      description: make build-fips MUST inject FIPS=true via -ldflags so the binary reports fips=true at --version
      type: technical
      enforcement: error
    - id: C-03
      description: The FIPS binary MUST link the in-toolchain FIPS module (crypto/internal/fips140/v1.0.0)
      type: security
      enforcement: error
    - id: C-04
      description: The non-FIPS build MUST NOT report fips=true (no accidental opt-in)
      type: security
      enforcement: error
    - id: C-05
      description: Both binaries MUST produce identical functional output for the diagnostic echo path (audit emit, idempotency hit, error envelope shape)
      type: technical
      enforcement: error
    - id: C-06
      description: The unit and integration test suite MUST pass when executed against the FIPS binary's runtime (i.e., with GOFIPS140 set)
      type: technical
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: make build-fips produces dist/openwatch-fips on a host with Go 1.25+ installed.
      priority: critical
      references_constraints: [C-01]
    - id: AC-02
      description: 'dist/openwatch-fips --version reports "fips: true".'
      priority: critical
      references_constraints: [C-02]
    - id: AC-03
      description: 'dist/openwatch --version (non-FIPS) reports "fips: false".'
      priority: high
      references_constraints: [C-04]
    - id: AC-04
      description: The FIPS binary contains symbols from crypto/internal/fips140 (verifiable via `go tool nm`).
      priority: critical
      references_constraints: [C-03]
    - id: AC-05
      description: The FIPS binary opens an HTTPS listener that completes a TLS handshake with the demo cert and serves /health with the same response shape as the non-FIPS binary.
      priority: critical
      references_constraints: [C-05]
    - id: AC-06
      description: Running `go test ./...` with GOFIPS140=v1.0.0 set on the test process produces the same pass/fail outcome as without (zero regressions from the FIPS module).
      priority: critical
      references_constraints: [C-06]
    - id: AC-07
      description: License JWT (Ed25519) signature verify still succeeds under FIPS mode (Ed25519 is FIPS-approved in 140-3).
      priority: high
      references_constraints: [C-05]
    - id: AC-08
      description: The two binaries report the same Version, Commit, and BuildTime when built from the same source tree at the same time.
      priority: medium
