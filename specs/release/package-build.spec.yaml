spec:
  id: release-package-build
  title: Native RPM and DEB packaging
  version: "1.2.0"
  status: approved
  tier: 2

  context:
    system: openwatch-go
    feature: Linux distribution packaging
    description: >
      The Go binary ships as a native RPM (CentOS Stream 9 / RHEL 9
      derivatives) and DEB (Ubuntu 24.04+). Air-gapped install:
      single binary, default config, install-generated demo cert, systemd unit.
      Operator runs `dnf install ./openwatch-*.rpm` or `apt install
      ./openwatch-*.deb` and the service is wired up.
    related_specs:
      - system-http-server
      - system-config
      - system-license-validation
      - system-kensa-executor

  objective:
    summary: >
      Make the operator install path one command. The package is the
      delivery boundary; everything Stage 0 needs to run (binary,
      config schema, systemd unit, demo TLS material) ships in it. No
      docker, no curl pipe-to-bash, no python venv. Reproducible
      from a tagged source tree.
    scope:
      includes:
        - RPM spec file + build script
        - DEB control files + build script
        - systemd unit definition
        - Default openwatch.toml shipped under /etc/openwatch/
        - Demo cert generated at /etc/openwatch/tls/ at install time, generate-if-absent (operators replace; upgrades never overwrite)
        - Post-install systemd reload
        - Pre-uninstall stop+disable
        - Multi-arch builds (amd64 + arm64) via ARCH, cross-compiled with CGO disabled
        - Kensa rule corpus shipped as a separate noarch/all kensa-rules package
        - Hard dependency from openwatch on kensa-rules so a corpus-less install fails fast
        - Install-time provisioning of the production identity keys (JWT signing key + credential DEK) that the server refuses to auto-generate
      excludes:
        - Signed package distribution (separate release infra)
        - FIPS variant (Day 12 ships a second binary build)

  constraints:
    - id: C-01
      description: Both packages MUST install the binary at /usr/bin/openwatch with mode 0755 and root ownership
      type: technical
      enforcement: error
    - id: C-02
      description: Both packages MUST install the default config at /etc/openwatch/openwatch.toml with mode 0640 and root:openwatch ownership
      type: security
      enforcement: error
    - id: C-03
      description: Both packages MUST install the systemd unit at /etc/systemd/system/openwatch.service and run daemon-reload post-install
      type: technical
      enforcement: error
    - id: C-04
      description: Both packages MUST create the openwatch system user and group at install time (if not already present)
      type: security
      enforcement: error
    - id: C-05
      description: >
        Both packages MUST provide a demo TLS cert + key at
        /etc/openwatch/tls/ (cert.pem mode 0644 root:openwatch, key.pem mode
        0600 openwatch:openwatch) so the service boots out of the box. To
        prevent a package upgrade from silently overwriting an operator's
        replacement certificate (TLS files are not %config / conffiles, so the
        package manager replaces them unconditionally), the cert + key MUST NOT
        be shipped in the package payload; they MUST be generated at install
        time by a post-install scriptlet, generate-if-absent (never overwrite).
        The packages ship only the empty /etc/openwatch/tls directory plus the
        provisioning helper. openssl MUST be a package dependency (shared with
        C-11).
      type: security
      enforcement: error
    - id: C-06
      description: Pre-uninstall MUST run systemctl stop and disable so a removal does not leave a running orphan
      type: technical
      enforcement: error
    - id: C-07
      description: Both packages MUST embed the same VERSION value into the binary via ldflags so `openwatch --version` matches the package version
      type: technical
      enforcement: error
    - id: C-08
      description: Build scripts MUST be invoked via make rpm and make deb targets — the Makefile is the orchestration surface
      type: technical
      enforcement: error
    - id: C-09
      description: Build scripts MUST support a target architecture via ARCH (amd64 | arm64), cross-compiling the binary with the matching GOARCH and CGO disabled, and labeling the artifact with the correct package arch (x86_64/aarch64 for RPM, amd64/arm64 for DEB)
      type: technical
      enforcement: error
    - id: C-10
      description: >
        The Kensa rule corpus MUST ship as a separate kensa-rules package
        (noarch RPM + Architecture:all DEB) installing the corpus to
        /usr/share/kensa/rules (the engine's default load path), staged from
        the vendored kensa module so air-gapped builds need no network. The
        openwatch RPM MUST declare Requires: kensa-rules and the openwatch DEB
        MUST list kensa-rules in Depends, so an install without the corpus
        fails fast rather than booting a scan-incapable service.
      type: technical
      enforcement: error
    - id: C-11
      description: >
        The server refuses to auto-generate its signing material in production
        and exits if it is missing. Therefore both packages MUST provision the
        identity keys at install time via a post-install scriptlet: an RSA
        >=2048-bit JWT signing key at /etc/openwatch/keys/jwt_private.pem (mode
        0640, root:openwatch) and a 32-byte AES-256 credential DEK at
        /etc/openwatch/keys/credential.key (mode 0600, openwatch:openwatch).
        Generation MUST be generate-if-absent (never overwrite, so upgrades do
        not invalidate tokens or render stored secrets undecryptable). The key
        files MUST NOT be shipped in the package payload (they must be unique
        per install). openssl MUST be a package dependency.
      type: security
      enforcement: error
    - id: C-12
      description: >
        A pre-release VERSION (one carrying a hyphen suffix such as
        0.2.0-rc.8) MUST be encoded in both packages with a tilde, never by
        stripping the suffix: the RPM Version and the DEB upstream version MUST
        be 0.2.0~rc.8. The tilde sorts a pre-release BELOW the final release
        (0.2.0~rc.8 < 0.2.0) so GA cleanly supersedes it, and distinguishes RCs
        from each other (stripping collapsed every RC to the same NVR, so dnf
        reported the next RC as already installed). Because releases rc.3..rc.8
        shipped with the suffix stripped (bare 0.2.0, Epoch 0 / no epoch), both
        packages MUST carry Epoch 1 (RPM Epoch:, DEB version prefix 1:) so an
        upgrade from those mis-versioned installs is not seen as a downgrade.
        The embedded binary MUST still report the true semver (0.2.0-rc.8), not
        the tilde form. Source-inspection enforces (AC-21).
      type: technical
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: scripts/build-rpm.sh produces a single .rpm file under app/dist/ on a system with rpmbuild installed.
      priority: critical
      references_constraints: [C-01]
    - id: AC-02
      description: scripts/build-deb.sh produces a single .deb file under app/dist/ on a system with dpkg-deb installed.
      priority: critical
      references_constraints: [C-01]
    - id: AC-03
      description: The RPM spec file passes `rpm -q --specfile packaging/rpm/openwatch.spec` without errors.
      priority: critical
    - id: AC-04
      description: The RPM payload contains /usr/bin/openwatch, /etc/openwatch/openwatch.toml, and /etc/systemd/system/openwatch.service. The demo TLS cert is generated at install time, not shipped in the payload (see AC-22).
      priority: critical
      references_constraints: [C-01, C-02, C-03]
    - id: AC-05
      description: The DEB control file lists package name "openwatch", a valid Depends line, and Maintainer.
      priority: critical
    - id: AC-06
      description: The DEB payload (via dpkg-deb -c) contains /usr/bin/openwatch, /etc/openwatch/openwatch.toml, and /etc/systemd/system/openwatch.service. The demo TLS cert is generated at install time, not shipped in the payload (see AC-22).
      priority: critical
      references_constraints: [C-01, C-02, C-03]
    - id: AC-07
      description: The RPM post-install script invokes systemctl daemon-reload (verified via rpm -q --scripts).
      priority: high
      references_constraints: [C-03]
    - id: AC-08
      description: The DEB postinst script invokes systemctl daemon-reload (verified via dpkg-deb --info).
      priority: high
      references_constraints: [C-03]
    - id: AC-09
      description: The RPM pre-uninstall script invokes systemctl stop and disable (verified via rpm -q --scripts).
      priority: high
      references_constraints: [C-06]
    - id: AC-10
      description: The DEB prerm script invokes systemctl stop and disable (verified via dpkg-deb --info).
      priority: high
      references_constraints: [C-06]
    - id: AC-11
      description: Both packages create the openwatch system user/group via their pre-install scripts.
      priority: critical
      references_constraints: [C-04]
    - id: AC-12
      description: The binary embedded in each package reports the same VERSION when invoked with --version (matches the package version metadata).
      priority: high
      references_constraints: [C-07]
    - id: AC-13
      description: make rpm and make deb invoke the corresponding build scripts and exit 0 on success.
      priority: high
      references_constraints: [C-08]
    - id: AC-14
      description: Both build scripts accept ARCH=arm64 and cross-compile the binary via GOARCH with CGO disabled, mapping to the correct package arch (aarch64 RPM / arm64 DEB); source-inspection verifies the arch mapping and the GOARCH/CGO_ENABLED=0 build invocation.
      priority: high
      references_constraints: [C-09]
    - id: AC-15
      description: make kensa-rules produces a noarch kensa-rules .rpm and an Architecture=all kensa-rules .deb under dist/, and each payload contains /usr/share/kensa/rules holding the full corpus (>=500 *.yml rule files).
      priority: critical
      references_constraints: [C-10]
    - id: AC-16
      description: The openwatch RPM spec declares Requires kensa-rules and the openwatch DEB control lists kensa-rules in Depends (source-inspection of packaging/rpm/openwatch.spec and packaging/deb/control).
      priority: critical
      references_constraints: [C-10]
    - id: AC-17
      description: make packages builds the kensa-rules corpus package alongside the openwatch artifacts (the Makefile packages target depends on the kensa-rules target).
      priority: high
      references_constraints: [C-10]
    - id: AC-18
      description: The RPM %post and the DEB postinst invoke the identity-key provisioning helper, and the shipped helper (packaging/common/provision-identity-keys.sh) generates the JWT key (RSA 2048 via openssl genrsa, 0640 root:openwatch) and the credential DEK (32 bytes via openssl rand, 0600 openwatch:openwatch) only when absent. Source-inspection of the scriptlets and the helper.
      priority: critical
      references_constraints: [C-11]
    - id: AC-19
      description: The openwatch RPM spec declares Requires openssl and the openwatch DEB control lists openssl in Depends (source-inspection).
      priority: high
      references_constraints: [C-11]
    - id: AC-20
      description: The package payloads ship the empty /etc/openwatch/keys directory and the provisioning helper at /usr/lib/openwatch/, but do NOT contain jwt_private.pem or credential.key (verified via rpm -qpl and dpkg-deb -c — the keys are generated per-install, never packaged).
      priority: critical
      references_constraints: [C-11]
    - id: AC-21
      description: >-
        Source-inspection of the build scripts and RPM spec — build-rpm.sh
        encodes the version with a tilde (it must NOT strip the suffix via the
        bash %%- expansion), openwatch.spec declares Epoch 1, build-deb.sh
        prefixes the DEB control version with the epoch-1 form and tilde-encodes
        the upstream version, and both scripts build the binary with the full
        semver $VERSION (not the tilde/stripped form). Backstops the rc.3..rc.8
        NVR-collision regression.
      priority: critical
      references_constraints: [C-12]
    - id: AC-22
      description: >-
        The RPM %post and the DEB postinst invoke the TLS-cert provisioning
        helper, and the shipped helper (packaging/common/provision-tls-cert.sh)
        generates a self-signed cert (openssl req -x509; cert.pem 0644
        root:openwatch, key.pem 0600 openwatch:openwatch) only when both files
        are absent. The package payloads ship the empty /etc/openwatch/tls
        directory and the helper at /usr/lib/openwatch/provision-tls-cert.sh,
        but do NOT contain cert.pem or key.pem (verified via rpm -qpl and
        dpkg-deb -c), and the build scripts no longer stage a cert into the
        payload — so a package upgrade never reverts an operator's replacement
        certificate.
      priority: critical
      references_constraints: [C-05]
