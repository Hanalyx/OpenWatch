spec:
  id: services-connectivity-config
  title: Connectivity-monitor runtime config — per-state intervals + persistence + reload
  version: "1.2.0"
  status: approved
  tier: 2

  context:
    system: openwatch-go
    feature: Operator-tunable runtime config for the host liveness probe loop, with per-state probe cadences
    description: >
      v1.0.0 shipped a single global IntervalSec. The Settings UI
      surfaces four reachability bands (Online, Degraded, Critical,
      Down) plus Maintenance, but the periodic loop probed every host
      at the same cadence regardless of band — bad operationally
      (online hosts get hammered, down hosts get pinged so often the
      operator can't tell if they're really down or just slow). v1.1.0
      replaces the single interval with five band-specific intervals
      and a per-host next_probe_at column on host_liveness so the tick
      can filter to "due now" hosts.

      Persistence stays single-row-per-key in system_config; the
      JSONB schema gains the five new fields and drops the old
      IntervalSec. Defaults bias toward "probe failing hosts more,
      probe stable hosts less" without becoming chatty:

        Online      — 15m (consec=0, reachable: nothing's changing)
        Degraded    —  5m (consec>=1, reachable: watch closely)
        Critical    —  2m (consec<3, unreachable: confirm fast)
        Down        — 30m (consec>=3: back off, don't hammer dead)
        Maintenance — 60m (UI/persisted band, not yet auto-applied)

      Other knobs (timeout_sec, unreachable_threshold, rate_limit,
      maintenance_global) stay as-is.

      Breaking change: PUT bodies submitting the old interval_sec
      field will be rejected with validation.field_required for the
      new fields. The endpoint shipped two PRs ago with no upstream
      consumers, so the breakage is acceptable.

    related_specs:
      - system-liveness-loop
      - system-config
      - system-audit-emission

  objective:
    summary: >
      ConnectivityConfig carries five band-specific interval fields.
      Load returns defaults when no row exists; Set validates +
      persists + emits the audit event. The liveness service consumes
      the snapshot at boot and on Reload.
    scope:
      includes:
        - ConnectivityConfig with OnlineSec / DegradedSec / CriticalSec
          / DownSec / MaintenanceSec instead of a single IntervalSec
        - Per-field bounds enforced at the SetConnectivity boundary
        - Defaults match the band table above
        - liveness.Service consumes the per-state config via the
          existing WithConfigLoader / Reload seam
      excludes:
        - Per-host maintenance flag (no hosts.maintenance_paused
          column; tracked in BACKLOG)
        - Compliance scheduler (separate slice; needs scan-on-cron)
        - OS-discovery sweeper (separate slice)

  constraints:
    - id: C-01
      description: ConnectivityConfig MUST include OnlineSec, DegradedSec, CriticalSec, DownSec, MaintenanceSec (all int 60..86400); TimeoutSec (1..30); UnreachableThreshold (1..10); RateLimit (1..200); MaintenanceGlobal (bool). Bounds enforced at the SetConnectivity boundary
      type: technical
      enforcement: error
    - id: C-02
      description: LoadConnectivity returns the persisted snapshot OR built-in defaults when no row exists. NEVER returns an error for "no config" — only for DB errors. Defaults match the band table (Online=900, Degraded=300, Critical=120, Down=1800, Maintenance=3600)
      type: technical
      enforcement: error
    - id: C-03
      description: SetConnectivity MUST emit audit.SystemConfigChanged with detail {config_key, old_value, new_value, changed_by}. The old_value is the snapshot BEFORE the write, captured in the same transaction
      type: security
      enforcement: error
    - id: C-04
      description: Concurrent SetConnectivity calls for the same key are serialized via a SELECT ... FOR UPDATE row lock, so they complete without deadlock and the final persisted state equals one writer's input (last-writer-wins; no torn write). Deterministic ordering between racing writers is NOT guaranteed.
      type: technical
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: systemconfig.LoadConnectivity on a freshly-migrated database returns the v1.1.0 defaults — OnlineSec=900, DegradedSec=300, CriticalSec=120, DownSec=1800, MaintenanceSec=3600, TimeoutSec=5, UnreachableThreshold=2, RateLimit=50, MaintenanceGlobal=false.
      priority: critical
      references_constraints: [C-02]
    - id: AC-02
      description: SetConnectivity({OnlineSec:600, DegradedSec:180, CriticalSec:60, DownSec:1200, MaintenanceSec:1800, ...}) followed by LoadConnectivity returns the saved snapshot exactly.
      priority: critical
      references_constraints: [C-01]
    - id: AC-03
      description: SetConnectivity with OnlineSec=10 (below the 60s minimum) returns validation error config.invalid; the persisted state is unchanged.
      priority: critical
      references_constraints: [C-01]
    - id: AC-04
      description: SetConnectivity with DownSec=100000 (above the 86400 maximum) returns validation error config.invalid.
      priority: high
      references_constraints: [C-01]
    - id: AC-05
      description: A successful SetConnectivity emits exactly one system.config.changed audit event with old_value, new_value, and changed_by populated. The old_value reflects the snapshot prior to the write.
      priority: critical
      references_constraints: [C-03]
    - id: AC-06
      description: Two concurrent SetConnectivity calls for the same key both return without error and without deadlock, and the final persisted state equals one of the two writers' inputs (last-writer-wins via the SELECT ... FOR UPDATE row lock; no torn write).
      priority: high
      references_constraints: [C-04]
