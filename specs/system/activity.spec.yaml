spec:
  id: system-activity
  title: Activity unified-feed service
  version: "1.3.0"
  status: approved
  tier: 2

  context:
    system: openwatch-go
    feature: UNION query over alerts + transactions + intelligence_events + audit_events + host_monitoring_history with row-level RBAC and seek-cursor pagination
    description: >
      Activity is the operator-facing "Eye on the fleet" — a unified
      feed that merges five time-ordered sources into one stream:

        - alerts (system-alert-router persistence; lifecycle via system-alerts)
        - transactions (compliance state changes — Slice B Q1)
        - intelligence_events (OS Intelligence diff log — PR 1.2)
        - audit_events (who-did-what — audit-emission)
        - host_monitoring_history (liveness band transitions — v1.1.0)

      Each source has its own RBAC. system-activity wraps them with a
      single Service.List that:

        1. Builds the candidate-row union with per-source filters
           pushed down (state != dismissed for alerts; etc).
        2. Applies the per-source permission gate — caller without
           host:read sees no transactions or intelligence rows; caller
           without alert:read sees no alerts; caller without
           audit:read sees no audit rows.
        3. Returns at most `limit` rows ordered by occurred_at DESC,
           plus the count of rows hidden by RBAC ("you have 47 items;
           200 more are hidden by your role").

      Cursor: occurred_at boundary — same pattern as audit + alerts.

      Per-source permissions in v1.0.0:
        - alerts:           alert:read
        - transactions:     host:read    (compliance:read is in the
                            backlog — host:read is the proximate gate)
        - intelligence:     host:read    (intelligence:read deferred
                            to a follow-up per docs/activity_and_os_
                            intelligence.md open decision #5)
        - audit:            audit:read

    related_specs:
      - system-alerts
      - system-alert-router
      - system-os-intelligence
      - system-audit-emission
      - api-activity

  objective:
    summary: >
      A new package internal/activity. Service.List(ctx, filter,
      caller) returns ([]Row, hiddenByRBAC int, nextCursor string,
      error). The list query is one UNION ALL across the four
      sources, paginated via seek-cursor on occurred_at DESC.
    scope:
      includes:
        - 'Service.List with the UNION query'
        - 'Per-source permission gate at the service level (HTTP layer just enforces the meta-permission to reach the endpoint)'
        - 'Source filter — query only one or two sources when requested (alert / transaction / intelligence / audit)'
        - 'Severity + since/until filters apply across all sources'
        - 'Cursor pagination on occurred_at DESC, returned as string'
      excludes:
        - 'Search across body text — out of scope for v1.0.0'
        - 'GET /api/v1/activity endpoint — separate api-activity spec'
        - 'Frontend page — depends on frontend stack direction'

  constraints:
    - id: C-01
      description: 'Service.List MUST be a single SQL query — one UNION ALL across the (up-to-4) sources. Per-source follow-up reads are forbidden; the union pushes severity/time-range/host_id filters into each leg'
      type: performance
      enforcement: error
    - id: C-02
      description: 'Per-source RBAC: a caller without alert:read MUST see ZERO alert rows; without host:read sees zero transaction + intelligence rows; without audit:read sees zero audit rows. The service returns hiddenByRBAC = the count of rows that would have matched filters but were excluded by RBAC'
      type: security
      enforcement: error
    - id: C-03
      description: 'v1.3.0 — Cursor is a COMPOUND keyset "<RFC3339Nano occurred_at>|<id>" of the last row returned. The next page filters the UNION result by the row-value predicate (occurred_at, id) < ($cursor_ts, $cursor_id) and orders by occurred_at DESC, id DESC, applied ONCE in an outer query wrapping the UNION (the monitoring leg''s id is synthesized in the SELECT, not WHERE-able per-leg). A row that shares the boundary occurred_at MUST NOT be dropped on the next page (the prior timestamp-only cursor with a strict occurred_at < $cursor silently skipped boundary-tie rows — real data loss, likely on the 5-leg UNION). Empty cursor on the response when fewer than limit rows returned (terminal page); a legacy timestamp-only cursor (no "|") is rejected rather than degrading to the lossy predicate'
      type: technical
      enforcement: error
    - id: C-04
      description: 'Limit is in [1, 200]; default 50. Values outside the range MUST cause Service.List to return an InvalidLimit error so the API can translate to 400 pagination.limit_exceeded'
      type: technical
      enforcement: error
    - id: C-05
      description: 'Source filter accepts the closed enum {alert, transaction, intelligence, audit, monitoring} or "" (all sources). Unknown values return ErrInvalidSource'
      type: technical
      enforcement: error
    - id: C-06
      description: 'Severity filter is a closed enum {info, low, medium, high, critical}. Each source maps its own severity column into this enum; alerts already use it, intelligence_events already uses it, transactions use the rule''s severity (rare types pass through), audit_events use severity directly. Unknown values return ErrInvalidSeverity'
      type: technical
      enforcement: error
    - id: C-07
      description: 'internal/activity MUST NOT import internal/server or net/http. The package is read-only and HTTP-free; the API surface lives in api-activity'
      type: technical
      enforcement: error
    - id: C-08
      description: 'v1.1.0 — A fifth leg projects host_monitoring_history into the unified Row shape: source=monitoring, host_id from the column, occurred_at from check_time, gated by CanReadHosts (same as transactions / intelligence — monitoring is host-scoped per-host operational data). The leg MUST filter to transition rows only (previous_state IS NULL OR monitoring_state <> previous_state) — every probe writes a history row, but only state changes are interesting on the operator-facing feed. Severity maps the band onto the closed severity enum: down→critical, critical→high, degraded→medium, online/maintenance→info. Title is operator-readable ("Host became unreachable" for down, "Host degraded" for degraded, "Host recovered" for online when previous_state was non-null, etc.). Summary surfaces error_message when present, falling back to "<failed_layer> fail". Because host_monitoring_history.id is a bigint sequence and Row.ID is a uuid, the leg synthesizes a stable uuid from the bigint via the deterministic prefix "00000000-0000-7000-8000-" + lpad(to_hex(id), 12, "0").'
      type: technical
      enforcement: error
    - id: C-09
      description: 'v1.2.0 — The feed MUST emit a human-readable title + summary for the three legs that previously carried raw machine codes, so no surface renders a raw dotted code, enum, or resource UUID. (a) Compliance/transaction: title = the rule''s catalog title resolved via an injected RuleTitleFunc (falling back to the raw rule_id only when the catalog has no entry); summary describes the change as "Changed: now <Status>" / "First seen: <Status>" / "Severity changed (now <Status>)" — the transactions table retains only the NEW status, so the summary MUST NOT claim a "<from> -> <to>" transition. (b) Intelligence: title = an event-code description (e.g. system.package.updated -> "Package updated"); summary derived generically from the detail JSONB (a subject from common keys + an optional "from -> to"). (c) Audit: title = "<actor> <predicate>" where actor is actor_label (falling back to a readable actor_type word) and predicate maps the action code (e.g. host.created -> "created a host"); the raw resource_id UUID MUST NOT appear in the title (resource_type may provide short summary context). Every formatter MUST degrade gracefully: an unmapped code is humanized structurally (dots/underscores -> spaces, capitalized) so a newly-added code can never leak as a raw dotted enum. The alert + monitoring legs (which already build sentences in SQL) are unchanged. Enrichment happens in Go after the single UNION query; the one-Query / UNION ALL property (C-01) is preserved.'
      type: technical
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: 'Service.List on a fresh DB with no rows returns an empty slice, hiddenByRBAC=0, no cursor, no error'
      priority: critical
      references_constraints: [C-01]
    - id: AC-02
      description: 'Service.List against a fleet with 1 alert + 1 transaction + 1 intelligence_event + 1 audit_event, caller with ALL permissions, returns 4 rows. Sources represented at least once in the result'
      priority: critical
      references_constraints: [C-01, C-02]
    - id: AC-03
      description: 'Service.List against the same data with a caller MISSING alert:read returns 3 rows (no alerts) AND hiddenByRBAC=1 (the suppressed alert)'
      priority: critical
      references_constraints: [C-02]
    - id: AC-04
      description: 'Service.List with caller MISSING host:read returns the alerts + audit rows AND hiddenByRBAC = (transactions+intelligence-rows count)'
      priority: critical
      references_constraints: [C-02]
    - id: AC-05
      description: 'Service.List with source="alert" returns ONLY alert-sourced rows. transactions, intelligence, audit excluded regardless of permissions'
      priority: high
      references_constraints: [C-05]
    - id: AC-06
      description: 'Service.List with severity="high" returns only rows whose severity column = high across every source'
      priority: high
      references_constraints: [C-06]
    - id: AC-07
      description: 'Service.List with since + until time-range narrows the union to occurred_at IN [since, until). Inclusive on since, exclusive on until — same as audit + intelligence APIs'
      priority: high
      references_constraints: [C-01]
    - id: AC-08
      description: 'Service.List with limit=2 against 6 candidate rows returns 2 + non-empty cursor; following the cursor returns the next 2; the third call returns the final 2 + empty cursor'
      priority: critical
      references_constraints: [C-03]
    - id: AC-09
      description: 'Service.List with limit=0 returns ErrInvalidLimit. limit=300 returns ErrInvalidLimit. limit in [1, 200] passes'
      priority: critical
      references_constraints: [C-04]
    - id: AC-10
      description: 'Service.List with source="not-a-source" returns ErrInvalidSource without touching the DB. Similar for severity="not-a-sev" -> ErrInvalidSeverity'
      priority: high
      references_constraints: [C-05, C-06]
    - id: AC-11
      description: 'Source inspection: Service.List body contains exactly ONE pool.Query call. UNION ALL string literal present in the query'
      priority: critical
      references_constraints: [C-01]
    - id: AC-12
      description: 'internal/activity source MUST NOT import internal/server OR net/http. Verified by walking the import set of every .go file under internal/activity/'
      priority: high
      references_constraints: [C-07]
    - id: AC-13
      description: 'Service.List with HostID set MUST NOT crash on the audit leg. Audit has no host_id column; when HostID is set the audit leg MUST evaluate to FALSE (or be skipped) and the response MUST contain only rows from sources that DO carry a host_id column (alert + transaction + intelligence + monitoring) for the requested host. Regression: a prior implementation emitted `'''' = $hostPH` against a uuid-typed parameter which crashed the union with `invalid input syntax for type uuid: ""`.'
      priority: critical
      references_constraints: [C-01, C-02]
    - id: AC-14
      description: 'v1.1.0 — Service.List against host_monitoring_history rows with at least one band transition (e.g. online→degraded with failed_layer="ssh" and error_message="SSH refused") returns a Row with source=monitoring, severity=medium, host_id set, title="Host degraded", summary="SSH refused". A second history row whose monitoring_state equals previous_state (no transition) MUST NOT appear in the result. The leg gates on CanReadHosts — a caller missing host:read sees zero monitoring rows and the count flows into hiddenByRBAC.'
      priority: critical
      references_constraints: [C-08]
    - id: AC-24
      description: 'v1.2.0 — Unit: formatTransaction("auditd_enabled","fail","state_changed", titler) where titler maps the id returns title="Ensure auditd is enabled", summary="Changed: now Fail"; first_seen yields "First seen: Pass". formatIntelligence("system.package.updated", {"name":"curl","from":"7.64","to":"7.81"}) returns title="Package updated", summary="curl: 7.64 → 7.81"; a subject-only detail yields just the subject. formatAudit("host.created","alice@example.com","user","host") returns title="alice@example.com created a host"; with an empty actor_label and actor_type="system" the title is "System was denied permission" for authz.permission.denied.'
      priority: critical
      references_constraints: [C-09]
    - id: AC-25
      description: 'v1.2.0 — Graceful fallback: an unmapped intelligence event_code ("system.future.thing") humanizes to "System future thing" (no "." separators); an unmapped audit action ("widget.frobnicated") with actor "bob" yields "bob widget frobnicated" (no raw dotted code); an unknown transaction change_kind degrades the summary to the bare status word. No formatter output for an unmapped code contains a "." from the original dotted code.'
      priority: high
      references_constraints: [C-09]
    - id: AC-26
      description: 'v1.2.0 — Integration: Service.List (with an injected RuleTitleFunc) over a seeded transaction (rule_id resolving to "Ensure auditd is enabled", status=fail, change_kind=state_changed), a system.package.updated intelligence event with from/to detail, and a host.created audit event with actor_label set, returns the transaction Row with title="Ensure auditd is enabled" + summary="Changed: now Fail", the intelligence Row with title="Package updated" + summary="curl: 7.64 → 7.81", and the audit Row with title="alice@example.com created a host". No returned title leaks the seeded raw codes ("system.package.updated", "host.created").'
      priority: critical
      references_constraints: [C-09]
    - id: AC-27
      description: 'v1.3.0 — Cursor pagination does NOT drop rows sharing the boundary occurred_at. Seeding four rows at one identical instant and paging with limit=2 returns all four distinct ids across the pages with none lost or duplicated (the prior timestamp-only cursor returned the second page empty, losing two rows).'
      priority: critical
      references_constraints: [C-03]
