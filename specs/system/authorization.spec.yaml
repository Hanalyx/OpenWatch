spec: authorization
version: "1.2"
status: active
owner: engineering
summary: >
  RBAC matrix: 6 roles (SUPER_ADMIN, SECURITY_ADMIN, SECURITY_ANALYST,
  COMPLIANCE_OFFICER, AUDITOR, GUEST) with 33 permissions across 9
  categories. SUPER_ADMIN holds all 33; GUEST holds exactly 3
  (HOST_READ, RESULTS_READ, COMPLIANCE_VIEW). SECURITY_ADMIN lacks user
  CRUD and system config permissions. require_permission and require_role
  decorators raise 403 with detail including the required permission or
  role values. API keys bypass role matrix and use a permissions list.
  Webhook management, Kensa scan, and metrics endpoints MUST require
  RBAC authorization. API key auth MUST resolve to valid role permissions.
  System-wide MFA enforcement and per-user MFA exemption MUST be
  restricted to SUPER_ADMIN only.

---

# Objective

objective: >
  Ensure the RBAC system enforces a complete, auditable permission matrix
  where every role has exactly the permissions documented here, decorators
  fail closed on unauthorized access, and 403 responses consistently
  include the required permission or role so that authorization failures
  are actionable.

---

# Constraints

constraints:
  roles:
    - "UserRole MUST define exactly 6 values: super_admin, security_admin,
      security_analyst, compliance_officer, auditor, guest"

  permissions:
    - "Permission enum MUST define exactly 33 members across 9 categories"
    - "Categories: user (5), host (5), content (4), scan (8), results (2),
      reports (2), system (4), audit (1), compliance (2)"

  role_matrix:
    - "SUPER_ADMIN MUST hold all 33 permissions"
    - "GUEST MUST hold exactly 3 permissions: HOST_READ, RESULTS_READ, COMPLIANCE_VIEW"
    - "SECURITY_ADMIN MUST NOT hold USER_CREATE, USER_UPDATE, USER_DELETE,
      USER_MANAGE_ROLES, SYSTEM_CONFIG, SYSTEM_CREDENTIALS, SYSTEM_MAINTENANCE"
    - "COMPLIANCE_OFFICER MUST hold RESULTS_READ_ALL and REPORTS_EXPORT but NOT SCAN_EXECUTE"

  decorators:
    - "require_permission MUST raise HTTP 403 when role lacks required permission"
    - "require_role MUST raise HTTP 403 when user role not in allowed list"
    - "403 detail MUST include the required permission value or role values"

---

# Acceptance Criteria

acceptance_criteria:
  - id: AC-1
    description: >
      UserRole enum defines exactly 6 members: super_admin, security_admin,
      security_analyst, compliance_officer, auditor, guest.

  - id: AC-2
    description: >
      Permission enum defines exactly 33 members covering user (5), host (5),
      content (4), scan (8), results (2), reports (2), system (4), audit (1),
      and compliance (2) categories.

  - id: AC-3
    description: >
      ROLE_PERMISSIONS[UserRole.SUPER_ADMIN] contains all 33 Permission
      members.

  - id: AC-4
    description: >
      ROLE_PERMISSIONS[UserRole.GUEST] contains exactly 3 permissions:
      HOST_READ, RESULTS_READ, COMPLIANCE_VIEW.

  - id: AC-5
    description: >
      require_permission decorator raises HTTP 403 FORBIDDEN when the
      user's role does not have the required permission.

  - id: AC-6
    description: >
      require_role decorator raises HTTP 403 FORBIDDEN when the user's
      role is not in the allowed roles list.

  - id: AC-7
    description: >
      403 response detail from require_permission includes the required
      permission value; from require_role includes the required role values.

  - id: AC-8
    description: >
      SECURITY_ADMIN lacks USER_CREATE, USER_UPDATE, USER_DELETE,
      USER_MANAGE_ROLES, SYSTEM_CONFIG, SYSTEM_CREDENTIALS, and
      SYSTEM_MAINTENANCE permissions.

  - id: AC-9
    description: >
      COMPLIANCE_OFFICER has RESULTS_READ_ALL and REPORTS_EXPORT but does
      not have SCAN_EXECUTE.

  - id: AC-10
    description: >
      check_permission handles "api_keys" resource type by checking against
      [SUPER_ADMIN, SECURITY_ADMIN] only, bypassing the general
      permission_map.

  - id: AC-11
    description: >
      Webhook management endpoints (list, create, update, delete, test) MUST
      use require_permission or require_role decorators restricting access to
      at least SECURITY_ADMIN role. Basic authentication via get_current_user
      alone is insufficient.

  - id: AC-12
    description: >
      Kensa scan endpoints that modify state (sync, execute) MUST require at
      minimum SCAN_EXECUTE permission; read endpoints MUST require at minimum
      HOST_READ permission. Any authenticated user (including GUEST) MUST NOT
      be able to access state-modifying Kensa endpoints.

  - id: AC-13
    description: >
      API key authentication MUST NOT return a hardcoded non-enum role value
      such as "api_key". The decode_token function MUST resolve API key
      authentication to the actual permissions associated with the key, not
      a synthetic role string outside the UserRole enum.

  - id: AC-14
    description: >
      The /metrics Prometheus endpoint MUST require authentication via
      Depends(get_current_user) or equivalent authentication dependency.
      Unauthenticated access to metrics MUST be rejected.

  - id: AC-15
    description: >
      System-wide MFA enforcement MUST be controllable only by SUPER_ADMIN.
      A settings endpoint (e.g., PUT /api/admin/settings/mfa) MUST exist
      that accepts an mfa_required boolean and MUST be gated by
      require_role([UserRole.SUPER_ADMIN]) or
      require_permission(Permission.SYSTEM_CONFIG). Non-SUPER_ADMIN roles
      MUST receive 403 when attempting to change the system MFA policy.

  - id: AC-16
    description: >
      Per-user MFA exemption MUST be controllable only by SUPER_ADMIN.
      An admin endpoint (e.g., PUT /api/admin/users/{id}/mfa) MUST exist
      that can disable or exempt a specific user from MFA, and MUST be
      gated by require_role([UserRole.SUPER_ADMIN]) or
      require_permission(Permission.USER_UPDATE). Non-SUPER_ADMIN roles
      MUST receive 403 when attempting to modify another user's MFA status.
      Users MUST NOT be able to bypass MFA enforcement for themselves
      through this endpoint.

---

