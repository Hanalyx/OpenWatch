spec:
  id: system-compliance-lens
  title: Default compliance lens — org-wide framework projection
  version: "1.3.0"
  status: approved
  tier: 2

  context:
    system: openwatch
    feature: An org-wide default framework "lens" the compliance-score surfaces project to
    description: >
      OpenWatch scans a host once against the full Kensa corpus; frameworks
      (CIS, STIG, NIST, …) are read-time PROJECTIONS over that one result
      (system-kensa-executor: "one scan, many framework views"). Phase 1 adds
      an org-wide DEFAULT LENS: an admin picks a framework FAMILY (e.g. STIG)
      and the score surfaces (dashboard + hosts avg compliance, hosts-list
      cards, host detail) default to scoring against that framework's mapped
      rules instead of All rules. The default is a family, not a versioned
      key, so it resolves per-host to the OS-appropriate corpus key
      (stig_rhel9 on RHEL 9, stig_rhel10 on RHEL 10); a host with no key for
      the family scores N/A under it. Empty means All rules — the honest
      framework-agnostic baseline and the factory default.
    related_specs:
      - system-kensa-executor
      - api-fleet-observability
      - api-hosts

  objective:
    summary: >
      The default lens changes what compliance scores DEFAULT to showing,
      org-wide, without changing what was scanned; All rules stays the
      baseline and frameworks never blend into one number.
    scope:
      includes:
        - 'ComplianceConfig.DefaultFramework (systemconfig) + config endpoints'
        - 'Framework family resolution (FamilyOf) + corpus-derived family list'
        - 'Family-aware score filter in the fleet score + hosts-list queries'
        - 'Enabled-frameworks allowlist (Phase 2): restrict which families are offered as lenses'
      excludes:
        - 'Per-host/per-group compliance TARGET assignment (Phase 3)'
        - 'Framework-scoped posture history / trend (Phase 3)'

  constraints:
    - id: C-01
      description: The default lens is ComplianceConfig.DefaultFramework, persisted in systemconfig (KeyCompliance). An empty value means All rules (the factory default); a non-empty value is a framework FAMILY id. It is a read-time display default only — it MUST NOT affect what a scan runs (scans always execute the full corpus).
      type: technical
      enforcement: error
    - id: C-02
      description: A framework FAMILY groups corpus keys by stripping a trailing OS suffix (_(rhel|ubuntu)<digits>); an OS-agnostic key (nist_800_53, pci_dss_4, srg) is its own family. The available family list MUST be derived from the live corpus (host_rule_state.framework_refs), never hardcoded. A score filter for a family MUST match ANY corpus key in that family (so a mixed-OS fleet scores across stig_rhel9 + stig_rhel10), while a specific key matches exactly; the family match SQL MUST mirror FamilyOf.
      type: technical
      enforcement: error
    - id: C-03
      description: The compliance config read is system:read; the write is system:config:write and emits a system.config.changed audit event. The frameworks list is host:read.
      type: security
      enforcement: error
    - id: C-04
      description: ComplianceConfig.EnabledFrameworks is the Phase 2 allowlist of framework FAMILY ids offered as lenses, persisted in the same systemconfig row. Empty means every corpus family is available (the factory default and backward-compatible for existing rows). When non-empty and DefaultFramework is non-empty, DefaultFramework MUST be one of EnabledFrameworks (an admin cannot default the org to a hidden family). GET /compliance/frameworks narrows its result to the allowlist by default; all=true returns the full corpus list (for the allowlist editor). The allowlist is a DISPLAY filter, not a security boundary — it never changes what a scan runs.
      type: technical
      enforcement: error
    - id: C-05
      description: >
        A compliance TARGET is durable operator intent about the framework
        family a host is held to, at two scopes (migration 0051): hosts.target_framework
        (the override) and groups.target_framework (a SITE group only — D1: an
        os_category group may not carry a target). The host_effective_target view
        resolves them per host by precedence: host target, else the OLDEST
        site-group membership's target (D2: group_members.added_at ASC, then group
        id), else NULL. framework.EffectiveTarget applies the org-default
        (ComplianceConfig.DefaultFramework) as the final fallback and becomes the
        host's default lens: a host's compliance summary defaults to its effective
        target instead of All rules when no explicit lens is requested. A target
        family with no matching corpus key for a host scores N/A, never 0% (D3).
        The host override is set via host.SetTarget and the group target via
        group.SetTarget; each surfaces its stored target_framework on the
        respective read model (host detail and the groups rollup list).
      type: technical
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: ComplianceConfig defaults DefaultFramework to "" (All rules); Validate accepts empty and a short lowercase family token and rejects an over-long or invalid-character value. SetCompliance persists and LoadCompliance round-trips the value; a fresh store with no row returns the empty (All rules) default.
      priority: high
      references_constraints: [C-01]
    - id: AC-02
      description: FamilyOf strips a trailing OS suffix (stig_rhel9 -> stig, cis_ubuntu22 -> cis) and leaves an OS-agnostic key as its own family (nist_800_53, pci_dss_4, srg). Label renders a known family (STIG, NIST 800-53) and upper-cases an unknown id.
      priority: high
      references_constraints: [C-02]
    - id: AC-03
      description: The fleet compliance score with a FAMILY filter counts rule-states carrying ANY key in that family across a mixed-OS corpus (a host with stig_rhel9 and a host with stig_rhel10 both contribute to the "stig" fleet score); a specific-key filter counts only that key; an empty filter counts all rules. The hosts-list card summary honors the same family filter per host.
      priority: critical
      references_constraints: [C-02]
    - id: AC-04
      description: GET /api/v1/compliance/frameworks returns the corpus-derived families (id, label, keys) and is host:read. GET /api/v1/system/compliance/config returns the current default lens (system:read); PUT sets it (system:config:write), rejects an invalid value with 400, and echoes the stored value.
      priority: high
      references_constraints: [C-01, C-03]
    - id: AC-05
      description: ComplianceConfig.EnabledFrameworks defaults to empty (all families). Validate accepts an empty allowlist and a list of valid family tokens, rejects an over-long list (>32) or an entry with invalid characters, and rejects a non-empty DefaultFramework that is not one of a non-empty EnabledFrameworks. SetCompliance persists the allowlist and LoadCompliance round-trips it (empty on a fresh store).
      priority: high
      references_constraints: [C-04]
    - id: AC-06
      description: GET /api/v1/compliance/frameworks narrows the returned families to EnabledFrameworks when the allowlist is non-empty, returns all corpus families when the allowlist is empty, and returns all corpus families (ignoring the allowlist) when all=true is passed.
      priority: high
      references_constraints: [C-04]
    - id: AC-07
      description: >
        The host_effective_target view resolves a host's target by precedence:
        a host with its own target_framework resolves to that; a host with no
        own target but a site-group target resolves to the group's; with two
        site groups carrying different targets, the OLDEST membership wins; a
        host with neither resolves to NULL. framework.EffectiveTarget returns
        the resolved target, falling back to the given org default when the view
        yields NULL, and empty when neither is set. A group target set on an
        os_category group is rejected (only a site group may carry one, D1); a
        target on a site group sets and clears via SetTarget.
      priority: high
      references_constraints: [C-05]
    - id: AC-08
      description: >-
        host.SetTarget sets (a valid family), clears (empty), and validates
        (rejects an over-long or invalid-character token with ErrInvalidTarget)
        the host's OWN target_framework, and returns ErrHostNotFound for an
        unknown or soft-deleted host. Unlike a group target there is no
        site-only constraint — a host may always carry its own target, and it is
        the per-host override that wins in host_effective_target. GetByID
        surfaces the stored target_framework (nil when unset).
      priority: high
      references_constraints: [C-05]
