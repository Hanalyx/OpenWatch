spec:
  id: system-config
  title: Layered runtime configuration
  version: "1.0.0"
  status: approved
  tier: 2

  context:
    system: openwatch
    feature: Configuration loader
    description: >
      Runtime configuration is loaded from four ordered sources — built-in
      defaults, TOML file, environment variables (OPENWATCH_<SECTION>_<KEY>),
      and CLI flags — with higher-numbered sources overriding lower.
      Configuration is validated before use; the openwatch binary exits
      non-zero with a multi-error report for invalid input. Database DSNs
      are redacted (password → ***) anywhere they are surfaced to humans
      or logs.

  objective:
    summary: >
      Provide a single resolved Config object built deterministically from
      layered sources, so callers never see partial state and operators can
      verify with `openwatch check-config` exactly what the running binary
      will use.
    scope:
      includes:
        - Layer precedence (defaults → TOML → env → flags)
        - Validation with multi-error reporting
        - DSN redaction
      excludes:
        - Hot-reload (deferred; SIGHUP only reloads license)
        - Schema migration between config versions

  constraints:
    - id: C-01
      description: Layering order MUST be defaults < TOML file < env vars < CLI flags
      type: technical
      enforcement: error
    - id: C-02
      description: Each layer MUST only overwrite fields it sets; unset fields fall through
      type: technical
      enforcement: error
    - id: C-03
      description: Env var name MUST be OPENWATCH_<SECTION>_<KEY> with uppercased section and key
      type: technical
      enforcement: error
    - id: C-04
      description: Validate() MUST return all failures, not just the first
      type: technical
      enforcement: error
    - id: C-05
      description: Validate() MUST be side-effect-free (no file I/O, no network)
      type: technical
      enforcement: error
    - id: C-06
      description: RedactDSN() MUST replace any URL userinfo password with literal '***'
      type: security
      enforcement: error
    - id: C-07
      description: Missing TOML file with PathRequired=false MUST silently fall back to defaults
      type: technical
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: >
        Load() with zero options returns Defaults(): Server.Listen=0.0.0.0:8443,
        Database.MaxConnections=25, Logging.Level=info, Logging.Format=json.
      priority: critical
      references_constraints: [C-01, C-02]
    - id: AC-02
      description: >
        Load() applied with a TOML file at Path overwrites the fields the
        file sets and leaves unset fields at default values.
      priority: critical
      references_constraints: [C-02]
    - id: AC-03
      description: >
        Env vars override TOML for the same field: setting OPENWATCH_SERVER_LISTEN
        beats a [server].listen value from TOML.
      priority: critical
      references_constraints: [C-01]
    - id: AC-04
      description: >
        CLI flag overrides beat env: a non-nil FlagOverrides.Listen value
        wins over OPENWATCH_SERVER_LISTEN.
      priority: critical
      references_constraints: [C-01]
    - id: AC-05
      description: >
        All seven env vars apply correctly: OPENWATCH_SERVER_LISTEN,
        OPENWATCH_SERVER_TLS_CERT, OPENWATCH_SERVER_TLS_KEY,
        OPENWATCH_DATABASE_DSN, OPENWATCH_DATABASE_MAX_CONNECTIONS,
        OPENWATCH_LOGGING_LEVEL, OPENWATCH_LOGGING_FORMAT.
      priority: high
      references_constraints: [C-03]
    - id: AC-06
      description: >
        Non-integer value in OPENWATCH_DATABASE_MAX_CONNECTIONS causes Load
        to return an error mentioning the variable name.
      priority: high
    - id: AC-07
      description: >
        Load() with Path pointing to a missing file and PathRequired=false
        returns the Defaults config and no error.
      priority: critical
      references_constraints: [C-07]
    - id: AC-08
      description: >
        Load() with Path pointing to a missing file and PathRequired=true
        returns an error.
      priority: high
    - id: AC-09
      description: >
        Load() with a malformed TOML file returns an error regardless of
        PathRequired.
      priority: high
    - id: AC-10
      description: >
        Validate() on Defaults() returns nil (the built-in defaults are
        valid out-of-box).
      priority: critical
      references_constraints: [C-05]
    - id: AC-11
      description: >
        Validate() rejects each of empty listen, host-only listen, empty
        tls_cert, empty tls_key, empty dsn, non-postgres scheme,
        max_connections <= 0, unknown logging level, unknown logging
        format.
      priority: high
    - id: AC-12
      description: >
        Validate() accumulates multiple errors and returns them all in a
        single joined error so check-config can report every issue at once.
      priority: high
      references_constraints: [C-04]
    - id: AC-13
      description: >
        RedactDSN("postgres://user:secret@host:5432/db") returns
        "postgres://user:***@host:5432/db" with the literal three-asterisk
        placeholder (not URL-encoded).
      priority: critical
      references_constraints: [C-06]
    - id: AC-14
      description: >
        RedactDSN preserves DSNs with no password unchanged (no userinfo,
        or userinfo with only a username).
      priority: medium
    - id: AC-15
      description: >
        RedactDSN returns the input unchanged when not parseable as a URL.
      priority: medium
