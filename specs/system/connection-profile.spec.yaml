spec:
  id: system-connection-profile
  title: Per-host SSH connection learning (auth method + sudo mode)
  version: "1.2.0"
  status: approved
  tier: 2

  context:
    system: openwatch-go
    feature: SSH connection memory shared by all host-communication paths
    description: >
      OpenWatch talks to a managed host from several paths (liveness
      privilege probe, OS discovery, OS intelligence collection, and the
      compliance scan). Each must decide, per connection, which SSH auth
      method to offer first (key or password) and how to escalate to root
      (no sudo, NOPASSWD via `sudo -n`, or a sudo password via `sudo -S`).
      Without memory every connection re-discovers this: it offers an
      unauthorized key (a failed publickey attempt that counts against
      MaxAuthTries and can trip fail2ban) and runs a doomed `sudo -n` on a
      host that needs a password. This spec records what last worked, per
      host, so each path leads with the known-good choice — a hint, never a
      lock: callers still fall back and rewrite the record when the host
      changes, so a stale hint self-heals.
    related_specs:
      - system-ssh-connectivity
      - system-kensa-executor

  objective:
    summary: >
      Support the full SSH matrix on every path — key OR password auth,
      NOPASSWD OR password sudo — out of the box, and remember per host
      which combination works so repeat connections avoid wasted/failed
      attempts.
    scope:
      includes:
        - host_connection_profile table + connprofile store (Get / Record)
        - Dial-layer auth-method ordering (PreferAuth) + observation (ObservedAuth)
        - Compliance-scan sudo -S support with per-connection sudo-mode probe + learning
        - Default-on sudo -S password fallback (kill-switch retained)
        - Auth-method learning wired into the OS discovery, OS intelligence
          (collector), and liveness privilege-probe paths (v1.1.0) — each
          leads the dial with the host's recorded method and records what
          authenticated via the shared connprofile store
        - Sudo-mode learning wired into those same three paths (v1.2.0) —
          each leads sudo with the host's recorded mode and records the
          mode confirmed to work. The liveness probe is the authoritative
          learner (innocuous `true` sentinel every cycle); discovery and
          collector learn opportunistically from their real sudo commands
          (only a confirmed exit-0 records a mode, never a misobservation)
      excludes:
        - Settings UI/API to toggle the kill-switch (DB-only for now)
        - A dedicated `true`-sentinel sudo probe in discovery/collector —
          they reuse their existing real sudo commands rather than adding a
          round-trip, deferring to the liveness probe for authoritative
          confirmation (system-connection-profile C-04 binds only the scan)

  constraints:
    - id: C-01
      description: The connection profile MUST be a hint, not a lock — a recorded value only orders the attempts; the path MUST still fall back to the other method and overwrite the record when the working choice changes.
      type: technical
      enforcement: error
    - id: C-02
      description: Recording one dimension (ssh_auth_method or sudo_mode) MUST NOT clobber the other; an unknown value MUST be a no-op.
      type: technical
      enforcement: error
    - id: C-03
      description: The sudo password MUST be delivered to the remote sudo via the session stdin pipe, never embedded in the command line / argv.
      type: security
      enforcement: error
    - id: C-04
      description: The compliance scan MUST determine the sudo mode once per connection via an innocuous `true` sentinel (not by inferring refusal from a real check's non-zero exit) and reuse it for every command on that connection.
      type: technical
      enforcement: error
    - id: C-05
      description: The compliance scan MUST gate its sudo -S use of the credential password on the SAME two conditions the collector/liveness/discovery paths enforce — the AllowCredentialSudoPassword kill-switch is on AND the credential auth method is password or both. When either fails, the scan MUST NOT attempt sudo -S (it degrades to sudo -n). This gates only the sudo use of the password; SSH password authentication is independent.
      type: security
      enforcement: error
    - id: C-06
      description: The OS discovery, OS intelligence (collector), and liveness privilege-probe paths MUST lead the SSH dial with the host's recorded auth method and record the method that authenticated, using the shared connprofile store. This learning MUST be best-effort — a missing host id, an absent profile row, or a store error MUST dial in the default order and MUST NOT fail the connection.
      type: technical
      enforcement: error
    - id: C-07
      description: The OS discovery, OS intelligence (collector), and liveness privilege-probe paths MUST lead sudo with the host's recorded sudo mode (leading with `sudo -S` only when the mode is password AND the credential password may be fed per C-05's gate) and MUST record the mode confirmed to work. To avoid misrecording, a mode MUST be recorded ONLY on a confirmed exit-0 of a given sudo form — never inferred from a command that exited non-zero for its own reasons. Learning MUST be best-effort and MUST NOT change the sudo password gate (C-05) or fail the connection on a store miss/error.
      type: technical
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: connprofile.Store.Get on a host with no recorded profile returns a zero Profile (both dimensions unknown) and a nil error.
      priority: high
      references_constraints: [C-02]
    - id: AC-02
      description: Recording one dimension preserves the other (COALESCE upsert), and re-recording a dimension overwrites it.
      priority: critical
      references_constraints: [C-01, C-02]
    - id: AC-03
      description: Recording an unknown SSH auth method or sudo mode is a no-op and creates no row.
      priority: high
      references_constraints: [C-02]
    - id: AC-04
      description: ssh.Dial offers every available auth method (preference is order, not exclusion); DialOptions.PreferAuth leads with the named method and DialOptions.ObservedAuth reports the method that actually authenticated after a successful dial.
      priority: critical
      references_constraints: [C-01]
    - id: AC-05
      description: The scan transport wraps a command per the connection's sudo mode — NOPASSWD as `sudo -n sh -c '<cmd>'` with no stdin, password as `sudo -S -p '' sh -c '<cmd>'` with the credential password (newline-terminated) on stdin and never in the command line, and no-sudo verbatim.
      priority: critical
      references_constraints: [C-03, C-04]
    - id: AC-06
      description: The sudo -S password fallback is ON by default (DefaultSecurity().AllowCredentialSudoPassword is true), retained as a kill-switch rather than an opt-in.
      priority: high
      references_constraints: [C-01]
    - id: AC-07
      description: The scan resolves a sudo password only when the kill-switch is on AND the credential auth method is password or both; a key-only credential or a kill-switch set false yields no sudo password (sudoPasswordFor returns empty), so the scan never attempts sudo -S in those cases.
      priority: critical
      references_constraints: [C-05]
    - id: AC-08
      description: The discovery/collector SSH transport, when a profile store is wired and the ctx carries a host id (connprofile.WithHostID), sets DialOptions.PreferAuth from the host's recorded SSH auth method and records the observed method via RecordSSHAuth after a successful dial. With no host id on the ctx OR no store wired, it dials in the default order and records nothing.
      priority: high
      references_constraints: [C-06]
    - id: AC-09
      description: The liveness privilege probe, when WithProfiles is set, leads the dial with the host's recorded SSH auth method and records the method that authenticated; with no profile store wired it passes no preference and records nothing. A profile lookup error is non-fatal (dials in the default order).
      priority: high
      references_constraints: [C-06]
    - id: AC-10
      description: ssh.RunSudo reports the sudo mode OBSERVED to work — SudoNopasswd when `sudo -n` exits 0, SudoPassword when `sudo -S` exits 0, and empty otherwise (never a misobservation from a command that failed for its own reasons). When told prefer=SudoPassword and the password gate is satisfied it leads with `sudo -S`, issuing zero `sudo -n` calls; a stale password preference self-heals by falling back to `sudo -n`. This is the shared primitive the collector threads (lead with the recorded mode, record the confirmed mode once per cycle).
      priority: critical
      references_constraints: [C-07]
    - id: AC-11
      description: The discovery firewall probe leads its sudo firewall commands with the host's recorded sudo mode and opportunistically records the mode a sudo command confirms (SudoUnknown when none answered via sudo — e.g. a sudoless firewalld host); recording is skipped when the confirmed mode equals the stored one.
      priority: high
      references_constraints: [C-07]
    - id: AC-12
      description: The liveness privilege probe records the sudo mode it confirms via the `true` sentinel (the authoritative learner, run every cycle), and on a host recorded as needing a password it leads with `sudo -S` (zero `sudo -n` calls); a confirmed mode equal to the stored one is not re-recorded.
      priority: high
      references_constraints: [C-07]
