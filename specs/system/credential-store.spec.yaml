spec:
  id: system-credential-store
  title: SSH credential store with system→host fallback
  version: "1.0.0"
  status: approved
  tier: 1

  context:
    system: openwatch
    feature: Encrypted credential storage + tiered resolver
    description: >
      Single credentials table with a scope column ('system' or 'host').
      System-scope rows are the platform-wide default; host-scope rows
      override per-host. Resolve(hostID) returns the highest-precedence
      credential: host first, then system default. Resolution never
      blends fields across tiers (no "use host's username with system's
      key" footgun). All secret fields encrypted at rest with AES-256-GCM
      using a Data Encryption Key (DEK) loaded from a configurable path.
    related_specs:
      - system-auth-identity

  objective:
    summary: >
      One place that owns SSH credentials for the platform. Resolver is
      the only path scan/connectivity code uses, so adding a new tier
      (host_group later) is a single-method change rather than scattered
      precedence rules. Plaintext secrets exist only inside SSH dial
      calls; the API surface returns metadata only.
    scope:
      includes:
        - credentials table (scope=system|host, encrypted_password/key/passphrase, key metadata)
        - AES-256-GCM via shared internal/secretkey package (same DEK used by MFA secrets)
        - Resolver host→system fallback
        - "Per-scope name uniqueness when is_active=true"
        - "At most one system default (is_default=true) across all active system credentials"
      excludes:
        - "host_group scope (deferred to a later slice)"
        - "API CRUD surface (lives in api-credentials spec)"
        - "KMS/Vault DEK source (file-based DEK only in Slice A)"

  constraints:
    - id: C-01
      description: Secret fields (encrypted_password, encrypted_private_key, encrypted_private_key_passphrase) MUST be stored AES-256-GCM encrypted; plaintext MUST NOT appear in any DB column
      type: security
      enforcement: error
    - id: C-02
      description: credentials.scope MUST be 'system' or 'host' (CHECK constraint enforced at migration time)
      type: technical
      enforcement: error
    - id: C-03
      description: scope='system' MUST have scope_id IS NULL; scope='host' MUST have scope_id IS NOT NULL (CHECK constraint enforced at migration time)
      type: technical
      enforcement: error
    - id: C-04
      description: auth_method='ssh_key' MUST have encrypted_private_key IS NOT NULL; auth_method='password' MUST have encrypted_password IS NOT NULL; auth_method='both' MUST have both
      type: technical
      enforcement: error
    - id: C-05
      description: At most one (scope='system', is_default=true, is_active=true) row may exist (enforced by partial unique index)
      type: technical
      enforcement: error
    - id: C-06
      description: Resolve(hostID) MUST return the host-scope credential when it exists; otherwise the system-default credential; otherwise ErrNoCredential
      type: technical
      enforcement: error
    - id: C-07
      description: Resolve MUST never blend fields across tiers — the returned Credential is always entirely from one row
      type: security
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: Migration 0007 creates the credentials table with all required columns and the CHECK constraints for scope, scope_id, and auth_method consistency.
      priority: critical
      references_constraints: [C-02, C-03, C-04]
    - id: AC-02
      description: NewCredential with scope=system, auth_method=password persists a row whose encrypted_password is NOT the plaintext bytes (AES-GCM ciphertext).
      priority: critical
      references_constraints: [C-01]
    - id: AC-03
      description: NewCredential with scope=host and scope_id=NULL returns ErrInvalidScope; no row is inserted.
      priority: critical
      references_constraints: [C-03]
    - id: AC-04
      description: NewCredential with scope=system and a non-nil scope_id returns ErrInvalidScope; no row is inserted.
      priority: critical
      references_constraints: [C-03]
    - id: AC-05
      description: NewCredential with auth_method=ssh_key but no private key returns ErrMissingSecret; no row is inserted.
      priority: critical
      references_constraints: [C-04]
    - id: AC-06
      description: NewCredential with auth_method=password but no password returns ErrMissingSecret; no row is inserted.
      priority: critical
      references_constraints: [C-04]
    - id: AC-07
      description: NewCredential with auth_method=both populates BOTH encrypted_password and encrypted_private_key.
      priority: critical
      references_constraints: [C-04]
    - id: AC-08
      description: A second NewCredential with scope=system, is_default=true while another is_default=true row exists returns ErrMultipleSystemDefaults.
      priority: critical
      references_constraints: [C-05]
    - id: AC-09
      description: GetByID returns a Credential with decrypted secret fields populated (plaintext usable by the SSH dial code).
      priority: critical
    - id: AC-10
      description: Resolve(hostID) returns the host-scope credential for that host when one exists with is_active=true.
      priority: critical
      references_constraints: [C-06, C-07]
    - id: AC-11
      description: Resolve(hostID) returns the system-default credential when no host-scope credential exists for hostID.
      priority: critical
      references_constraints: [C-06]
    - id: AC-12
      description: Resolve(hostID) returns ErrNoCredential when neither a host-scope row exists for hostID nor a (system, is_default=true) row exists.
      priority: critical
      references_constraints: [C-06]
