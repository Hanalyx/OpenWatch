spec:
  id: system-http-server
  title: HTTPS server with TLS hot-reload
  version: "1.3.0"
  status: approved
  tier: 2

  context:
    system: openwatch-go
    feature: HTTP server bootstrap
    description: >
      HTTPS server with chi router and TLS cert hot-reload (mtime-cached
      GetCertificate). Foundation middleware mounted first; Day-5+ routes
      register onto the router exposed via api.HandlerFromMux.

  objective:
    summary: >
      Get a real HTTPS endpoint serving traffic with the foundation
      middleware chain in place, so Day-5+ endpoints land into a working
      request lifecycle.
    scope:
      includes:
        - chi router with correlation + idempotency middleware
        - http.Server with locked timeouts
        - TLS GetCertificate with mtime cache
      excludes:
        - Graceful shutdown verification under load
        - HTTP/3, QUIC

  constraints:
    - id: C-01
      description: chi MUST be the router; net/http and the stdlib mux MUST NOT be used in production paths
      type: technical
      enforcement: error
    - id: C-02
      description: Correlation middleware MUST run before any other middleware
      type: technical
      enforcement: error
    - id: C-03
      description: ReadHeaderTimeout MUST be 10s
      type: performance
      enforcement: error
    - id: C-04
      description: ReadTimeout MUST be 30s
      type: performance
      enforcement: error
    - id: C-05
      description: WriteTimeout MUST be 60s
      type: performance
      enforcement: error
    - id: C-06
      description: IdleTimeout MUST be 120s
      type: performance
      enforcement: error
    - id: C-07
      description: MaxHeaderBytes MUST be 65536 (64 KiB)
      type: security
      enforcement: error
    - id: C-08
      description: tls.Config.MinVersion MUST be tls.VersionTLS12 or higher
      type: security
      enforcement: error
    - id: C-09
      description: Cert cache validity period MUST be 5 seconds (cert hot-reload within seconds)
      type: technical
      enforcement: error
    - id: C-10
      description: The server MUST serve the embedded single-page app for non-API routes (static assets directly, index.html as the client-side-routing fallback) and MUST NOT serve the SPA for unmatched /api/ paths (those return 404).
      type: technical
      enforcement: error
    - id: C-12
      description: >-
        Every response MUST carry security headers, since the single binary
        serves the SPA + API from one origin with no edge proxy: Strict-
        Transport-Security (HSTS, >=1 year, includeSubDomains), a Content-
        Security-Policy that denies framing (frame-ancestors 'none') and
        restricts default-src to 'self', X-Content-Type-Options nosniff,
        X-Frame-Options DENY, and Referrer-Policy no-referrer. The CSP for
        the embedded Swagger UI under /docs may relax script/style to
        'unsafe-inline' but MUST still deny framing. (C-11 is reserved for
        the static-delivery spec slice.)
      type: security
      enforcement: error
    - id: C-13
      description: >-
        The authentication endpoints (POST /api/v1/auth/login and
        /api/v1/auth/mfa:verify) MUST be rate-limited per client IP against
        online password/OTP guessing. Over the limit the server returns 429
        Too Many Requests with a Retry-After header and does NOT run the
        credential check. The client IP MUST come from the direct connection
        (RemoteAddr), not a client-supplied X-Forwarded-For, so an attacker
        cannot rotate the key. The limit is generous enough that legitimate
        sign-ins never trip it.
      type: security
      enforcement: error
    - id: C-14
      description: >-
        Unsafe (POST/PUT/PATCH/DELETE), cookie-authenticated requests MUST
        be CSRF-protected by double-submit: the server issues a non-HttpOnly
        XSRF-TOKEN cookie at login and on refresh, and the request MUST echo
        it in the X-CSRF-Token header (constant-time compared) or get 403.
        The check is gated on ambient authority — it applies only when the
        openwatch_session cookie is present; Bearer/token requests, the
        /api/v1/auth/* lifecycle endpoints, and requests with no session
        cookie are exempt. This makes the frontend's double-submit real
        rather than relying on SameSite=Lax alone.
      type: security
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: Server.Run() binds to cfg.Server.Listen and accepts HTTPS connections using TLSCert and TLSKey via GetCertificate.
      priority: critical
      references_constraints: [C-01]
    - id: AC-02
      description: http.Server constructed with ReadHeaderTimeout=10s, ReadTimeout=30s, WriteTimeout=60s, IdleTimeout=120s, MaxHeaderBytes=65536.
      priority: critical
      references_constraints: [C-03, C-04, C-05, C-06, C-07]
    - id: AC-03
      description: tls.Config.MinVersion is tls.VersionTLS12 (or higher); GetCertificate callback set.
      priority: critical
      references_constraints: [C-08]
    - id: AC-04
      description: GetCertificate called twice within 5-second cache window returns cached cert (one disk read).
      priority: high
      references_constraints: [C-09]
    - id: AC-05
      description: GetCertificate called after cache window expires re-reads from disk.
      priority: high
    - id: AC-06
      description: Replacing cert/key files on disk causes subsequent (post-cache) handshake to present new certificate.
      priority: critical
    - id: AC-07
      description: GetCertificate returns non-nil error if cert or key file is missing/malformed.
      priority: high
    - id: AC-08
      description: chi router has correlation.HTTPMiddleware mounted as first middleware before any handler.
      priority: critical
      references_constraints: [C-02]
    - id: AC-09
      description: GET to any path returns a response carrying an X-Correlation-Id header (req- prefix when no client header).
      priority: critical
    - id: AC-10
      description: HTTP request during ctx cancellation is either served to completion or rejected cleanly; no panic.
      priority: high
    - id: AC-11
      description: Run returns the first non-nil error from ListenAndServeTLS that is not http.ErrServerClosed.
      priority: medium
    - id: AC-12
      description: GET / returns the embedded SPA index.html with a 200 status and a text/html content type.
      priority: high
      references_constraints: [C-10]
    - id: AC-13
      description: GET a non-API, unmatched path (a client-side route such as /hosts) returns the SPA index.html (200) so deep links and reloads resolve.
      priority: high
      references_constraints: [C-10]
    - id: AC-14
      description: GET an unmatched /api/ path returns 404 and does NOT serve the SPA index.html.
      priority: critical
      references_constraints: [C-10]
    - id: AC-17
      description: Every response carries Strict-Transport-Security (max-age >= 1 year, includeSubDomains), Content-Security-Policy (with frame-ancestors 'none' and default-src 'self'), X-Content-Type-Options nosniff, X-Frame-Options DENY, and Referrer-Policy no-referrer. A request under /docs gets a CSP that relaxes script/style to 'unsafe-inline' (for Swagger UI) but still denies framing.
      priority: high
      references_constraints: [C-12]
    - id: AC-18
      description: The rateLimiter allows up to its limit within the window and denies the limit+1th attempt for the same key (a different key is independent). After the per-IP login budget is exhausted, POST /api/v1/auth/login returns 429 with a Retry-After header.
      priority: high
      references_constraints: [C-13]
    - id: AC-19
      description: A cookie-authenticated unsafe request (session cookie present) with no X-CSRF-Token, or a header that does not match the XSRF-TOKEN cookie, returns 403 authz.csrf_invalid; the same request with a matching X-CSRF-Token proceeds. A request carrying no session cookie, or an Authorization (Bearer) header, or to an /api/v1/auth/* path, is exempt. POST /auth/login Set-Cookies a non-HttpOnly XSRF-TOKEN.
      priority: critical
      references_constraints: [C-14]
