spec:
  id: system-license-validation
  title: License JWT validation
  version: "1.1.0"
  status: approved
  tier: 1

  context:
    system: openwatch
    feature: License JWT (EdDSA) validation
    description: >
      License files are JWTs signed with EdDSA (Ed25519). The OpenWatch
      binary embeds public keys at build time. Validation parses the JWT,
      verifies signature against embedded keys (current/prev/deprecated),
      validates iss/aud/exp/iat/nbf, checks fingerprint binding, and
      detects clock rollback against last_known_good.

  objective:
    summary: >
      Make license validation honest and inspectable. Today's Python
      LicenseService is a config-flag stub; the rebuild ships real
      signature checking, claim validation, and tamper detection from
      day one.
    scope:
      includes:
        - EdDSA signature verification
        - All standard JWT claim checks (iss, aud, exp, iat, nbf)
        - 30-day grace period
        - Fingerprint and clock-rollback detection
      excludes:
        - Production private-key minting
        - Hardware-backed key storage

  constraints:
    - id: C-01
      description: Algorithm MUST be EdDSA (Ed25519); other alg headers MUST be rejected
      type: security
      enforcement: error
    - id: C-02
      description: Signature MUST be verified against embedded public key (current/prev/deprecated)
      type: security
      enforcement: error
    - id: C-03
      description: iss MUST equal 'hanalyx-openwatch-licensing'
      type: security
      enforcement: error
    - id: C-04
      description: aud MUST equal 'openwatch'
      type: security
      enforcement: error
    - id: C-05
      description: exp MUST be present; license expires after exp+30 days (grace period)
      type: security
      enforcement: error
    - id: C-06
      description: iat MUST be present and not in the future (clock-rollback guard)
      type: security
      enforcement: error
    - id: C-07
      description: Loader MUST persist last_known_good timestamp; reject loads with iat < last_known_good
      type: security
      enforcement: error
    - id: C-08
      description: Fingerprint mismatch MUST emit license.tampered audit event
      type: security
      enforcement: error
    - id: C-09
      description: The embedded current public key (license-pubkey-current.pem) MUST NOT be the testdata signing key; a build embedding the test trust anchor is forgeable and MUST fail (SEC-H1)
      type: security
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: JWT signed with current private key, valid claims, no fingerprint validates as Valid; License struct populated.
      priority: critical
      references_constraints: [C-02]
    - id: AC-02
      description: JWT with tampered payload (signature mismatch) returns SignatureInvalid.
      priority: critical
      references_constraints: [C-01]
    - id: AC-03
      description: JWT signed with prev key validates as Valid but VerifyResult.UsingPrevKey is true.
      priority: high
    - id: AC-04
      description: JWT with wrong iss claim returns IssuerInvalid.
      priority: critical
      references_constraints: [C-03]
    - id: AC-05
      description: JWT with wrong aud claim returns AudienceInvalid.
      priority: critical
      references_constraints: [C-04]
    - id: AC-06
      description: JWT with exp in the past (>30 days ago) returns Expired.
      priority: critical
      references_constraints: [C-05]
    - id: AC-07
      description: JWT with exp in the past but within 30-day grace validates as Valid with InGracePeriod=true.
      priority: high
    - id: AC-08
      description: JWT with iat newer than now+10s (clock skew budget) returns NotYetValid.
      priority: high
      references_constraints: [C-06]
    - id: AC-09
      description: Fresh load with iat < last_known_good emits license.clock_rollback_detected audit (sync) and returns ClockRollback.
      priority: critical
      references_constraints: [C-07]
    - id: AC-10
      description: Mismatched fingerprint returns FingerprintMismatch and emits license.tampered audit event.
      priority: critical
      references_constraints: [C-08]
    - id: AC-11
      description: Each feature ID in claims MUST exist in features.yaml; unknown returns UnknownFeature.
      priority: high
    - id: AC-12
      description: Malformed JWT (not three dot-separated base64 segments) returns MalformedJWT; no panic.
      priority: critical
    - id: AC-13
      description: Validator latency p99 < 1ms for a single JWT signature verify.
      priority: medium
    - id: AC-14
      description: The embedded license-pubkey-current.pem MUST NOT equal the public half of the testdata test key; a regression to the test trust anchor fails the build (SEC-H1 guard).
      priority: critical
      references_constraints: [C-09]
