spec:
  id: system-notifications
  title: Notification channels — encrypted store + SSRF-guarded delivery
  version: "1.3.0"
  status: approved
  tier: 2

  context:
    system: openwatch-go
    feature: >-
      Operator-managed alert-delivery channels (Slack, generic webhook).
      A row per channel in notification_channels carries its routing tag
      filter and an AES-256-GCM encrypted config (target URL + optional
      bearer token). The notification.DispatchChannel adapts the store to
      the existing alertrouter.Channel seam, fanning every fired alert out
      to all enabled, tag-matching channels.
    description: >-
      Slice 2a ships Slack + webhook (both https POST). Email/SMTP is a
      follow-up. Secrets never touch a column in plaintext and are never
      returned by the API; the non-secret target_hint (URL host) is stored
      alongside for display so the list/read path never decrypts. Outbound
      delivery is SSRF-guarded: only https URLs to public hosts are dialed
      (literal private/loopback/link-local IPs rejected at validate time;
      the resolved IP re-checked at dial time to close the TOCTOU gap).
    related_specs:
      - api-notifications
      - system-alerts
      - system-credential-store

  objective:
    summary: >-
      Lock the encrypted-at-rest channel store, the SSRF guard, the
      secret-free list/read path, and the alertrouter dispatch fan-out.
    scope:
      includes:
        - "notification_channels migration 0030 (config_ciphertext BYTEA, target_hint, tag_filter JSONB)"
        - "Create/List/Get/Update/Delete with config encrypted via secretkey.Active()"
        - "SSRF guard: https-only, public-host-only, dial-time re-check"
        - "DispatchChannel.Send fans out to enabled tag-matching channels"
      excludes:
        - "Email/SMTP channel (follow-up slice 2b)"
        - "Delivery retry/backoff + per-delivery history (follow-up)"

  constraints:
    - id: C-01
      description: >-
        The channel secret MUST be encrypted with secretkey.Active() before
        persistence (config_ciphertext BYTEA) and MUST NEVER be stored in a
        plaintext column. The list/read paths (List, Get) MAY decrypt to
        surface NON-secret config (for email: smtp host/port/from/to/
        username, so the edit form can pre-fill), but MUST redact secrets via
        redactConfig — the SMTP password, and the slack/webhook URL + token,
        are NEVER returned. A decrypt failure on read is non-fatal (the
        channel still lists, without pre-fill).
      type: security
      enforcement: error
    - id: C-02
      description: >-
        Outbound delivery MUST be SSRF-guarded. safeURLHost MUST reject any
        non-https URL and any literal loopback/private/link-local/
        unspecified IP (and localhost names) at validate time; the delivery
        HTTP client MUST re-check the post-DNS resolved IP at dial time and
        refuse non-public addresses.
      type: security
      enforcement: error
    - id: C-03
      description: >-
        DispatchChannel.Send MUST deliver only to enabled channels whose
        tag filter matches the alert (empty filter = wildcard), and a
        delivery failure to one channel MUST NOT stop delivery to the
        others (it returns the first error for the router's failure metric).
      type: technical
      enforcement: error
    - id: C-04
      description: >-
        The notification package MUST NOT import any external notification
        SDK (Slack/webhook clients); delivery uses net/http + encoding/json
        only, mirroring alertrouter's no-SDK rule.
      type: technical
      enforcement: error
    - id: C-05
      description: >-
        v1.3.0 — the in-app notification feed (the bell) is a durable per-user
        store (notifications, migration 0048): one row per (recipient, change).
        Record MUST upsert on (user_id, group_key) so a recurring change
        collapses onto one row and re-surfaces it UNREAD (read_at reset), rather
        than flooding the bell. Read-state is per user: MarkRead MUST be scoped
        to the owning user (a user can never read or mutate another user's row),
        UnreadCount counts that user's unread rows, MarkAllRead clears them. List
        returns the user's rows newest-first with an optional unread-only filter.
      type: technical
      enforcement: error
    - id: C-06
      description: >-
        v1.3.0 — the bell is fed by an in-app alertrouter.Channel
        (notifyfeed.Channel) registered alongside the stdout/Slack/email
        channels, so every alert the engine classifies fans into the feed. Send
        MUST fan one row per active recipient (Slice 1: all non-deleted users;
        per-host RBAC scoping is a later refinement), mapping the alert's
        type/severity/title/host onto the notification and deep-linking a
        host-scoped alert to /hosts/{id}. The API read/mutate endpoints are
        self-scoped to the caller (no cross-user access).
      type: security
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: Create encrypts the config and persists config_ciphertext + target_hint; a round-trip getDecrypted returns the original URL + token, and the ciphertext column never equals the plaintext URL bytes.
      priority: critical
      references_constraints: [C-01]
    - id: AC-02
      description: List and Get route through scanRedacted; redactConfig clears the email password (returning host/port/from/to/username for pre-fill) and returns an empty Config for slack/webhook (URL/token stay hidden). The read path never returns the password, URL, or token. Source inspection of redactConfig + scanRedacted.
      priority: critical
      references_constraints: [C-01]
    - id: AC-03
      description: "safeURLHost rejects http:// URLs, returns ErrInvalidConfig for literal private/loopback/link-local IPs (127.0.0.1, 10.0.0.1, 169.254.169.254, ::1) and localhost, and accepts a public https host returning its hostname."
      priority: critical
      references_constraints: [C-02]
    - id: AC-04
      description: isBlockedIP returns true for loopback, RFC1918 private, link-local, and unspecified addresses, and false for a public address (e.g. 1.1.1.1); the delivery client's dial Control refuses a blocked resolved IP.
      priority: critical
      references_constraints: [C-02]
    - id: AC-05
      description: DispatchChannel.Send delivers to an enabled wildcard channel and to a channel whose tag filter matches the alert tags, and skips a disabled channel and a non-matching tag filter; matchesTags treats an empty filter as a wildcard.
      priority: high
      references_constraints: [C-03]
    - id: AC-06
      description: Update with ReplaceConfig=false leaves config_ciphertext + target_hint unchanged (name/enabled/tag_filter only); Update with ReplaceConfig=true re-encrypts and refreshes target_hint. Delete is idempotent for a missing id.
      priority: high
      references_constraints: [C-01]
    - id: AC-07
      description: Source inspection — the notification package imports no external Slack/webhook SDK (only net/http + encoding/json for delivery).
      priority: high
      references_constraints: [C-04]
    - id: AC-08
      description: "v1.1.0 (Phase 2b) — email channels: validateEmail requires smtp_host, a valid port, a from address, and >=1 recipient (else ErrInvalidConfig) and returns the smtp_host as target_hint; a created email channel round-trips its smtp host/port/username/password/from/to through the encrypted config; deliver routes email via SMTP (net/smtp) and slack/webhook via HTTP. The SMTP host is NOT public-host-restricted (internal relays allowed)."
      priority: high
      references_constraints: [C-01, C-03]
    - id: AC-09
      description: >-
        v1.3.0 — notifyfeed.Store.Record inserts a notification for a user; a
        second Record with the same (user_id, group_key) collapses onto the same
        row (one row, not two), refreshes its content + occurred_at, and
        re-surfaces it as unread even if it had been read. List returns a user's
        rows newest-first and, with unreadOnly, only unread rows.
      priority: high
      references_constraints: [C-05]
    - id: AC-10
      description: >-
        v1.3.0 — read-state is per user: UnreadCount returns the user's unread
        count; MarkRead marks one of the user's rows read (idempotent) and
        returns ErrNotFound for an id that is not the caller's (so a user cannot
        mutate another user's notification); MarkAllRead marks all the user's
        unread rows read and returns the count affected.
      priority: critical
      references_constraints: [C-05]
    - id: AC-11
      description: >-
        v1.3.0 — notifyfeed.Channel (an alertrouter.Channel named "in-app")
        fans an alert into one notification row per active recipient, mapping
        the alert's Type->kind, Severity->severity, Title/Body, and HostID, with
        a host-scoped alert deep-linked to /hosts/{id} and the alert DedupKey as
        the group_key; a fleet alert (no host) carries no host link.
      priority: high
      references_constraints: [C-06]
