spec:
  id: system-notifications
  title: Notification channels — encrypted store + SSRF-guarded delivery
  version: "1.8.0"
  status: approved
  tier: 2

  context:
    system: openwatch
    feature: >-
      Operator-managed alert-delivery channels (Slack, generic webhook).
      A row per channel in notification_channels carries its routing tag
      filter and an AES-256-GCM encrypted config (target URL + optional
      bearer token). The notification.DispatchChannel adapts the store to
      the existing alertrouter.Channel seam, fanning every fired alert out
      to all enabled, tag-matching channels.
    description: >-
      Slice 2a ships Slack + webhook (both https POST). Email/SMTP is a
      follow-up. Secrets never touch a column in plaintext and are never
      returned by the API; the non-secret target_hint (URL host) is stored
      alongside for display so the list/read path never decrypts. Outbound
      delivery is SSRF-guarded: only https URLs to public hosts are dialed
      (literal private/loopback/link-local IPs rejected at validate time;
      the resolved IP re-checked at dial time to close the TOCTOU gap).
    related_specs:
      - api-notifications
      - system-alerts
      - system-credential-store

  objective:
    summary: >-
      Lock the encrypted-at-rest channel store, the SSRF guard, the
      secret-free list/read path, and the alertrouter dispatch fan-out.
    scope:
      includes:
        - "notification_channels migration 0030 (config_ciphertext BYTEA, target_hint, tag_filter JSONB)"
        - "Create/List/Get/Update/Delete with config encrypted via secretkey.Active()"
        - "SSRF guard: https-only, public-host-only, dial-time re-check"
        - "DispatchChannel.Send fans out to enabled tag-matching channels"
      excludes:
        - "Email/SMTP channel (follow-up slice 2b)"
        - "Delivery retry/backoff + per-delivery history (follow-up)"

  constraints:
    - id: C-01
      description: >-
        The channel secret MUST be encrypted with secretkey.Active() before
        persistence (config_ciphertext BYTEA) and MUST NEVER be stored in a
        plaintext column. The list/read paths (List, Get) MAY decrypt to
        surface NON-secret config (for email: smtp host/port/from/to/
        username, so the edit form can pre-fill), but MUST redact secrets via
        redactConfig — the SMTP password, and the slack/webhook URL + token,
        are NEVER returned. A decrypt failure on read is non-fatal (the
        channel still lists, without pre-fill).
      type: security
      enforcement: error
    - id: C-02
      description: >-
        Outbound delivery MUST be SSRF-guarded. safeURLHost MUST reject any
        non-https URL and any literal loopback/private/link-local/
        unspecified IP (and localhost names) at validate time; the delivery
        HTTP client MUST re-check the post-DNS resolved IP at dial time and
        refuse non-public addresses.
      type: security
      enforcement: error
    - id: C-03
      description: >-
        DispatchChannel.Send MUST deliver only to enabled channels whose
        tag filter matches the alert (empty filter = wildcard), and a
        delivery failure to one channel MUST NOT stop delivery to the
        others (it returns the first error for the router's failure metric).
      type: technical
      enforcement: error
    - id: C-04
      description: >-
        The notification package MUST NOT import any external notification
        SDK (Slack/webhook clients); delivery uses net/http + encoding/json
        only, mirroring alertrouter's no-SDK rule.
      type: technical
      enforcement: error
    - id: C-05
      description: >-
        v1.3.0 — the in-app notification feed (the bell) is a durable per-user
        store (notifications, migration 0048): one row per (recipient, change).
        Record MUST upsert on (user_id, group_key) so a recurring change
        collapses onto one row and re-surfaces it UNREAD (read_at reset), rather
        than flooding the bell. Read-state is per user: MarkRead MUST be scoped
        to the owning user (a user can never read or mutate another user's row),
        UnreadCount counts that user's unread rows, MarkAllRead clears them. List
        returns the user's rows newest-first with an optional unread-only filter.
      type: technical
      enforcement: error
    - id: C-06
      description: >-
        v1.3.0 — the bell is fed by an in-app alertrouter.Channel
        (notifyfeed.Channel) registered alongside the stdout/Slack/email
        channels, so every alert the engine classifies fans into the feed. Send
        MUST fan one row per active recipient (Slice 1: all non-deleted users;
        per-host RBAC scoping is a later refinement), mapping the alert's
        type/severity/title/host onto the notification and deep-linking a
        host-scoped alert to /hosts/{id}. The API read/mutate endpoints are
        self-scoped to the caller (no cross-user access).
      type: security
      enforcement: error
    - id: C-07
      description: >-
        v1.4.0 (Slice 2) — the bell's second producer is a transaction-log
        regression projector (notifyfeed.Projector). After a scan's outcomes
        persist, ProjectScan reads that scan's transactions for the host and
        records ONE grouped "rule_regression" notification (fanned per active
        recipient) when any rule regressed. A regression is a state_changed ->
        fail row (a passing/skipped/errored rule now fails); a first_seen ->
        fail row counts ONLY when its severity is critical AND the host has
        prior scan history (on a host's first scan every rule is first_seen —
        baseline, not regression — and MUST NOT flood the bell). The grouped
        row's group_key is per host ("rule_regression:<host>") so a burst of N
        rules in one scan is one row and a later scan's regressions collapse
        onto (and re-surface) it; the notification severity is the highest among
        the regressed rules and the title summarizes the counts. The projector
        runs best-effort in the scan worker: a projection failure never fails or
        retries the scan.
      type: technical
      enforcement: error
    - id: C-08
      description: >-
        v1.5.0 (Slice 3) — the bell's third producer is the governance
        action-queue: a notifyfeed.GovernanceProjector with RBAC-scoped fan-out.
        notifyfeed.Store.RecordForRoles MUST fan one row per active user holding
        any of the given built-in roles (DISTINCT, same upsert/collapse as
        RecordFanout), and auth.RolesWithPermission(p) MUST resolve a permission
        to the role IDs that grant it. The projector MUST: (a) on an exception
        request, notify only users who can approve it
        (roles granting exception:approve), kind "exception_pending", severity
        high, deep-linked to the exception queue (/settings/policies), grouped
        per exception; (b) on an approve/reject, notify only the requester, kind
        "exception_approved"/"exception_rejected", severity medium; (c) on a
        TERMINAL remediation FAILURE (an execute that failed, or a rollback that
        did not restore — NOT a successful user-initiated rollback), notify only
        users who can act (roles granting remediation:execute), kind
        "remediation_failed", severity high, deep-linked to /hosts/{id}, grouped
        per (host, rule). The exception service and remediation worker hold the
        producer interfaces (so neither imports notifyfeed) and call best-effort:
        a notify failure never fails the governance transition or the job.
      type: security
      enforcement: error
    - id: C-09
      description: >-
        v1.6.0 (Slice 4) — the governance action queue completes the exception
        lifecycle: GovernanceProjector.ExceptionExpiringSoon warns approvers
        (roles granting exception:approve) that an approved exception is within
        ExpiringSoonWindow (72h) of lapsing — kind "exception_expiring", medium,
        deep-linked to the queue, grouped per exception; and
        GovernanceProjector.ExceptionExpired notifies approvers when one lapses
        (rules back in scope) — kind "exception_expired", medium. The
        expiring-soon warning MUST use notifyfeed.Store.RecordForRolesQuiet (ON
        CONFLICT DO NOTHING) so the hourly sweep notifies each recipient AT MOST
        ONCE and does not re-surface a read warning every hour; expired fires
        once per exception so it uses the standard fan-out. exception.Service
        drives both from its existing sweep loop: ExpireSweep notifies per newly
        expired exception, and ExpiringSoonSweep selects only approved
        exceptions with expires_at in (now, now+window] and warns each. All
        notifications are best-effort (a failure never fails the sweep).
      type: technical
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: Create encrypts the config and persists config_ciphertext + target_hint; a round-trip getDecrypted returns the original URL + token, and the ciphertext column never equals the plaintext URL bytes.
      priority: critical
      references_constraints: [C-01]
    - id: AC-02
      description: List and Get route through scanRedacted; redactConfig clears the email password (returning host/port/from/to/username for pre-fill) and returns an empty Config for slack/webhook (URL/token stay hidden). The read path never returns the password, URL, or token. Source inspection of redactConfig + scanRedacted.
      priority: critical
      references_constraints: [C-01]
    - id: AC-03
      description: "safeURLHost rejects http:// URLs, returns ErrInvalidConfig for literal private/loopback/link-local IPs (127.0.0.1, 10.0.0.1, 169.254.169.254, ::1) and localhost, and accepts a public https host returning its hostname."
      priority: critical
      references_constraints: [C-02]
    - id: AC-04
      description: isBlockedIP returns true for loopback, RFC1918 private, link-local, and unspecified addresses, and false for a public address (e.g. 1.1.1.1); the delivery client's dial Control refuses a blocked resolved IP.
      priority: critical
      references_constraints: [C-02]
    - id: AC-05
      description: 'v1.8.0 - DispatchChannel.Send delivers to an enabled wildcard channel and to a channel whose tag filter matches the alert tags, and skips a disabled channel and a non-matching tag filter; matchesTags treats an empty filter as a wildcard. The reserved "severity" key uses THRESHOLD semantics (via alertrouter.SeverityOrder): a filter value delivers that severity and every more-severe one (e.g. "high" delivers high and critical), so a channel can be scoped to a minimum level. Every other tag key stays exact-match.'
      priority: high
      references_constraints: [C-03]
    - id: AC-06
      description: Update with ReplaceConfig=false leaves config_ciphertext + target_hint unchanged (name/enabled/tag_filter only); Update with ReplaceConfig=true re-encrypts and refreshes target_hint. Delete is idempotent for a missing id.
      priority: high
      references_constraints: [C-01]
    - id: AC-07
      description: Source inspection — the notification package imports no external Slack/webhook SDK (only net/http + encoding/json for delivery).
      priority: high
      references_constraints: [C-04]
    - id: AC-08
      description: "v1.1.0 (Phase 2b) — email channels: validateEmail requires smtp_host, a valid port, a from address, and >=1 recipient (else ErrInvalidConfig) and returns the smtp_host as target_hint; a created email channel round-trips its smtp host/port/username/password/from/to through the encrypted config; deliver routes email via SMTP (net/smtp) and slack/webhook via HTTP. The SMTP host is NOT public-host-restricted (internal relays allowed)."
      priority: high
      references_constraints: [C-01, C-03]
    - id: AC-09
      description: >-
        v1.3.0 — notifyfeed.Store.Record inserts a notification for a user; a
        second Record with the same (user_id, group_key) collapses onto the same
        row (one row, not two), refreshes its content + occurred_at, and
        re-surfaces it as unread even if it had been read. List returns a user's
        rows newest-first and, with unreadOnly, only unread rows.
      priority: high
      references_constraints: [C-05]
    - id: AC-10
      description: >-
        v1.3.0 — read-state is per user: UnreadCount returns the user's unread
        count; MarkRead marks one of the user's rows read (idempotent) and
        returns ErrNotFound for an id that is not the caller's (so a user cannot
        mutate another user's notification); MarkAllRead marks all the user's
        unread rows read and returns the count affected.
      priority: critical
      references_constraints: [C-05]
    - id: AC-11
      description: >-
        v1.3.0 — notifyfeed.Channel (an alertrouter.Channel named "in-app")
        fans an alert into one notification row per active recipient, mapping
        the alert's Type->kind, Severity->severity, Title/Body, and HostID, with
        a host-scoped alert deep-linked to /hosts/{id} and the alert DedupKey as
        the group_key; a fleet alert (no host) carries no host link.
      priority: high
      references_constraints: [C-06]
    - id: AC-12
      description: >-
        v1.4.0 — Projector.ProjectScan turns a scan's state_changed -> fail
        transactions into ONE grouped rule_regression notification per active
        recipient: severity is the highest among the regressed rules, the title
        reads "<host>: <N> rule(s) regressed (<C> critical)", host_id + a
        /hosts/{id} deep-link are set, and fail->pass recoveries and
        severity_changed rows are excluded from the count.
      priority: high
      references_constraints: [C-07]
    - id: AC-13
      description: >-
        v1.4.0 — first-scan baseline suppression: a scan whose fail rows are all
        first_seen with no prior host scan history produces NO notification; once
        the host has prior history, a NEW first_seen critical fail is counted
        (and a first_seen high fail is not), so a follow-up scan with one new
        critical yields "1 rule regressed (1 critical)".
      priority: critical
      references_constraints: [C-07]
    - id: AC-14
      description: >-
        v1.4.0 — no-op + collapse: a scan with only a recovery + severity churn
        records nothing; two regressing scans on the same host collapse onto one
        per-host row (group_key rule_regression:<host>) and the second
        re-surfaces it unread with the latest scan's severity.
      priority: high
      references_constraints: [C-07]
    - id: AC-15
      description: >-
        v1.5.0 — GovernanceProjector.ExceptionRequested fans an
        "exception_pending" (severity high, link /settings/policies, grouped per
        exception) to every user whose role grants exception:approve (auditor,
        security_admin, admin) and to no one else (a viewer does not receive
        it). auth.RolesWithPermission(exception:approve) resolves that role set;
        RecordForRoles fans one row per holder.
      priority: high
      references_constraints: [C-08]
    - id: AC-16
      description: >-
        v1.5.0 — GovernanceProjector.ExceptionDecided notifies ONLY the
        requester: an approve records kind "exception_approved" (severity
        medium) for the requesting user and no one else; a reject records
        "exception_rejected".
      priority: high
      references_constraints: [C-08]
    - id: AC-17
      description: >-
        v1.5.0 — GovernanceProjector.RemediationFailed fans a "remediation_failed"
        (severity high, link /hosts/{id}, grouped per host+rule) to every user
        whose role grants remediation:execute (ops_lead, security_admin, admin)
        and to no one else (a viewer does not receive it).
      priority: high
      references_constraints: [C-08]
    - id: AC-18
      description: >-
        v1.6.0 — ExceptionExpiringSoon records a medium "exception_expiring"
        (link /settings/policies, grouped per exception) for approvers and not
        viewers, via the QUIET fan-out: after a recipient reads it, a repeated
        record for the same exception leaves it READ (does not re-surface
        unread). ExceptionExpired records a medium "exception_expired" for
        approvers.
      priority: high
      references_constraints: [C-09]
    - id: AC-19
      description: >-
        v1.6.0 — Service.ExpiringSoonSweep warns only approved exceptions whose
        expires_at is within (now, now+ExpiringSoonWindow]: an in-window
        approved exception is warned, an out-of-window approved one and an
        in-window still-requested one are not; the count returned matches the
        warned set.
      priority: high
      references_constraints: [C-09]
    - id: AC-20
      description: >-
        v1.7.0 — GovernanceProjector.PasswordExpiring fans an
        account_password_expiring notification to every host:read user
        (RolesWithPermission(HostRead)), grouped per (host, user), with
        severity medium when expiring and high when expired, carrying the
        host_id and a /hosts/<id> link. It uses the QUIET fan-out
        (RecordForRolesQuiet) so a daily re-sweep of the same account stays
        read rather than re-surfacing unread each day.
      priority: high
      references_constraints: [C-09]
    - id: AC-21
      description: >-
        v1.8.0 — Email SMTP encryption is operator-selectable via
        Config.SMTPEncryption. NormalizeSMTPEncryption maps an empty or
        unknown value to the secure default "starttls" and passes through
        "none"/"tls". sendSMTP (shared by alert + report email) implements
        implicit TLS from connect for "tls" (SMTPS, e.g. port 465, via
        tls.DialWithDialer), a REQUIRED STARTTLS upgrade for "starttls"
        (the send fails rather than silently downgrading to plaintext), and
        plaintext for "none". net/smtp.SendMail is not used (it cannot do
        implicit TLS and only opportunistic STARTTLS).
      priority: high
      references_constraints: [C-03]
