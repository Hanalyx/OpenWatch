spec:
  id: system-scheduler
  title: Adaptive compliance scheduler
  version: "3.1.0"
  status: approved
  tier: 1

  context:
    system: openwatch
    feature: Adaptive scan scheduling
    description: >
      The scheduler decides WHEN to run a scan against a host. A scan
      runs the FULL rule corpus applicable to the host's detected OS
      capabilities — not a single framework. Framework-scoped views
      are produced at query time by joining transactions /
      host_rule_state to the per-rule framework_refs JSONB.

      A cron tick (60s) sweeps host_compliance_schedule for rows where
      next_scheduled_scan <= now() and enqueues one job per due host
      to the PostgreSQL SKIP LOCKED queue, capped by the config rate
      limit. After each COMPLETED scan (scheduler-dispatched or
      on-demand), the worker calls Service.PersistAfterScan: the
      result is classified into a compliance state and the row's
      next_scheduled_scan is re-anchored to the completion time.

      Version 3.0.0 breaking changes (from 2.0.0), per scan plan
      decisions #4 and #5 (resolved 2026-06-12):

      (1) The tier ladder is OPERATOR-EDITABLE SYSTEMCONFIG (key
      "scan", systemconfig.ScanConfig), loaded via LoadFromConfig and
      refreshed before every tick by RunManaged. The v2 Ed25519-signed
      schedules-policy file, its revocation list, and the
      startup-refusal path are REMOVED (startup.go / revocation.go
      deleted): signing the cadence config had no threat-model value
      when the same operator can PUT maintenance toggles that stop
      scanning entirely. The job-payload HMAC (hmac.go) is unrelated
      to policy signing and STAYS. The payload's policy_version
      becomes a config-derived snapshot ("cfg-" + the six ladder
      minutes) that changes exactly when the effective cadence does.

      (2) ComplianceState grows a fifth score band, mostly_compliant,
      matching the prototype: critical <20, non_compliant 20-49,
      partial 50-69, mostly_compliant 70-89, compliant >=90, plus
      unknown for never-scanned (migration 0024 widens the CHECK and
      backfills a schedule row per live host; host create seeds new
      rows due immediately).

      (3) Manual-scan posture revision: POST /scans still bypasses
      dispatch (no schedule-row lock, no dispatch-time advancement),
      but its COMPLETION updates the row via PersistAfterScan like any
      scan — a manual scan postpones the next auto scan rather than
      stacking onto it.

      Version 2.0.0 (from 1.0.0) removed framework_id from JobPayload
      and the HMAC inputs; that architecture is unchanged here.

  objective:
    summary: >
      A scan happens on every host on its config-defined cadence with no
      manual intervention. Fast for risky states, slow for compliant
      (max 48h). Maintenance (config-global or per-host) blocks
      dispatch; the config Enabled flag pauses the loop. Manual scans
      bypass dispatch but refresh the schedule on completion.
    scope:
      includes:
        - Per-host schedule record with state-derived next-scan time
        - Cron tick that polls for due hosts
        - Tier ladder driven by systemconfig (key "scan"), refreshed per tick
        - Config Enabled flag + global maintenance pause; per-host maintenance flag
        - Schedule update after each scan completion
      excludes:
        - Per-rule scheduling (whole-framework cadence only in Slice B)
        - Anomaly/ML-driven cadence
        - Cross-host scan-storm protection (per-host concurrency only)

  constraints:
    - id: C-01
      description: 'v3.0.0 - tier intervals MUST be loaded from the systemconfig scan config (LoadFromConfig over systemconfig.ScanConfig), never hardcoded and never from a policy file; RunManaged refreshes the config before every tick so operator edits apply within one tick without a restart'
      type: technical
      enforcement: error
    - id: C-02
      description: Cron tick interval MUST be 60s; finer cadence offers no improvement
      type: performance
      enforcement: error
    - id: C-03
      description: Dispatcher MUST use SELECT ... FOR UPDATE SKIP LOCKED on host_compliance_schedule
      type: technical
      enforcement: error
    - id: C-04
      description: Max interval cap is 48 hours regardless of policy tier values
      type: business
      enforcement: error
    - id: C-05
      description: 'v3.1.0 - A host in EFFECTIVE maintenance MUST be excluded from dispatch, resolved via the host_effective_maintenance view (migration 0049): per-host (hosts.maintenance_mode, the host-detail toggle) OR per-group (a group with maintenance=true the host belongs to, manual member or auto os_family match). Maintenance is an explicit operator toggle with no auto-expiry; the host resumes on the next tick once maintenance clears. The dispatcher MUST NOT read host_compliance_schedule.maintenance_mode (a legacy column the API never wrote, so it enforced nothing).'
      type: technical
      enforcement: error
    - id: C-06
      description: 'Each scan job payload MUST snapshot the config-derived version string at enqueue time ("cfg-" + the six ladder minutes); config reloads do not affect in-flight payloads'
      type: technical
      enforcement: error
    - id: C-07
      description: 'v3.0.0 revision - manual scans via POST /scans MUST bypass DISPATCH (no schedule-row lock, no dispatch-time next_scheduled_scan advancement), but their COMPLETION updates the row via PersistAfterScan exactly like a scheduled scan'
      type: technical
      enforcement: error
    - id: C-08
      description: Tier intervals MUST be clamped to a minimum of 5 minutes regardless of config values; protects against scan-storm DoS via misconfigured (malicious or accidental) settings. The clamp applies BOTH at config write (ScanConfig.Normalize) and at ladder load (LoadIntervals)
      type: business
      enforcement: error
    - id: C-09
      description: Every UPDATE to host_compliance_schedule MUST emit a scheduler.schedule.updated audit event with the prior + new state in detail
      type: security
      enforcement: error
    - id: C-10
      description: 'v3.0.0 - the five score bands MUST classify as: hasCritical OR score<20 -> critical; 20-49 -> non_compliant; 50-69 -> partial; 70-89 -> mostly_compliant; >=90 -> compliant. These band names are the systemconfig keys, the host_compliance_schedule CHECK values (migration 0024), and the Settings UI labels'
      type: technical
      enforcement: error
    - id: C-11
      description: Each scan job payload MUST include an HMAC-SHA256 over (host_id, policy_version, enqueued_at) using a server-side key; dequeue MUST verify the HMAC before executing, rejecting tampered payloads. NOTE v2.0.0 breaking change — framework_id removed from the HMAC inputs; old payloads (with framework_id) MUST fail verification under the new HMAC scheme and are dead-lettered
      type: security
      enforcement: error
    - id: C-12
      description: Scheduler.NewService MUST NOT take a defaultFramework parameter — scans no longer carry a framework identifier. JobPayload struct has no FrameworkID field. Source-inspection enforces (AC-16)
      type: technical
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: 'v3.0.0 - scheduler.LoadFromConfig(systemconfig.ScanConfig) maps all six state minutes into a clamped TierLadder via LoadIntervals (missing tier still defaults to MaxInterval 48h) and derives the version snapshot from the ladder values; two configs with the same ladder produce the same version, an edit that changes any interval changes it.'
      priority: critical
      references_constraints: [C-01, C-04]
    - id: AC-02
      description: scheduler.NextScanFor(state, lastFinishedAt, ladder) returns lastFinishedAt + ladder[state]; clamps to MaxInterval.
      priority: critical
      references_constraints: [C-01, C-04]
    - id: AC-03
      description: Cron tick fires at 60s intervals; missed ticks (e.g., during a restart) do not cause double dispatch of the same host.
      priority: critical
      references_constraints: [C-02]
    - id: AC-04
      description: Dispatcher's SELECT uses FOR UPDATE ... SKIP LOCKED (locking only the schedule rows, FOR UPDATE OF s); two concurrent tick processes dispatch disjoint hosts.
      priority: critical
      references_constraints: [C-03]
    - id: AC-05
      description: 'v3.1.0 - A host in effective maintenance is skipped by the dispatcher even when due, whether the maintenance is per-host (hosts.maintenance_mode=true) or per-group (member of a group with maintenance=true); enforcement resolves through the host_effective_maintenance view. The skipped host''s schedule row is not advanced, so it resumes once maintenance clears.'
      priority: high
      references_constraints: [C-05]
    - id: AC-06
      description: Scheduler-enqueued scan job payload contains policy_version, host_id, enqueued_at, hmac — NOT framework_id; downstream services use the snapshotted policy_version for audit and threshold lookup. Verified by decoding a freshly enqueued payload and asserting its field set.
      priority: critical
      references_constraints: [C-06, C-12]
    - id: AC-07
      description: Manual scan via POST /scans does not write to host_compliance_schedule (no UPDATE to next_scheduled_scan, no row lock acquired by scheduler).
      priority: high
      references_constraints: [C-07]
    - id: AC-08
      description: 'After a scan completes, Service.PersistAfterScan(hostID, score, hasCritical, completedAt) classifies via StateFromScore + UpdateAfterScan and UPSERTs host_compliance_schedule (state, score, has_critical_findings, interval minutes, next_scheduled_scan anchored at completedAt, last_scan_completed_at), emitting scheduler.schedule.updated. The worker calls it after EVERY completed scan, scheduler-dispatched or on-demand; host create seeds the schedule row due-immediately and migration 0024 backfills existing hosts.'
      priority: critical
      references_constraints: [C-07, C-09, C-10]
    - id: AC-09
      description: Config reload while a scan is in-flight does NOT change that scan's payload version snapshot; verified by reloading mid-test.
      priority: critical
      references_constraints: [C-06]
    - id: AC-10
      description: 'v3.0.0 - Service.Reload swaps ladder/version/rate-limit/pause atomically; a paused scheduler (config Enabled=false or MaintenanceGlobal=true) dispatches ZERO hosts even with due rows, and un-pausing resumes dispatch on the next tick. RunManaged keeps the last-known-good ladder when a config load fails (logged, never crashes the loop).'
      priority: critical
      references_constraints: [C-01]
    - id: AC-11
      description: scheduler metrics expose last_tick_at, due_count, dispatched_count, skipped_maintenance_count, refuse_count, policy_clamped_count, hmac_reject_count counters.
      priority: medium
    - id: AC-12
      description: A config tier interval below 5 minutes is clamped to 5 minutes at load time (ClampRecord produced); ScanConfig.Normalize applies the same floor plus the 48h ceiling and the 1..100 rate-limit bound at write time.
      priority: critical
      references_constraints: [C-08]
    - id: AC-13
      description: Every UPDATE to host_compliance_schedule (next_scheduled_scan write, maintenance_mode toggle, manual override) emits exactly one scheduler.schedule.updated audit event with prior and new state in detail.
      priority: critical
      references_constraints: [C-09]
    - id: AC-14
      description: 'v3.0.0 - StateFromScore implements the five bands with hasCritical override: boundaries at 20/50/70/90 (half-open, lower bound inclusive); hasCritical=true forces critical at any score. AllStates() lists exactly the six states in ladder order, and migration 0024 admits mostly_compliant in the host_compliance_schedule CHECK.'
      priority: critical
      references_constraints: [C-10]
    - id: AC-15
      description: A scan job whose stored payload has been tampered (host_id mutated post-enqueue) fails HMAC verification at dequeue; the job is rejected, marked failed in the queue, and scheduler.job.hmac_rejected audit event is emitted.
      priority: critical
      references_constraints: [C-11]
    - id: AC-16
      description: Source-inspection of internal/scheduler/ — JobPayload struct has no FrameworkID field; NewService signature has no defaultFramework parameter; Dispatch emit payload does not contain the "framework_id" key. Confirms the v2.0.0 architectural correction is materially in place, not just spec'd.
      priority: critical
      references_constraints: [C-12]
