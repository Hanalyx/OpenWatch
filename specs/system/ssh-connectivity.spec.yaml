spec:
  id: system-ssh-connectivity
  title: SSH connectivity check against resolved credentials
  version: "1.3.0"
  status: approved
  tier: 2

  context:
    system: openwatch
    feature: SSH dial layer
    description: >
      Performs an SSH handshake against a host using the credential
      returned by credential.Resolve. The dial layer is the only path
      that consumes plaintext secrets; the api-hosts connectivity-check
      endpoint and the future Kensa scan executor both go through it.
      Key validation follows NIST SP 800-57 (RSA ≥ 2048, Ed25519 always
      OK). Host-key verification has two modes: strict (known-hosts
      lookup; reject unknown) and TOFU (trust-on-first-use, then
      strict). Timeouts are mandatory.
    related_specs:
      - system-credential-store
      - system-host-inventory

  objective:
    summary: >
      Make "can the platform reach this host?" answerable in one call
      with a hard timeout, a clean error per failure mode, and no
      leaked credential material in any log or audit row.
    scope:
      includes:
        - Dial(ctx, host, cred) with timeout enforcement
        - Known-hosts policy (Strict, TOFU)
        - NIST SP 800-57 key validator (RSA ≥ 2048, Ed25519, ECDSA P-256+)
        - Distinct error sentinels per failure mode for forensic clarity
      excludes:
        - "Running commands over SSH (Slice B's scan executor)"
        - "Connection pooling / session reuse (no demand in Slice A)"
        - "SSH cert auth (deferred — operators rarely use it)"

  constraints:
    - id: C-01
      description: Dial MUST enforce a connect+handshake timeout no greater than DefaultDialTimeout (10 seconds); callers may supply a shorter ctx deadline
      type: performance
      enforcement: error
    - id: C-02
      description: Dial MUST reject RSA keys below 2048 bits per NIST SP 800-57
      type: security
      enforcement: error
    - id: C-03
      description: Dial MUST NEVER include a credential's password or private key in any error message, log line, or audit detail
      type: security
      enforcement: error
    - id: C-04
      description: Strict known-hosts mode MUST reject a connection when the host's presented key does not match any known-hosts entry for that hostname
      type: security
      enforcement: error
    - id: C-05
      description: TOFU known-hosts mode MUST accept the first key presented for a hostname and store it; subsequent connections behave like Strict against that stored key
      type: security
      enforcement: error
    - id: C-06
      description: A failed handshake MUST surface a distinct error sentinel (ErrAuthFailed / ErrHostKeyUnknown / ErrHostKeyMismatch / ErrDialTimeout / ErrConnect) so callers can audit by reason
      type: technical
      enforcement: error
    - id: C-09
      description: 'v1.2.0 — The credential-password sudo fallback applies to EVERY SSH-using subsystem that issues a sudo command, namely: (1) the compliance collector via ssh.RunSudo, (2) the liveness privilege probe in internal/sshprivilege, (3) OS discovery firewall queries in internal/intelligence/discovery. When the initial `sudo -n <cmd>` returns non-zero, the call site MAY retry as `sudo -S -k -p '' <cmd>` ONLY when ALL of these hold — (a) systemconfig.SecurityConfig.AllowCredentialSudoPassword is true, (b) cred.AuthMethod ∈ {password, both}, (c) cred.Password is non-empty. Any one condition false → no retry; the original sudo -n failure propagates with usedFallback=false. The conditions and the retry shape are IDENTICAL across the three call sites — drift between them is forbidden. NOTE: the compliance scan path ALSO supports credential-password sudo, but via the per-connection sudo-mode probe defined in system-connection-profile (a once-per-connection `true` sentinel, then `sudo -S -p ''` without `-k` given the high command volume) — it is deliberately NOT part of this inline `sudo -n`→`sudo -S -k` retry shape and is exempt from the identical-shape rule. Separately, AllowCredentialSudoPassword now DEFAULTS to true (a kill-switch, not opt-in); the per-call gating above is unchanged.'
      type: security
      enforcement: error
    - id: C-10
      description: The credential password MUST be delivered to the remote sudo process via the SSH session's STDIN pipe (RunWithStdin). The password MUST NOT appear in the cmd argv on the remote host. Source-inspection enforces (AC-15).
      type: security
      enforcement: error
    - id: C-11
      description: Every sudo -S retry MUST include the -k flag so the remote sudo credential cache is invalidated before each attempt. A wrong password therefore fails immediately on the FIRST sudo -S call rather than incrementing pam_tally2 / pam_faillock counters that could lock the host user out.
      type: security
      enforcement: error
    - id: C-12
      description: When sudo -n succeeds, the password fallback path MUST NOT execute and the credential password MUST NOT be transmitted. Source-inspection enforces (AC-15) — there is exactly one call site that passes a password to sudo and it is unreachable after a sudo -n success on the same command.
      type: security
      enforcement: error
    - id: C-13
      description: >-
        TOFU's "store the first key" (C-05) MUST be DURABLE in production:
        the known-hosts store MUST persist across process restarts. The
        in-memory store is per-process, so a restart re-TOFUs every host and
        a network attacker can MITM the first scan after each restart to
        harvest credentials. Production therefore wires a PostgreSQL-backed
        KnownHostsStore (internal/knownhosts, table ssh_known_hosts) at every
        dial site, not an in-memory store. A changed key is still rejected
        (ErrHostKeyMismatch) by the dial layer.
      type: security
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: Dial against a reachable test SSH server with a valid password credential completes the handshake within 1 second.
      priority: critical
    - id: AC-02
      description: Dial against a reachable test SSH server with a valid Ed25519 private-key credential completes the handshake within 1 second.
      priority: critical
    - id: AC-03
      description: Dial against a TCP address that refuses connections returns ErrConnect within DefaultDialTimeout (10s).
      priority: critical
      references_constraints: [C-01]
    - id: AC-04
      description: Dial with a context that times out before the underlying dial returns surfaces ErrDialTimeout (not a generic ctx.DeadlineExceeded).
      priority: critical
      references_constraints: [C-01, C-06]
    - id: AC-05
      description: ValidateAuthKey rejects an RSA key with bitlen < 2048 with ErrWeakKey; accepts an RSA key with bitlen >= 2048; always accepts an Ed25519 key.
      priority: critical
      references_constraints: [C-02]
    - id: AC-06
      description: KnownHostsPolicy Strict mode rejects an unknown-host-key handshake with ErrHostKeyUnknown; the connection is NOT cached.
      priority: critical
      references_constraints: [C-04, C-06]
    - id: AC-07
      description: KnownHostsPolicy TOFU mode accepts the first connection to a hostname and persists the key; a second connection with the SAME key succeeds; a second connection with a DIFFERENT key returns ErrHostKeyMismatch.
      priority: critical
      references_constraints: [C-05, C-06]
    - id: AC-08
      description: A failed Dial's returned error AND any audit emission MUST NOT contain the cleartext password or the cleartext private key from the credential.
      priority: critical
      references_constraints: [C-03]
    - id: AC-09
      description: Dial returns ErrAuthFailed (distinct from ErrConnect / ErrHostKeyUnknown) when credentials are rejected by the server.
      priority: critical
      references_constraints: [C-06]
    - id: AC-10
      description: Dial against an unparseable private-key credential returns ErrInvalidKey BEFORE any network I/O — invariant verified by mocking the dial network func.
      priority: high
    - id: AC-11
      description: Test stub returns exit 1 for `sudo -n cat /etc/shadow` then exit 0 for `sudo -S -k -p '' cat /etc/shadow` with the expected password on stdin. With AllowCredentialPassword=true and cred.AuthMethod=both + populated Password, ssh.RunSudo returns the fallback's (out, code=0, usedFallback=true) and the collector's runCycleWithTransport reports fallback count > 0.
      priority: critical
      references_constraints: [C-09]
    - id: AC-12
      description: Same stub setup as AC-11 but AllowCredentialPassword=false. The sudo -n exit 1 propagates verbatim; ssh.RunSudo issues NO sudo -S -k call; usedFallback=false; the collector's per-cycle fallback count remains 0.
      priority: critical
      references_constraints: [C-09]
    - id: AC-13
      description: cred.AuthMethod=ssh_key with empty cred.Password. Policy allows fallback but credential cannot provide one. ssh.RunSudo MUST NOT issue sudo -S -k; usedFallback=false.
      priority: critical
      references_constraints: [C-09]
    - id: AC-14
      description: Stub returns exit 0 for `sudo -n cat /etc/shadow`. The password fallback path MUST NOT execute even if policy + credential would allow it. Snapshot is populated normally; zero `system.intelligence.sudo_password_used` audit events emitted.
      priority: critical
      references_constraints: [C-12]
    - id: AC-15
      description: Source-inspection of internal/ssh/sudo.go verifies the password is passed to RunWithStdin via the stdin parameter and never appears in the cmd string. The single call site that builds the `sudo -S -k -p ''` command MUST source the password from cred.Password — no fmt.Sprintf interpolation of secret material into argv.
      priority: critical
      references_constraints: [C-10]
    - id: AC-16
      description: After one collector.RunCycle against a host where the password fallback engaged for at least one sudo command, exactly one audit event of code `system.intelligence.sudo_password_used` is emitted with detail.credential_id = the credential UUID, detail.host_id = the host UUID, and detail.command_count = the number of distinct sudo commands that used the fallback. Cycles with zero fallback use emit zero such events.
      priority: critical
      references_constraints: [C-09]
    - id: AC-17
      description: Stub returns exit 1 for sudo -n then exit 1 for sudo -S -k (wrong password). ssh.RunSudo issues exactly ONE sudo -S -k call (no internal retry); usedFallback=true; the returned exit code matches the failing fallback. The -k flag is present in the fallback cmd string so the host-side sudo timestamp cache is invalidated, protecting against pam_tally2 / pam_faillock lockout.
      priority: critical
      references_constraints: [C-11]
    - id: AC-18
      description: 'v1.2.0 — Liveness privilege probe parity. A stubbed SSH session returns exit 1 for `sudo -n true` then exit 0 for `sudo -S -k -p '''' true` with the credential password fed via stdin. With AllowCredentialSudoPassword=true and a credential carrying a non-empty Password, internal/sshprivilege.Probe returns ok=true. With the policy off (false) the probe returns ok=false and issues no sudo -S call.'
      priority: critical
      references_constraints: [C-09, C-10, C-11]
    - id: AC-19
      description: 'v1.2.0 — Liveness privilege probe — credential cannot supply a password. cred.AuthMethod=ssh_key with empty cred.Password and AllowCredentialSudoPassword=true. The probe MUST NOT issue any sudo -S call (no Password to feed); the sudo -n exit 1 propagates as ok=false.'
      priority: critical
      references_constraints: [C-09]
    - id: AC-20
      description: 'v1.2.0 — OS discovery firewall parity. A stubbed SSH session returns exit 1 for `sudo -n ufw status` then exit 0 for `sudo -S -k -p '''' ufw status` (with active output) when fed the password via stdin. With policy on + password, discovery.probeFirewall returns service="ufw", status="active". With policy off or no password, the helper returns ok=false from this attempt (existing fall-through to the next firewall remains).'
      priority: critical
      references_constraints: [C-09, C-10, C-11]
    - id: AC-21
      description: 'v1.2.0 — Negative invariant across all three sites: a sudo -n exit 0 MUST NOT trigger the fallback. Source-walk asserts that the three call sites (ssh.RunSudo, sshprivilege.Probe, discovery.probeFirewall) all gate the sudo -S retry behind a non-zero exit code from sudo -n and a runtime policy/credential check.'
      priority: high
      references_constraints: [C-09, C-12]
    - id: AC-22
      description: The PostgreSQL known-hosts store (internal/knownhosts) round-trips Put/Get for a hostname and returns (nil,false) for an absent host; a key stored by one Store instance is visible to a fresh Store instance on the same database (the durable-TOFU-across-restart guarantee), and re-Putting the same key is idempotent.
      priority: critical
      references_constraints: [C-13]
