spec: ssh-security
version: "1.1"
status: active
owner: engineering
summary: >
  SSH key validation and host key policy security: key type classification
  following NIST SP 800-57, security level assessment (SECURE/ACCEPTABLE/
  DEPRECATED/REJECTED), host key policies (strict, auto_add, warning),
  policy factory, SHA256 fingerprint generation in OpenSSH format, and
  enforcement that all SSH client creation uses the configurable policy
  system (not hardcoded AutoAddPolicy).

---

# Objective

objective: >
  Ensure SSH key validation enforces NIST SP 800-57 security levels and that
  host key policies provide auditable connection decisions for compliance
  environments.

---

# Constraints

constraints:
  key_validation:
    - "Key validation MUST follow NIST SP 800-57 security levels"
    - "DSA MUST be classified as REJECTED (disabled in OpenSSH 7.0+)"
    - "Ed25519 MUST be classified as SECURE regardless of key size parameter"
    - "RSA classification MUST use 4096-bit threshold for SECURE and 2048-bit for ACCEPTABLE"
    - "ECDSA classification MUST use P-384 threshold for SECURE and P-256 for ACCEPTABLE"

  host_key_policies:
    - "Host key policies MUST default to SecurityWarningPolicy (audit-friendly)"
    - "SecurityWarningPolicy MUST log warnings but MUST NOT raise exceptions"
    - "StrictHostKeyPolicy MUST reject unknown hosts by raising an exception"
    - "create_host_key_policy factory MUST support strict, auto_add, auto_add_warning, and warning"

  fingerprints:
    - "Known host fingerprints MUST use SHA256 in OpenSSH format (SHA256:base64hash)"

---

# Acceptance Criteria

acceptance_criteria:
  - id: AC-1
    description: >
      Ed25519 is always classified as SECURE by assess_key_security,
      regardless of key_size parameter.

  - id: AC-2
    description: >
      RSA key classification: >=4096 bits -> SECURE, 2048-4095 -> ACCEPTABLE,
      <2048 -> DEPRECATED.

  - id: AC-3
    description: >
      DSA is always classified as REJECTED with a deprecation warning in the
      warnings list.

  - id: AC-4
    description: >
      ECDSA classification: >=384 bits -> SECURE, 256 -> ACCEPTABLE,
      <256 -> DEPRECATED.

  - id: AC-5
    description: >
      SSHKeyValidationResult exposes required fields: is_valid, key_type,
      security_level, key_size, error_message, warnings, recommendations.

  - id: AC-6
    description: >
      SSHKeySecurityLevel enum has exactly 4 values in security order:
      REJECTED < DEPRECATED < ACCEPTABLE < SECURE.

  - id: AC-7
    description: >
      SecurityWarningPolicy allows connection (missing_host_key does not raise).

  - id: AC-8
    description: >
      StrictHostKeyPolicy rejects unknown hosts by delegating to
      super().missing_host_key which raises an exception.

  - id: AC-9
    description: >
      create_host_key_policy factory supports "strict", "auto_add",
      "auto_add_warning", and "warning" policy types.

  - id: AC-10
    description: >
      Known hosts fingerprints use SHA256 format (SHA256:base64hash)
      as generated by KnownHostsManager._generate_fingerprint.

  - id: AC-11
    description: >
      All SSH client creation paths (including execute_command_async in
      SSHConnectionManager and host validation in hosts/crud.py) MUST use
      SSHConfigManager.configure_ssh_client() or equivalent configurable
      policy, never hardcode paramiko.AutoAddPolicy.

---

